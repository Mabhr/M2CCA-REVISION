    <li><strong>ISO 17799</strong> — sécurité (ancêtre 27002, par thèmes)</li>
    <li><strong>ISO 19001</strong> — directives pour la conduite d'audit</li>
    <li><strong>ISO 27001</strong> — SMSI</li>
    <li><strong>ISO 27002</strong> — 133 bonnes pratiques de sécurité</li>
    <li><strong>ISO 27004</strong> — indicateurs et métriques SMSI</li>
    <li><strong>ISO 27005</strong> — gestion des risques</li>
  </ul>
  <h3>Les buts du SMSI (ISO 27001)</h3>
  <ul>
    <li>Maintenir et améliorer la position de l'organisme : compétitivité, profitabilité, conformité aux lois, image de marque</li>
    <li>Protéger les <strong>actifs</strong> (« assets ») — tout ce qui compte pour l'organisme</li>
  </ul>
  <p>Le vocabulaire du SMSI est fourni dans ISO 27000. Les mesures de sécurité sont prises dans le catalogue ISO 27002.</p>
  <h3>Méthodes d'analyse des risques</h3>
  <p>Normes = bonnes pratiques. Méthodes = évaluation globale du SI en termes de <em>risques</em> et de <em>protection</em>.</p>
  <ul>
    <li><strong>COBIT</strong> — Control Objectives for Business and related Technology</li>
    <li><strong>EBIOS</strong> — Expression des Besoins et Identification des Objectifs de Sécurité (ANSSI)</li>
    <li><strong>MARION</strong> (ancienne)</li>
    <li><strong>MEHARI</strong> — MÉthode HArmonisée d'analyse de RIsques (CLUSIF, depuis 1995)</li>
  </ul>
  <h3>EBIOS — 5 étapes</h3>
  <ol>
    <li><strong>Étude du contexte</strong> — périmètre, présentation de l'entreprise, architecture, contraintes techniques et réglementaires, enjeux commerciaux, détails équipements/logiciels/organisation</li>
    <li><strong>Expression des besoins de sécurité</strong> — critères de risque + impacts inacceptables exprimés par les utilisateurs</li>
    <li><strong>Étude des menaces</strong> — vulnérabilités et types d'attaques selon l'architecture, par origine (humaine/matérielle/environnementale) et cause (accidentelle/délibérée)</li>
    <li><strong>Identification des objectifs de sécurité</strong> — confrontation besoins/menaces → cahier des charges de sécurité</li>
    <li><strong>Détermination des exigences de sécurité</strong> — jusqu'où aller, stratégie de gestion du risque (accepter, réduire, refuser)</li>
  </ol>
  <h3>MEHARI — démarche et livrables</h3>
  <p>Développée par le <strong>CLUSIF depuis 1995</strong>, dérivée de MELISA et MARION. Démarche : analyse des enjeux (scénarios redoutés), classification des entités selon 3 critères DIC, audits identifiant les vulnérabilités, analyse des risques.</p>
  <table class="comp-table">
    <thead><tr><th>Livrable</th><th>Contenu</th></tr></thead>
    <tbody>
      <tr><td><strong>PSS — Plan Stratégique de Sécurité</strong></td><td>Objectifs de sécurité + métriques pour les mesurer. Évaluation du niveau de gravité. Définit la PSSI et la charte d'utilisation du SI.</td></tr>
      <tr><td><strong>POS — Plans Opérationnels de Sécurité</strong></td><td>Mesures de sécurité à mettre en œuvre par site. Scénarios de compromission, audits des services. Évaluation de chaque risque (probabilité, impact). Planification de la mise à niveau.</td></tr>
      <tr><td><strong>POE — Plan Opérationnel d'Entreprise</strong></td><td>Suivi de la sécurité via indicateurs sur les risques identifiés + choix des scénarios de catastrophe contre lesquels se prémunir.</td></tr>
    </tbody>
  </table>
  <p>Bases de connaissances pour automatiser les calculs de gravité et proposer des liens menaces/parades. Démarche centrée sur la <strong>continuité d'activité</strong>.</p>
  <h3>ISMS et roue de Deming</h3>
  <p>Application au domaine de la sécurité informatique de la roue de Deming (PDCA) :</p>
  <ul>
    <li><strong>Planifier</strong> — passer d'une posture réactive à proactive</li>
    <li><strong>Faire</strong> — développer des processus en suivant un référentiel</li>
    <li><strong>Contrôler</strong> — audits et tests d'intrusion</li>
    <li><strong>Agir</strong> — analyse des risques, besoins et enjeux</li>
  </ul>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="25" id="chap-25">
  <h2>25. Cryptographie — historique et principes</h2>
  <h3>Repères historiques</h3>
  <ul>
    <li><strong>50 av. JC</strong> — Julius Cesar utilise une simple substitution de l'alphabet</li>
    <li><strong>1918</strong> — Gilbert Vernam invente le <em>one-time pad</em>, l'algorithme le plus sûr mais impraticable</li>
    <li><strong>1923</strong> — Albert Scherbius met au point la machine <em>Enigma</em></li>
    <li><strong>1937-1939</strong> — Enigma M3 adoptée par le Wehrmacht ; équipe d'Alan Turing trouve la solution</li>
    <li><strong>1976</strong> — IBM publie le DES (Data Encryption Standard) basé sur Lucifer</li>
    <li><strong>1976</strong> — Diffie et Hellman introduisent l'idée du système à clé publique</li>
    <li><strong>1978</strong> — l'algorithme RSA est publié par Rivest, Shamir et Adleman</li>
  </ul>
  <p>« Cryptographie » : du grec <em>crypto</em> = caché, <em>graphy</em> = écrire. Art de l'écriture secrète. Science permettant de préserver la confidentialité des échanges.</p>
  <h3>Les 3 services de la cryptographie</h3>
  <ul>
    <li>① <strong>Intégrité</strong> — détecter une modification malveillante (la crypto fournit le MOYEN de détection, pas l'empêchement)</li>
    <li>② <strong>Confidentialité</strong> — limiter l'accès aux personnes autorisées</li>
    <li>③ <strong>Preuve</strong> — authentification (identité) + non-répudiation (imputation des actions)</li>
  </ul>
  <h3>Stéganographie</h3>
  <div class="def-box">
    <div class="def-label">Stéganographie</div>
    <p>Du grec « écriture couverte/dissimulée ». Consiste à dissimuler l'information à chiffrer <strong>dans une autre information</strong>. Connaissance de l'existence = connaissance de l'information.</p>
  </div>
  <p>Exemples :</p>
  <ul>
    <li>Un bit tous les 8 bits dans une image (bit de poids faible) — image faiblement modifiée</li>
    <li>Associer un groupe de lettres à un caractère et composer un texte qui ait un sens (compte rendu d'échecs)</li>
    <li><strong>Watermarking</strong> (filigrane) — dissimulation pour identification, protection des droits d'auteur</li>
    <li><strong>Cover channel</strong> (canal de communication caché) — détourner des canaux anodins, déjoue les firewalls (ex : ralentir/accélérer un FTP pour coder un bit)</li>
  </ul>
  <p>La cryptographie peut être utilisée EN PLUS de la stéganographie pour en dissimuler l'usage.</p>
  <h3>Cryptographie moderne</h3>
  <p>Auparavant : algorithmes simples + clés longues. Maintenant : <strong>algorithmes sophistiqués + clés courtes</strong>. Investissement à long terme.</p>
  <div class="def-box">
    <div class="def-label">Principe de Kerckhoff (1883)</div>
    <p>« La cryptographie militaire » — Auguste Kerckhoff, février 1883.</p>
    <ul>
      <li>L'opposant connaît le système cryptographique</li>
      <li>Toute la sécurité d'un système cryptographique doit reposer sur LA CLÉ, et pas sur le système lui-même</li>
    </ul>
  </div>
  <p>Repose sur un algorithme <strong>public</strong> (connu de tous) + une clé. Il existe deux sortes : à clé symétrique et à clé asymétrique.</p>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="26" id="chap-26">
  <h2>26. Chiffrement symétrique, asymétrique, hashage</h2>
  <h3>Chiffrement symétrique</h3>
  <p><strong>Même clé</strong> pour chiffrer et déchiffrer.</p>
  <table class="comp-table">
    <thead><tr><th>Avantages</th><th>Limites</th></tr></thead>
    <tbody>
      <tr><td>Facile à implémenter, rapide</td><td>
        <ul>
          <li><strong>Multiplication des clés</strong> : n participants → n(n-1)/2 clés. Comment échanger toutes ces clés ?</li>
          <li><strong>Pas d'intégrité ni d'identification</strong> de l'auteur : si Alice, Bob et Cédric partagent la même clé, chacun peut intercepter et modifier</li>
        </ul>
      </td></tr>
    </tbody>
  </table>
  <h3>Chiffrement asymétrique</h3>
  <p>Chaque communicant possède une <strong>paire de clés</strong> associées : clé publique (Kpb) et clé privée (Kpv).</p>
  <div class="key-box">
    <p>Un message chiffré par une clé NE PEUT PAS être déchiffré par cette même clé, mais PEUT être déchiffré par l'autre clé de la paire.</p>
    <p>• La clé privée doit être conservée par son propriétaire (jamais dévoilée).<br>
    • La clé publique est diffusée sans restriction (idéalement comme un annuaire).<br>
    • Aucun moyen pratique de déduire l'une des clés depuis l'autre.</p>
  </div>
  <h4>Avantages</h4>
  <ul>
    <li><strong>Chiffré avec la clé publique</strong> → seul le propriétaire de la clé privée correspondante peut lire = <em>confidentialité</em>. Le receveur n'a aucune idée de l'expéditeur (la clé publique est accessible à tous).</li>
    <li><strong>Chiffré avec la clé privée</strong> → altération frauduleuse impossible = <em>intégrité</em>. Pas de confidentialité (la clé publique permet de lire à tous). La clé privée dévoile l'identité de l'expéditeur.</li>
  </ul>
  <h4>Inconvénients</h4>
  <ul>
    <li>Algorithmes complexes et difficiles à implémenter</li>
    <li>Peu performant : long et gourmand en CPU — <strong>1000× plus lent</strong> que les algorithmes symétriques</li>
    <li>Moins sûr contre la force brute → nécessite des clés plus longues</li>
  </ul>
  <h3>Hashage</h3>
  <div class="def-box">
    <div class="def-label">Hashage</div>
    <p>Calcul d'un « condensé significatif » de taille fixe, quelle que soit la taille d'origine.</p>
    <ul>
      <li><strong>Irréversible</strong> : transformation inverse impossible</li>
      <li><strong>Déterministe</strong> : même message → même résumé</li>
      <li>Effets imprévisibles : un petit changement bouleverse tout le hash</li>
    </ul>
    <p>L'intégrité du résumé significatif est une garantie de l'intégrité du document d'origine — c'est une <strong>empreinte digitale</strong>.</p>
  </div>
  <p>Fonctions de hash : <strong>MD5, SHA1, SHA256</strong>.</p>
  <div class="example-box">Exemple :<br>
  « Bonjour » hashé → f30ecbf5b1cb85c631fdec0b39678550973cfcbc<br>
  « Bonjour ! » hashé → 245469f3c41b3222441056b6bc6e789710ef2bfb</div>
  <h3>Algorithme RSA</h3>
  <p>De Rivest, Shamir et Adleman (1978). Algorithme asymétrique très utilisé (sites sécurisés, e-mails chiffrés). Dans le domaine public. Basé sur les nombres premiers.</p>
  <div class="key-box">
    <p><strong>Chiffrement :</strong> c = m<sup>e</sup> mod n<br>
    <strong>Déchiffrement :</strong> m = c<sup>d</sup> mod n</p>
    <p>m = message clair · c = chiffré · (e, n) = clé publique · (d, n) = clé privée · n = pq (produit de 2 nombres premiers).</p>
  </div>
  <p>Création d'une paire :</p>
  <ol>
    <li>Choisir deux nombres premiers p et q (de taille similaire)</li>
    <li>Calculer n = pq</li>
    <li>Choisir e sans facteur commun avec (p-1)(q-1)</li>
    <li>Calculer d tel que ed mod (p-1)(q-1) = 1</li>
    <li>(e, n) = clé publique, (d, n) = clé privée</li>
  </ol>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="27" id="chap-27">
  <h2>27. Confiance numérique — signature, certificat, PKI, archivage</h2>
  <h3>Confiance numérique</h3>
  <p>Architecture complète reposant sur des pratiques, outils, systèmes et organisations qui se posent en gardiens de tout un écosystème. Garantit la fiabilité des informations, l'innocuité des services, le respect de la vie privée.</p>
  <h3>Signature électronique</h3>
  <p>Mécanisme garantissant l'<strong>intégrité d'un document</strong> et <strong>authentifiant son auteur</strong>, par analogie avec la signature manuscrite. Pas visuelle : suite de caractères.</p>
  <div class="key-box">
    <p>Propriétés requises :</p>
    <ul>
      <li><strong>Identification</strong> — identifier la personne ou l'organisme signataire</li>
      <li><strong>Intégrité</strong> — garantir que le document n'a pas été altéré entre la signature et la consultation</li>
    </ul>
  </div>
  <p>Effets juridiques : Directive du Parlement européen <strong>13 décembre 1999</strong> + 14 lois/décrets entre 2000 et 2010 + modification du <strong>Code civil en 2000</strong>. <strong>Même valeur juridique qu'une signature manuscrite.</strong></p>
  <h3>Certificat électronique</h3>
  <p>Document numérique permettant de valider le lien entre une signature électronique et son signataire. Joue un <strong>double rôle</strong> : chiffrement avec clés cryptographiques publiques + atteste de l'identité.</p>
  <p>Utilisations : sites e-commerce, webmails, banques, impôts, garantir la non-répudiation, l'intégrité, la confidentialité et l'authentification.</p>
  <h4>Les 3 classes de certificat</h4>
  <table class="comp-table">
    <thead><tr><th>Classe</th><th>Garanties</th></tr></thead>
    <tbody>
      <tr><td><strong>I</strong></td><td>Ne garantit pas l'identité du titulaire — seulement l'existence de son adresse e-mail</td></tr>
      <tr><td><strong>II</strong></td><td>Garantit les informations titulaire + entreprise (contrôlées par l'autorité de certification sur pièces justificatives postales)</td></tr>
      <tr><td><strong>III</strong></td><td>Idem Classe II + contrôle supplémentaire de l'identité du titulaire</td></tr>
      <tr><td><strong>3Plus</strong></td><td>Certificats agréés par l'État, sécurité maximale</td></tr>
    </tbody>
  </table>
  <h3>Autorité de certification (AC)</h3>
  <p>Organismes enregistrés et certifiés (ex : Click and Trust, Banque Populaire). Diffusent leurs propres clés publiques. En contact direct avec les producteurs d'OS et de navigateurs (Firefox, IE, Chrome) qui incluent nativement les listes de clés. Cette relation est à la base de la <strong>chaîne de confiance</strong>. Les clés publiques racines (clé root) identifient les clés publiques d'autres organismes.</p>
  <h3>Infrastructure à Clés Publiques (ICP / PKI)</h3>
  <p>Ensemble de composants physiques (ordinateurs, HSM, cartes à puce), procédures humaines (vérifications, validation) et logiciels gérant le cycle de vie des certificats numériques. Cadre global d'installation des éléments de sécurité : confidentialité, authentification, intégrité, non-répudiation.</p>
  <p>Services : communications serveur/navigateur · accès bases de données · accès VPN · échanges courrier électronique · procédures administratives en ligne · déclarations fiscales et sociales · dématérialisation · procédures avec horodatage.</p>
  <h3>Archivage électronique</h3>
  <p>Un <strong>SAE</strong> (Système d'Archivage Électronique) conserve les documents numériques sur le long terme et les préserve de toute modification pour preuve devant un tribunal.</p>
  <div class="key-box">
    <p><strong>Cadre légal :</strong></p>
    <ul>
      <li><strong>Loi 13 mars 2000</strong> + <strong>Art. 1316-1 Code civil</strong> : écrit électronique = preuve si conservation garantit l'intégrité. Art. 1348 précise la copie faisant foi.</li>
      <li><strong>Art. L134-2 Code consommation</strong> (loi confiance économie numérique juin 2004) : archivage 10 ans des contrats > 120 € (décret 16/02/2005)</li>
      <li><strong>Art. 289 et suivants CGI</strong> : conservation des factures électroniques</li>
    </ul>
    <p>La destruction d'archives publiques sans autorisation = délit (Code du patrimoine).</p>
  </div>
  <h4>Normes d'archivage</h4>
  <ul>
    <li><strong>NF Z42-013</strong> — Norme technique : mesures techniques et processus organisationnels, traçabilité, exigences sécurité/accès, clauses pour tiers-archiveur</li>
    <li><strong>Modèle OAIS</strong> (Open Archival Information System) — Modèle conceptuel généraliste indépendant des évolutions technologiques. Définit vocabulaire commun + responsabilités/fonctions/organisation pour la pérennisation</li>
  </ul>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="28" id="chap-28">
  <h2>28. Architecture technique — Firewall, Proxy, SSL/TLS, WEP/WPA</h2>
  <h3>Firewall (pare-feu)</h3>
  <p>Complète les techniques de cryptographie par des contrôles d'accès réseau sur les paramètres utilisés pour l'établissement des communications : adresses, ports, sens de la connexion.</p>
  <p>Permet :</p>
  <ul>
    <li>Restriction des accès sur une entrée précise</li>
    <li>Restriction des sorties pour limiter les envois de données</li>
    <li>Blocage des agressions en cas d'attaque du réseau</li>
  </ul>
  <h3>Proxy et SAS applicatifs</h3>
  <p>Contrôles plus fins (et plus lourds) au niveau du flot de données :</p>
  <ul>
    <li><strong>Serveur Proxy</strong> entre des clients et une application (ex : Web proxy entre browsers et serveur Web)</li>
    <li><strong>SAS applicatifs</strong> spécialisés pour certaines applications (proxy FTP, proxy Telnet)</li>
  </ul>
  <h3>SSL/TLS et SSH — sécurité de transport</h3>
  <p>Principaux protocoles :</p>
  <ul>
    <li><strong>SSL/TLS</strong> — Secured Socket Layer / Transport Layer Security</li>
    <li><strong>SSH</strong> — Secured SHell</li>
  </ul>
  <table class="comp-table">
    <thead><tr><th>Protections assurées</th><th>Protections NON assurées</th></tr></thead>
    <tbody>
      <tr><td>Attaque passive · Attaque active · Usurpation · Intrusion</td><td>Répudiation · Protection de bout en bout</td></tr>
    </tbody>
  </table>
  <h3>Clé WEP / WPA / WPA2</h3>
  <table class="comp-table">
    <thead><tr><th>Protocole</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td><strong>WEP</strong></td><td>Wired Equivalent Privacy. Clé 64-256 bits, dont 24 servent de vecteur d'initialisation NON CHIFFRÉ. Faille exploitée facilement : reconstitution de la clé en quelques minutes par écoute des échanges. <strong>Ne doit absolument plus être utilisée.</strong></td></tr>
      <tr><td><strong>WPA</strong></td><td>Même algo de chiffrement que WEP, mais ajout du <strong>TKIP</strong> (Temporal Key Integrity Protocol) → permutation plus importante des clés. Mode Personnel : <strong>PSK</strong> (Pre-Shared Key) ≥ 32 caractères = protection acceptable.</td></tr>
      <tr><td><strong>WPA2</strong></td><td>Algorithme de chiffrement beaucoup plus puissant, dernière norme du protocole WPA. Considéré comme le plus sécurisé malgré une faille découverte en juillet 2010.</td></tr>
    </tbody>
  </table>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="29" id="chap-29">
  <h2>29. Blockchain — principes, Bitcoin, MiCA</h2>
  <h3>Définition et fonctionnement</h3>
  <p>Base de données distribuée permettant le stockage d'une liste croissante de fichiers (« blocs ») contenant un historique de transactions. Chaque bloc est lié au précédent. Force : maintenir une <strong>archive indélébile et transparente</strong> sans autorité centrale.</p>
  <p>Le processus de validation nécessite des ordinateurs appelés <strong>mineurs</strong> utilisant leur puissance de calcul pour résoudre des puzzles cryptographiques. Une fois validé, un bloc est irréversible.</p>
  <h3>3 composants</h3>
  <ul>
    <li><strong>Blocs</strong> — groupements de transactions, distingués par un identifiant unique (<em>hash</em>)</li>
    <li><strong>Nœuds</strong> — ordinateurs connectés à la blockchain ; chacun héberge une copie complète</li>
    <li><strong>Mineurs</strong> — vérifient que les nouveaux blocs correspondent aux standards de sécurité ; garantissent l'authenticité</li>
  </ul>
  <p>Fonctions de hash utilisées : <strong>MD5, SHA1, SHA256</strong>.</p>
  <h3>Caractéristiques des données</h3>
  <ul>
    <li><strong>Chronologiques</strong> — transactions intégrées les unes à la suite des autres</li>
    <li><strong>Immuables</strong> — informations non supprimables</li>
    <li><strong>Infalsifiables</strong> — modification impossible après intégration ; une erreur nécessite une transaction d'annulation</li>
  </ul>
  <h3>Types de blockchain</h3>
  <table class="comp-table">
    <thead><tr><th>Type</th><th>Caractéristiques</th></tr></thead>
    <tbody>
      <tr><td><strong>Publique (distribuée)</strong></td><td>Ouverte à tous (ex : Bitcoin). Tous participent sans distinction. Code source commun.</td></tr>
      <tr><td><strong>Privée (centralisée)</strong></td><td>Accès sur invitation de l'administrateur. Accès personnalisable (lecture seule, validation). Taille restreinte → efficacité et rapidité décuplées.</td></tr>
    </tbody>
  </table>
  <h3>Atouts et limites</h3>
  <table class="comp-table">
    <thead><tr><th>Atouts</th><th>Limites</th></tr></thead>
    <tbody>
      <tr><td>
        <ul>
          <li><strong>Traçabilité</strong> — pas de suppression possible, copie intégrale chez chaque nœud</li>
          <li><strong>Sécurité</strong> — inviolable : >50 % des nœuds à hacker simultanément</li>
          <li><strong>Efficacité 24/24</strong> — sans intermédiaire, délais réduits, coûts moindres</li>
        </ul>
      </td><td>
        <ul>
          <li><strong>Impact environnemental</strong> — fortement énergivore</li>
          <li><strong>Volume de stockage</strong> croissant — peut ralentir les performances</li>
          <li><strong>Temps d'adaptation</strong> nécessaire</li>
          <li><strong>Absence de cadre réglementaire</strong> international — arnaque, manipulation, vol</li>
        </ul>
      </td></tr>
    </tbody>
  </table>
  <h3>Domaines d'application</h3>
  <ul>
    <li><strong>Logistique</strong> — secteur agroalimentaire, traçabilité totale</li>
    <li><strong>Santé</strong> — données médicales centralisées (Estonie)</li>
    <li><strong>Assurance</strong> — contrats intelligents (ex : AXA, retards aériens)</li>
    <li><strong>Administratif</strong> — transactions immobilières, diplômes, actes d'état civil</li>
  </ul>
  <h3>Bitcoin</h3>
  <p>Première cryptomonnaie, mentionnée pour la première fois par <strong>Satoshi Nakamoto</strong> peu après la crise 2008 — « système d'échange de liquidités de pair-à-pair sans institution financière ». 1ère transaction commerciale en 2010 (deux pizzas). Mineurs récompensés en Bitcoin à chaque bloc validé.</p>
  <p>Limites du Bitcoin : instabilité, volatilité, peu accepté, mobilise beaucoup d'énergie (max 7 transactions/seconde), purement spéculatif (sans équivalent physique).</p>
  <h3>Règlement MiCA (02 août 2024)</h3>
  <div class="def-box">
    <div class="def-label">MiCA — Markets in Crypto-Assets</div>
    <p>Règlement européen issu du « Digital Finance Package ». Vise à encadrer les émissions et services sur crypto-actifs non couverts par les règlementations existantes en matière d'instruments financiers.</p>
  </div>
  <p>Couvre :</p>
  <ul>
    <li>Offre publique et admission aux négociations de crypto-actifs</li>
    <li>Offre publique de jetons de valeur stable (stablecoins)</li>
    <li>Fourniture de services sur crypto-actifs par des prestataires</li>
    <li>Prévention des abus de marché sur crypto-actifs</li>
  </ul>
  <p>Remplace les cadres nationaux (en France : loi PACTE du 22 mai 2019 et régime des PSAN/ICO).</p>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="30" id="chap-30">
  <h2>30. Cadre juridique des SI</h2>
  <h3>Responsabilité du chef d'entreprise</h3>
  <ul>
    <li><strong>Responsabilité civile</strong> (art. 1384 C.civ.) — civilement responsable de l'activité des employés, notamment en cas d'utilisation malveillante des moyens informatiques (messagerie, forums)</li>
    <li><strong>Responsabilité pénale</strong> — pénalement responsable des faits des préposés/auxiliaires dès lors qu'une obligation légale impose une action directe</li>
  </ul>
  <h3>Loi Informatique et Libertés (1978) et CNIL</h3>
  <p><strong>Loi du 6 janvier 1978</strong>, modifiée le 6 août 2004. Sécurité relative à l'informatique, aux fichiers et aux libertés. Traite des problèmes d'intrusion dans les SI.</p>
  <div class="def-box">
    <div class="def-label">CNIL — Commission Nationale de l'Informatique et des Libertés</div>
    <p>Autorité administrative indépendante française, chargée de veiller à ce que l'informatique soit au service du citoyen et ne porte atteinte ni à l'identité humaine, ni aux droits de l'homme, ni à la vie privée, ni aux libertés.</p>
  </div>
  <h3>Règles en matière de données personnelles</h3>
  <p>Principes : finalité des fichiers · pertinence · conservation limitée · confidentialité.</p>
  <p>Le chef d'entreprise a en principe l'obligation d'effectuer une déclaration préalable des traitements auprès de la CNIL. Droits des personnes :</p>
  <ul>
    <li>Information préalable</li>
    <li>Accès aux données traitées</li>
    <li>Rectification</li>
    <li>Opposition au traitement (collecte, utilisation, diffusion)</li>
  </ul>
  <p>Sanctions en cas de non-respect : pénales (art. 226-16 à 226-23 du Code pénal) et civiles.</p>
  <h3>Protection des systèmes de traitement</h3>
  <p><strong>Article 34 de la loi du 6 janvier 1978</strong> : le responsable du traitement prend « toutes précautions utiles » pour protéger les données personnelles : empêcher déformation, endommagement ou accès de tiers non autorisés.</p>
  <p><strong>Articles 323-1 à 323-3-1 du Code pénal</strong> : permettent au chef d'entreprise de porter plainte en cas d'intrusion dans son SI.</p>
  <h3>Autres règles</h3>
  <ul>
    <li><strong>Reproductions non autorisées</strong> : responsabilité du chef d'entreprise engagée si ses préposés utilisent des logiciels piratés ou stockent des contenus protégés (musique, films). Mise en place d'une <em>charte d'utilisation</em> recommandée.</li>
    <li><strong>Secret des correspondances privées</strong>, électroniques ou non.</li>
    <li><strong>Identification de l'entreprise sur son site internet</strong> : dénomination, siège, téléphone, e-mail, RCS, capital, directeur de publication, TVA, hébergeur, prix.</li>
    <li><strong>Publicité par voie électronique</strong> : message identifié comme publicitaire, possibilité de s'opposer, consentement préalable des personnes prospectées (sauf exceptions). Manquement : 750 € d'amende/message.</li>
    <li><strong>Contrats en ligne</strong> (art. 1369-1 et suivants C.civ.) : étapes techniques, archivage, correction des erreurs, langues, règles professionnelles. Acceptation par <em>clic</em> ou signature électronique. Présomption de responsabilité de l'entrepreneur en ligne sur la bonne exécution.</li>
  </ul>
  <h3>Lois importantes</h3>
  <ul>
    <li><strong>Loi 85-660 du 3/7/1985</strong> — contrefaçons et droit d'auteur (copie hors sauvegarde : 3 mois à 2 ans de prison, 6000 à 12000 F d'amende)</li>
    <li><strong>Loi 88-19 du 5/1/1988</strong> — fraude informatique. Jusqu'à 5 ans de prison + 2 M d'amende pour : accès frauduleux aux données, introduction de données, entrave au fonctionnement</li>
    <li><strong>Loi 19/03/1999</strong> sur la cryptographie :
      <ul>
        <li>Usage libre pour authentification/intégrité, clés < 40 bits</li>
        <li>Clés 40-128 bits : déclaration de commercialisation/importation</li>
        <li>Clés > 128 bits : demande d'autorisation de distribution et d'utilisation</li>
        <li>Exportation : demande d'autorisation</li>
        <li>Auprès du <strong>SCSSI</strong> (Service Central de Sécurité des Systèmes Informatiques)</li>
      </ul>
    </li>
  </ul>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="31" id="chap-31">
  <h2>31. BYOD / BYOA</h2>
  <div class="def-box">
    <div class="def-label">BYOD — Bring Your Own Device</div>
    <p>« Apportez Votre Équipement personnel de Communication » (AVEC). Usage d'équipements informatiques personnels dans un contexte professionnel : salarié utilisant son ordinateur, sa tablette ou son smartphone personnel pour se connecter au réseau de l'entreprise.</p>
  </div>
  <div class="def-box">
    <div class="def-label">BYOA — Bring Your Own Application</div>
    <p>Usage d'applications personnelles à des fins professionnelles : Dropbox, Google Drive, iCloud…</p>
  </div>
  <div class="key-box">L'<strong>employeur reste responsable</strong> de la sécurité des données personnelles de son entreprise, y compris lorsqu'elles sont stockées sur des terminaux dont il n'a pas la maîtrise physique ou juridique mais dont il a autorisé l'utilisation.</div>
  <h3>Risques à anticiper</h3>
  <ul>
    <li>Atteinte ponctuelle à la disponibilité, l'intégrité et la confidentialité des données</li>
    <li>Compromission générale du SI (intrusion, virus, chevaux de Troie)</li>
    <li>Effacement progressif des frontières entre vie professionnelle et personnelle</li>
  </ul>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="32" id="chap-32">
  <h2>32. Acteurs du piratage et typologie des menaces</h2>
  <h3>Hacker, Hacktiviste, Cracker</h3>
  <table class="comp-table">
    <thead><tr><th>Acteur</th><th>Définition</th></tr></thead>
    <tbody>
      <tr><td><strong>Hacker</strong></td><td>Origine : étudiants du MIT travaillant sur le premier IBM 704. « Hacking » = utiliser une machine à des fins non prévues (« bidouillage »). Pas péjoratif à l'origine.</td></tr>
      <tr><td><strong>Hacktiviste</strong></td><td>Fusion <em>hacker</em> + <em>activisme</em>. Objectifs politiques, utilise ses connaissances pour diffuser ses opinions (piratage de sites, altération de données, détournement de serveurs). Reste totalement illégal.</td></tr>
      <tr><td><strong>Cracker</strong></td><td>« Déplombeur de logiciels ». Spécialisé dans le cassage des protections (connaissance assembleur, désassembleur, débogueur). Crée patches/cracks/keygens. Motivations : renommée, exploit, intérêts personnels.</td></tr>
    </tbody>
  </table>
  <h3>Virus</h3>
  <p>Programme qui se reproduit en s'insérant dans d'autres fichiers. Tant que non exécuté, pas de risque. Activé, il peut afficher des messages, supprimer des données ou formater le disque. Majorité se propage par <em>pièces jointes</em>.</p>
  <table class="comp-table">
    <thead><tr><th>Type</th><th>Caractéristique</th></tr></thead>
    <tbody>
      <tr><td><strong>Virus furtif</strong></td><td>Se camoufle pour ne pas être détecté par les antivirus</td></tr>
      <tr><td><strong>Virus polymorphe</strong></td><td>Change de signature pour berner les antivirus (rare)</td></tr>
      <tr><td><strong>Virus macros</strong></td><td>Écrit en VBA (Visual Basic Application) Microsoft Office (Word, Excel). Très dangereux par diffusion</td></tr>
      <tr><td><strong>Virus composite</strong></td><td>Combinaison des catégories précédentes</td></tr>
    </tbody>
  </table>
  <h3>Vers (worm)</h3>
  <p>Programme se propageant d'ordinateur à ordinateur via le réseau. <strong>Pas besoin de programme hôte</strong> contrairement au virus. Très léger → propagation à vitesse impressionnante, peut saturer le réseau.</p>
  <h3>Spyware et Hijacker</h3>
  <ul>
    <li><strong>Spyware</strong> — logiciel espion transmettant des informations à des tiers. Souvent dans des gratuiciels/partagiciels. Diminue les performances. Ex : transmission des sites consultés, adresses mail.</li>
    <li><strong>Hijacker</strong> (pirate de navigateur) — utilise les failles d'Internet Explorer pour s'installer (sites de patches, cracks, pornographiques). Modifie la page de démarrage, fond d'écran ; comportement parfois proche du spyware.</li>
  </ul>
  <h3>Troyens, backdoor, bombe logique</h3>
  <ul>
    <li><strong>Troyen</strong> (cheval de Troie) — apparence saine voire attirante mais effectue des actions supplémentaires à l'exécution (ex : installation d'une backdoor). Modèle client/serveur : le pirate contrôle l'ordinateur cible à distance.</li>
    <li><strong>Backdoor</strong> (porte dérobée) — moyen pour la personne malveillante de revenir dans un système (compte secret). Pour espionnage ou pour lancer des attaques en faisant porter le chapeau à la victime.</li>
    <li><strong>Bombe logique</strong> — troyen produisant ses effets à un moment précis. Ex : « Tchernobyl » activée le 26 avril 1999 (anniversaire de la catastrophe). Peut attendre une combinaison de touches ou l'exécution d'un fichier.</li>
  </ul>
  <h3>Cryptolocker / Ransomware</h3>
  <p>Virus apparu en 2013 (principalement Windows). Se propage comme un cheval de Troie via emails malicieux. Exécute une charge active chiffrant les fichiers de l'utilisateur. <strong>Seul l'auteur connaît la clé privée</strong> de déchiffrement. Demande une rançon dans un laps de temps très court, menaçant de supprimer les données.</p>
  <p>Cryptolocker = cheval de Troie + ransomware. Fonctionnement basé sur le chiffrement de données personnelles.</p>
  <h3>Protection — bonnes pratiques</h3>
  <div class="key-box">
    <ul>
      <li>Avoir un <strong>antivirus</strong> et le mettre à jour régulièrement</li>
      <li>Avoir un <strong>pare-feu</strong> et le configurer correctement</li>
      <li>Avoir un <strong>antispyware</strong> et scanner régulièrement</li>
      <li>Ne pas ouvrir une pièce jointe d'une personne inconnue</li>
      <li>Même d'une personne connue : scanner la pièce jointe (virus / usurpation d'identité)</li>
      <li>Se renseigner sur la présence de spywares dans les logiciels installés</li>
      <li>Utiliser un navigateur moins ciblé (Mozilla Firefox)</li>
      <li>Vigilance sur le contenu des sites</li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="33" id="chap-33">
  <h2>33. Attaques réseau et social engineering</h2>
  <h3>Hoax (canular)</h3>
  <p>Courrier électronique contenant une fausse information. Types :</p>
  <ul>
    <li><strong>Faux virus (viroax)</strong> — le plus dangereux : convainc de réaliser une action en réalité néfaste</li>
    <li><strong>Chaînes de solidarité</strong> — demande de faire suivre à tous les contacts</li>
    <li><strong>Fausses informations</strong> — censées importantes pour pousser à diffuser</li>
    <li><strong>Arnaques</strong> — promettent enrichissement facile</li>
  </ul>
  <p>Non dangereux en soi mais encombre les réseaux et les boîtes. Ne pas faire suivre.</p>
  <h3>Spam et Mailbombing</h3>
  <ul>
    <li><strong>Spam</strong> — envoi de messages publicitaires non sollicités. Protection : filtres messagerie + logiciel anti-spam.</li>
    <li><strong>Mailbombing</strong> — saturation de la boîte par milliers de mails. Protection : avoir une 2<sup>e</sup> adresse, utilitaires anti-bombing (eremove).</li>
  </ul>
  <h3>Phishing</h3>
  <p>Soutirer des informations confidentielles (codes bancaires) par <strong>usurpation d'identité</strong>. Méthodes : créer un site e-commerce répliqué + envoyer un lien ; envoyer un mail d'apparence officielle (banque) demandant des infos.</p>
  <p>Protection :</p>
  <ul>
    <li>Écrire soi-même l'URL au lieu de cliquer sur un lien</li>
    <li>Se méfier des courriels de la banque (rares demandes d'infos confidentielles)</li>
    <li>En cas de doute, téléphoner</li>
    <li>Vérifier <em>https</em> + cadenas dans le navigateur</li>
  </ul>
  <h3>Denial of Service (DoS)</h3>
  <p>Mettre HORS JEU le système visé. La victime ne peut plus accéder à son réseau. Toutes les plateformes touchées (Windows, Linux, Unix). Protection : être à jour dans les correctifs logiciels (patches).</p>
  <h3>Sniffing</h3>
  <p>Analyser le trafic réseau pour récupérer des informations sensibles. Exemple : entreprise avec 100 PC reliés par un <em>hub</em> → écoute possible des identifiants entre 8h-10h.</p>
  <p>Protection : utiliser un <strong>switch</strong> plutôt qu'un hub · protocoles chiffrés · détecteur de sniffer.</p>
  <h3>Scanning</h3>
  <p>Balayer tous les ports d'une machine avec un scanner pour identifier les ports ouverts, l'OS et les applications. Permet aux hackers de trouver les points faibles.</p>
  <p>Protection : scanner sa machine, surveiller les ports avec un firewall, fermer ceux inutiles, utiliser un <strong>IDS</strong> (détecteur d'intrusion) ou mieux un <strong>IPS</strong> (prévention d'intrusion).</p>
  <h3>Social Engineering</h3>
  <p>Art de <strong>manipuler les personnes</strong>. Obtenir des informations qu'on ne devrait pas donner, en donnant de bonnes raisons. Par téléphone, mail, lettre. Pas d'ordre informatique mais TRÈS efficace, à ne pas sous-estimer. Protection : bon sens + se méfier des inconnus.</p>
  <h3>Cracking de mots de passe</h3>
  <p>Devinetter le mot de passe via des logiciels spécifiques (<em>John the Ripper, L0phtCrack</em>). Beaucoup d'utilisateurs choisissent des mots de passe évidents (prénoms d'enfants…).</p>
  <p>Les craqueurs s'appliquent à un fichier contenant les hash. Fonctions de hachage univoques → impossible de décrypter, mais possible d'encrypter et comparer.</p>
  <table class="comp-table">
    <thead><tr><th>Méthode</th><th>Principe</th></tr></thead>
    <tbody>
      <tr><td><strong>Dictionnaire</strong></td><td>Teste tous les mots stockés dans un fichier texte — redoutable car beaucoup de mots de passe sont des mots existants</td></tr>
      <tr><td><strong>Hybride</strong></td><td>Mots du dictionnaire + combinaisons (ex : thomas01) — beaucoup ajoutent des chiffres</td></tr>
      <tr><td><strong>Brute-force</strong></td><td>Toutes les combinaisons possibles — aboutit toujours mais prend du temps</td></tr>
    </tbody>
  </table>
  <h3>Spoofing — usurpation</h3>
  <p>Se faire passer pour quelqu'un d'autre :</p>
  <ul>
    <li><strong>IP</strong> — changer d'adresse IP pour se faire passer pour un autre ordinateur</li>
    <li><strong>E-mail</strong> — changer l'adresse pour usurper l'identité d'un supérieur</li>
    <li><strong>Web</strong> — c'est le principe du phishing</li>
  </ul>
  <p>Protection : utiliser des protocoles sécurisés comme <strong>SSH</strong> qui empêche le spoofing.</p>
  <h3>Man in the Middle</h3>
  <p>« L'homme du milieu ». S'insère entre A et B qui communiquent, se fait passer pour A auprès de B et inversement → tout le trafic passe par lui. Risques : interception des mots de passe, modification du trafic (ex : commander à 10 € → 1000 €).</p>
  <p>Protection : achats sur sites sécurisés (https + cadenas), protocoles sécurisés.</p>
  <h3>Hijacking et Buffer overflow</h3>
  <ul>
    <li><strong>Hijacking (détournement de session)</strong> — attendre que la victime se connecte et prendre sa place → contourner l'authentification. Mettre la victime hors-jeu via un DoS.</li>
    <li><strong>Buffer overflow (débordement de tampon)</strong> — envoyer plus de données qu'un programme n'en attend, pour qu'il exécute un code arbitraire. Si le programme ne vérifie pas la longueur des chaînes en paramètre, compromission de la machine.</li>
  </ul>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="34" id="chap-34">
  <h2>34. PCA et PRA — Continuité et reprise d'activité</h2>
  <h3>Plan de Continuité d'Activité (PCA)</h3>
  <div class="def-box">
    <div class="def-label">PCA — Business Continuity</div>
    <p>Gestion qui doit <strong>limiter l'impact</strong> des accidents, dysfonctionnements ou malveillance dans l'entreprise. Fait partie de la PSSI (incendie, malveillance, inondation…).</p>
  </div>
  <p>Concerne un nombre croissant d'entreprises privées ou publiques. Devient un axe important de la gestion :</p>
  <ul>
    <li><strong>Obligatoire dans certains cas</strong> (secteur bancaire depuis SOX, entreprises cotées au NYSE)</li>
    <li>L'ISO a fait une norme sur la « sécurité sociétale »</li>
  </ul>
  <h4>Obligations légales en France</h4>
  <ul>
    <li><strong>Réglementation CRBF 2004-02</strong> (issue de Bâle II) — obligation d'un plan de secours opérationnel pour les établissements financiers, banques et assurances</li>
    <li><strong>Code du commerce art. L.123-22</strong> — conservation des documents comptables pendant <strong>10 ans</strong></li>
    <li><strong>Décret du 24 mars 2006</strong> — conservation des fichiers de journalisation des prestataires d'hébergement (identification des personnes ayant édité du contenu mis en ligne)</li>
  </ul>
  <h4>Politique de continuité d'activité</h4>
  <ul>
    <li>Élaborer des règles et procédures à mettre en œuvre</li>
    <li>Définir les actions à entreprendre et les personnes à contacter en cas de perturbation</li>
    <li>Sensibiliser les utilisateurs aux problèmes liés à la continuité</li>
  </ul>
  <h4>Objectifs</h4>
  <ul>
    <li>Identifier les <strong>processus critiques</strong> qui en cas d'interruption doivent être rétablis le plus rapidement</li>
    <li>Éviter des pertes trop importantes ou impacts préjudiciables à la survie</li>
    <li>Réduire au minimum les conséquences économiques et légales d'une défaillance du SI</li>
  </ul>
  <h3>Plan de Reprise d'Activité (PRA)</h3>
  <p>But : reconstruire ou basculer sur un <strong>système de relève</strong> pour une durée déterminée en cas de crise majeure ou de sinistre. Fournir les besoins informatiques nécessaires à la survie de l'entreprise.</p>
  <div class="key-box">
    <p>S'appuie sur 2 indicateurs :</p>
    <ul>
      <li><strong>RPO</strong> (Recovery Point Objective) — risque défini de perte de données</li>
      <li><strong>RTO</strong> (Recovery Time Objective) — durée acceptable d'interruption</li>
    </ul>
    <p>Exemple : basculement vers un <em>DataCenter</em> sur un site de secours en cas d'incendie.</p>
  </div>
  <h4>Orientations / Solutions</h4>
  <ul>
    <li><strong>Hébergeur externe</strong> pour l'hébergement d'un site Web (l'hébergeur doit disposer de son propre PCA/PRA)</li>
    <li><strong>Cloud</strong> — héberger les applications métiers (Amazon Elastic Compute Cloud EC2…) si l'application a été adaptée à ce mode</li>
    <li><strong>Sauvegardes en ligne</strong> — GoogleDrive, DropBox, WebDav… (à mettre en conformité avec la politique de sécurité)</li>
    <li><strong>Virtualisation</strong> du poste de travail (VMware, VirtualBox) — matériel interchangeable, machine virtuelle = fichiers ; bénéficie mal des cartes graphiques</li>
    <li><strong>Stockage sur serveur réseau</strong> — NAS, SAN avec disques en RAID (survie à la mort d'un disque)</li>
    <li><strong>Image complète</strong> du poste (Clonezilla, Symantec Ghost) — restauration totale du disque (OS + applications)</li>
    <li><strong>Applications Web</strong> — Google Docs, Microsoft Office 365 (travail collaboratif sans installation locale)</li>
    <li><strong>Télétravail</strong> + visioconférence — s'affranchir des risques liés aux déplacements</li>
  </ul>
</div>


`; }

      <p><strong>SLA</strong> = contrat externe (qualité de service, pénalités) ; transforme obligation de moyens en obligation de résultat. Décomposé en SLS (spécif) + SLO (objectifs). <strong>OLA</strong> = accord interne entre services. <strong>Réversibilité</strong> = ré-internalisation. <strong>Transférabilité</strong> = changement de prestataire. <strong>Offshore</strong> (Inde, Pologne) / <strong>nearshore</strong> (pays voisin) / <strong>onshore</strong> (proximité régionale).</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">

    </div>
    <div class="synth-mini">
      <strong>ITIL — Support + Production</strong>
      <p>Support : incidents · problèmes · changements · mises en production · configurations (CMDB). Production : capacité · disponibilité · continuité · financière · niveaux de service (<strong>SLA</strong>). L'approche processus clarifie les rôles et professionnalise l'organisation.</p>

    <div class="synth-mini">
      <strong>ISO 27000 + PDCA</strong>
      <p>27001 = SMSI · <strong>27002 = 133 bonnes pratiques</strong> · 27004 = indicateurs · 27005 = gestion des risques. Démarche PDCA appliquée : Plan (PSSI, périmètre, risques) · Do (déploiement, formation) · Check (audit, contrôles) · Act (actions correctives).</p>

      <strong>Lois Corporate Governance</strong>
      <p>Après les scandales 2000 (Enron, Worldcom) : <strong>SOX</strong> (USA, 29 août 2002) · <strong>NRE</strong> (France, 15 mai 2001) · <strong>LSF</strong> (France, 1er août 2003 — équivalent SOX) · <strong>Loi Breton</strong> (France, 26 juillet 2005). Gouvernance SI très dépendante de la gouvernance d'entreprise.</p>

    <div class="synth-mini">
      <strong>COSO</strong>
      <p>Committee of Sponsoring Organisation of the Treadway Commission, défini en <strong>1992</strong>, émerge à partir de <strong>2002</strong>. Référentiel de contrôle interne visant à limiter les fraudes dans les rapports financiers. Adopté en France via la <strong>LSF 2003</strong>.</p>
    </div>
    <div class="synth-mini">
      <strong>Tryptique ISACA</strong>
      <p><strong>COBIT</strong> (gouvernance et audit) + <strong>Val IT</strong> (création de valeur, sélection des projets) + <strong>Risk IT</strong> (management des risques en 3 volets : RG Gouvernance, RE Évaluation, RR Réponse). Cadre de référence complet pour la gouvernance SI.</p>
    </div>
    <div class="synth-mini">
      <strong>Balanced Scorecard</strong>
      <p>Kaplan &amp; Norton. 4 axes : <strong>Financier</strong> · <strong>Client</strong> · <strong>Innovation / Apprentissage</strong> · <strong>Processus internes</strong>. Traduit la stratégie en KPI mesurables. Pilotage stratégique adapté au SI (indicateurs financiers, support/exploitation/maintenance, projets).</p>

<div class="synth-card">

      <p>« Processus méthodique, indépendant et documenté permettant de recueillir des informations objectives pour déterminer dans quelle mesure les pratiques observées satisfont aux référentiels ». L'audit des SI (années 1970) couvre un périmètre <strong>plus large</strong> que l'audit informatique : aspects organisationnels + fonctionnels.</p>
    </div>
    <div class="synth-mini">
      <strong>12 vecteurs du guide d'audit gouvernance</strong>
      <p>Stratégie · Innovation · Risques · Données · Architecture · Portefeuille de projets · Projets · Ressources humaines · Prestataires et fournisseurs · Services · Budget et performance · Marketing et communication.</p>
    </div>
    <div class="synth-mini">
      <strong>5 typologies d'audit SI</strong>
      <p>① <strong>Fonction informatique</strong> (COBIT PO4) · ② <strong>Exploitation</strong> (DS — outils Openview, Tivoli, <em>Nagios</em>) · ③ <strong>Projets</strong> (PO10, AI1, AI2 — modèles cascade/V/W/spirale) · ④ <strong>Applications opérationnelles</strong> (recommandé tous les 2-3 ans) · ⑤ <strong>Sécurité</strong> (DS5, PO9 — réf : ISO 27001/27002, 4 notions menaces/vulnérabilité/manifestation/maîtrise).</p>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(77,154,168,0.18)">📋</div> Normes audit, contrôle interne, SIC

    <div class="synth-mini">
      <strong>Normes — IIA, ISA, NEP</strong>
      <p>Audit interne : normes IIA (qualification, fonctionnement, mise en œuvre) + norme 1210.A3. Audit externe : ISA 315 (connaissance entité) et ISA 330 (procédures). En France : CNCC 2-301/2-302 remplacées le 1er mai 2007 par <strong>NEP 315</strong> et <strong>NEP 330</strong> (valeur de loi).</p>
    </div>
    <div class="synth-mini">
      <strong>Contrôle interne (AFAI)</strong>
      <p>Dispositif maîtrisant les activités + risques. 4 objectifs (LSF/art. L.225-37) : conformité, application des directives DG, fonctionnement des processus internes (sauvegarde actifs), fiabilité financière. Cadre AMF 2010 : s'appuie sur <strong>COSO II</strong> + <strong>ISO 31000</strong>.</p>
    </div>
    <div class="synth-mini">
      <strong>SIC — 3 niveaux d'intégration</strong>
      <p><strong>Autonome</strong> (PME, lien direct fait juridique/écriture) · <strong>Semi-intégré</strong> (progiciels métier alimentent la compta par import/export) · <strong>Intégré</strong> (saisie unique, base commune ERP). Norme CNCC 2-302 : l'environnement informatisé ne change pas l'objectif du CAC mais sa démarche (risques inhérent et lié au contrôle).</p>
    </div>
    <div class="synth-mini">
      <strong>Risque d'audit ISACA</strong>
      <p>Risque inhérent (anomalies indépendantes du CI) × Risque lié au contrôle (CI ne détecte pas) × Risque de non-détection (l'audit ne détecte pas). Le plus important pour le CAC = <strong>non-détection</strong>. 6 risques spécifiques de l'environnement informatique : manque de trace, uniformité, séparation, erreurs humaines/programmation, accès non autorisés.</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(176,90,71,0.18)">🔒</div> Sécurité — fondamentaux
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>DIC + 5 objectifs</strong>
      <p>Critères de base : <strong>D</strong>isponibilité · <strong>I</strong>ntégrité · <strong>C</strong>onfidentialité. Étendus par la Preuve (authentification + non-répudiation). Les 5 objectifs de la sécurité : Intégrité, Confidentialité, Disponibilité, Non-répudiation, Authentification.</p>
    </div>
    <div class="synth-mini">
      <strong>Équation du risque (ISO 73)</strong>
      <p><strong>RISQUE = MENACE × VULNÉRABILITÉ × IMPACT</strong>. Menace + Vulnérabilité = cause (potentialité), Impact = conséquence (sévérité). Le risque zéro n'existe pas → définir un <strong>risque résiduel</strong> acceptable. Principaux risques restant banals (Lebey) : câble arraché, coupure secteur, crash disque, mauvais profil utilisateur.</p>
    </div>
    <div class="synth-mini">
      <strong>PSSI — démarche</strong>
      <p>Document formalisé de directives, procédures, codes de conduite, règles. 4 étapes : ① <strong>Audit</strong> · ② <strong>Élaboration des règles</strong> · ③ <strong>Surveillance</strong> · ④ <strong>Actions</strong>. Mise en œuvre : audit, tests d'intrusion, détection, réactions, restauration. Réussite : simple, réaliste, à faire vivre.</p>
    </div>
    <div class="synth-mini">
      <strong>10 défauts récurrents</strong>
      <p>Installation par défaut · MAJ non faites · MdP par défaut · services inutiles (Netbios) · logs inexploités · pas de séparation flux opérationnels/admin · télémaintenance sans contrôle · procédures obsolètes · authentification faible · état actif/passif d'insécurité.</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">

  </div>

    <div class="synth-mini">
      <strong>Normes ISO sécurité</strong>
      <p>ISO 9000 (management) · 14001 (environnement) · 17799 (sécurité par thèmes, ancêtre 27002) · 19001 (audit) · <strong>27001</strong> (SMSI) · <strong>27002</strong> (133 bonnes pratiques) · 27004 (indicateurs) · 27005 (risques). Buts du SMSI : compétitivité, conformité, image + protection des <em>actifs</em>.</p>
    </div>
    <div class="synth-mini">
      <strong>EBIOS — 5 étapes</strong>
      <p>① Étude du contexte (périmètre, enjeux) · ② Expression des besoins de sécurité · ③ Étude des menaces (vulnérabilités) · ④ Identification des objectifs · ⑤ Détermination des exigences (accepter, réduire, refuser le risque). Méthode ANSSI.</p>
    </div>
    <div class="synth-mini">
      <strong>MEHARI — 3 livrables</strong>
      <p>Méthode CLUSIF depuis 1995, dérivée de MELISA/MARION. ① <strong>PSS</strong> (Plan Stratégique de Sécurité — objectifs + charte) · ② <strong>POS</strong> (Plans Opérationnels par site — scénarios, audits) · ③ <strong>POE</strong> (Plan Opérationnel d'Entreprise — suivi par indicateurs). Centrée sur la continuité d'activité.</p>
    </div>
    <div class="synth-mini">
      <strong>ISMS — PDCA</strong>
      <p>Application de la roue de Deming à la sécurité : Planifier (réactif → proactif) · Faire (développer en suivant un référentiel) · Contrôler (audits, tests d'intrusion) · Agir (analyse des risques, besoins, enjeux).</p>
    </div>

</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(200,131,70,0.18)">🔐</div> Cryptographie
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>Historique et services</strong>
      <p>Cesar (50 av. JC) · Vernam (1918, one-time pad) · Scherbius — Enigma (1923) · Turing (1939) · DES (IBM, 1976) · Diffie-Hellman (1976, clé publique) · <strong>RSA</strong> (Rivest-Shamir-Adleman, 1978). 3 services : intégrité, confidentialité, preuve.</p>
    </div>
    <div class="synth-mini">
      <strong>Symétrique vs Asymétrique</strong>
      <p><strong>Symétrique</strong> : même clé chiffre/déchiffre — rapide mais multiplication des clés (n(n-1)/2), pas d'intégrité partagée. <strong>Asymétrique</strong> : paire clé publique/privée. Chiffré avec clé pub → confidentialité ; chiffré avec clé priv → intégrité + identité. ~<strong>1000× plus lent</strong>. Principe de Kerckhoff (1883) : sécurité repose sur la clé, pas l'algo.</p>
    </div>
    <div class="synth-mini">
      <strong>Hashage et stéganographie</strong>
      <p><strong>Hashage</strong> = empreinte digitale de taille fixe, <em>irréversible</em>, <em>déterministe</em>. Fonctions : MD5, SHA1, SHA256. <strong>Stéganographie</strong> = dissimuler l'information dans une autre (watermarking, cover channel). Différent du chiffrement (qui rend illisible).</p>
    </div>
    <div class="synth-mini">
      <strong>RSA — formule</strong>
      <p>Chiffrement : <code>c = m^e mod n</code> · Déchiffrement : <code>m = c^d mod n</code>. (e, n) = clé publique · (d, n) = clé privée · n = pq (deux nombres premiers). Création : p, q premiers, n = pq, e sans facteur commun avec (p-1)(q-1), d tel que ed mod (p-1)(q-1) = 1.</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(77,154,168,0.18)">✍️</div> Confiance numérique
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>Signature électronique</strong>
      <p>Garantit <strong>intégrité</strong> du document et <strong>authentifie</strong> l'auteur. Effets juridiques : Directive européenne 13 déc. 1999 + modif. Code civil 2000 → même valeur que la signature manuscrite. Pas visuelle (suite de caractères).</p>
    </div>
    <div class="synth-mini">
      <strong>Certificat électronique</strong>
      <p>Document numérique validant le lien signature/signataire. Double rôle : chiffrement + atteste l'identité. <strong>3 classes</strong> : I (e-mail seulement) · II (titulaire + entreprise, pièces postales) · III (idem + contrôle identité). Type <strong>3Plus</strong> = agréé État.</p>
    </div>
    <div class="synth-mini">
      <strong>PKI / Autorité de certification</strong>
      <p>PKI = composants + procédures + logiciels gérant le cycle de vie des certificats. Services : VPN, accès BD, courrier, déclarations fiscales, horodatage. AC = organisme fiable diffusant ses clés publiques racines (root), intégrées aux navigateurs → <strong>chaîne de confiance</strong>.</p>
    </div>
    <div class="synth-mini">
      <strong>Archivage électronique (SAE)</strong>
      <p>Cadre : <strong>Loi 13 mars 2000</strong> + art. 1316-1 C.civ. (écrit électronique = preuve si intégrité) · art. L134-2 C.conso (archivage 10 ans contrats > 120 €) · art. 289 CGI (factures). Normes : <strong>NF Z42-013</strong> (technique) et <strong>OAIS</strong> (modèle conceptuel).</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(90,145,104,0.18)">🌐</div> Architecture technique et blockchain
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>Firewall, Proxy, SSL/TLS</strong>
      <p><strong>Firewall</strong> : contrôle adresses/ports/sens — restriction accès/sortie, blocage. <strong>Proxy</strong> + SAS applicatifs (FTP, Telnet) : contrôles plus fins. <strong>SSL/TLS</strong> et <strong>SSH</strong> : protègent contre attaque passive/active, usurpation, intrusion ; NE protègent PAS contre la répudiation ni en bout-en-bout.</p>
    </div>
    <div class="synth-mini">
      <strong>WEP / WPA / WPA2</strong>
      <p><strong>WEP</strong> : vecteur d'initialisation 24 bits non chiffré → cassable en quelques minutes, à proscrire. <strong>WPA</strong> : ajout TKIP + PSK ≥ 32 caractères. <strong>WPA2</strong> : algorithme renforcé, le plus sécurisé (faille mineure découverte juillet 2010).</p>
    </div>
    <div class="synth-mini">
      <strong>Blockchain — fonctionnement</strong>
      <p>BD distribuée. 3 composants : <strong>blocs</strong> (transactions + hash) · <strong>nœuds</strong> (copies intégrales) · <strong>mineurs</strong> (validation par calcul). Caractéristiques : chronologique, immuable, infalsifiable. Atouts : traçabilité, sécurité (>50 % des nœuds à hacker), efficacité 24/24. Limites : énergivore, stockage, cadre réglementaire.</p>
    </div>
    <div class="synth-mini">
      <strong>Bitcoin + MiCA</strong>
      <p>Bitcoin : Satoshi Nakamoto, post-crise 2008. Limites : volatilité, 7 tx/s max, énergivore. <strong>Règlement MiCA</strong> (02/08/2024) : cadre européen encadrant les émissions et services sur crypto-actifs, stablecoins, PSAN, abus de marché. Remplace les cadres nationaux (loi PACTE 2019).</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(168,125,90,0.18)">⚖️</div> Cadre juridique SI
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>Responsabilité du chef d'entreprise</strong>
      <p><strong>Civile</strong> (art. 1384 C.civ.) : responsable de l'activité de ses employés, y compris utilisation malveillante des moyens IT. <strong>Pénale</strong> : responsable des faits des préposés dès lors qu'une obligation légale impose une action directe.</p>
    </div>
    <div class="synth-mini">
      <strong>Loi 1978 + CNIL</strong>
      <p>Loi Informatique et Libertés du <strong>6 janvier 1978</strong>, modifiée 6 août 2004. <strong>CNIL</strong> = autorité administrative indépendante. Principes : finalité, pertinence, conservation limitée, confidentialité. Droits des personnes : information, accès, rectification, opposition. Article 34 : « toutes précautions utiles » pour protéger les données.</p>
    </div>
    <div class="synth-mini">
      <strong>Lois spécifiques</strong>
      <p>Loi <strong>85-660 du 3/7/1985</strong> (contrefaçons, droit d'auteur). Loi <strong>88-19 du 5/1/1988</strong> (fraude informatique — jusqu'à 5 ans + 2M d'amende). Loi <strong>19/03/1999 cryptographie</strong> : usage libre &lt; 40 bits, déclaration 40-128 bits, autorisation > 128 bits (auprès du SCSSI). Articles 323-1 à 323-3-1 C. pénal pour intrusion.</p>
    </div>
    <div class="synth-mini">
      <strong>BYOD / BYOA</strong>
      <p><strong>BYOD</strong> = Bring Your Own Device (smartphone, tablette, PC personnels au travail). <strong>BYOA</strong> = Bring Your Own Application (Dropbox, Google Drive, iCloud). L'<strong>employeur reste responsable</strong> de la sécurité, même sur terminaux non maîtrisés. Risques : DIC + intrusion, virus, chevaux de Troie.</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(176,90,71,0.18)">🦠</div> Menaces et attaques
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>Virus, vers, troyens</strong>
      <p><strong>Virus</strong> : s'insère dans d'autres fichiers (furtif, polymorphe, macros VBA, composite). <strong>Vers</strong> : se propage par réseau sans hôte → sature. <strong>Troyens</strong> : apparence saine, installe backdoor. <strong>Bombe logique</strong> : effet à un moment précis (ex Tchernobyl 26/4/1999). <strong>Cryptolocker</strong> (2013) = troyen + ransomware (chiffre les données contre rançon).</p>
    </div>
    <div class="synth-mini">
      <strong>Phishing, DoS, sniffing</strong>
      <p><strong>Phishing</strong> : usurpation d'identité pour soutirer infos (mail/site répliqué). <strong>DoS</strong> : mise hors service du système. <strong>Sniffing</strong> : analyse du trafic → switch &gt; hub, protocoles chiffrés, détecteur. <strong>Scanning</strong> : balayage des ports → IDS (détection) / IPS (prévention).</p>
    </div>
    <div class="synth-mini">
      <strong>Cracking mots de passe</strong>
      <p>3 méthodes (John the Ripper, L0phtCrack) : <strong>dictionnaire</strong> (mots existants) · <strong>hybride</strong> (mots + chiffres ex thomas01) · <strong>brute-force</strong> (toutes combinaisons). Fonctions de hachage univoques : impossible à inverser, mais on peut chiffrer + comparer.</p>
    </div>
    <div class="synth-mini">
      <strong>Spoofing, MITM, Hijacking</strong>
      <p><strong>Spoofing</strong> : usurpation d'IP, e-mail, web (= phishing). <strong>Man in the Middle</strong> : s'insère entre A et B, intercepte ET modifie. <strong>Hijacking</strong> : détourner une session ouverte. <strong>Buffer overflow</strong> : déborder un tampon pour exécuter du code. Protections : SSH, HTTPS, protocoles sécurisés.</p>
    </div>
  </div>
</div>

<div class="synth-card">
  <div class="synth-card-title">
    <div class="synth-icon" style="background:rgba(90,145,104,0.18)">🔄</div> PCA / PRA — Continuité
  </div>
  <div class="synth-grid">
    <div class="synth-mini">
      <strong>PCA — Plan de Continuité</strong>
      <p>Limite l'impact des accidents/dysfonctionnements/malveillance. Fait partie de la PSSI. Obligations : <strong>CRBF 2004-02</strong> (Bâle II, banques/assurances), <strong>Code commerce L.123-22</strong> (conservation 10 ans), <strong>décret 24/03/2006</strong> (journalisation hébergeurs).</p>
    </div>
    <div class="synth-mini">
      <strong>Politique de continuité</strong>
      <p>Objectifs : identifier les <strong>processus critiques</strong> à rétablir rapidement, éviter pertes importantes, réduire les conséquences économiques et légales. Actions : règles/procédures, personnes à contacter, sensibilisation des utilisateurs.</p>
    </div>

/* ═══════ DEEP LINK (hash : #cours=N&q=word ou #chap-N) ═══════ */
function parseDeepLink() {
  const h = window.location.hash || '';
  if (!h) return null;
  const out = {};
  // Format 1 : #chap-3
  let m = h.match(/^#chap-(\d+)$/);
  if (m) { out.chap = parseInt(m[1], 10); return out; }
  // Format 2 : #cours=3&q=mot&theme=xxx
  m = h.match(/^#([^?]+)/);
  if (m) {
    const params = new URLSearchParams(h.slice(1));
    if (params.has('cours')) out.chap = parseInt(params.get('cours'), 10);
    if (params.has('q')) out.q = params.get('q');
    if (params.has('theme')) out.theme = params.get('theme');
    if (params.has('tab')) out.tab = params.get('tab');
  }
  return Object.keys(out).length ? out : null;
}
function highlightInChapter(chapEl, word) {
  if (!chapEl || !word) return;
  const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  const walker = document.createTreeWalker(chapEl, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n => {
    if (!re.test(n.nodeValue)) return;
    re.lastIndex = 0;
    const span = document.createElement('span');
    span.innerHTML = n.nodeValue.replace(re, '<mark class="search-hit">$1</mark>');
    n.parentNode.replaceChild(span, n);
  });
}
function applyDeepLink() {
  const dl = parseDeepLink();
  if (!dl) return;
  if (dl.theme) coursTheme = dl.theme;
  // S'assurer qu'on est sur l'onglet cours
  const targetTab = dl.tab || 'cours';
  const jumper = () => {
    const el = dl.chap ? document.getElementById('chap-' + dl.chap) : null;
    if (el) {
      // Si le chapitre est masqué par le filtre, réinitialise à 'all'
      if (el.style.display === 'none') { coursTheme = 'all'; applyCoursFilter(); renderCoursPills(); }
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      el.classList.add('chap-target-flash');
      setTimeout(() => el.classList.remove('chap-target-flash'), 2400);
      if (dl.q) highlightInChapter(el, dl.q);
    }
  };
  if (currentTab !== targetTab) {
    window._pendingCoursJump = jumper;
    switchTab(targetTab);
  } else {
    setTimeout(jumper, 80);
  }
}
window.addEventListener('hashchange', applyDeepLink);

let fcQueue = [], fcKnown = [], fcFlipped = false, fcStreak = 0;

function initFlashcards() {

    }

    fcQueue = shuffle([...allowedIdx]);
  }

}

function renderFlash() {

}

function flipCard() {
  fcFlipped = !fcFlipped;
  const card = document.getElementById('fcCard');
  if (card) card.classList.toggle('flipped', fcFlipped);
}

function markKnown() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'good');
  saveSRS(DATA.quizKey, fcSRS);
  fcKnown.push(idx); fcStreak++; fcFlipped = false; rerenderFlash();
}
function markReview() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'again');
  saveSRS(DATA.quizKey, fcSRS);
  fcQueue.push(idx); fcStreak = 0; fcFlipped = false; rerenderFlash();
}
function markEasy() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'easy');
  saveSRS(DATA.quizKey, fcSRS);
  fcKnown.push(idx); fcStreak++; fcFlipped = false; rerenderFlash();
}
function skipCard() {
  if (!fcQueue.length) return;
  fcQueue.push(fcQueue.shift()); fcFlipped = false; rerenderFlash();
}
function toggleSRSMode() {
  fcSRSMode = (fcSRSMode === 'srs') ? 'shuffle' : 'srs';
  switchTab('flash');
}
function resetFlash() { initFlashcards(); rerenderFlash(); }

function rerenderFlash() {
  const ctx = { fcQueue, fcKnown, fcStreak, fcSRS, fcSRSMode, fcSessionSize };
  if (updateFlashCardPartial(DATA, ctx)) return;
  const root = document.getElementById('appRoot');
  const header = root.querySelector('.page-header') ? root.querySelector('.page-header').outerHTML : '';
  root.innerHTML = header + buildFlashHTML();
}

function bindFlash() { document.addEventListener('keydown', fcKeyHandler); }
function fcKeyHandler(e) {
  if (currentTab !== 'flash') { document.removeEventListener('keydown', fcKeyHandler); return; }
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  else if (e.code === 'ArrowLeft') { if (fcQueue.length > 0) markReview(); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); if (fcQueue.length > 0) markKnown(); }
  else if (e.code === 'ArrowRight') { if (fcQueue.length > 0) markEasy(); }
  else if (e.code === 'Tab' || e.code === 'KeyS') { e.preventDefault(); if (fcQueue.length > 0) skipCard(); }
}

      <div class="quiz-options" id="quizOpts">
        ${q.o.map((opt, i) => `
          <button class="quiz-option" data-i="${i}" onclick="selectAnswer(event, ${qi}, ${i})">
            <div class="opt-letter">${letters[i]}</div>
            <span>${opt}</span>
          </button>`).join('')}
      </div>`}
    </div>
  </div>`;

  // Attach ripples
  if (q.type === 'tf') renderTFQuestionInline(document.getElementById('quizCard'), q, qi, quizState);
  document.querySelectorAll('.quiz-option').forEach(attachRipple);

  if (quizState.timerEnabled) startQuestionTimer(qi);
}

function startQuestionTimer(qi) {
  timeLeft = 30;
  const fill = document.getElementById('timerFill');
  const label = document.getElementById('timerLabel');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    if (fill) {
      fill.style.width = (timeLeft / 30 * 100) + '%';
      if (timeLeft <= 10) fill.classList.add('warn');
    }
    if (label) label.textContent = timeLeft + 's';
    if (timeLeft <= 0) { clearInterval(timerInterval); autoWrong(qi); }
  }, 1000);
}

function autoWrong(qi) {
  if (!quizState || quizState.answers[qi] !== undefined) return;
  quizState.answers[qi] = -1;
  quizState.errors.push({ qi, chosen: -1 });
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.classList.add('disabled'));
  const q = quizState.questions[qi];
  if (opts[q.c]) opts[q.c].classList.add('correct');
  document.getElementById('quizCard').classList.add('shake');
  showExplanation(q, true, qi);
}

function selectAnswer(ev, qi, chosen) {
  if (!quizState || quizState.answers[qi] !== undefined) return;
  clearInterval(timerInterval);
  quizState.answers[qi] = chosen;
  const q = quizState.questions[qi];
  const correct = chosen === q.c;
  if (!correct) quizState.errors.push({ qi, chosen });
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[q.c].classList.add('correct');
  opts[q.c].classList.add('correct-highlight');
  if (!correct) {
    if (opts[chosen]) opts[chosen].classList.add('wrong');
    document.getElementById('quizCard').classList.add('shake');
    setTimeout(() => document.getElementById('quizCard')?.classList.remove('shake'), 500);
  }
  showExplanation(q, !correct, qi);
}

function showExplanation(q, wrong, qi) {
  const card = document.getElementById('quizCard');
  if (!card) return;
  const expl = document.createElement('div');
  expl.className = 'quiz-expl';
  expl.textContent = q.e;
  card.appendChild(expl);
  const nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-next-btn';
  const isLast = quizState.current >= quizState.questions.length - 1;
  nextBtn.textContent = isLast ? 'Voir les résultats →' : 'Question suivante →';
  nextBtn.onclick = () => { quizState.current++; renderQuizQuestion(); };
  card.appendChild(nextBtn);
}

function showQuizResult() {
  clearInterval(timerInterval);
  const total = quizState.questions.length;
  const score = quizState.answers.filter((a, i) => isQuestionCorrect(quizState.questions[i], a)).length;
  saveQuizScore(DATA.quizKey, score, total);
  const pct = Math.round(score / total * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 75 ? '🎉' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 90 ? 'Excellent !' : pct >= 75 ? 'Très bien !' : pct >= 50 ? 'Bien !' : 'Continue tes efforts !';
  if (pct >= 90) launchConfetti();

  const errorsHTML = quizState.errors.length === 0
    ? '<p style="color:var(--green);text-align:center;margin-top:1rem">Aucune erreur — parfait !</p>'
    : `<div class="errors-list">
        <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:0.7rem">Erreurs à revoir</div>
        ${quizState.errors.map(err => {
          const q = quizState.questions[err.qi];
          const yourAns = q.type === 'tf' ? '' : (err.chosen >= 0 && q.o ? q.o[err.chosen] : 'Pas de réponse');
          return `<div class="error-item"><div class="eq">${q.q}</div>${yourAns ? `<div class="ea-wrong">✗ Ta réponse : ${yourAns}</div>` : ''}<div class="ea">${formatCorrectAnswerHTML(q)}</div>${q.e ? `<div class="ea-expl">${q.e}</div>` : ''}</div>`;
        }).join('')}
      </div>`;

  const root = document.getElementById('appRoot');
  root.innerHTML = `
  <div class="page-header">
    <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
    <div class="page-title">${DATA.title}</div>
    <div class="page-subtitle">${DATA.subtitle}</div>
  </div>
  <div class="fade-up">
    <div class="score-box">
      <div class="score-emoji">${emoji}</div>
      <div class="score-num" id="scoreNum">0/${total}</div>
      <div class="score-label">${msg} · ${pct}%</div>
      <div class="score-actions">
        <button class="btn-secondary" onclick="switchTab('quiz')">↺ Relancer</button>
        <button class="btn-primary" id="errBtn" onclick="toggleErrors()">${quizState.errors.length > 0 ? 'Voir les erreurs' : "Pas d'erreurs"}</button>
        ${quizState.errors.length > 0 ? `<button class="btn-secondary" onclick="replayErrors()">↻ Rejouer mes ${quizState.errors.length} erreur${quizState.errors.length > 1 ? 's' : ''}</button>` : ''}
      </div>
      <div id="errSection" style="display:none">${errorsHTML}</div>
    </div>
  </div>`;

  // Animation compteur
  const el = document.getElementById('scoreNum');
  const start = Date.now();
  const dur = 1500;
  (function tick() {
    const t = Math.min((Date.now() - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(ease * score) + '/' + total;
    if (t < 1) requestAnimationFrame(tick);
  })();
}

function toggleErrors() {
  const sec = document.getElementById('errSection');
  const btn = document.getElementById('errBtn');
  if (!sec) return;
  const visible = sec.style.display !== 'none';
  sec.style.display = visible ? 'none' : 'block';
  if (btn) btn.textContent = visible ? 'Voir les erreurs' : 'Masquer les erreurs';
}

  const a = [...arr];
