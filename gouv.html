/* ═══════════════════════════════════════════════════════════
   ORCHESTRATION
   ═══════════════════════════════════════════════════════════ */

function examQuestionsFromDuration(durMin) {
  if (durMin <= 30) return 1;
  if (durMin <= 60) return 2;
  if (durMin <= 75) return 3;
  if (durMin <= 105) return 4;
  return 5;
}

function examGenerate(nQuestions) {
  return { questions: eShuffle(GOUV_QUESTIONS).slice(0, nQuestions) };
}

function examPick(qid, value) {
  if (!examState || examState.submitted) return;
  examState.answers[qid] = value;
}

function examEvalCheck(group, key, checked) {
  if (!examState) return;
  examState.answers[group] = examState.answers[group] || {};
  examState.answers[group][key] = checked;
  if (examState.submitted) examRecomputeScore();
}

function examRecomputeScore() {
  const ds = examState.dossiers;
  const a = examState.answers;
  let total = 0, max = 0;
  ds.questions.forEach((q, qi) => {
    const r = correctQuestion(q, a, qi);
    total += r.pts; max += r.max;
  });
  const rounded = Math.round(total * 100) / 100;
  const el = document.getElementById('exam-score-live');
  if (el) el.textContent = rounded.toFixed(2).replace('.', ',');
  if (examState && examState.submitted) {
    const arr = loadExamScores();
    if (arr.length > 0) {
      arr[0].score = rounded;
      arr[0].total = max;
      localStorage.setItem(EXAM_KEY, JSON.stringify(arr));
      flashSaveIndicator();
    }
  }
}

function flashSaveIndicator() {
  const el = document.getElementById('exam-save-flash');
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function correctQuestion(q, ans, qi) {
  const qid = 'q' + qi;
  const checks = ans[qid + '_checks'] || {};
  const nChecked = q.points.filter((_, i) => checks['p' + i]).length;
  const pts = Math.min(4, nChecked * (4 / q.points.length));
  return { pts: Math.round(pts * 100) / 100, max: 4, nChecked, total: q.points.length };
}

function renderExamen() {
  const root = document.getElementById('appRoot');
  const header = `
    <div class="page-header">
      <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
      <div class="page-title">${DATA.title}</div>
      <div class="page-subtitle">${DATA.subtitle}</div>
    </div>`;
  if (!examState) { root.innerHTML = header + renderExamenConfig(); return; }
  if (examState.submitted) { root.innerHTML = header + renderExamenResult(); return; }
  root.innerHTML = header + renderExamenRunning();
  examStartTimer();
}

function loadExamScores() {
  try { return JSON.parse(localStorage.getItem(EXAM_KEY)) || []; } catch (e) { return []; }
}
function saveExamScore(score, total, durationSec, elapsedSec) {
  const arr = loadExamScores();
  arr.unshift({ score, total, date: Date.now(), duration: durationSec, elapsed: elapsedSec });
  localStorage.setItem(EXAM_KEY, JSON.stringify(arr.slice(0, 5)));
}

function renderExamenConfig() {
  const scores = loadExamScores().slice(0, 3);
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const histHTML = scores.length === 0
    ? '<p style="color:var(--text3);font-size:0.82rem;text-align:center">Aucune tentative précédente</p>'
    : scores.map(s => {
        const pct = Math.round(s.score / s.total * 100);
        const d = new Date(s.date);
        const ds = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
        const mm = Math.floor((s.elapsed || 0) / 60);
        return `<span class="quiz-score-pill"><span style="color:${col};font-weight:700">${fmtNum(s.score)}/${s.total}</span><span style="color:var(--text3)">${ds} · ${mm} min</span></span>`;
      }).join('');
  return `
    <div class="fade-up">
      <div class="exam-setup">
        <div style="font-size:2.4rem">📝</div>
        <h3 style="font-family:'Playfair Display',serif;margin:0.4rem 0">Examen blanc — Management des SI</h3>
        <p style="color:var(--text2);max-width:560px;margin:0 auto 1.4rem;font-size:0.92rem">Format épreuve écrite (N. Lebey) — 2h, 20 pts : 5 questions ouvertes × 4 pts sur des thèmes du cours. Aucun document autorisé. ${GOUV_QUESTIONS.length} questions disponibles dans le pool, tirage aléatoire.</p>
        <div class="quiz-history" style="max-width:560px;margin:0 auto 1.4rem">
          <div class="quiz-history-title">Tentatives récentes</div>
          ${histHTML}
        </div>
        <div class="exam-setup-grid">
          <div class="exam-setup-card">
            <div class="exam-setup-label">⏱ Durée</div>
            <input id="exam-duration" type="range" min="30" max="120" step="15" value="120" class="exam-slider" oninput="examUpdateDurationLabel(this.value)">
            <div class="exam-setup-value"><span id="exam-duration-label">120 min</span></div>
            <div class="exam-setup-hint" id="exam-duration-hint">→ <strong>5 questions</strong> · note sur <strong>20 pts</strong> (épreuve complète)</div>
          </div>
          <div class="exam-setup-card">
            <div class="exam-setup-label">🎯 Pool de thèmes</div>
            <p style="font-size:0.82rem;color:var(--text2);margin:0.4rem 0 0.6rem">${GOUV_QUESTIONS.length} questions ouvertes disponibles sur tous les thèmes du cours : gouvernance, sécurité, RGPD, IA, dématérialisation, audit, contrats SI, infogérance.</p>
            <div class="exam-setup-hint">Tirage <strong>au hasard</strong> sur l'ensemble du pool — pas de filtre par thème (l'épreuve réelle ne filtre pas non plus).</div>
          </div>
        </div>
        <button class="start-btn" style="margin-top:1.5rem" onclick="examStart()">🚀 Lancer l'examen blanc</button>
      </div>
    </div>
  `;
}

function examUpdateDurationLabel(val) {
  const sliderEl = document.getElementById('exam-duration');
  if (val == null) val = sliderEl ? sliderEl.value : 120;
  const dur = parseInt(val, 10);
  const lbl = document.getElementById('exam-duration-label');
  if (lbl) lbl.textContent = dur + ' min';
  const n = examQuestionsFromDuration(dur);
  const totalPts = n * 4;
  const hint = document.getElementById('exam-duration-hint');
  if (hint) {
    const isFull = n === 5;
    hint.innerHTML = `→ <strong>${n} question${n>1?'s':''}</strong> tirée${n>1?'s':''} au sort · note sur <strong>${totalPts} pts</strong>${isFull ? ' (épreuve complète)' : ''}`;
  }
}

function examStart() {
  const dur = parseInt(document.getElementById('exam-duration').value, 10) * 60;
  const n = examQuestionsFromDuration(Math.floor(dur / 60));
  examState = {
    startedAt: Date.now(),
    durationSec: dur,
    submitted: false,
    dossiers: examGenerate(n),
    answers: {},
    pickedCount: n
  };
  renderExamen();
}

function renderExamenRunning() {
  const a = examState.answers;
  const body = examState.dossiers.questions.map((q, qi) => {
    const qid = 'q' + qi;
    const text = a[qid + '_text'] || '';
    return `
      <div class="exam-dossier" id="exam-${qid}">
        <div class="exam-dossier-head">
          <div class="exam-dossier-num">Question ${qi + 1}</div>
          <div class="exam-dossier-title">${eEscape(q.theme)}</div>
          <div class="exam-dossier-pts">4 points</div>
        </div>
        <div class="exam-context"><p><strong>${eEscape(q.q)}</strong></p>${q.context ? `<p class="exam-rappel">📰 Contexte : ${eEscape(q.context)}</p>` : ''}</div>
        <div class="exam-q">
          <textarea class="exam-textarea" style="min-height:280px" placeholder="Rédigez votre réponse structurée (15-25 min par question)..." oninput="examPick('${qid}_text', this.value)">${eEscape(text)}</textarea>
          <div class="exam-wc">${text.trim() ? text.trim().split(/\s+/).length : 0} mots</div>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="exam-timer-bar" id="exam-timer-bar">
      <span class="exam-timer-icon">⏱</span>
      <span class="exam-timer-time" id="exam-timer-time">--:--</span>
      <div class="exam-timer-progress"><div class="exam-timer-progress-fill" id="exam-timer-fill"></div></div>
      <button class="exam-timer-submit" onclick="examSubmit(false)">Terminer l'examen →</button>
    </div>
    <div class="fade-up exam-running">
      ${body}
      <div style="text-align:center;margin:2rem 0">
        <button class="start-btn" onclick="examSubmit(false)">Terminer l'examen et voir le corrigé →</button>
      </div>
    </div>`;
}

function examStartTimer() {
  clearInterval(examTimerInterval);
  const update = () => {
    if (!examState || examState.submitted) { clearInterval(examTimerInterval); return; }
    const elapsed = Math.floor((Date.now() - examState.startedAt) / 1000);
    const remaining = Math.max(0, examState.durationSec - elapsed);
    const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
    const ss = String(remaining % 60).padStart(2, '0');
    const el = document.getElementById('exam-timer-time');
    if (el) el.textContent = mm + ':' + ss;
    const fill = document.getElementById('exam-timer-fill');
    if (fill) fill.style.width = (remaining / examState.durationSec * 100) + '%';
    const bar = document.getElementById('exam-timer-bar');
    if (bar) {
      bar.classList.toggle('warn', remaining < 300 && remaining > 60);
      bar.classList.toggle('danger', remaining <= 60);
    }
    if (remaining <= 0) { clearInterval(examTimerInterval); examSubmit(true); }
  };
  update();
  examTimerInterval = setInterval(update, 1000);
}

function examSubmit(timeout) {
  if (!examState || examState.submitted) return;
  if (!timeout && !confirm('Terminer l\'examen et afficher le corrigé ? Tu ne pourras plus modifier tes réponses.')) return;
  examState.submitted = true;
  examState.elapsedSec = Math.floor((Date.now() - examState.startedAt) / 1000);
  examState.timeout = !!timeout;
  clearInterval(examTimerInterval);
  renderExamen();
}

function renderExamenResult() {
  const a = examState.answers;
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const corrs = examState.dossiers.questions.map((q, qi) => ({ q, qi, r: correctQuestion(q, a, qi) }));
  const total = Math.round(corrs.reduce((s, c) => s + c.r.pts, 0) * 100) / 100;
  const max = corrs.length * 4;
  const pct = max > 0 ? Math.round(total / max * 100) : 0;
  const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '🎉' : pct >= 35 ? '👍' : '💪';
  const msg = pct >= 75 ? 'Mention TB' : pct >= 60 ? 'Mention B' : pct >= 50 ? 'Validé' : pct >= 30 ? 'Insuffisant' : 'Non validé';
  saveExamScore(total, max, examState.durationSec, examState.elapsedSec);
  if (pct >= 75) launchConfetti();
  const mm = Math.floor(examState.elapsedSec / 60);
  const ss = examState.elapsedSec % 60;
  const evalBlocks = corrs.map(c => {
    const qid = 'q' + c.qi;
    const checks = a[qid + '_checks'] || {};
    const ptPerPoint = 4 / c.q.points.length;
    const text = a[qid + '_text'] || '';
    return `
      <div class="exam-result-dossier">
        <div class="exam-result-dossier-head">
          <div class="exam-result-dossier-title">Question ${c.qi + 1} — ${eEscape(c.q.theme)} <span style="font-size:0.78rem;color:var(--text3)">${c.q.points.length} points-clés</span></div>
          <div class="exam-result-dossier-score" style="color:${c.r.pts >= 3 ? 'var(--green)' : c.r.pts >= 2 ? 'var(--orange)' : 'var(--red)'}"><span id="exam-score-q${c.qi}">${fmtNum(c.r.pts)}</span> / 4 pts</div>
        </div>
        <div style="padding:0 1rem 1rem">
          <p style="font-size:0.92rem;color:var(--text2);margin:0.6rem 0"><strong>Énoncé :</strong> ${eEscape(c.q.q)}</p>
          <div style="background:var(--bg);padding:0.8rem 1rem;border-radius:8px;margin-bottom:1rem;border-left:3px solid var(--accent);font-size:0.88rem;white-space:pre-wrap">${eEscape(text || '(aucune réponse saisie)')}</div>
          <div class="exam-eval-sub">
            <div class="exam-eval-section"><strong>Points-clés attendus — coche ceux que tu as réellement traités :</strong></div>
            ${c.q.points.map((pt, i) => `
              <label class="exam-eval-item">
                <input type="checkbox" ${checks['p' + i] ? 'checked' : ''} onchange="examEvalCheck('${qid}_checks', 'p${i}', this.checked)">
                <span>${eEscape(pt)}</span>
                <span class="exam-eval-pts">+${ptPerPoint.toFixed(2)} pt</span>
              </label>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="fade-up">
      <div class="score-box">
        <div class="score-emoji">${emoji}</div>
        <div class="score-num"><span id="exam-score-live">${fmtNum(total)}</span> / ${max}</div>
        <div class="exam-save-flash-wrap"><span id="exam-save-flash" class="exam-save-flash">💾 Note sauvegardée</span></div>
        <div class="score-label">${msg} · ${pct}% · ${mm}min${ss > 0 ? ' ' + ss + 's' : ''}${examState.timeout ? ' (temps écoulé)' : ''}</div>
        <div class="score-actions">
          <button class="btn-secondary" onclick="examState = null; renderExamen()">↺ Nouvel examen</button>
        </div>
      </div>
      ${evalBlocks}
    </div>`;
}

/* ═══════ BOOT ═══════ */
(async function() {
  try {
    DATA = await loadJSON('data/gouv.json', FALLBACK);
    if (!DATA || !DATA.checklistItems) DATA = FALLBACK;
    renderNav();
    switchTab('checklist');
  } catch (err) {
    console.error('[gouv] boot error', err);
    const root = document.getElementById('appRoot');
    if (root) root.innerHTML = `
      <div style="padding:3rem 1.5rem;text-align:center;background:var(--card);border-radius:14px;border:1px solid var(--red)">
        <div style="font-size:2rem;margin-bottom:0.8rem">⚠️</div>
        <div style="color:var(--red);font-weight:600;margin-bottom:0.4rem">Erreur de chargement</div>
        <div style="color:var(--text2);font-size:0.85rem;margin-bottom:1rem">${err.message || err}</div>
        <button class="back-home" onclick="window.location.href='index.html'">← Retour à l'accueil</button>
      </div>`;
  }
})();

</script>
