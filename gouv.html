        {
          "label": "Question 1 — Dématérialisation des bulletins de paie",
          "context": "Dématérialisation des bulletins de paie : un nouveau standard en entreprise ?\n\nArticle de Bertrand Dolbeau.\nSelon le Baromètre 2024 de la dématérialisation des documents RH mené par Digiposte et OpinionWay, 63 % des travailleurs reçoivent aujourd'hui leur fiche de paie au format numérique contre seulement 42 % en 2020. Cette transition vers un environnement professionnel toujours plus digital, loin d'être anodin, témoigne d'un bouleversement profond des usages et des mentalités, même si des inquiétudes persistent.\n\nLe coffre-fort numérique, outil plébiscité par les salariés, s'impose comme une réponse adaptée aux besoins de sécurité et d'accessibilité. Il permet non seulement un stockage sûr et durable des bulletins de paie, mais ouvre aussi la voie à une centralisation plus large des documents RH.\n\nLa praticité de conservation (58 %) et l'accès facilité (51 %) restent les deux principaux leviers de la dématérialisation du bulletin de paie et les salariés recevant leurs bulletins de paie dans un coffre-fort numérique sont très confiants, à 90 %, par rapport au stockage de ce type de document.\n\nPourtant, cette transformation n'est pas exempte de résistances. Près de 80 % des salariés expriment encore des préoccupations face aux risques numériques, notamment le vol de données personnelles ou l'utilisation frauduleuse de leurs documents. Un sentiment de vulnérabilité qui n'est pas à prendre à la légère et qui impose aux entreprises et aux acteurs de la dématérialisation un effort constant en matière de transparence et de pédagogie. Car si la technologie est prête, les esprits, eux, ont encore besoin d'être rassurés. Dans ce contexte, l'hébergement des données en France ou en Europe émerge comme une solution rassurante, souhaitée par 72 % des répondants.\n\nDes solutions de confiance peuvent apporter une réponse sécurisée et pédagogique pour accompagner les entreprises dans cette transition numérique, au bénéfice des employeurs comme des salariés.",
          "items": [
            {
              "q": "Expliquez quelles sont les obligations et les risques liés à la dématérialisation des bulletins de salaire.",
              "correction": "[Meilleure copie — note 16/20]\n\nLa dématérialisation des bulletins de salaire implique les obligations et les risques suivants.\n\n━━━ OBLIGATIONS ━━━\n\nAu niveau des obligations, la dématérialisation impose à l'entreprise de garantir aux salariés :\n  • La sécurité de leurs données à caractère personnel (DCP) par la mise en place d'un certain nombre de moyens, mesures, ressources ainsi que de leurs données sensibles comme le coffre-fort numérique\n  • La disponibilité de ces données pendant 50 ans (accès numérique)\n  • L'intégrité de celles-ci\n  • L'authenticité et l'identification de celles-ci ainsi que de son émetteur et de celui qui y accède\n  • La non-répudiation\n  • L'inaltérabilité\n\nCette dématérialisation impose également aux entreprises de se conformer au RGPD (Règlement Général sur la Protection des Données) et à la loi Informatique et Libertés de 1978.\n\nL'entreprise est tenue de nommer un DPO (Délégué à la Protection des Données) chargé du respect du traitement de ces données au RGPD.\n\nElle doit tenir un registre des traitements des données à caractère personnel.\nElle doit informer la CNIL (Commission Nationale Informatique et Libertés) de toute perte de données dans les 72h.\nElle doit garantir les droits des salariés en ce qui concerne le droit à la consultation de leurs DCP, le droit à la rectification / suppression de leurs données, le droit à la portabilité.\nElle doit informer les salariés des finalités du traitement de la collecte de leurs données à caractère personnel et obtenir leurs consentements si elles souhaitent commercialiser celles-ci.\nElle doit stocker ces données sur des serveurs hébergés en France et/ou en Europe.\nElle doit mettre en place une PSSI (Politique de Sécurité des Systèmes d'Information) et un PCA (Plan de Continuité d'Activité).\nElle doit nommer un RCCI (Responsable Conformité et Contrôle Interne) et mettre en place une procédure de contrôle interne.\n\n━━━ RISQUES ━━━\n\nAu niveau des risques, la dématérialisation engendre les risques suivants :\n\n  • Risques financiers en cas de perte / vol de données : cela peut engendrer des coûts pour l'entreprise, d'une part pour indemniser les salariés du préjudice subi, et d'autre part, en cas de rançons demandées par les assaillants.\n\n  • Risques d'image liés également à la perte / fuite des données qui aurait pour conséquence de faire perdre la confiance des salariés dans la capacité à protéger leurs données et par la même occasion celles de leurs clients.\n\n  • Risques organisationnels liés à la nécessité de cartographier les risques, d'élaborer une stratégie et une méthode de projet pour mettre en place cette dématérialisation, ainsi que l'établissement de procédures.\n\n  • Risques humains liés à la résistance au changement, par exemple 37 % selon le baromètre 2024 de la dématérialisation des documents RH mené par Digiposte et OpinionWay.\n\n  • Risques techniques et informatiques liés à la mise en œuvre de cette dématérialisation et la nécessité d'avoir du matériel permettant celle-ci, de répondre à ses obligations vues précédemment ; la nécessité d'avoir les compétences techniques ou informatiques… et/ou encore la perte de réseaux de communication."

        {
          "label": "Question 2 — IA et usages : 3 risques + pistes pour les diminuer",
          "context": "IA et usages : la confiance, pierre angulaire de son adoption durable.\n\nUne étude mondiale KPMG-Université de Melbourne révèle une adoption croissante de l'IA, mais pointe un manque de formation, une confiance encore limitée et la nécessité d'un cadre réglementaire renforcé. En France, malgré des usages en progression, les risques associés demeurent encore des freins importants notamment en entreprise.",
          "items": [
            {

function escAnnale(s) {
  return String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
function toggleAnnaleCorrection(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const isHidden = el.style.display === 'none' || !el.style.display;
  el.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '▾ Masquer la correction' : '▸ Afficher la correction';
  btn.classList.toggle('open', isHidden);
}
function expandAllAnnales(scope) {
  document.querySelectorAll(scope + ' .annale-correction').forEach(el => { el.style.display = 'block'; });
  document.querySelectorAll(scope + ' .annale-show-corr').forEach(btn => { btn.textContent = '▾ Masquer la correction'; btn.classList.add('open'); });
}
function collapseAllAnnales(scope) {
  document.querySelectorAll(scope + ' .annale-correction').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll(scope + ' .annale-show-corr').forEach(btn => { btn.textContent = '▸ Afficher la correction'; btn.classList.remove('open'); });
}

function switchAnnale(idx, btn) {
  document.querySelectorAll('.annale-body-wrap').forEach(el => {
    el.style.display = parseInt(el.dataset.annaleIdx, 10) === idx ? '' : 'none';
  });
  document.querySelectorAll('.annale-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Collapse toutes les corrections de l'annale qu'on quitte pour repartir propre
  document.querySelectorAll('.annale-correction').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll('.annale-show-corr').forEach(b => { b.textContent = '▸ Afficher la correction'; b.classList.remove('open'); });
}

function getAnnalesHTML() {
  const list = (DATA.annales || []);
  if (!list.length) return `<div class="annales-empty"><p>Aucune annale disponible pour ce cours.</p></div>`;
  const renderOne = (a, aIdx) => {
    const meta = [a.duration ? `⏱ ${a.duration}` : '', a.format || '', a.professor ? `👤 ${a.professor}` : '']
      .filter(Boolean).join(' · ');
    const head = `
      <div class="annale-head">
        <div class="annale-head-row">
          <div class="annale-year">${escAnnale(a.year || '')}</div>
          <div class="annale-title">${escAnnale(a.name || 'Annale')}</div>
        </div>
        ${meta ? `<div class="annale-meta">${escAnnale(meta)}</div>` : ''}
      </div>`;
    const tipsHTML = (a.tips||[]).length ? `
      <div class="annale-tips">
        <div class="annale-block-title">💡 Conseils méthodologiques</div>
        <ul>${a.tips.map(t => `<li>${escAnnale(t)}</li>`).join('')}</ul>
      </div>` : '';

    // ── NOUVEAU SCHÉMA : dossiers[].items[{q,correction}] avec bouton par sous-question ──
    if (Array.isArray(a.dossiers) && a.dossiers.length) {
      const cardId = `annale-card-${aIdx}`;
      const dossiersHTML = a.dossiers.map((ds, dIdx) => {
        const itemsHTML = (ds.items || []).map((it, iIdx) => {
          const corrId = `corr-${aIdx}-${dIdx}-${iIdx}`;
          return `
          <div class="annale-question">
            <div class="annale-q-text">${escAnnale(it.q || '')}</div>
            ${it.correction ? `
              <button class="annale-show-corr" type="button" onclick="toggleAnnaleCorrection('${corrId}', this)">▸ Afficher la correction</button>
              <div class="annale-correction" id="${corrId}" style="display:none">${escAnnale(it.correction)}</div>
            ` : ''}
          </div>`;
        }).join('');
        return `
        <div class="annale-dossier">
          <div class="annale-dossier-label">${escAnnale(ds.label || '')}</div>
          ${ds.context ? `<div class="annale-dossier-context">${escAnnale(ds.context)}</div>` : ''}
          <div class="annale-dossier-items">${itemsHTML}</div>
        </div>`;
      }).join('');
      const subjectHTML = a.subject ? `
        <div class="annale-subject">
          <div class="annale-block-title">📋 Énoncé général</div>
          <div class="annale-subject-content">${escAnnale(a.subject)}</div>
        </div>` : '';
      return `
      <div class="annale-card" id="${cardId}">
        ${head}
        <div class="annale-toolbar">
          <button class="annale-toolbar-btn" type="button" onclick="expandAllAnnales('#${cardId}')">▾ Tout afficher</button>
          <button class="annale-toolbar-btn" type="button" onclick="collapseAllAnnales('#${cardId}')">▸ Tout masquer</button>
        </div>
        ${subjectHTML}
        <div class="annale-dossiers">${dossiersHTML}</div>
        ${tipsHTML}
      </div>`;
    }

    // ── ANCIEN SCHÉMA (fallback pour annales non encore migrées) ──
    const exHTML = (a.exercises || []).map(e => `
      <div class="annale-exercise">
        <div class="annale-exercise-label">${escAnnale(e.label)}</div>
        <div class="annale-exercise-content">${escAnnale(e.content||'').replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
    const bc = a.bestCopy;
    let bestCopyHTML = '';
    if (bc) {
      const planHTML = (bc.plan||[]).map(line => {
        const t = (line||'').trim();
        if (!t) return '<div class="annale-plan-spacer"></div>';
        if (/^(I+\.|[0-9]+\.|Introduction|Conclusion|Exercice|Q[0-9]+|•)/.test(t)) {
          return `<div class="annale-plan-line annale-plan-main">${escAnnale(t)}</div>`;
        }
        return `<div class="annale-plan-line">${escAnnale(t)}</div>`;
      }).join('');
      const conceptsHTML = (bc.keyConcepts||[]).map(c => `<span class="annale-concept">${escAnnale(c)}</span>`).join('');
      const qcmHTML = (bc.qcmAnswers||[]).length
        ? `<div class="annale-block annale-qcm"><div class="annale-block-title">QCM — réponses correctes</div>${bc.qcmAnswers.map(q=>`<div class="annale-qcm-line">${escAnnale(q)}</div>`).join('')}</div>`
        : '';
      bestCopyHTML = `
      <div class="annale-bestcopy">
        <div class="annale-bestcopy-head">
          <span class="annale-grade">📝 Note : ${escAnnale(bc.grade)}</span>
          ${bc.subjectChosen ? `<span class="annale-chosen">Sujet traité : ${escAnnale(bc.subjectChosen)}</span>` : ''}
        </div>
        ${qcmHTML}
        <div class="annale-block">
          <div class="annale-block-title">Plan-type / structure de la copie</div>
          <div class="annale-plan">${planHTML}</div>
        </div>
        ${(bc.keyConcepts||[]).length ? `
        <div class="annale-block">
          <div class="annale-block-title">Mots-clés &amp; concepts mobilisés</div>
          <div class="annale-concepts">${conceptsHTML}</div>
        </div>` : ''}
        ${bc.correctorNotes ? `<div class="annale-corrector"><strong>Annotations du correcteur :</strong> ${escAnnale(bc.correctorNotes)}</div>` : ''}
      </div>`;
    }
    let corrigeHTML = '';
    if (a.corrige && a.corrige.available) {
      const hl = (a.corrige.highlights||[]).map(h => `<li>${escAnnale(h)}</li>`).join('');
      corrigeHTML = `
      <div class="annale-corrige">
        <div class="annale-block-title">Corrigé officiel — points clés</div>
        ${a.corrige.summary ? `<p class="annale-corrige-summary">${escAnnale(a.corrige.summary)}</p>` : ''}
        <ul>${hl}</ul>
      </div>`;
    }
    return `
    <div class="annale-card">
      ${head}
      <div class="annale-subject">
        <div class="annale-block-title">📋 Sujet</div>
        <div class="annale-subject-content">${escAnnale(a.subject||'').replace(/\n/g,'<br>')}</div>
      </div>
      ${exHTML ? `<div class="annale-exercises">${exHTML}</div>` : ''}
      ${bestCopyHTML}
      ${corrigeHTML}
      ${tipsHTML}
    </div>`;
  };
  if (list.length === 1) return renderOne(list[0], 0);
  // Multi-annales : onglets en haut + un seul corps visible à la fois
  const tabsHTML = list.map((a, i) => `
    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}

      <tr><td><strong>Management</strong></td><td>Hiérarchique</td><td>Hiérarchique</td><td>Délégation</td><td>Local/fonctionnel</td><td>Par projet</td></tr>
      <tr><td><strong>Solutions NTIC</strong></td><td>Mainframe</td><td>Minis, transactionnel</td><td>SGBD/R, micro-info</td><td>Client/serveur, ERP/SCM</td><td>Internet, Intranet, SOA</td></tr>
    </tbody>
  </table>
  <div class="example-box"><strong>Knowledge Management (2000s) :</strong> transformer l'information en connaissance, et la connaissance en valeur. L'informaticien devient « celui qui peut aider à générer un avantage compétitif ».</div>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="3" id="chap-3">
  <h2>3. Les 5 fondements ISACA de la gouvernance SI</h2>
  <p>L'<strong>ISACA</strong> (Information Systems Audit and Control Association) a défini cinq fondements de la gouvernance des SI.</p>
  <h3>① Alignement stratégique</h3>
  <p>Le SI doit être aligné sur les objectifs stratégiques de la DG. La stratégie de la DSI doit découler de la stratégie globale. Sans adéquation, les dépenses IT (70 à 80 % du budget pour le seul fonctionnement) risquent d'être inefficaces. L'alignement dépend du secteur, de la taille, de la maturité, de la concurrence.</p>
  <div class="def-box">
    <div class="def-label">Modèle Henderson-Venkatraman — 4 formes d'alignement</div>
    <ul>
      <li>① <strong>Exécution opérationnelle</strong> de la stratégie</li>
      <li>② <strong>SI vecteur de transformation technologique</strong></li>
      <li>③ <strong>SI à l'origine de la stratégie</strong> et source d'avantage concurrentiel</li>
      <li>④ <strong>SI prestataire de services</strong> opérationnels</li>
    </ul>
    <p><strong>Deux conditions préalables :</strong> compréhension/intégration des objectifs stratégiques par la fonction IT + prise en compte des opportunités et contraintes IT dans la stratégie générale.</p>
  </div>
  <h4>Démarche d'alignement stratégique en 5 étapes</h4>
  <ol>
    <li>Favoriser la communication entre les acteurs</li>
    <li>Définir et réviser la stratégie SI</li>
    <li>Nouer des alliances et partenariats avec les métiers</li>
    <li>Améliorer la visibilité et la prévisibilité</li>
    <li>Choisir les projets et les prioriser</li>
  </ol>
  <h3>② Création de valeur</h3>
  <p>La valeur est créée essentiellement à travers la <strong>connaissance</strong> détenue et délivrée par le SI. Il est le <em>point de départ</em> (données) ET le <em>point d'arrivée</em> (aide à la décision) de toute analyse. Un SI fiable peut aussi avoir une valeur pécuniaire lors d'une fusion-acquisition.</p>
  <div class="key-box"><strong>Double objectif du budget SI :</strong> mettre en évidence la valeur créée + optimiser les coûts.</div>
  <h3>③ Gestion des risques</h3>
  <p>Identifier et contrôler l'ensemble des menaces qui pèsent sur le SI. Sous-estimer ces risques peut conduire à un préjudice économique majeur (espionnage industriel). Particulièrement critique pour les entreprises dont le CA repose sur un savoir-faire spécifique (laboratoire pharmaceutique, téléphonie).</p>
  <div class="key-box"><strong>Référentiels mobilisés :</strong> ISO 27000 (management de la sécurité de l'information) · ISO 27002 (bonnes pratiques pour implémenter un SMSI).</div>
  <h3>④ Gestion des ressources</h3>
  <p>Optimiser et rationaliser les investissements dans les ressources IT (infrastructures, applications, compétences). Un manque de compétences ou d'infrastructures freine la réactivité face aux besoins métiers.</p>
  <h3>⑤ Mesure de la performance</h3>
  <p>Le SI est indispensable au contrôle de gestion (reporting, tableaux de bord) pour surveiller l'atteinte des objectifs.</p>
  <div class="key-box"><strong>Balanced Scorecard (BSC) — Kaplan &amp; Norton :</strong> tableaux de bord équilibrés sur 4 axes — <em>Financier</em> · <em>Client</em> · <em>Innovation / Apprentissage</em> · <em>Processus internes</em>. Traduit la stratégie en objectifs mesurables.</div>
  <h3>Adéquation fondements / pratiques</h3>
  <p>10 pratiques managériales fondamentales en gouvernance SI : Planification du SI · Alignement SI/activités · Gestion du portefeuille de projets SI · Budget et contrôle de gestion · Gestion des projets SI · Fourniture de services et optimisation des processus · Gestion des risques · Gestion des compétences · Gestion de la communication · Gestion et mesure de la performance.</p>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="4" id="chap-4">
  <h2>4. Gouvernance d'entreprise vs Gouvernance des SI</h2>
  <div class="def-box">
    <div class="def-label">Gouvernance d'entreprise (Corporate Governance)</div>
    <p>Organisation du système de contrôle des décisions des dirigeants. Alchimie entre <strong>performance</strong> et <strong>conformité</strong>. Organise la relation entre conseil des actionnaires et direction. Renforcée par les scandales des années 2000 (Enron, Worldcom).</p>
  </div>
  <h3>Lois encadrant la Corporate Governance</h3>
  <ul>
    <li><strong>SOX — Sarbanes-Oxley</strong> (29 août 2002, États-Unis) : contrôle interne obligatoire après Enron/Worldcom</li>
    <li><strong>NRE</strong> — Nouvelles Réglementations Économiques (15 mai 2001, France)</li>
    <li><strong>LSF</strong> — Loi de Sécurité Financière (1er août 2003, France) : équivalent SOX</li>
    <li><strong>Loi Breton</strong> (26 juillet 2005, France) : confiance et modernisation de l'économie</li>
  </ul>
  <div class="key-box">La gouvernance des SI est <strong>extrêmement dépendante</strong> de la gouvernance d'entreprise. Elle contribue à la fois à la <em>Gouvernance de Conformité</em> et à la <em>Gouvernance de Performance</em>. Deux éléments décalqués : séparation entre propriétaires et gestionnaires + gestion des risques et anticipation.</div>
  <h3>Enjeux d'un modèle de gouvernance SI</h3>
  <ul>
    <li>Maintenir la création de valeur</li>
    <li>Améliorer la performance des processus du SI et la prise en compte des clients du SI</li>
    <li>Contrôler l'aspect financier du SI</li>
    <li>Développer compétences et solutions pour les besoins futurs</li>
    <li>Identifier et gérer les risques</li>
    <li>Développer la transparence</li>
  </ul>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="5" id="chap-5">
  <h2>5. La DSI dans l'entreprise</h2>
  <p>Le DSI est un acteur clé de la gouvernance : il maintient la cohérence des structures IT avec les besoins métier, assure la continuité des services, garantit l'alignement stratégique. Son rôle est <strong>de moins en moins technique</strong> et <strong>de plus en plus managérial</strong> : efficacité, productivité, rentabilité, alignement.</p>
  <h3>Organisation interne — 3 pôles</h3>
  <table class="comp-table">
    <thead><tr><th>Pôle</th><th>Activités</th></tr></thead>
    <tbody>
      <tr><td><strong>Production</strong></td><td>Exploitation courante : hébergement, sauvegardes, configurations, accès</td></tr>
      <tr><td><strong>Support</strong></td><td>Traitement des erreurs et demandes des utilisateurs (Help Desk)</td></tr>
      <tr><td><strong>Développement</strong></td><td>Prépare les évolutions selon les orientations stratégiques</td></tr>
    </tbody>
  </table>
  <p>Le directeur de la DSI siège, comme les responsables métiers, aux assemblées stratégiques avec la DG.</p>
  <h3>4 activités principales de la DSI</h3>
  <ol>
    <li>Soutenir les objectifs de création de valeur</li>
    <li>Accroître la performance des processus du SI</li>
    <li>Maîtriser l'exploitation courante et assurer les risques SI</li>
    <li>Développer solutions et compétences pour les besoins futurs</li>
  </ol>
  <h3>Relations DSI / métiers</h3>
  <ul>
    <li>Bon fonctionnement des applications actuelles</li>
    <li>Évolutions pour s'adapter aux besoins métiers (upgrades)</li>
    <li>Réduction des coûts du SI</li>
    <li>Garantir la continuité de l'exploitation</li>
    <li>Productivité et efficacité commerciale</li>
    <li>Stimuler les innovations métier par la technologie</li>
  </ul>
  <h3>Help Desk — critères de qualité</h3>
  <div class="key-box">Taux et temps de résolution des problèmes · Taux de résolution en ligne · Temps moyen de décroché · Taux d'abandon d'appel · Taux de prise en main à distance · Qualité de l'accueil et service rendu</div>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="6" id="chap-6">
  <h2>6. Externalisation, infogérance et TMA</h2>
  <h3>Sous-traitance vs Infogérance</h3>
  <div class="def-box">
    <div class="def-label">Sous-traitance</div>
    <p>Faire réaliser certaines opérations par des prestataires externes, en <strong>conservant</strong> le choix des moyens, la maîtrise et la responsabilité d'ensemble.</p>
  </div>
  <div class="def-box">
    <div class="def-label">Infogérance (contrat)</div>
    <p>Achat auprès d'un fournisseur d'un service complet, avec <strong>obligation de résultat</strong>, sans maîtrise ni responsabilité sur les moyens mis en œuvre par le prestataire.</p>
  </div>
  <p>En France, la Commission ministérielle de terminologie informatique réserve « externalisation » à l'infogérance basée sur l'exploitation ET le développement évolutif.</p>
  <h3>Caractéristiques de l'infogérance</h3>
  <ul>
    <li>Engagement réciproque <strong>pluriannuel</strong> prestataire/client</li>
    <li>Relation multi-partite (DG, DAF, DSI, métiers)</li>
    <li>Cadre contractuel précis définissant un <strong>niveau de service</strong> attendu (vs livrable d'un contrat d'intégration)</li>
    <li>Périmètre évolutif pour répondre aux besoins du client</li>
    <li>Conditions de <strong>réversibilité</strong> ET <strong>transférabilité</strong></li>
    <li>Parfois : reprise de personnel/actifs, plateformes offshore/nearshore, hébergement</li>
  </ul>
  <div class="example-box"><strong>Infogérance « mouroir » / fin de vie :</strong> le SI a vocation à être abandonné ou remplacé. Caractéristiques différentes : engagement plus court, périmètre peu évolutif, pas de réversibilité/transférabilité.</div>
  <h3>Types d'infogérance</h3>
  <table class="comp-table">
    <thead><tr><th>Type</th><th>Périmètre</th></tr></thead>
    <tbody>
      <tr><td><strong>Globale</strong></td><td>Reprise complète du SI (infra + applications hétérogènes : paie, banques, CRM…). Inclut parfois reprise du personnel et actifs (postes, serveurs, PABX, progiciels).</td></tr>
      <tr><td><strong>Sélective</strong></td><td>Ne couvre qu'une part de l'infogérance globale (parc, production, TMA…)</td></tr>
      <tr><td><strong>De parc</strong></td><td>Postes utilisateurs : help desk, équipe de proximité, gestion du parc, dépannage, masterisation, télédistribution</td></tr>
      <tr><td><strong>De production</strong></td><td>Serveurs de messagerie, intermédiaires, applis critiques, réseaux, téléphonie, systèmes applicatifs</td></tr>
      <tr><td><strong>BPO</strong></td><td>Business Process Outsourcing : prend en charge l'IT ET les autres segments de la fonction (RH, achats, logistique). Va plus loin que l'infogérance.</td></tr>
      <tr><td><strong>BTO</strong></td><td>Business Transformation Outsourcing : transformation complète d'un ensemble de processus</td></tr>
      <tr><td><strong>ASP</strong></td><td>Application Service Provider : location d'application (ex : automatisation des forces de vente)</td></tr>
    </tbody>
  </table>
  <div class="key-box"><strong>Point fondamental :</strong> toujours conserver la possibilité technique et contractuelle de ré-internaliser les fonctions confiées à des tiers ou de changer de prestataire à moindre coût. Les fonctions externalisées sont généralement les fonctions d'exécution standard ou à forte variabilité/saisonnalité.</div>
  <h3>TMA — Tierce Maintenance Applicative</h3>
  <p>Prise en charge par le prestataire de la maintenance et de l'évolution de tout ou partie du système applicatif. <strong>Ne couvre pas l'exploitation</strong> (assurée par l'infogérance de production). Objectif : éviter les défauts, remettre en état rapidement, prendre en compte les évolutions.</p>
  <div class="key-box">
    <p><strong>3 domaines de la TMA :</strong></p>
    <ul>
      <li><strong>Assistance applicative</strong> : support fonctionnel et technique aux responsables d'applications et équipes d'exploitation du client</li>
      <li><strong>Maintenance curative</strong> : assurer le bon fonctionnement des applications en production</li>
      <li><strong>Maintenance évolutive</strong> : ajout / modification de fonctionnalités, évolutions réglementaires + <em>maintenance adaptative</em> (changements de versions d'OS sur les systèmes hôtes)</li>
    </ul>
  </div>
  <h3>Phases d'un service</h3>
  <ol>
    <li><strong>Prise en charge</strong> : fondements pour la production, constitution de l'équipe, minimiser le risque</li>
    <li><strong>Récurrence (production)</strong> : fournir le service conforme au contrat, gérer la fourniture financièrement, proposer des optimisations</li>
    <li><strong>Réversibilité / Transférabilité</strong> : fin du service, soit reprise par le client (réversibilité), soit confiée à un tiers (transférabilité)</li>
  </ol>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="7" id="chap-7">
  <h2>7. SLA, OLA, réversibilité, offshore</h2>
  <h3>SLA — Service Level Agreement</h3>
  <div class="def-box">
    <div class="def-label">SLA — Convention de service</div>
    <p>Document qui définit la qualité de service requise entre un prestataire et un client. Formalise un accord négocié : contenu des prestations, modalités, responsabilités, garanties, niveau de service (disponibilité, performance, opération, facturation, pénalités).</p>
  </div>
  <ul>
    <li><strong>SLS</strong> (Service Level Specification) : guide spécifiant les critères que le service doit fournir</li>
    <li><strong>SLO</strong> (Service Level Objectives) : indicateurs mesurant la qualité de service décrite par le SLS</li>
  </ul>
  <h4>Intérêts du SLA</h4>
  <ul>
    <li>Identifier et définir les besoins clients, allouer les services en adéquation</li>
    <li>Transforme l'<strong>obligation de moyens en obligation de résultat</strong></li>
    <li>Réduction des coûts IT + amélioration de la performance</li>
    <li>Le dialogue préalable réduit les risques de conflit</li>
  </ul>
  <h4>Limites</h4>
  <ul>
    <li>Manque de précision ou vocabulaire trop technique → conflits</li>
    <li>Description insuffisante des résultats à atteindre</li>
    <li>Complexité et évolution rapide du domaine IT compliquent le contrôle (souvent confié à un tiers)</li>
  </ul>
  <h3>OLA — Operation Level Agreement</h3>
  <p>Accord entre un fournisseur de service IT et une <strong>autre partie de la même organisation</strong>. Exemples : DSI ↔ service achats (matériel dans les délais), Centre de Services ↔ groupe de support (résolution d'incidents).</p>
  <h4>Intérêts de l'OLA</h4>
  <ul>
    <li>Recenser les besoins des services, mutualiser les ressources</li>
    <li>Ventilation des coûts dans des comptes de résultat d'exploitation par direction cliente</li>
    <li>La facturation interne sensibilise la DSI (qui peut être mise en concurrence) et les directions clientes</li>
    <li>La modulation tarifaire incite à adopter des standards à moindre coût</li>
  </ul>
  <h4>Limites</h4>
  <p>Imputation lourde et complexe → coût de traitement élevé. Mais ce calcul est indispensable pour justifier les prix.</p>
  <h3>Réversibilité, transférabilité, offshore</h3>
  <table class="comp-table">
    <thead><tr><th>Terme</th><th>Définition</th></tr></thead>
    <tbody>
      <tr><td><strong>Réversibilité</strong></td><td>Le client reprend la maîtrise du périmètre infogéré (ré-internalisation)</td></tr>
      <tr><td><strong>Transférabilité</strong></td><td>Le service est confié à un autre tiers (sans ré-internalisation)</td></tr>
      <tr><td><strong>Offshore</strong></td><td>Ressources dans un pays à faible coût de main d'œuvre (Inde, Pologne). Contraintes : distance, culture, fuseau horaire, langue, juridique.</td></tr>
      <tr><td><strong>Nearshore</strong></td><td>Prestation dans un pays limitrophe</td></tr>
      <tr><td><strong>Onshore</strong></td><td>Prestation de relative proximité (province ou région)</td></tr>
    </tbody>
  </table>
  <p>La clause de réversibilité/transférabilité est souvent plus délicate juridiquement qu'opérationnellement (transferts de responsabilité).</p>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="8" id="chap-8">
  <h2>8. COBIT — Control OBjectives for Information and related Technology</h2>
  <p>Référentiel <strong>ISACA</strong> élaboré dans les années 1990. Cadre de référence et de contrôle fondamental de la gouvernance et de l'audit des SI. Aide le management à piloter les risques (fiabilité, conformité, sécurité) et les investissements.</p>
  <h3>Principe directeur</h3>
  <p>Pour fournir l'information dont elle a besoin pour atteindre ses objectifs, l'entreprise doit investir dans des ressources IT, les gérer et les contrôler au moyen d'un ensemble de processus structurés. La gestion et le contrôle des informations sont au cœur du référentiel.</p>
  <h3>Les 4 domaines de processus COBIT</h3>
  <table class="comp-table">
    <thead><tr><th>Code</th><th>Domaine</th><th>Contenu</th></tr></thead>
    <tbody>
      <tr><td><strong>PO</strong></td><td>Planifier et Organiser</td><td>Stratégie IT, architecture, ressources, risques, cadre de gouvernance, processus organisationnels</td></tr>
      <tr><td><strong>AI</strong></td><td>Acquérir et Implémenter</td><td>Trouver des solutions IT, acquérir/maintenir des applications, mises en production</td></tr>
      <tr><td><strong>DS</strong></td><td>Délivrer et Supporter</td><td>Niveaux de service, sécurité (DS5), continuité, support utilisateurs, exploitation</td></tr>
      <tr><td><strong>SE</strong> (ou ME)</td><td>Surveiller et Évaluer</td><td>Performance, contrôle interne, audit, conformité réglementaire</td></tr>
    </tbody>
  </table>
  <div class="key-box"><strong>Cube COBIT :</strong> organisation du référentiel autour de 3 dimensions — <em>processus (et activités)</em> · <em>segmentation de l'information</em> · <em>ressource concernée</em>.</div>
  <h3>Les 7 critères d'information COBIT</h3>
  <table class="comp-table">
    <thead><tr><th>Critère</th><th>Définition</th></tr></thead>
    <tbody>
      <tr><td><strong>Efficacité</strong></td><td>Information pertinente, utile aux processus métiers, livrée au moment opportun, sous forme correcte, cohérente et utilisable</td></tr>
      <tr><td><strong>Efficience</strong></td><td>Mise à disposition par utilisation optimale (productive et économique) des ressources</td></tr>
      <tr><td><strong>Confidentialité</strong></td><td>Protection de l'information sensible contre toute divulgation non autorisée</td></tr>
      <tr><td><strong>Intégrité</strong></td><td>Exactitude, exhaustivité, validité de l'information</td></tr>
      <tr><td><strong>Disponibilité</strong></td><td>Information disponible pour les processus métiers, immédiatement et à l'avenir, avec sauvegardes</td></tr>
      <tr><td><strong>Conformité</strong></td><td>Respect des lois, règlements, contrats, politiques internes</td></tr>
      <tr><td><strong>Fiabilité</strong></td><td>Information appropriée permettant au management de piloter et d'exercer ses responsabilités fiduciaires</td></tr>
    </tbody>
  </table>
  <h3>5 fondements de la gouvernance des SI selon COBIT</h3>
  <ul>
    <li><strong>Alignement stratégique</strong> : SI aligné sur les plans métiers</li>
    <li><strong>Apport de valeur</strong> : optimisation des coûts, preuve de la valeur intrinsèque</li>
    <li><strong>Gestion des ressources</strong> : applications, informations, infrastructures, personnes</li>
    <li><strong>Gestion des risques</strong> : conscience par les cadres supérieurs, appétence au risque, conformité</li>
    <li><strong>Mesure de la performance</strong> : suivi de la stratégie, projets, ressources, processus (tableaux de bord équilibrés)</li>
  </ul>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="9" id="chap-9">
  <h2>9. ITIL — Information Technology Infrastructure Library</h2>
  <p>Référentiel pour la prestation de services IT. L'implémentation commence souvent avec la gestion de la CMDB, des changements, des incidents et des problèmes. L'approche processus professionnalise l'organisation et clarifie les rôles.</p>
  <h3>Processus du service Support</h3>
  <ul>
    <li><strong>Gestion des incidents</strong> — revenir au niveau de service initial en cas d'incident</li>
    <li><strong>Gestion des problèmes</strong> — identifier la cause fondamentale des incidents récurrents pour les résoudre définitivement (proactivité)</li>
    <li><strong>Gestion des changements</strong> — management des évolutions, procédures suivies, qualité de service</li>
    <li><strong>Gestion des mises en production</strong> — contrôle qualité des nouvelles versions, anticipation des impacts</li>
    <li><strong>Gestion des configurations</strong> — suivi de toutes les configurations, gestion du référentiel CMDB</li>
  </ul>
  <h3>Processus du service Production</h3>
  <ul>
    <li><strong>Gestion de la capacité</strong> — optimiser la capacité existante, anticiper le besoin futur, modérer la demande</li>
    <li><strong>Gestion de la disponibilité</strong> — service continu, anticipation des incidents, reprises rapides</li>
    <li><strong>Gestion de la continuité de services</strong> — rétablir les services critiques, sites de secours, plan de continuité</li>
    <li><strong>Gestion financière</strong> — suivi précis des coûts IT, gestion des budgets, refacturation</li>
    <li><strong>Gestion des niveaux de service</strong> — SLA, implication des fournisseurs, métrique consensuelle</li>
  </ul>
  <div class="example-box">La gestion des services doit être prise en considération <em>en amont</em> des projets informatiques, dès la phase d'audit et conception.</div>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="10" id="chap-10">
  <h2>10. Normes ISO 9000, 20000, 27000</h2>
  <h3>ISO 9000 — Qualité générale</h3>
  <ul>
    <li><strong>ISO 9000</strong> : principes du système de management de la qualité + terminologie</li>
    <li><strong>ISO 9001</strong> : exigences d'un SMQ pour usage interne, contractuel ou certification — caractère <em>générique</em> applicable à tous secteurs</li>
    <li><strong>ISO 9004</strong> : lignes directrices pour l'amélioration des performances (usage interne)</li>
  </ul>
  <h4>8 principes de management de la qualité (ISO 9000:2000)</h4>
  <ol>
    <li>Orientation client</li>
    <li>Leadership</li>
    <li>Implication du personnel</li>
    <li>Approche processus</li>
    <li>Management par approche système</li>
    <li>Amélioration continue</li>
    <li>Approche factuelle pour la prise de décision</li>
    <li>Relations mutuellement bénéfiques avec les fournisseurs</li>
  </ol>
  <h3>ISO 20000 — Gestion des services IT</h3>
  <p>Décomposée en 2 parties : la 1ère définit le cadre de certification et les procédures ; la 2ème explique les pratiques et la gestion des services.</p>
  <p>Processus : niveaux de service · rapports · continuité/disponibilité · budgétisation · capacité · sécurité de l'information · relations clients · fournisseurs · mises en production · résolution de problèmes · configurations · changements.</p>
  <h3>ISO 27000 — Sécurité de l'information</h3>
  <table class="comp-table">
    <thead><tr><th>Norme</th><th>Objet</th></tr></thead>
    <tbody>
      <tr><td><strong>27000</strong></td><td>Présentation, glossaire</td></tr>
      <tr><td><strong>27001</strong></td><td>SMSI (Système de Management de la Sécurité de l'Information)</td></tr>
      <tr><td><strong>27002</strong></td><td>Sécurité de l'information — 133 bonnes pratiques</td></tr>
      <tr><td><strong>27004</strong></td><td>Indicateurs de sécurité, mesures et métriques pour suivi du SMSI</td></tr>
      <tr><td><strong>27005</strong></td><td>Gestion des risques et sécurité de l'information</td></tr>
    </tbody>
  </table>
  <h4>Démarche PDCA (roue de Deming) appliquée à ISO 27002</h4>
  <ul>
    <li><strong>PLAN</strong> : élaboration de la PSSI, périmètre, objectifs, analyse des risques, cartographie, indicateurs</li>
    <li><strong>DO</strong> : déploiement des mesures, élaboration des procédures, sensibilisation/formation, tableaux de bord</li>
    <li><strong>CHECK</strong> : audit, contrôles internes, revue de processus</li>
    <li><strong>ACT</strong> : actions correctives, amélioration, bouclage</li>
  </ul>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="11" id="chap-11">
  <h2>11. CMMI — Capability Maturity Model Integration</h2>
  <p>Créé à l'origine par le département de la défense US pour assurer le suivi des développements et budgets. CMMI mesure la <strong>capacité des projets à s'achever correctement</strong> en termes de délais, fonctionnalités et budget. Destiné aux métiers de l'IT (projets et maintenance). Devient un standard international et un critère de sélection des fournisseurs.</p>
  <h3>Les 5 niveaux de maturité</h3>
  <table class="comp-table">
    <thead><tr><th>Niveau</th><th>Nom</th><th>Caractéristique</th></tr></thead>
    <tbody>
      <tr><td>1</td><td><strong>Initial</strong></td><td>Niveau basique ; efficacité reposant sur les compétences/motivations des individus ; processus quasi inconnus</td></tr>
      <tr><td>2</td><td><strong>Discipliné</strong></td><td>Déroulement du projet maîtrisé ; méthodes de réalisation assurent la répétition</td></tr>
      <tr><td>3</td><td><strong>Ajusté</strong></td><td>Processus clairement identifiés et définis ; compréhension partagée par tous les acteurs</td></tr>
      <tr><td>4</td><td><strong>Géré quantitativement</strong></td><td>Déroulement mesuré en termes quantitatifs et qualitatifs ; écarts analysés</td></tr>
      <tr><td>5</td><td><strong>En optimisation</strong></td><td>Stade ultime de l'amélioration continue</td></tr>
    </tbody>
  </table>
  <div class="key-box"><strong>Principe d'empilement :</strong> les domaines de processus rattachés à un niveau supérieur ne peuvent être stabilisés et efficaces que si les domaines des niveaux inférieurs le sont déjà.</div>
  <h3>Domaines de processus par niveau</h3>
  <ul>
    <li><strong>Niveau 2</strong> : Gestion de configuration (CM) · Mesure et analyse (MA) · Suivi et contrôle de projet (PMC) · Planification de projet (PP) · Assurance qualité (PPQA) · Gestion des exigences (REQM) · Gestion des ententes fournisseurs (SAM)</li>
    <li><strong>Niveau 3</strong> : Analyse et prise de décision (DAR) · Gestion de projet intégrée (IPM) · Environnement organisationnel (OEI) · Focalisation processus (OPF) · Performance processus (OPP) · Formation organisationnelle (OT) · Intégration produit (PI) · Développement des exigences (RD) · Gestion du risque (RSKM) · Solution technique (TS) · Validation (VAL) · Vérification (VER)</li>
    <li><strong>Niveau 4</strong> : Définition du processus organisationnel (OPD) · Gestion de projet quantitative (QPM)</li>
    <li><strong>Niveau 5</strong> : Analyse causale et résolution (CAR) · Innovation et déploiement (OID)</li>
  </ul>
</div>

<div class="course-chapter" data-theme="gouvernance" data-chap-idx="12" id="chap-12">
  <h2>12. COSO + Val IT + Risk IT — le tryptique ISACA</h2>
  <h3>COSO — Contrôle interne</h3>
  <p><strong>Committee of Sponsoring Organisation of the Treadway Commission</strong>, défini en <strong>1992</strong>. Référentiel de contrôle interne visant à limiter les tentatives de fraudes dans les rapports financiers. Émerge réellement à partir de <strong>2002</strong> avec les lois américaines rendant obligatoire l'évaluation du contrôle interne pour les sociétés faisant appel à l'épargne publique (suite à Enron et Worldcom). En France, déploiement avec la <strong>LSF de 2003</strong>.</p>
  <h3>Val IT</h3>
  <p>Ensemble de préconisations permettant d'évaluer la <strong>création de valeur</strong> comme critère de sélection entre différents projets. Permet de suivre leur cycle de vie et d'en faire un bilan afin d'améliorer les méthodes.</p>
  <h3>Risk IT</h3>
  <p>Volet management des risques. Permet d'intégrer la gestion des risques SI à la gestion des risques entreprise. Apporte une connaissance des niveaux de risques (présents, acceptables, tolérables).</p>
  <p>Les risques peuvent être induits par : la fourniture de services (panne, sécurité), la fourniture de solutions (dysfonctionnement applicatif, pertinence de projets), la réalisation de bénéfices (opportunités ratées).</p>
  <div class="key-box">
    <p><strong>3 volets de Risk IT :</strong></p>
    <ul>
      <li><strong>RG — Gouvernance des risques</strong> : RG1 vision commune · RG2 intégration aux risques entreprise · RG3 décisions business intégrant les risques</li>
      <li><strong>RE — Évaluation des risques</strong> : RE1 collecter les données · RE2 analyser · RE3 maintenir un profil de risque</li>
      <li><strong>RR — Réponse aux risques</strong> : RR1 articuler la situation · RR2 gérer · RR3 réagir aux événements</li>
    </ul>
  </div>
  <h3>Référentiels listés par finalité (Lebey)</h3>
  <ul>
    <li><strong>COBIT</strong> — gouvernance des SI</li>
    <li><strong>ITIL</strong> — prestation de services</li>
    <li><strong>CMM</strong> — fourniture de solutions</li>
    <li><strong>ISO 9001:2000</strong> — systèmes de management de la qualité</li>
    <li><strong>ISO 17799</strong> — sécurité de l'information (ancêtre ISO 27002)</li>
    <li><strong>PRINCE2</strong> — gestion de projets</li>
  </ul>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="13" id="chap-13">
  <h2>13. Audit des SI — Définitions et objectifs</h2>
  <div class="def-box">
    <div class="def-label">Audit (ISO 9000)</div>
    <p>« Processus méthodique, indépendant et documenté permettant de recueillir des informations objectives pour déterminer dans quelle mesure les pratiques observées satisfont aux référentiels du domaine concerné. » L'auditeur se forge une opinion qu'il consigne dans un rapport.</p>
  </div>
  <h3>Audit informatique vs Audit des SI</h3>
  <table class="comp-table">
    <thead><tr><th>Audit informatique</th><th>Audit des SI (apparu années 1970)</th></tr></thead>
    <tbody>
      <tr><td>Conseil en organisation par spécialistes extérieurs. Focus technique.</td><td>Périmètre <strong>plus large</strong> : aspects organisationnels et fonctionnels EN PLUS du technique. Examen des processus, systèmes de traitement automatisé, interfaces, avec règles en vigueur (fiscales, juridiques, techniques).</td></tr>
    </tbody>
  </table>
  <p>L'audit des SI peut être décomposé en deux approches :</p>
  <ul>
    <li><strong>Évaluation de la fonction informatique</strong> — appui sur COBIT (séparation des fonctions, gestion personnel, projets, fiabilité)</li>
    <li><strong>Évaluation de la composante « SI » des processus opérationnels</strong> — programmes de travail spécifiques, appréciation des risques généraux selon degré d'informatisation</li>
  </ul>
  <h3>Objectifs d'un audit SI</h3>
  <ul>
    <li>Évaluer efficacité, performance, pérennité et sécurité de l'information</li>
    <li>Dresser un bilan intelligible et transparent du SI</li>
    <li>Recommandations de réorganisation (technologie, métier, humain, stratégie)</li>
    <li>Évaluer la pertinence du parc logiciel</li>
    <li>Estimer coûts, délais, ROI des recommandations</li>
    <li>Évaluer la maturité numérique de l'entreprise par rapport à son secteur</li>
  </ul>
  <h3>Quand l'audit SI est-il utile ?</h3>
  <ul>
    <li>L'entreprise a franchi un cap (CA, collaborateurs, métier) et le SI freine la croissance</li>
    <li>Impossibilité de capter les données nécessaires à de nouveaux produits/marchés</li>
    <li>Besoin d'évoluer pour s'adapter (expérience client, générations Y et Z)</li>
    <li>Le SI ne permet pas l'effet de levier des nouvelles technologies</li>
    <li>Besoin de renouveler le business model ou innover</li>
    <li>La DSI met trop de temps à répondre aux utilisateurs</li>
    <li>Valorisation d'une entreprise (cession, fusion, acquisition)</li>
  </ul>
  <h3>Concepts de base de l'audit informatique</h3>
  <p>La notion de <strong>contrôle</strong> est au cœur de la démarche. Le contrôle interne est un processus mis en œuvre à l'initiative des dirigeants pour fournir une assurance raisonnable sur 3 objectifs :</p>
  <ol>
    <li>Conformité aux lois et règlements</li>
    <li>Fiabilité des informations financières</li>
    <li>Réalisation et optimisation des opérations</li>
  </ol>
  <p>L'audit informatique s'intéresse surtout au 3<sup>ème</sup> objectif. Démarche : <em>lettre de mission</em> (mandat, pouvoirs) → relevé des faits → entretiens → évaluation par rapport à des référentiels → recommandations.</p>
  <h3>Référentiels mobilisés par l'auditeur SI</h3>
  <div class="key-box">Référentiel de base : <strong>COBIT</strong>. Également : ISO 27002, CMMi, ITIL, Val IT, Risk IT.</div>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="14" id="chap-14">
  <h2>14. Guide d'audit gouvernance SI — les 12 vecteurs</h2>
  <p>Depuis l'alignement stratégique jusqu'à la réalisation des projets métiers et à la communication.</p>
  <table class="comp-table">
    <thead><tr><th>#</th><th>Vecteur</th><th>Objet</th></tr></thead>
    <tbody>
      <tr><td>1</td><td><strong>Stratégie</strong></td><td>Intégrer les enjeux numériques dans le plan stratégique de l'entreprise</td></tr>
      <tr><td>2</td><td><strong>Innovation</strong></td><td>Diffuser la culture numérique et promouvoir les technologies innovantes</td></tr>
      <tr><td>3</td><td><strong>Risques</strong></td><td>Prendre en compte les risques numériques dans les enjeux stratégiques et les processus métiers</td></tr>
      <tr><td>4</td><td><strong>Données</strong></td><td>Gérer, valoriser et protéger les données de l'entreprise</td></tr>
      <tr><td>5</td><td><strong>Architecture</strong></td><td>Aligner l'architecture du SI avec les enjeux stratégiques</td></tr>
      <tr><td>6</td><td><strong>Portefeuille de projets</strong></td><td>Optimiser la valeur du patrimoine SI et gérer ses évolutions</td></tr>
      <tr><td>7</td><td><strong>Projets</strong></td><td>Maîtriser la réalisation des projets et solutions</td></tr>
      <tr><td>8</td><td><strong>Ressources humaines</strong></td><td>Organiser et manager les talents et les compétences</td></tr>
      <tr><td>9</td><td><strong>Prestataires &amp; Fournisseurs</strong></td><td>Piloter les relations avec les fournisseurs de solutions et services numériques</td></tr>
      <tr><td>10</td><td><strong>Services</strong></td><td>Fournir des services numériques conformes aux attentes clients</td></tr>
      <tr><td>11</td><td><strong>Budget &amp; Performance</strong></td><td>Piloter le budget et la performance du SI</td></tr>
      <tr><td>12</td><td><strong>Marketing &amp; Communication</strong></td><td>Valoriser les services et communiquer sur les enjeux technologiques</td></tr>
    </tbody>
  </table>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="15" id="chap-15">
  <h2>15. Typologie des missions d'audit SI</h2>
  <p>Les missions se caractérisent par : nature, objectifs, degré d'approfondissement, caractère ponctuel ou permanent. Elles sont classifiées par la nature du lien (audit interne/externe), le cadre juridique, la qualité du mandataire.</p>
  <h3>Audit interne vs Audit externe</h3>
  <table class="comp-table">
    <thead><tr><th>Type</th><th>Description (AFAI)</th></tr></thead>
    <tbody>
      <tr><td><strong>Audit interne</strong></td><td>« Activité indépendante et objective qui donne à l'organisation une assurance sur le degré de maîtrise de ses opérations, apporte ses conseils pour les améliorer et contribue à créer de la valeur ajoutée. » Diligenté par la direction, exécuté par le département d'audit interne.</td></tr>
      <tr><td><strong>Audit externe</strong></td><td>Réalisé par des personnes extérieures (cabinets, spécialistes). Soit objectifs similaires à l'audit interne (absence ou incompétence du dept interne), soit autres contextes (mission CAC pour évaluer le contrôle interne et les risques impactant l'opinion).</td></tr>
    </tbody>
  </table>
  <h3>Les 5 typologies d'audit SI</h3>
  <table class="comp-table">
    <thead><tr><th>Type d'audit</th><th>Bonnes pratiques / Objectifs</th><th>Référentiel COBIT</th></tr></thead>
    <tbody>
      <tr><td><strong>Audit de la fonction informatique</strong></td><td>Clarté structures/responsabilités, relations DG/métiers/IT, dispositifs de mesure (tableau de bord), niveau compétences, comité de pilotage, politiques/normes/procédures, coûts (compta analytique ou refacturation)</td><td>PO4 — Définir les processus, l'organisation et les relations</td></tr>
      <tr><td><strong>Audit de l'exploitation</strong></td><td>Clarté organisation, SI dédié à l'exploitation, mesure efficacité/qualité. Outils : Openview (HP), Tivoli (IBM), <strong>Nagios</strong> (open source). Procédures dégradées, gestion incidents, plan de secours, comptabilité analytique.</td><td>DS1 (niveaux services), DS3 (perf/capacité), DS6 (coûts), DS12 (env. physique), DS13 (exploitation)</td></tr>
      <tr><td><strong>Audit des projets informatiques</strong></td><td>Méthodologie de conduite, étapes (modèles <strong>cascade, V, W, spirale</strong>), pilotage CdP/comité, conformité aux objectifs, note de cadrage, étude faisabilité, analyse fonctionnelle, tests utilisateurs</td><td>PO10 (gérer le projet), AI1 (trouver solutions), AI2 (acquérir applications)</td></tr>
      <tr><td><strong>Audit des applications opérationnelles</strong></td><td>Contrôles opérationnels suffisants, qualité données (saisies/stockées/produites), efficacité traitements, application documentée, procédures à jour, exploitation. Recommandé tous les <strong>2 ou 3 ans</strong>. Évaluation de régularité, conformité, productivité, pérennité.</td><td>—</td></tr>
      <tr><td><strong>Audit de la sécurité informatique</strong></td><td>4 notions fondamentales (menaces, vulnérabilité, manifestation, maîtrise du risque). Repérer actifs informationnels, identifier risques (<strong>RSSI</strong>), évaluer menaces, mesurer impacts (cartographie), définir parades. Réf : ISO 27001/27002.</td><td>DS5 (sécurité systèmes), PO9 (gérer les risques)</td></tr>
    </tbody>
  </table>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="16" id="chap-16">
  <h2>16. Démarche et règles de l'audit SI</h2>
  <h3>Caractéristiques de la démarche</h3>
  <table class="comp-table">
    <thead><tr><th>Caractéristique</th><th>Définition</th></tr></thead>
    <tbody>
      <tr><td><strong>Progressive</strong></td><td>Différents objectifs successifs</td></tr>
      <tr><td><strong>Modulaire</strong></td><td>Application en tout ou partie</td></tr>
      <tr><td><strong>Universelle</strong></td><td>Tous les domaines potentiellement concernés</td></tr>
      <tr><td><strong>Opérationnelle</strong></td><td>Orientée vers la proposition de solutions concrètes</td></tr>
    </tbody>
  </table>
  <h3>Règles d'audit des SI</h3>
  <p>Quel que soit le type de l'audit, la finalité est de porter un <strong>jugement sur le management du SI</strong> et l'exécution de ses objectifs. Comparer ce qui est observé et ce qui devrait être (système de références).</p>
  <ul>
    <li>Aller au-delà du jugement (approbation/condamnation) : préciser ce qu'il aurait fallu faire et ce qu'il faudra faire pour corriger</li>
    <li>Comparer l'observation d'objets selon des aspects à ce qu'ils devraient être</li>
    <li>Tâche parfaitement définie quant à l'objet et l'aspect, sans en déborder</li>
    <li>Ne pas remettre en cause la finalité de l'audit en fonction de la facilité ou des goûts</li>
    <li>Audit toujours faisable : découpé en fonctions, étapes significatives, conclusions partielles</li>
  </ul>
  <h3>Démarche de l'audit en 8 phases</h3>
  <ol>
    <li><strong>Prise de connaissance</strong> du SI et de l'organisation</li>
    <li>Évaluation des <strong>enjeux</strong></li>
    <li>Évaluation <strong>fonctionnelle</strong></li>
    <li>Évaluation <strong>technique</strong></li>
    <li>Évaluation <strong>financière</strong></li>
    <li>Évaluation de la <strong>conduite de projet</strong></li>
    <li>Évaluation de la <strong>sécurité et du contrôle interne</strong> des traitements</li>
    <li>Évaluation du <strong>support aux utilisateurs</strong></li>
  </ol>
  <h3>Rapport d'audit — exigences ISACA</h3>
  <div class="key-box">
    <ul>
      <li>Préciser l'entreprise, les destinataires, les éventuelles restrictions de diffusion</li>
      <li>Spécifier la portée, les objectifs, la période couverte, la nature, la durée et l'ampleur de l'audit</li>
      <li>Spécifier les conclusions et recommandations, limitations, réserves</li>
      <li>L'auditeur doit collecter des éléments probants suffisants et pertinents</li>
      <li>Le rapport doit être <strong>signé, daté</strong>, distribué conformément à la charte d'audit ou la lettre de mission</li>
    </ul>
    <p>Le rapport est un outil stratégique, support des améliorations du SI.</p>
  </div>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="17" id="chap-17">
  <h2>17. Cadre légal et normes professionnelles</h2>
  <h3>Cadre légal et réglementaire</h3>
  <p>Le législateur a imposé aux grandes entreprises plus de transparence et des SI à la hauteur des enjeux :</p>
  <table class="comp-table">
    <thead><tr><th>Norme / Loi</th><th>Pays</th><th>Date</th><th>Objet</th></tr></thead>
    <tbody>
      <tr><td><strong>SOX — Sarbanes-Oxley</strong></td><td>USA</td><td>29 août 2002</td><td>Contrôle interne obligatoire après Enron/Worldcom</td></tr>
      <tr><td><strong>NRE</strong></td><td>France</td><td>15 mai 2001</td><td>Nouvelles Réglementations Économiques</td></tr>
      <tr><td><strong>LSF</strong></td><td>France</td><td>1er août 2003</td><td>Loi de Sécurité Financière (art. 117/120 → art. L.225-37, L.225-68, L.225-235 C.com.)</td></tr>
      <tr><td><strong>Loi Breton</strong></td><td>France</td><td>26 juillet 2005</td><td>Confiance et modernisation de l'économie</td></tr>
    </tbody>
  </table>
  <h3>Normes d'audit interne — IIA</h3>
  <p>Référentiel : Institute of Internal Auditors (IIA) + code de déontologie. Selon l'<strong>IFACI</strong> :</p>
  <ul>
    <li>Définir les principes fondamentaux de la pratique</li>
    <li>Cadre de référence pour la réalisation et la promotion d'un large champ d'intervention</li>
    <li>Critères d'appréciation du fonctionnement</li>
    <li>Favoriser l'amélioration des processus et opérations</li>
  </ul>
  <p>Composition :</p>
  <ul>
    <li><strong>Normes de qualification</strong> — caractéristiques des organisations/personnes</li>
    <li><strong>Normes de fonctionnement</strong> — nature des missions + critères de qualité</li>
    <li><strong>Normes de mise en œuvre</strong> — exigences pour activités d'assurance ou de conseil</li>
  </ul>
  <div class="key-box"><strong>Norme 1210.A3 :</strong> « Les auditeurs internes doivent posséder une connaissance suffisante des principaux risques et contrôles IT, et des techniques d'audit informatisées. » Toutefois, tous les auditeurs internes ne sont pas censés posséder l'expertise d'un auditeur informatique.</div>
  <h3>Normes d'audit externe — ISA</h3>
  <p>Élaborées par l'<strong>IAASB</strong> (International Auditing and Assurance Standards Board), dépendance de l'<strong>IFAC</strong>. Selon l'ISACA, les normes informent : auditeurs SI (niveau minimum de diligence) + direction et parties prenantes (attentes vis-à-vis des travaux).</p>
  <p>Architecture : <em>normes</em> (exigences obligatoires) + <em>recommandations</em> (conseils) + <em>procédures</em> (modalités).</p>
  <ul>
    <li><strong>ISA 315</strong> — Connaissance de l'entité et évaluation du risque d'anomalies significatives</li>
    <li><strong>ISA 330</strong> — Procédures à mettre en œuvre selon l'évaluation du risque</li>
    <li><strong>ISCQ1</strong> — Contrôle qualité des cabinets</li>
  </ul>
  <h3>Normes professionnelles nationales — CNCC / NEP</h3>
  <p>En France, la <strong>CNCC</strong> (Compagnie nationale des commissaires aux comptes) homologue le référentiel applicable à la profession. Transposition entérinée en 2000.</p>
  <ul>
    <li><strong>CNCC 2-301</strong> — évaluation du risque et contrôle interne</li>
    <li><strong>CNCC 2-302</strong> — audit en environnement informatique</li>
  </ul>
  <p>Remplacées le <strong>1er mai 2007</strong> par les NEP (Normes d'Exercice Professionnel), qui ont <strong>valeur de loi</strong> pour le CAC :</p>
  <ul>
    <li><strong>NEP 315</strong> — Connaissance de l'entité et évaluation du risque d'anomalies significatives</li>
    <li><strong>NEP 330</strong> — Procédures d'audit à l'issue de l'évaluation des risques</li>
  </ul>
  <p>Les NEP découlent des normes internationales ISA 315 et 330.</p>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="18" id="chap-18">
  <h2>18. Contrôle interne — définition et cadre AMF</h2>
  <div class="def-box">
    <div class="def-label">Contrôle interne (AFAI)</div>
    <p>« Dispositif mis en œuvre par la société sous sa responsabilité. Ensemble de moyens, comportements, procédures et actions adaptés aux caractéristiques de chaque société qui :</p>
    <ul>
      <li>Contribue à la maîtrise des activités, à l'efficacité des opérations, à l'utilisation efficiente des ressources</li>
      <li>Permet de prendre en compte les risques significatifs (opérationnels, financiers, conformité) »</li>
    </ul>
  </div>
  <h3>4 objectifs du contrôle interne</h3>
  <ol>
    <li>Conformité aux lois et règlements</li>
    <li>Application des instructions et orientations fixées par la DG</li>
    <li>Bon fonctionnement des processus internes (sauvegarde des actifs)</li>
    <li>Fiabilité des informations financières</li>
  </ol>
  <p>Le contrôle interne <strong>ne se limite pas</strong> aux procédures comptables et financières. Il ne recouvre pas la stratégie, les objectifs, le traitement des risques ou le suivi des performances.</p>
  <h3>Code de commerce — origine LSF</h3>
  <p>Selon les articles L.225-37 et L.225-68 (issus de la LSF 2003), dans les sociétés faisant appel public à l'épargne, le président du CA/CS rend compte des procédures de contrôle interne. Selon l'article L.225-235, les CAC présentent leurs observations sur le rapport du Président pour les procédures concernant l'information comptable et financière.</p>
  <h3>Cadre de référence AMF 2010</h3>
  <p>Le cadre de l'<strong>AMF</strong> (Autorité des marchés financiers) sur les dispositifs de gestion des risques et de contrôle interne s'appuie sur les évolutions des principaux référentiels internationaux :</p>
  <ul>
    <li><strong>Référentiel COSO II</strong> — le plus communément admis, adopté par un nombre croissant d'entreprises françaises</li>
    <li><strong>Norme ISO 31000</strong> — « Management du risque — Principes et lignes directrices »</li>
  </ul>
  <p>Le cadre intègre un questionnaire de contrôle interne comptable et financier dont une partie porte sur les SI.</p>
  <h3>7 démarches de contrôle interne (AFAI)</h3>
  <ol>
    <li><strong>Audit comptable</strong> — sincérité des comptes (audit interne, CAC, autorités de tutelle)</li>
    <li><strong>Audit interne</strong> — assurance d'un niveau de sécurité adapté à chaque processus</li>
    <li><strong>Analyse des risques</strong> — évaluation périodique des risques opérationnels et bilanciels</li>
    <li><strong>Audit de sécurité</strong> — dispositifs organisationnels, matériels, logiciels</li>
    <li><strong>Audit informatique</strong> — efficacité des activités informatiques</li>
    <li><strong>Audit du SI</strong> — contribution des ressources IT à l'efficacité de l'entreprise</li>
    <li><strong>Audit qualité</strong> — dispositifs d'assurance qualité</li>
  </ol>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="19" id="chap-19">
  <h2>19. SIC et environnement informatique (CAC)</h2>
  <h3>Système d'Information Comptable (SIC)</h3>
  <p>Interface entre les systèmes opérants (achat, production, vente, investissement) et le système de pilotage. Recueille et traite les informations comptables et financières pour le système de décision. Les SIC sont de plus en plus intégrés (information fiable, actuelle, non redondante, homogène).</p>
  <table class="comp-table">
    <thead><tr><th>Niveau d'intégration</th><th>Caractéristiques</th></tr></thead>
    <tbody>
      <tr><td><strong>Comptabilité autonome</strong></td><td>Petites entreprises ; progiciel comptable centralisé ; lien direct entre fait juridique et écriture comptable</td></tr>
      <tr><td><strong>Comptabilité semi-intégrée</strong></td><td>Moyenne/grande entreprise ; progiciels métier alimentent la compta (génération automatique des écritures par importation/exportation, même gamme logicielle)</td></tr>
      <tr><td><strong>Comptabilité intégrée</strong></td><td>Grandes entreprises ; saisie unique dans une base commune (ERP) ; processus très informatisés</td></tr>
    </tbody>
  </table>
  <h3>Norme CNCC 2-302 — environnement informatique</h3>
  <p>Principes fondamentaux :</p>
  <ul>
    <li>L'existence d'un environnement informatique ne modifie pas l'objectif et l'étendue de la mission du CAC</li>
    <li>L'ordinateur modifie la saisie/traitement/conservation des données → incidence sur les systèmes comptable et de contrôle interne</li>
    <li>Incidence sur la démarche du CAC lors de : prise de connaissance, prise en compte du risque inhérent et lié au contrôle, mise en œuvre des procédures</li>
  </ul>
  <h3>6 risques spécifiques à l'environnement informatique</h3>
  <div class="key-box">
    <ol>
      <li><strong>Manque de trace matérielle</strong> des opérations → risque accru de non-détection d'erreurs dans les programmes</li>
      <li><strong>Uniformité du traitement</strong> : élimine quasiment les erreurs humaines mais une erreur de programmation peut affecter TOUTES les opérations</li>
      <li><strong>Séparation insuffisante des tâches</strong> (centralisation des contrôles)</li>
      <li><strong>Erreurs humaines</strong> en conception/maintenance/MEP plus importantes qu'en système manuel</li>
      <li><strong>Utilisateurs non autorisés</strong> accèdent, modifient, suppriment des données sans trace visible</li>
      <li>Erreurs et irrégularités souvent <strong>intégrées lors de la conception</strong>, difficilement identifiables dans le temps</li>
    </ol>
  </div>
  <p>Les risques peuvent résulter de défaillances dans : développement/maintenance des programmes, exploitation du système, traitements particuliers, sécurité physique, contrôles d'accès des utilisateurs privilégiés.</p>
  <h3>Risque d'audit (ISACA) — 3 composantes</h3>
  <p>L'opinion du CAC nécessite une <strong>assurance raisonnable</strong> (non absolue). Le risque d'audit comprend :</p>
  <table class="comp-table">
    <thead><tr><th>Composante</th><th>Définition</th></tr></thead>
    <tbody>
      <tr><td><strong>Risque inhérent</strong></td><td>Possibilité qu'une anomalie significative se produise dans les comptes, <em>indépendamment</em> du contrôle interne</td></tr>
      <tr><td><strong>Risque lié au contrôle</strong></td><td>Risque qu'une anomalie ne soit ni prévenue ni détectée par le contrôle interne</td></tr>
      <tr><td><strong>Risque de non-détection</strong></td><td>Propre à la mission d'audit — le CAC ne détecte pas l'anomalie significative</td></tr>
    </tbody>
  </table>
  <div class="example-box"><strong>Exemple incidence achats/développement :</strong> faible si plan préétabli tenant compte des besoins utilisateurs + critères techniques · modérée si critères financiers uniquement · élevée si lancement après un incident majeur.<br>
  <strong>Exemple interfaces :</strong> faible si automatiques éprouvées + états d'anomalies contrôlés · modérée si états conservés mais corrections tardives · élevée si interfaces manuelles ou récemment introduites sans contrôle.</div>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="20" id="chap-20">
  <h2>20. Cartographie du SI et identification des processus</h2>
  <h3>Cartographie générale des applications</h3>
  <p>Permet de comprendre et de documenter les composantes du SI et de mettre en évidence les risques liés à l'architecture.</p>
  <p>Pour chaque <strong>application</strong> :</p>
  <ul>
    <li>Type (progiciel avec éditeur / développement spécifique)</li>
    <li>Date de mise en place</li>
    <li>Environnement technique (UNIX, Windows, AS400…)</li>
    <li>Mode de traitement (différé ou temps réel)</li>
    <li>Éditeur ou prestataire</li>
    <li>Date de la dernière modification</li>
    <li>Principales fonctionnalités</li>
    <li>Nature des sorties</li>
    <li>Estimation du volume traité</li>
  </ul>
  <p>Pour chaque <strong>interface</strong> :</p>
  <ul>
    <li>Type (automatique, semi-automatique, manuel)</li>
    <li>Applications en amont et en aval</li>
    <li>Nature des flux (ventes, stocks, clients…)</li>
    <li>Fréquence (quotidienne, hebdomadaire, mensuelle…)</li>
    <li>États d'anomalies</li>
  </ul>
  <p>Résultat : représentation graphique + tableaux d'inventaire. Pour des systèmes très complexes, intervention d'un expert IT.</p>
  <h3>Appréciation de la complexité du SI</h3>
  <p>Critères pris en compte via la cartographie :</p>
  <ul>
    <li>Existence d'un progiciel intégré ou de nombreuses applications spécifiques</li>
    <li>Technologie (central, client-serveur, Internet…)</li>
    <li>Paramétrage : complexité, étendue, standard ou personnalisé</li>
    <li>Nombre d'interfaces</li>
    <li>Existence d'interfaces manuelles entre systèmes</li>
    <li>Dépendance des traitements entre systèmes</li>
  </ul>
  <p>Si le système est très complexe, le CAC peut faire appel à un expert pour identifier les zones de risques majeures et apporter une assurance complémentaire sur la fiabilité des informations et le respect des procédures de contrôle interne.</p>
  <h3>Identification des processus à analyser</h3>
  <div class="def-box">
    <div class="def-label">Processus</div>
    <p>« Enchaînement de tâches, manuelles, semi-automatiques, automatiques, concourant à l'élaboration, à la production ou au traitement d'informations, de produits ou de services. »</p>
  </div>
  <p>Le CAC ne s'intéresse qu'aux processus contribuant directement ou indirectement à la <strong>production des comptes</strong>. Les processus étudiés sont, dans la majorité des cas :</p>
  <ul>
    <li>Achats</li>
    <li>Ventes</li>
    <li>Stocks</li>
    <li>Règlements</li>
    <li>Paie</li>
  </ul>
  <p>Seules les applications (et leurs inter-relations) qui interviennent dans ces processus font l'objet d'une étude. Le résultat est formalisé dans un tableau croisé Applications × Processus pour identifier les processus à analyser en profondeur.</p>
</div>

<div class="course-chapter" data-theme="audit" data-chap-idx="21" id="chap-21">
  <h2>21. Management des risques SI</h2>
  <h3>Démarche générale</h3>
  <ol>
    <li><strong>Stratégie</strong> — définition et qualification des risques (inhérents à l'activité + propres à l'organisation) ; classification par impact ; validation DG ; charte d'audit, responsabilités, ressources</li>
    <li><strong>Évaluation des vulnérabilités</strong> — outils et moyens d'investigation, évaluation des dispositifs en place (détection, prévention, protection, transfert), cartographie du risque résiduel</li>
    <li><strong>Conception du plan d'actions</strong> — objectifs clairs et mesurables, responsabilités et moyens identifiés</li>
    <li><strong>Mise en œuvre opérationnelle</strong> — conception et déploiement, mode projet incluant les opérationnels, mesure d'efficacité, intégration dans les processus</li>
    <li><strong>Communication et formation</strong> — diffuser les référentiels, intégrer la gestion du risque aux objectifs individuels</li>
    <li><strong>Mesure de la conformité</strong> — suivi du plan d'actions, tableau de bord de la gestion des risques</li>
    <li><strong>Programme d'audit</strong> — revue périodique des vulnérabilités, contrôles spécifiques</li>
    <li><strong>Pérenniser la démarche</strong> — industrialiser les outils, maintenir la communication interne</li>
  </ol>
  <h3>Structures de gestion des risques — 3 niveaux</h3>
  <table class="comp-table">
    <thead><tr><th>Niveau</th><th>Caractéristiques</th></tr></thead>
    <tbody>
      <tr><td><strong>Niveau 1</strong></td><td>Responsabilité implicite, va de pair avec la fonction. Absence de processus de suivi.</td></tr>
      <tr><td><strong>Niveau 2</strong></td><td>Responsabilité définie, délégation formelle, intégration à l'organigramme.</td></tr>
      <tr><td><strong>Niveau 3</strong></td><td>Responsabilité globale. <strong>Comité ou Direction des Risques</strong> · <strong>Risk Manager</strong>. Gestion intégrée, responsabilité transversale, optimisation des polices d'assurance, communication externe sur la gestion des risques.</td></tr>
    </tbody>
  </table>
  <h3>Risques liés au SI</h3>
  <p>Le SI = <strong>fonction transversale</strong> qui participe à tous les processus de l'entreprise, reflet de la stratégie. À <strong>hauts risques</strong> :</p>
  <ul>
    <li>Évolution des technologies</li>
    <li>Ouverture sur l'extérieur (image)</li>
    <li>Risques inhérents</li>
  </ul>
  <h3>Vers une vision dynamique</h3>
  <p>Évolution des enjeux et objectifs : amélioration de la performance · modification des contraintes réglementaires · apparition de nouveaux concepts (développement durable : social/environnemental/économique · éthique) · recours aux nouvelles technologies · étendue du champ de certification.</p>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="22" id="chap-22">
  <h2>22. Sécurité informatique — fondamentaux</h2>
  <div class="def-box">
    <div class="def-label">Sécurité informatique</div>
    <p>Ensemble des moyens mis en œuvre pour <strong>réduire la vulnérabilité d'un système</strong> contre les menaces accidentelles ou intentionnelles. Réduit les risques pesant sur le SI pour limiter leurs impacts sur le fonctionnement et les activités métiers.</p>
  </div>
  <h3>Sûreté de fonctionnement vs Sécurité — ne pas confondre</h3>
  <table class="comp-table">
    <thead><tr><th>Sûreté de fonctionnement</th><th>Sécurité</th></tr></thead>
    <tbody>
      <tr><td>Domaine : Génie Logiciel. Spécification formelle, preuve de programmes, test de protocole. Vérifier que l'application réalise <em>exactement</em> les tâches attendues.</td><td>Domaine : protection contre les menaces. Réduire la vulnérabilité face aux risques accidentels ou intentionnels.</td></tr>
    </tbody>
  </table>
  <h3>Les critères DIC + Preuve</h3>
  <p>3 critères de base pour évaluer le niveau de sécurité d'un bien du SI :</p>
  <ul>
    <li>① <strong>DISPONIBILITÉ</strong> — accessible quand nécessaire</li>
    <li>② <strong>INTÉGRITÉ</strong> — conforme à ce que l'on croit</li>
    <li>③ <strong>CONFIDENTIALITÉ</strong> — accès limité aux personnes autorisées</li>
  </ul>
  <p>Étendus par la <strong>Preuve</strong> = Authentification (identité vérifiée) + Non-répudiation (action non niable).</p>
  <h3>5 objectifs de la sécurité informatique</h3>
  <div class="key-box">
    <ol>
      <li><strong>Intégrité</strong> — garantir que les données sont bien celles qu'on croit</li>
      <li><strong>Confidentialité</strong> — seules les personnes autorisées accèdent aux ressources échangées</li>
      <li><strong>Disponibilité</strong> — maintien du bon fonctionnement du SI</li>
      <li><strong>Non-répudiation</strong> — une transaction ne peut être niée</li>
      <li><strong>Authentification</strong> — seules les personnes autorisées accèdent aux ressources</li>
    </ol>
  </div>
  <h3>Équation du risque (guide ISO 73)</h3>
  <div class="def-box">
    <div class="def-label">Équation du risque</div>
    <p><strong>RISQUE = MENACE × VULNÉRABILITÉ × IMPACT</strong></p>
    <ul>
      <li><strong>MENACE</strong> — source du risque, attaque possible, agent responsable</li>
      <li><strong>VULNÉRABILITÉ</strong> — caractéristique constituant une faiblesse ou faille</li>
      <li><strong>IMPACT</strong> — conséquence du risque sur l'organisme et ses objectifs</li>
    </ul>
    <p>Menace + Vulnérabilité = cause du risque (qualifiées en <em>potentialité</em>). Impact = qualifié en <em>sévérité</em>.</p>
  </div>
  <div class="key-box">Le risque zéro n'existe pas. Il faut définir le <strong>risque résiduel</strong> que l'on est prêt à accepter.</div>
  <div class="example-box"><strong>Lebey rappelle :</strong> les principaux risques restent banals — « câble arraché », « coupure secteur », « crash disque », « mauvais profil utilisateur ». Ne pas se focaliser que sur les attaques sophistiquées.</div>
  <h3>Évolution des risques</h3>
  <ul>
    <li>Croissance de l'Internet</li>
    <li>Croissance des attaques</li>
    <li>Failles des technologies</li>
    <li>Failles des configurations</li>
    <li>Failles des politiques de sécurité</li>
    <li>Changement de profil des pirates</li>
  </ul>
  <h3>10 principaux défauts de sécurité</h3>
  <ol>
    <li>Installation des logiciels/matériels par défaut</li>
    <li>Mises à jour non effectuées</li>
    <li>Mots de passe inexistants ou par défaut</li>
    <li>Services inutiles conservés (Netbios…)</li>
    <li>Traces (logs) inexploitées</li>
    <li>Pas de séparation des flux opérationnels et d'administration</li>
    <li>Télémaintenance sans contrôle fort</li>
    <li>Procédures de sécurité obsolètes (périmées)</li>
    <li>Authentification faible</li>
    <li>État <strong>actif</strong> (utilisateur ignore les fonctionnalités) + état <strong>passif</strong> d'insécurité (admin ignore les moyens en place)</li>
  </ol>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="23" id="chap-23">
  <h2>23. PSSI — Politique de Sécurité des SI</h2>
  <div class="def-box">
    <div class="def-label">PSSI</div>
    <p>Ensemble formalisé dans un document applicable, des <strong>directives, procédures, codes de conduite, règles organisationnelles et techniques</strong>, ayant pour objectif la protection des SI de l'organisme.</p>
  </div>
  <div class="key-box">La sécurité est comme une chaîne, guère plus solide que son maillon le plus faible. Une porte blindée est inutile si les fenêtres sont ouvertes.</div>
  <h3>Démarche : 4 étapes principales</h3>
  <ol>
    <li><strong>Audit</strong> — identifier les risques et leurs conséquences</li>
    <li><strong>Élaboration des règles</strong> — règles et procédures pour les risques identifiés</li>
    <li><strong>Surveillance</strong> — veille technologique sur les vulnérabilités découvertes</li>
    <li><strong>Actions</strong> — actions à entreprendre + personnes à contacter en cas de détection</li>
  </ol>
  <h3>Mise en œuvre</h3>
  <ul>
    <li>Audit</li>
    <li>Tests d'intrusion</li>
    <li>Détection d'incidents</li>
    <li>Réactions</li>
    <li>Restauration</li>
  </ul>
  <h3>Éléments de la politique de sécurité</h3>
  <ul>
    <li>Défaillance matérielle (vieillissement, défaut)</li>
    <li>Défaillance logicielle (bugs, MAJ)</li>
    <li>Accidents (pannes, incendies, inondations)</li>
    <li>Erreur humaine (formation)</li>
    <li>Vol via dispositifs physiques (disques, bandes) — contrôler l'accès aux équipements</li>
    <li>Virus provenant de disquettes/clés</li>
    <li>Piratage et virus réseau</li>
  </ul>
  <h3>Les 8 thèmes de la PSSI</h3>
  <ol>
    <li>Classification et contrôle du patrimoine matériel et immatériel</li>
    <li>Rôle des personnes</li>
    <li>Protection des locaux et équipements</li>
    <li>Contrôle des accès et gestion des habilitations</li>
    <li>Gestion des communications et des opérations</li>
    <li>Développement et maintenance des SI</li>
    <li>Continuité des activités</li>
    <li>Obligations légales</li>
  </ol>
  <h3>Stratégie et réussite</h3>
  <p>La PSSI doit faire partie intégrante de la stratégie de la société (un défaut de sécurité coûte cher). Elle repose sur 4 points :</p>
  <ul>
    <li>Protection des applicatifs aux métiers du SI qualifiés de sensibles</li>
    <li>Diminution des vulnérabilités</li>
    <li>Sécurité proprement dite du SI</li>
    <li>Continuité en cas de sinistre</li>
  </ul>
  <p>Pour réussir : être <strong>simple et réaliste</strong> pour que tout le monde la comprenne et la respecte, puis la faire vivre.</p>
  <h3>Audit de sécurité — critères d'évaluation</h3>
  <p>Disponibilité · Intégrité · Confidentialité · <strong>Traçabilité</strong>. Identifier les risques (probabilité, impact) et les besoins (état des lieux du SI).</p>
</div>

<div class="course-chapter" data-theme="securite" data-chap-idx="24" id="chap-24">
  <h2>24. Normes ISO et méthodes d'analyse des risques</h2>
  <h3>Normes ISO de sécurité</h3>
  <ul>
    <li><strong>ISO 9000</strong> — système de management (référentiel + audit)</li>
    <li><strong>ISO 9001</strong> — SMQ, exigences</li>
    <li><strong>ISO 14001</strong> — management de l'environnement</li>
