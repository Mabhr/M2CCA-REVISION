 qu'une levée réalisée auprès des fonds de capital investissement.\n\n─── INCONVÉNIENTS ───\n\n1. La complexité : l'introduction en bourse est un processus complexe, coûteux et risqué : il faut généralement faire appel à une banque spécialisée, qui achète les titres avant de les revendre au marché. Or, ces intermédiaires réclament une rémunération conséquente, et de temps à autre — comme cela a été le cas pour Facebook — ils se trompent dans leur estimation de cours d'introduction, ce qui nuit à l'image de l'entreprise.\n\n2. Une exposition qui requiert une très grande discipline : être une société cotée entraîne une série d'obligations d'information auprès du marché boursier : il faut détailler précisément tous les éléments de l'activité dans des communications financières régulières, ce qui impose une grande discipline de gestion et des systèmes d'information exhaustifs. Une société cotée est beaucoup plus exposée et doit être beaucoup plus transparente.\n\n3. Être soumis à « la loi du marché » : être coté, c'est aussi devoir se soumettre aux exigences des analystes, qui peuvent contraindre l'entreprise à changer de stratégie lorsqu'ils estiment que cela leur sera plus profitable. Paradoxalement, alors que l'introduction en bourse permet de lever des fonds supplémentaires, elle peut donc se traduire par une perte d'indépendance stratégique. C'est pour regagner cette indépendance que Dell cherche actuellement à se retirer de la bourse.\n\n4. Une plus grande vulnérabilité face aux OPA : être côté, c'est s'exposer au risque d'OPA. Pour éviter ce risque, l'exigence de performance devient incontournable.\n\n5. Une opération qui requiert beaucoup de temps et de ressources : il faut être conscient qu'une introduction en bourse est un processus qui mobilise beaucoup d'énergie et prend du temps. L'équipe dirigeante est très sollicitée et il faut une organisation particulièrement efficace pour gérer, en plus d'une activité en croissance, les relations avec les partenaires qui vous accompagnent. Je me souviens par exemple avoir passé quelques nuits au bureau sur notre document de référence.\n\n6. Une opération coûteuse : l'entrée en bourse a également un coût en termes de cotation, tenu de compte, honoraires de conseil, recrutement le cas échéant. C'est un point qu'il ne faut surtout pas négliger au moment de se lancer dans l'aventure."

    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}

function getCoursHTML() {
  return `
    <!-- ══ CH 1 : Le coût du capital ══ -->
    <div class="course-chapter" data-theme="cout_capital" data-chap-idx="1" id="chap-1">
      <h2 class="chapter-title">1 · Le coût du capital</h2>

      <div class="def-box">
        <strong>Définition.</strong> Le coût du capital représente le coût des ressources financières à la disposition de l'entreprise, quelle que soit leur origine (associés et prêteurs externes), au regard du poids de chaque ressource dans l'ensemble. C'est la rentabilité exigée par chacun des apporteurs de fonds. Il se mesure par le <strong>CMPC</strong> (coût moyen pondéré du capital).
      </div>

      <h3>La formule du CMPC</h3>
      <div class="example-box">
        CMPC = Rcp × Vcp/(Vcp+Vd) + Rd × (1 − IS) × Vd/(Vcp+Vd)<br><br>
        Rcp = rentabilité exigée par les actionnaires (coût des fonds propres) · Rd = rentabilité attendue par les prêteurs (coût de la dette) · Vcp = valeur des capitaux propres · Vd = valeur de marché des dettes · IS = taux d'impôt sur les sociétés.
      </div>
      <p>Le CMPC est le <strong>taux d'actualisation de la VAN</strong> d'un projet d'investissement : on actualise les flux du projet au CMPC ; si la VAN est positive, le projet est retenu, sinon il est écarté.</p>

      <h3>Le coût de la dette (Rd)</h3>
      <p>Rd est la rentabilité attendue par les créanciers. Ce n'est <strong>pas la moyenne des taux d'emprunts passés</strong>, mais le taux d'endettement futur auquel l'entreprise pourrait prétendre au regard de son risque à venir.</p>
      <div class="key-box">
        <strong>Construction de Rd : taux sans risque + spread.</strong><br>
        Le taux sans risque est le taux des <strong>OAT</strong> (Obligations Assimilables du Trésor), taux d'emprunt à moyen / long terme de l'État. Le <strong>spread</strong> est le surcoût demandé par le prêteur au regard du risque pris ; il dépend du niveau d'endettement de l'entreprise. Net d'impôt, on retient Rd × (1 − IS), les intérêts d'emprunt étant déductibles du résultat imposable.
      </div>
      <p><strong>Détermination par interpolation linéaire.</strong> Lorsque le coût de la dette n'est pas donné, on le détermine comme le TRI qui actualise les flux de la dette (intérêts + remboursement) à sa valeur actuelle. On encadre le taux entre deux valeurs t1 et t2 dont on connaît les sommes actualisées, puis on interpole :</p>
      <div class="example-box">
        t = t1 + (t2 − t1) × (Somme(t1) − Valeur cible) / (Somme(t1) − Somme(t2))<br>
        Le taux obtenu (TRI) est ensuite mis net d'IS : Rd × (1 − IS).
      </div>

      <h3>Le coût des fonds propres (Rcp)</h3>
      <p>Du fait de la privation immédiate de la ressource (coût d'opportunité) et du risque pris, l'investisseur attend une rentabilité : c'est le coût des capitaux propres. Sa détermination repose sur deux modèles.</p>

      <h3>Modèle de Gordon-Shapiro</h3>
      <p>La valeur d'un actif est la somme actualisée de ses flux futurs. Pour une action détenue à l'infini, la valeur se résume à la somme actualisée des dividendes.</p>
      <div class="example-box">
        Dividendes constants : V0 = D1 / R, d'où r = D1 / V0<br>
        Dividendes croissants au taux g : Rcp = D1 / V0 + g<br><br>
        D1 = premier dividende futur · V0 = cours actuel · g = taux de croissance du dividende.
      </div>

      <h3>Le MEDAF (Modèle d'Équilibre des Actifs Financiers)</h3>
      <p>Le MEDAF détermine la rentabilité exigée d'une action compte tenu de son risque de marché. Il fournit une relation linéaire entre la rentabilité d'une action et son risque de marché.</p>
      <div class="example-box">
        Rcp = Rf + βcp × (E(Rm) − Rf) = Rf + βcp × prime de risque du marché<br><br>
        Rf = taux sans risque · E(Rm) = espérance de rentabilité du marché · prime de risque du marché = E(Rm) − Rf.
      </div>
      <div class="key-box">
        <strong>Attention.</strong> Le Rcp issu du MEDAF est la rentabilité <em>attendue</em> par les actionnaires au regard du risque pris. Ce n'est pas forcément la rentabilité qui leur sera effectivement versée : Rcp escompté et rentabilité financière réellement obtenue peuvent différer.
      </div>
    </div>

    <!-- ══ CH 2 : Le béta et le risque ══ -->
    <div class="course-chapter" data-theme="cout_capital" data-chap-idx="2" id="chap-2">
      <h2 class="chapter-title">2 · Le béta et le risque</h2>

      <h3>Les deux composantes du risque</h3>
      <table class="comp-table">
        <thead><tr><th>Type de risque</th><th>Nature</th><th>Diversifiable ?</th><th>Rémunéré ?</th></tr></thead>
        <tbody>
          <tr><td>Risque systémique</td><td>Risque de marché</td><td>Non</td><td>Oui</td></tr>
          <tr><td>Risque spécifique</td><td>Lié au secteur d'activité</td><td>Oui</td><td>Non</td></tr>
        </tbody>
      </table>
      <p>Le risque systémique ne peut pas être diversifié dans un portefeuille : il est donc rémunéré. Le risque spécifique peut être diversifié : il n'est pas rémunéré (à l'investisseur de se débrouiller). Le MEDAF ne rémunère que le risque systémique, mesuré par le béta.</p>

      <h3>Définition et interprétation du béta</h3>
      <p>Le béta mesure la sensibilité du titre aux variations du marché.</p>
      <ul>
        <li><strong>β &gt; 1</strong> : titre plus sensible que le marché, il amplifie les variations.</li>
        <li><strong>β = 1</strong> : le titre réplique les variations du marché.</li>
        <li><strong>β &lt; 1</strong> : titre défensif, il atténue les variations du marché.</li>
      </ul>

      <h3>Les 4 facteurs qui influencent le béta</h3>
      <ul>
        <li><strong>A. La structure des coûts</strong> : plus la part de charges fixes est élevée (vs charges variables), plus l'entreprise est sensible à la conjoncture.</li>
        <li><strong>B. La sensibilité du secteur</strong> d'activité à la conjoncture économique.</li>
        <li><strong>C. La capacité à déterminer des flux futurs de trésorerie</strong> : plus les flux sont volatils, plus le béta augmente.</li>
        <li><strong>D. La structure financière</strong> : plus l'entreprise est endettée, plus elle génère des charges financières fixes, plus le béta augmente.</li>
      </ul>

      <h3>Béta endetté vs béta désendetté</h3>
      <table class="comp-table">
        <thead><tr><th>Concept</th><th>Autres noms</th><th>Contenu</th></tr></thead>
        <tbody>
          <tr><td>Béta des capitaux propres</td><td>Béta endetté</td><td>Risque de marché + risque financier lié à l'endettement</td></tr>
          <tr><td>Béta de l'actif économique</td><td>Béta désendetté, béta de l'activité, béta sectoriel</td><td>Seul risque de marché, indépendant de la structure financière</td></tr>
        </tbody>
      </table>

      <h3>Calcul du béta : covariance et droite de régression</h3>
      <div class="example-box">
        β = Covariance(R titre, R marché) / Variance(R marché)
      </div>
      <p>Le béta est la pente (A) de la droite de régression Y = Ax + B, où X = rentabilité du marché (variable explicative) et Y = rentabilité du titre (variable expliquée). Le <strong>coefficient de détermination R²</strong> mesure le poids du marché dans la volatilité du titre : plus R² est élevé, plus le marché explique les variations du titre.</p>
      <div class="example-box">
        Covariance(R titre, R marché) = Σ p × a × b, avec a = Ra − E(Ra) et b = Rm − E(Rm)<br>
        E(Ra) = Σ (Ra × probabilité) = taux de rendement espéré de l'action<br>
        Variance(R marché) = Σ p × b²<br>
        Pour des séries de données historiques : covariance et variance standard (division par N − 1).
      </div>

      <h3>Désendettement et réendettement du béta</h3>
      <div class="example-box">
        β désendetté = β endetté / [1 + (D/CP) × (1 − IS)]<br>
        β endetté = β désendetté × [1 + (D/CP) × (1 − IS)]<br><br>
        Formule alternative avec béta de la dette :<br>
        βc = βa + (βa − βd) × (D/CP)<br>
        βd = (coût de la dette − taux sans risque) / (E(Rm) − taux sans risque)
      </div>

      <h3>Le béta d'une société non cotée</h3>
      <p>Un titre non coté n'a pas de droite de régression : son béta n'est pas calculable directement. On reconstruit le béta en 3 étapes.</p>
      <div class="key-box">
        <strong>Méthode en 3 étapes.</strong><br>
        1. Prendre le béta endetté d'entreprises cotées comparables (idéalement mono-activité) et le <strong>désendetter</strong> avec leur structure financière.<br>
        2. Faire la <strong>moyenne</strong> des bétas désendettés.<br>
        3. <strong>Réendetter</strong> ce béta moyen avec la structure financière de la société non cotée.<br>
        On calcule ensuite Rcp via le MEDAF.
      </div>
      <p><strong>La prime d'illiquidité.</strong> Pour une société non cotée, on majore le Rcp obtenu d'une prime d'illiquidité. Cette notion n'a rien à voir avec un problème de trésorerie : elle tient à la difficulté de céder les titres d'une société non cotée, contrairement à un titre coté. Exemple du cours (Application 4) : majoration de 4 points.</p>
    </div>

    <!-- ══ CH 3 : Le marché monétaire ══ -->
    <div class="course-chapter" data-theme="marches_fi" data-chap-idx="3" id="chap-3">
      <h2 class="chapter-title">3 · Le marché monétaire : le NEU CP</h2>

      <div class="def-box">
        <strong>NEU CP.</strong> Le NEU CP (Negotiable European Commercial Paper) est un titre de créance négociable à court terme émis sur le marché monétaire pour financer un besoin de trésorerie. Les intérêts peuvent être post-comptés ou précomptés.
      </div>

      <h3>Intérêts post-comptés vs précomptés</h3>
      <table class="comp-table">
        <thead><tr><th>Mode</th><th>Mécanisme</th><th>Formule</th></tr></thead>
        <tbody>
          <tr><td>Post-comptés</td><td>Les intérêts s'ajoutent au nominal à l'échéance</td><td>Valeur future = Nominal × (1 + taux × n/36 000)</td></tr>
          <tr><td>Précomptés</td><td>Les intérêts sont retenus dès l'émission</td><td>Montant versé = Nominal / (1 + taux × n/36 000)</td></tr>
        </tbody>
      </table>
      <p>n = nombre de jours. En intérêts précomptés, le souscripteur verse le montant actualisé et reçoit le nominal à l'échéance.</p>

      <h3>Cession avant échéance</h3>
      <p>Si le porteur cède son titre avant l'échéance, le prix de cession dépend du taux de marché du jour et de la durée restant à courir. On compare le montant reçu à la cession avec le montant initialement investi pour déterminer le <strong>rendement réel</strong> du placement, qui diffère du taux nominal.</p>
      <div class="key-box">
        Si les taux ont monté depuis la souscription, la valeur de cession baisse : le cédant peut subir une moins-value. Le nouvel acquéreur, lui, obtient le rendement du marché au jour de l'achat s'il conserve le titre jusqu'à l'échéance.
      </div>
    </div>

    <!-- ══ CH 4 : Le marché obligataire ══ -->
    <div class="course-chapter" data-theme="marches_fi" data-chap-idx="4" id="chap-4">
      <h2 class="chapter-title">4 · Le marché obligataire</h2>

      <div class="def-box">
        <strong>Obligation.</strong> Titre de créance négociable représentant une fraction d'un emprunt. L'émetteur verse des coupons périodiques et rembourse le capital. L'obligation est cotée en pourcentage de la valeur nominale.
      </div>

      <h3>Vocabulaire de l'emprunt obligataire</h3>
      <ul>
        <li><strong>Valeur nominale</strong> : valeur de référence du titre, base de calcul du coupon.</li>
        <li><strong>Prix d'émission</strong> : prix payé par le souscripteur (au pair s'il égale le nominal).</li>
        <li><strong>Prix de remboursement</strong> : montant remboursé à l'échéance.</li>
        <li><strong>Taux nominal (facial)</strong> : taux servant à calculer le coupon.</li>
        <li><strong>Date de jouissance</strong> : date de départ du calcul des intérêts.</li>
      </ul>

      <h3>Le taux actuariel brut</h3>
      <p>Le taux actuariel brut est le taux qui égalise le prix d'émission (ou le prix de marché) et la somme des flux futurs actualisés (coupons + remboursement). Il est <strong>supérieur au taux nominal lorsqu'il existe une prime d'émission</strong> (prix d'émission inférieur au nominal).</p>
      <div class="example-box">
        Prix d'émission : Pe = Vn × i × (1 − (1+i)⁻ⁿ)/i + Pr × (1+i)⁻ⁿ
      </div>

      <h3>Les 3 modes de remboursement</h3>
      <table class="comp-table">
        <thead><tr><th>Mode</th><th>Mécanisme</th><th>Annuités</th></tr></thead>
        <tbody>
          <tr><td>In fine</td><td>Coupons seuls chaque année, capital remboursé en totalité à l'échéance</td><td>Coupon, puis coupon + capital</td></tr>
          <tr><td>Annuités constantes</td><td>Annuité fixe ; part de capital croissante, part d'intérêts décroissante</td><td>Constantes</td></tr>
          <tr><td>Amortissement constant</td><td>Même fraction de capital remboursée chaque année (C/n)</td><td>Dégressives</td></tr>
        </tbody>
      </table>
      <div class="example-box">
        Annuité constante : a = C × i / [1 − (1 + i)⁻ⁿ]<br>
        C = capital emprunté · i = taux annuel · n = durée
      </div>

      <h3>Cotation d'une obligation et relation prix / taux</h3>
      <p>La valeur d'une obligation est la somme de ses flux futurs actualisés au taux de marché. La relation prix / taux est <strong>inverse</strong> :</p>
      <ul>
        <li>Si le taux de marché passe au-dessus du taux nominal, le cours descend sous 100 %.</li>
        <li>Si le taux de marché passe sous le taux nominal, le cours dépasse 100 %.</li>
        <li>À l'émission au pair, le cours vaut 100 %.</li>
      </ul>

      <h3>Coupon couru et cours au pied du coupon</h3>
      <div class="key-box">
        <strong>Coupon couru</strong> = taux nominal × (nombre de jours écoulés depuis le dernier détachement / 365).<br>
        Le <strong>cours au pied du coupon</strong> est la valeur de l'obligation hors coupon couru : c'est la cotation publiée. Le prix d'acquisition réel = cours au pied du coupon + coupon couru.
      </div>

      <h3>La duration</h3>
      <p>La duration est la durée de détention d'un titre obligataire pour laquelle une variation des taux n'a aucune incidence : le portefeuille est alors dit « immunisé ». Elle se calcule comme la moyenne des dates de flux pondérée par les flux actualisés : Duration = Σ (flux actualisé × date) / Σ (flux actualisés).</p>
      <p><strong>Effet coupon</strong> : une hausse des taux renchérit le replacement des coupons mais fait baisser la valeur intrinsèque du titre, et inversement en cas de baisse.</p>

      <h3>Les 3 déterminants du prix d'une obligation</h3>
      <ol>
        <li><strong>Le taux d'intérêt</strong> : relation inverse avec le prix.</li>
        <li><strong>La valeur du coupon</strong> : plus le coupon est faible, plus le titre est sensible aux variations de taux.</li>
        <li><strong>La durée de l'emprunt</strong> : plus elle est longue, plus le risque de taux est élevé.</li>
      </ol>
    </div>

    <!-- ══ CH 5 : Le marché des actions et l'introduction en Bourse ══ -->
    <div class="course-chapter" data-theme="marches_fi" data-chap-idx="5" id="chap-5">
      <h2 class="chapter-title">5 · Le marché des actions et l'introduction en Bourse</h2>

      <h3>Pourquoi s'introduire en Bourse ?</h3>
      <ul>
        <li>Lever des fonds par la création de nouveaux titres.</li>
        <li>Accéder aux marchés de capitaux à moindre coût qu'un emprunt obligataire.</li>
        <li>Faciliter le départ des actionnaires historiques (volontaire ou non).</li>
        <li>Bénéficier d'une revalorisation de la société plus proche de la réalité.</li>
      </ul>
      <p>Être coté est aussi un gage de rigueur (publications régulières, réorganisation) qui rassure les partenaires extérieurs.</p>

      <h3>Inconvénients de l'introduction en Bourse</h3>
      <ul>
        <li>Le coût de l'introduction : entre 3 % et 7 % des fonds levés.</li>
        <li>L'obligation de se dévoiler au regard des concurrents.</li>
        <li>Le risque de perte de contrôle de l'entreprise.</li>
        <li>La pression exercée par le marché en matière de rentabilité.</li>
      </ul>

      <h3>Les procédures d'introduction</h3>
      <p>Le problème majeur est le prix d'introduction : l'émetteur veut le prix le plus élevé, l'investisseur le plus bas. Le prix conditionne la diffusion des titres. C'est Euronext qui décide du marché d'admission ; l'AMF autorise l'introduction.</p>
      <table class="comp-table">
        <thead><tr><th>Procédure</th><th>Mécanisme</th></tr></thead>
        <tbody>
          <tr><td>Placement garanti (diffusion directe)</td><td>Un établissement financier place les titres auprès d'investisseurs restreints ; il doit les acheter lui-même s'il ne trouve pas preneur.</td></tr>
          <tr><td>OPO (Offre à Prix Ouvert)</td><td>Fourchette de prix annoncée ; procédure la plus utilisée.</td></tr>
          <tr><td>OPM (Offre à Prix Minimal)</td><td>Vente aux enchères sur la base d'un prix minimum.</td></tr>
          <tr><td>OPF (Offre à Prix Ferme)</td><td>Nombre de titres et prix fixés à l'avance, en privilégiant les particuliers.</td></tr>
          <tr><td>Cotation directe</td><td>Comme l'OPM, mais tous les types d'ordres sont acceptés.</td></tr>
        </tbody>
      </table>

      <h3>La détermination du prix d'équilibre</h3>
      <p>On construit le carnet d'ordres : les demandes sont classées par prix <strong>décroissant</strong>, les offres par prix <strong>croissant</strong>, avec les quantités cumulées. Le prix d'équilibre est celui qui permet le <strong>volume d'échange maximum</strong>. À ce prix, certains ordres sont servis intégralement, d'autres partiellement.</p>

      <h3>Cotation en continu et cotation au fixing</h3>
      <ul>
        <li><strong>Cotation en continu</strong> : pré-ouverture (7h15, accumulation des ordres et prix d'ouverture théorique), ouverture (9h00), pré-clôture (17h30), clôture (17h35, prix de clôture).</li>
        <li><strong>Cotation au fixing</strong> (titres moins liquides) : fixing A = deux plages de négociation (matin et après-midi) ; fixing B = une seule séance l'après-midi.</li>
      </ul>

      <h3>Les ordres de bourse</h3>
      <p>Pour passer un ordre, il faut un compte chez un <strong>PSI</strong> (prestataire de services d'investissement : établissement de crédit ou société d'investissement). Mentions obligatoires de l'ordre : le sens (achat / vente), la codification du titre, le nombre de titres, la durée de validité, les conditions de prix. Validité : à la journée, durée déterminée (10 à 15 jours), ou à révocation.</p>
      <div class="key-box">
        <strong>Règles d'exécution.</strong> Règle du <strong>prix</strong> : à l'achat, l'ordre à la limite la plus élevée est exécuté en premier ; à la vente, l'ordre à la limite la plus basse en premier. Règle de <strong>chronologie</strong> : à sens et limite identiques, les ordres sont exécutés dans leur ordre d'arrivée.
      </div>
    </div>

    <!-- ══ CH 6 : Les produits dérivés fermes ══ -->
    <div class="course-chapter" data-theme="derives" data-chap-idx="6" id="chap-6">
      <h2 class="chapter-title">6 · Les produits dérivés fermes</h2>

      <h3>Cadre général</h3>
      <p>Les instruments de couverture et de gestion des risques s'échangent sur <strong>2 marchés</strong> (de gré à gré et organisé), relèvent de <strong>3 familles</strong> (contrats d'échange, contrats à terme, contrats d'option) et portent sur <strong>5 sous-jacents</strong> : matières premières et marchandises, taux d'intérêt, devises, actions, indices boursiers.</p>

      <h3>Le risque de taux et l'exposition</h3>
      <p>Le risque de taux est une évolution défavorable des taux par rapport à une position initiale. Face à un agent qui se couvre se trouve toujours un spéculateur.</p>
      <table class="comp-table">
        <thead><tr><th>Position</th><th>Hausse des taux</th><th>Baisse des taux</th></tr></thead>
        <tbody>
          <tr><td>Emprunteur à taux variable</td><td>Défavorable</td><td>Favorable</td></tr>
          <tr><td>Prêteur à taux variable</td><td>Favorable</td><td>Défavorable</td></tr>
        </tbody>
      </table>

      <h3>Le marché de gré à gré (OTC)</h3>
      <p>Sur le marché de gré à gré, les agents contractent directement entre eux, sans intermédiaire, ce qui permet des produits de couverture sur mesure. Le marché repose sur la confiance (transactions par téléphone ou mail, sans garantie). En contrepartie de cette flexibilité, il existe un <strong>risque de contrepartie</strong> : non-paiement ou non-livraison.</p>

      <h3>Le contrat à terme ferme</h3>
      <p>Un contrat à terme ferme fixe aujourd'hui les conditions (quantité, prix) d'achat ou de vente d'un sous-jacent dont la transaction aura lieu à une date future. L'engagement est ferme et définitif pour les deux parties : à l'échéance, l'actif est livré et payé, quelles que soient les conditions du marché.</p>

      <h3>Le swap de taux</h3>
      <p>Le swap de taux modifie l'exposition à un risque de taux (ou de change) ou permet de se financer à moindre coût. Les parties se rétrocèdent des intérêts calculés sur un même nominal notionnel mais sur des structures de taux différentes : il n'y a pas d'échange de capital, seulement des échanges d'intérêts. Durée de 3 mois à 10 ans, montants de 1 à 10 M€.</p>
      <ul>
        <li><strong>Basis swap</strong> : échange de taux variables sur des références différentes (EURIBOR, LIBOR, TME, TMO, TMB).</li>
        <li><strong>Coupon swap</strong> : conversion d'une position à taux fixe en taux variable, ou inversement.</li>
      </ul>

      <h3>Le FRA (Forward Rate Agreement)</h3>
      <p>Le FRA est un contrat de gré à gré qui fixe aujourd'hui un taux d'intérêt pour un emprunt ou un placement futur. Il n'oblige pas à mettre en place le prêt : seul le <strong>différentiel d'intérêts</strong> entre le taux garanti et le taux de marché est échangé. Un emprunteur achète un FRA (couverture contre la hausse) ; un prêteur le vend (couverture contre la baisse). Le différentiel est versé en début de période, donc actualisé.</p>
      <div class="example-box">
        Di = [(Tm − Tg) × C × n / 36 000] / [1 + Tm × n / 36 000]<br><br>
        Tm = taux de marché · Tg = taux garanti · C = capital notionnel · n = durée en jours.
      </div>

      <h3>Le contrat Forward/Forward</h3>
      <p>Le Forward/Forward fixe aujourd'hui le taux d'un emprunt (ou placement) futur, <strong>avec obligation de mise en place effective du prêt</strong> (contrairement au FRA). Il se décompose en une période d'attente (de la signature au départ de l'emprunt) et une période d'engagement. La banque réalise une <strong>triple opération</strong> : emprunter sur les marchés pour la durée totale, placer pendant la période d'attente, puis prêter au client.</p>
      <div class="example-box">
        T(F/F) = [(T emprunt × durée emprunt) − (T placement × durée placement)] / [durée du prêt × (1 + T placement × durée placement / 36 000)]<br><br>
        Durée d'emprunt = attente + garantie · durée de placement = période d'attente · durée du prêt = période garantie.
      </div>
    </div>

    <!-- ══ CH 7 : Les produits dérivés optionnels et les options ══ -->
    <div class="course-chapter" data-theme="derives" data-chap-idx="7" id="chap-7">
      <h2 class="chapter-title">7 · Les produits dérivés optionnels et les options</h2>

      <p>Dans les contrats optionnels, l'acheteur verse une prime au vendeur (payable en une fois ou au début de chaque période). Au terme, il n'y a pas de marchandise à livrer : seul le différentiel de taux peut être encaissé.</p>

      <h3>Le CAP</h3>
      <p>Le CAP garantit à un emprunteur un taux d'intérêt <strong>maximum</strong> (taux plafond), tout en lui permettant de profiter d'une baisse des taux. Moyennant une prime, l'acheteur acquiert le droit, mais non l'obligation, d'encaisser le différentiel entre le taux de marché et le taux garanti lorsque le marché dépasse le plafond. Le vendeur encaisse la prime et s'exécute si l'option est exercée.</p>

      <h3>Le FLOOR</h3>
      <p>Le FLOOR garantit à un prêteur (placeur) un taux de rendement <strong>minimum</strong> (taux plancher). Moyennant une prime, l'acheteur encaisse le différentiel entre le taux garanti et le taux de marché lorsque celui-ci passe sous le plancher.</p>

      <h3>Le COLLAR</h3>
      <p>Le COLLAR (tunnel) combine l'achat et la vente simultanés de deux contrats afin de limiter le décaissement de prime : la prime encaissée sur le contrat vendu réduit la prime versée sur le contrat acheté.</p>
      <table class="comp-table">
        <thead><tr><th>Type de collar</th><th>Position</th><th>Achat</th><th>Vente</th></tr></thead>
        <tbody>
          <tr><td>Collar emprunteur</td><td>Protection contre la hausse des taux</td><td>CAP</td><td>FLOOR</td></tr>
          <tr><td>Collar prêteur</td><td>Protection contre la baisse des taux</td><td>FLOOR</td><td>CAP</td></tr>
        </tbody>
      </table>
      <p>Pour un collar emprunteur, le coût réel de l'endettement est borné entre le taux plancher et le taux plafond, ajusté du différentiel de primes.</p>

      <h3>Les options</h3>
      <p>Une option donne à son détenteur le <strong>droit, mais non l'obligation</strong>, d'acheter (call) ou de vendre (put) un sous-jacent à un prix d'exercice convenu, moyennant le versement d'une prime.</p>
      <ul>
        <li><strong>Option européenne</strong> : exercice à l'échéance uniquement.</li>
        <li><strong>Option américaine</strong> : exercice à tout moment jusqu'à l'échéance.</li>
      </ul>
      <p>Le vendeur encaisse la prime, définitivement acquise, et s'engage de manière ferme et définitive à s'exécuter si l'acheteur lève l'option.</p>

      <h3>Les déterminants de la valeur d'une option</h3>
      <p>La valeur (prime) d'une option dépend de cinq paramètres : le cours du sous-jacent, le prix d'exercice, la volatilité du sous-jacent, la durée de vie de l'option, le niveau des taux d'intérêt. La valeur d'une option = valeur intrinsèque + valeur temps.</p>

      <h3>Les options de change</h3>
      <div class="key-box">
        <strong>Exportateur</strong> (recevra des devises, craint une baisse de la devise) : il <strong>achète un PUT</strong> sur la devise, ce qui garantit un cours plancher.<br>
        <strong>Importateur</strong> (devra payer des devises, craint une hausse de la devise) : il <strong>achète un CALL</strong> sur la devise, ce qui garantit un cours plafond.<br>
        La prime est versée à l'achat et n'est pas récupérable. Si le marché comptant est plus favorable que l'option, on abandonne l'option.
      </div>
    </div>

    <!-- ══ CH 8 : Le marché organisé ══ -->
    <div class="course-chapter" data-theme="derives" data-chap-idx="8" id="chap-8">
      <h2 class="chapter-title">8 · Le marché organisé</h2>

      <p>Sur un marché organisé, les contreparties ne négocient pas directement l'une avec l'autre : elles placent des ordres d'achat ou de vente dont la confrontation dégage un prix.</p>
      <ul>
        <li>L'<strong>entreprise de marché</strong> (Euronext) définit les règles de fonctionnement, habilite les intervenants et veille aux infrastructures techniques.</li>
        <li>L'<strong>AMF</strong> est l'autorité de tutelle ; elle exige des émetteurs une diffusion de l'information.</li>
        <li>Le <strong>carnet d'ordres</strong>, public, garantit l'égalité des intervenants ; la concentration des offres et demandes assure la liquidité.</li>
      </ul>

      <h3>La chambre de compensation</h3>
      <p>La chambre de compensation (<strong>LCH ClearNet</strong>) est la contrepartie unique sur le marché : elle sert de « rideau » entre les deux parties, garantissant l'anonymat, et supprime le risque de contrepartie. Elle s'appuie sur deux mécanismes de sécurisation.</p>
      <div class="key-box">
        <strong>1. Le dépôt de garantie.</strong> À la transmission d'un ordre, acheteur comme vendeur déposent auprès de la chambre un pourcentage du montant du contrat.<br><br>
        <strong>2. L'appel de marge.</strong> Chaque jour, la chambre simule la clôture de la position (cours de compensation). Si la position est perdante, l'opérateur a 24h pour reconstituer la marge, sinon la chambre se sert sur le dépôt de garantie et l'élimine. Si la position est gagnante, le gain peut être retiré ou laissé en dépôt rémunéré.
      </div>
      <p>La limitation des variations de cours : au-delà d'un certain seuil de variation de l'actif, la cotation est stoppée. Sur le marché organisé s'échangent notamment les contrats à terme (futures) et les options sur futures, par exemple sur l'indice CAC 40.</p>
    </div>

    <!-- ══ CH 9 : Les critères extra-financiers ══ -->
    <div class="course-chapter" data-theme="esg" data-chap-idx="9" id="chap-9">
      <h2 class="chapter-title">9 · Les critères extra-financiers</h2>

      <h3>Vers une économie verte</h3>
      <p>Le GIEC alerte de longue date sur le lien fort entre les activités financières et le changement climatique. La mise en place d'une économie verte implique une refonte des modes de production et de consommation. L'économie verte est un concept multidimensionnel qui ne se résume pas à la fin des émissions de gaz à effet de serre : il renvoie à l'idée d'une société en harmonie avec la nature.</p>

      <h3>La théorie du Donut (Kate Raworth, 2010)</h3>
      <p>L'économiste anglaise Kate Raworth a développé en 2010 la théorie du Donut pour expliciter ce que peut être l'économie verte. Elle repose sur deux limites : les <strong>limites planétaires</strong> (plafond, à ne pas dépasser pour préserver les écosystèmes) et les <strong>limites sociales</strong> (plancher, besoins de base de tout être humain). Entre les deux se trouve l'espace où l'humanité peut satisfaire ses besoins en respectant les écosystèmes et le climat.</p>
      <div class="key-box">
        <strong>Les 7 principes du Donut.</strong><br>
        1. Changer de but : ne plus avoir le PIB pour seul indicateur.<br>
        2. Avoir une vision globale : intégrer le social et l'environnement dans l'économie.<br>
        3. Nourrir et entretenir la nature humaine : l'humain fait partie d'un tout.<br>
        4. Intégrer l'aspect systémique : tenir compte des interactions complexes.<br>
        5. Concevoir pour distribuer : les inégalités sont un échec du modèle.<br>
        6. Créer pour régénérer : un modèle régénératif et circulaire.<br>
        7. Être sceptique sur la croissance économique.
      </div>

      <h3>Chronologie de la RSE et du développement durable</h3>
      <table class="comp-table">
        <thead><tr><th>Date</th><th>Jalon</th></tr></thead>
        <tbody>
          <tr><td>1953</td><td>Howard Bowen</td></tr>
          <tr><td>1970</td><td>Le Club de Rome</td></tr>
          <tr><td>1987</td><td>Le Rapport Brundtland</td></tr>
          <tr><td>1992</td><td>Conférence des Nations Unies de Rio de Janeiro</td></tr>
          <tr><td>2000</td><td>Pacte Global des Nations Unies</td></tr>
          <tr><td>2009 / 2010</td><td>Lois Grenelle I et II</td></tr>
          <tr><td>2010</td><td>Norme ISO 26000</td></tr>
          <tr><td>2014 (dès 2017)</td><td>Directive européenne NFRD</td></tr>
          <tr><td>2015</td><td>Objectifs de Développement Durable (ODD) de l'ONU</td></tr>
          <tr><td>2016</td><td>Loi Sapin II</td></tr>
          <tr><td>2017</td><td>Loi sur le devoir de vigilance</td></tr>
          <tr><td>2019</td><td>Loi PACTE</td></tr>
          <tr><td>2021 (dès 2024)</td><td>Directive CSRD</td></tr>
        </tbody>
      </table>

      <h3>Développement durable et RSE</h3>
      <p>Le développement durable (Rapport Brundtland) consiste à répondre aux besoins actuels sans compromettre la capacité des générations futures à répondre aux leurs. La RSE intègre les enjeux sociaux et climatiques dans la politique de l'entreprise, en respectant la législation et les parties prenantes. Les lois Grenelle imposent pour la première fois aux entreprises cotées la publication d'un rapport RSE avec les comptes annuels.</p>
      <p>Performance financière et performance environnementale / sociale ont longtemps été opposées ; de nombreuses études démontrent l'inverse : la RSE peut être créatrice de valeur, par la croissance du chiffre d'affaires (clients sensibles au développement durable) et par l'optimisation des investissements (plus durables, moins gourmands en énergie).</p>

      <h3>Les 3 Scopes d'émissions de GES</h3>
      <p>Le bilan des émissions de gaz à effet de serre se structure en 3 périmètres (Scopes) et 23 sous-catégories.</p>
      <table class="comp-table">
        <thead><tr><th>Scope</th><th>Nature</th><th>Postes principaux</th></tr></thead>
        <tbody>
          <tr><td>Scope 1</td><td>Émissions directes</td><td>Sources fixes et mobiles de combustion, procédés, émissions fugitives, émissions issues des terres</td></tr>
          <tr><td>Scope 2</td><td>Émissions indirectes liées à l'énergie achetée</td><td>Électricité, énergie de réseau hors électricité (chaleur, vapeur, froid)</td></tr>
          <tr><td>Scope 3</td><td>Autres émissions indirectes (chaîne de valeur)</td><td>Amont et aval : achats, immobilisations, déchets, transport, déplacements, leasing, investissements, usage et fin de vie des produits</td></tr>
        </tbody>
      </table>

      <h3>Le reporting extra-financier : sigles et ESRS</h3>
      <p><strong>Sigles.</strong> NFRD (Non Financial Reporting Directive) · DPEF (Déclaration de Performance Extra-Financière) · KPI (Key Performance Indicator) · CSRD (Corporate Sustainability Reporting Directive) · ESRS (European Sustainability Reporting Standards, les normes de reporting de la CSRD).</p>
      <div class="key-box">
        <strong>Les 12 normes ESRS.</strong><br>
        Transversales (2) : ESRS 1 (exigences générales, 4 piliers : Gouvernance, Stratégie, Gestion des impacts/risques/opportunités, Mesures et cibles) et ESRS 2 (informations générales).<br>
        Environnementales (5) : E1 changement climatique, E2 pollution, E3 ressources aquatiques et marines, E4 biodiversité et écosystèmes, E5 ressources et économie circulaire.<br>
        Sociales (4) : S1 effectifs de l'entreprise, S2 travailleurs de la chaîne de valeur, S3 communautés affectées, S4 consommateurs et utilisateurs finals.<br>
        Gouvernance (1) : G1 conduite des affaires.
      </div>

      <h3>La Directive Omnibus 2025</h3>
      <p>La Directive Omnibus consolide et simplifie trois textes : la <strong>CSRD</strong> (transparence sur les impacts ESG), le règlement <strong>Taxonomie</strong> (définition des activités durables, pour orienter la finance durable) et la <strong>CS3D</strong> (devoir de vigilance et de prévention des impacts négatifs sur les droits humains et l'environnement dans la chaîne de valeur). L'appellation « Omnibus » vient du regroupement de plusieurs révisions en une seule proposition. La simplification a été demandée à la suite du rapport Draghi (charge administrative et coût jugés excessifs).</p>
      <table class="comp-table">
        <thead><tr><th>Texte</th><th>Principales conséquences</th></tr></thead>
        <tbody>
          <tr><td>CSRD</td><td>Report de 2026 à 2028 ; maintien de la double matérialité ; seuils relevés (1 000 salariés et 50 M€ de CA ou 25 M€ de bilan, soit environ −80 % d'entreprises concernées) ; fin de la collecte auprès des fournisseurs non soumis ; abandon des standards sectoriels ; refonte des 12 ESRS.</td></tr>
          <tr><td>CS3D</td><td>Devoir de vigilance limité aux partenaires directs ; évaluations tous les 5 ans au lieu d'annuelles ; suppression des sanctions financières proportionnelles au CA.</td></tr>
          <tr><td>Taxonomie</td><td>Réduction d'environ 70 % des obligations de reporting ; introduction d'un seuil de matérialité financière ; possibilité pour les banques d'exclure de leur Green Asset Ratio les actifs d'entreprises sorties du champ de la CSRD.</td></tr>
        </tbody>
      </table>
    </div>
`;
}

/* ────── HELPERS NUMÉRIQUES ────── */
function eRandInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function eRandFloat(min, max, dec) {
  const v = Math.random() * (max - min) + min;
  const p = Math.pow(10, dec);
  return Math.round(v * p) / p;
}
function ePick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function eRound(x, dec) { const p = Math.pow(10, dec); return Math.round(x * p) / p; }
function eRoundUp(x, dec) { const p = Math.pow(10, dec); return Math.ceil(x * p) / p; }
function eFmtPct(x, dec) { dec = dec == null ? 2 : dec; return Number(x).toFixed(dec).replace('.', ',') + ' %'; }
function eFmtEur(x, dec) { dec = dec == null ? 2 : dec; return Number(x).toLocaleString('fr-FR', {minimumFractionDigits:dec, maximumFractionDigits:dec}) + ' €'; }
function eFmtNum(x, dec) { dec = dec == null ? 2 : dec; return Number(x).toFixed(dec).replace('.', ','); }
function eFmtSignedNum(x, dec) { dec = dec == null ? 2 : dec; const s = Number(x).toFixed(dec).replace('.', ','); return x > 0 ? '+' + s : s; }
function eEscape(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Distracteurs : variations numériques plausibles autour de la bonne réponse */
function eMakeDistractors(correct, dec, customWrongs) {
  const set = new Map(); // value (string) → numeric
  const keyOf = v => Number(v).toFixed(Math.max(dec, 2));
  set.set(keyOf(correct), correct);
  if (Array.isArray(customWrongs)) {
    for (const w of customWrongs) {
      if (w == null || isNaN(w)) continue;
      const r = eRound(w, dec);
      const k = keyOf(r);
      if (!set.has(k)) set.set(k, r);
      if (set.size >= 4) break;
    }
  }
  // compléter avec du bruit ± si besoin
  let safety = 60;
  while (set.size < 4 && safety-- > 0) {
    const sign = Math.random() < 0.5 ? -1 : 1;
    const pct = 0.05 + Math.random() * 0.30;
    let v = correct + sign * Math.max(Math.abs(correct) * pct, Math.pow(10, -dec) * 5);
    v = eRound(v, dec);
    const k = keyOf(v);
    if (!set.has(k) && k !== keyOf(0)) set.set(k, v);
  }
  const opts = [...set.values()];
  // shuffle + retenir l'index correct
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  const correctIdx = opts.findIndex(v => keyOf(v) === keyOf(correct));
  return { opts, correctIdx };
}

/* ═══════════════════════════════════════════════════════════
   DOSSIER 1 — FORWARD/FORWARD (4 pts)

const D1_SOCIETIES = ['Passflux', 'Cashtide', 'Trésor+', 'Marenor', 'Solifin', 'Cresci', 'Aquaflux', 'Boréal Capital', 'Helios Trésorerie', 'Nordique Finance'];
const D1_TRIMESTERS = [
  { label: 'fin 3e trimestre', startDate: '01/10/N', endDateN: '31/12/N', jPlac: 92, jEmp: 457 },
  { label: 'fin 2e trimestre', startDate: '01/07/N', endDateN: '31/12/N', jPlac: 184, jEmp: 549 },
  { label: 'fin 1er trimestre', startDate: '01/04/N', endDateN: '31/12/N', jPlac: 275, jEmp: 640 }
];

function d1Generate() {
  const society = ePick(D1_SOCIETIES);
  const trim = ePick(D1_TRIMESTERS);
  const montant = ePick([100000, 150000, 200000, 250000, 300000, 350000, 400000, 500000]);
  // taux 3 mois (court) : placement < emprunt
  const tp3 = eRandFloat(0.25, 1.50, 2);
  const te3 = eRound(tp3 + eRandFloat(0.30, 0.80, 2), 2);
  // taux 12-18 mois (long) : > taux 3 mois
  const tp12 = eRound(tp3 + eRandFloat(0.40, 1.20, 2), 2);
  const te12 = eRound(tp12 + eRandFloat(0.50, 1.20, 2), 2);
  // calcul du taux F/F en utilisant te12 (taux emprunt long banque) et tp3 (placement banque court)
  const Te = te12 / 100;
  const Tp = tp3 / 100;
  const Je = trim.jEmp;
  const Jp = trim.jPlac;
  const Jpret = 365;
  const tff = (Te * Je - Tp * Jp) / (Jpret * (1 + Tp * Jp / 360));
  const tffPct = eRound(tff * 100, 3); // afficher avec 3 décimales pour précision
  // distracteurs basés sur erreurs typiques
  const wrong1 = eRound((te3 / 100 * Je - tp3 / 100 * Jp) / (Jpret * (1 + tp3 / 100 * Jp / 360)) * 100, 3); // utilise te3 au lieu de te12
  const wrong2 = eRound((Te * Je - Tp * Jp) / Jpret * 100, 3); // oublie l'ajustement de capitalisation
  const wrong3 = eRound((Te * Je + Tp * Jp) / (Jpret * (1 + Tp * Jp / 360)) * 100, 3); // somme au lieu de différence
  const qb = eMakeDistractors(tffPct, 3, [wrong1, wrong2, wrong3]);
  return {
    society, trim, montant,
    tp3, te3, tp12, te12,
    tffPct,
    qbOpts: qb.opts, qbCorrect: qb.correctIdx
  };
}

/* ═══════════════════════════════════════════════════════════
   DOSSIER 2 — COLLAR (4 pts)
   Table 4 ans avec 5 lignes paramétrées
   ═══════════════════════════════════════════════════════════ */
const D2_SOCIETIES = ['Carrousel', 'Méridien', 'Octave', 'Brassens', 'Vermillon', 'Antinéa', 'Vélocia', 'Pléiade'];

function d2Generate() {
  const society = ePick(D2_SOCIETIES);
  const montant = ePick([200000, 250000, 300000, 400000, 500000, 600000, 800000]);
  const duree = ePick([3, 4, 5]);
  const spread = ePick([0.25, 0.30, 0.40, 0.50, 0.60, 0.75]); // Tam + spread
  const capTaux = ePick([2.5, 2.75, 3, 3.25, 3.5]);
  const floorTaux = ePick([1.5, 1.75, 2, 2.25]);
  const primeCap = ePick([0.30, 0.35, 0.40, 0.45, 0.50]);
  const primeFloor = ePick([0.15, 0.20, 0.25, 0.30]);
  // évolution Tam sur 4 périodes (croissante de N à N+3)
  const tamBase = ePick([1.0, 1.25, 1.5, 1.75, 2.0]);
  const step = ePick([0.25, 0.5]);
  const tam = duree === 3
    ? [tamBase, tamBase + step, tamBase + 2 * step]
    : duree === 4
    ? [tamBase, tamBase + step, tamBase + 2 * step, tamBase + 3 * step]
    : [tamBase, tamBase + step, tamBase + 2 * step, tamBase + 3 * step, tamBase + 4 * step];
  // Build expected rows
  const tamSpread = tam.map(t => eRound(t + spread, 2));
  const diffCap = tamSpread.map(t => t > capTaux ? eRound(capTaux - t, 2) : 0); // négatif si reçu
  const diffFloor = tamSpread.map(t => t < floorTaux ? eRound(floorTaux - t, 2) : 0); // positif si versé (mais ici tam_spread généralement > floor → 0)
  // Coût réel = tam_spread + primeCap - primeFloor + diffCap + diffFloor
  // (primeCap est versée = +, primeFloor est reçue = −)
  const coutReel = tamSpread.map((ts, i) => eRound(ts + primeCap - primeFloor + diffCap[i] + diffFloor[i], 2));
  // Pour chaque cellule on génère un QCM 4 options
  function cellQCM(correct, dec) {
    return eMakeDistractors(correct, dec, [
      eRound(correct + 0.10, dec),
      eRound(correct - 0.10, dec),
      eRound(correct + 0.25, dec),
      eRound(correct - 0.25, dec)
    ]);
  }
  const cells = {
    tamSpread: tamSpread.map(v => cellQCM(v, 2)),
    primeCap: tam.map(_ => cellQCM(primeCap, 2)),
    diffCap: diffCap.map(v => cellQCM(v, 2)),
    primeFloor: tam.map(_ => cellQCM(-primeFloor, 2)),
    diffFloor: diffFloor.map(v => cellQCM(v, 2)),
    coutReel: coutReel.map(v => cellQCM(v, 2))
  };
  return {
    society, montant, duree, spread,
    capTaux, floorTaux, primeCap, primeFloor,
    tam, tamSpread, diffCap, diffFloor, coutReel,
    cells
  };
}

/* ═══════════════════════════════════════════════════════════
   DOSSIER 3 — OPTIONS SUR DEVISES (4 pts)
   ═══════════════════════════════════════════════════════════ */
const D3_DEVISES = [
  { code: 'JPY', name: 'yens',     baseRange: [140, 175], pivotPair: 'yen' },
  { code: 'USD', name: 'dollars',  baseRange: [1.05, 1.18], pivotPair: 'dollar' },
  { code: 'GBP', name: 'livres',   baseRange: [0.82, 0.92], pivotPair: 'livre' },
  { code: 'CHF', name: 'francs suisses', baseRange: [0.92, 1.02], pivotPair: 'franc suisse' },
  { code: 'CNY', name: 'yuans',    baseRange: [7.4, 8.2], pivotPair: 'yuan' }
];

function d3Generate() {
  const dev = ePick(D3_DEVISES);
  const role = ePick(['exportateur', 'importateur']);
  const horizon = ePick([60, 90, 120, 180]);
  const montantDev = role === 'exportateur'
    ? ePick([1000000, 2000000, 3000000, 5000000])
    : ePick([500000, 800000, 1000000, 1500000]);
  // cours actuel (1€ = X devise)
  const isBigUnit = dev.baseRange[1] > 10;
  const cours = isBigUnit ? eRandFloat(dev.baseRange[0], dev.baseRange[1], 3) : eRandFloat(dev.baseRange[0], dev.baseRange[1], 4);
  // prix d'exercice (proche du cours, légèrement différent)
  const decimals = isBigUnit ? 2 : 4;
  const offset = isBigUnit ? eRandFloat(0.5, 2.5, 2) * (role === 'exportateur' ? -1 : 1) : eRandFloat(0.005, 0.025, 4) * (role === 'exportateur' ? -1 : 1);
  // Note: si exporter veut un Put strike, en général strike inférieur (moins de devise / €) ou supérieur ?
  // dans l'énoncé original, strike 160,85 et cours 161,964 → strike < cours (donc moins de yens par €, plus avantageux pour exportateur)
  const strike = eRound(cours + offset, decimals);
  const primePct = ePick([1, 1.5, 2, 2.5, 3]);
  // 2 hypothèses de cours futur : une favorable, une défavorable
  const ampl = isBigUnit ? eRandFloat(1.5, 4, 2) : eRandFloat(0.015, 0.05, 4);
  const hypothese1 = eRound(cours - ampl, decimals); // moins de devise par € = € faible = devise forte (favorable exportateur)
  const hypothese2 = eRound(cours + ampl, decimals); // plus de devise par € = € fort = devise faible (défavorable exportateur)
  // calculs
  const valeurOptionEUR = montantDev / strike; // valeur garantie en €
  const prime = eRound((montantDev / strike) * (primePct / 100), 2);
  // h1 (favorable export)
  const compantH1 = eRound(montantDev / hypothese1, 2);
  const netH1Lever = eRound(valeurOptionEUR - prime, 2);
  const netH1Abandon = eRound(compantH1 - prime, 2);
  const choixH1 = role === 'exportateur'
    ? (compantH1 > valeurOptionEUR ? 'abandon' : 'lever')
    : (compantH1 < valeurOptionEUR ? 'abandon' : 'lever');
  const netH1 = choixH1 === 'lever' ? netH1Lever : netH1Abandon;
  // h2 (défavorable export)
  const compantH2 = eRound(montantDev / hypothese2, 2);
  const netH2Lever = eRound(valeurOptionEUR - prime, 2);
  const netH2Abandon = eRound(compantH2 - prime, 2);
  const choixH2 = role === 'exportateur'
    ? (compantH2 > valeurOptionEUR ? 'abandon' : 'lever')
    : (compantH2 < valeurOptionEUR ? 'abandon' : 'lever');
  const netH2 = choixH2 === 'lever' ? netH2Lever : netH2Abandon;
  // distracteurs
  const qPrime = eMakeDistractors(prime, 2, [
    eRound(montantDev * (primePct / 100), 2), // oubli de diviser par strike
    eRound((montantDev / cours) * (primePct / 100), 2), // utilise cours au lieu de strike
    eRound(prime * 2, 2)
  ]);
  const qH1 = eMakeDistractors(netH1, 2, [
    role === 'exportateur' ? netH1Lever : netH1Abandon, // l'inverse du choix
    eRound(netH1 + prime, 2), // oubli de soustraire la prime
    eRound(compantH1, 2),
    eRound(valeurOptionEUR, 2)
  ]);
  const qH2 = eMakeDistractors(netH2, 2, [
    role === 'exportateur' ? netH2Abandon : netH2Lever,
    eRound(netH2 + prime, 2),
    eRound(compantH2, 2),
    eRound(valeurOptionEUR, 2)
  ]);
  return {
    dev, role, horizon, montantDev, cours, strike, primePct,
    hypothese1, hypothese2,
    valeurOptionEUR, prime,
    compantH1, netH1, choixH1,
    compantH2, netH2, choixH2,
    qPrime, qH1, qH2,
    decimals
  };
}

        <div class="exam-q-sub">Hypothèse 1 : 1 € = <strong>${eFmtNum(p.hypothese1, p.decimals)} ${p.dev.code}</strong></div>
        <div class="exam-opts">${optEur('d3c1', p.qH1)}</div>
        <div class="exam-q-sub" style="margin-top:0.8rem">Hypothèse 2 : 1 € = <strong>${eFmtNum(p.hypothese2, p.decimals)} ${p.dev.code}</strong></div>

  `;

function d3Correct(p, ans) {
  ans = ans || {};
  const okA = ans['d3a'] === (p.role === 'exportateur' ? 1 : 0);
  const okB = ans['d3b'] === p.qPrime.correctIdx;

/* ═══════════════════════════════════════════════════════════
   DOSSIER 4 — BÊTA + MEDAF + CMPC (4 pts)
   ═══════════════════════════════════════════════════════════ */
const D4_TITRES = ['Choups', 'Vélo', 'Cassis', 'Maïs', 'Tilleul', 'Brume', 'Orchidée', 'Mésange'];

function d4Generate() {
  const titre = ePick(D4_TITRES);
  const indice = ePick(['CAC', 'S&P 500', 'Eurostoxx', 'MSCI Europe']);
  // 5 rentabilités cohérentes (RC ~ RM avec un peu de bruit)
  const periods = [1, 2, 3, 4, 5];
  const data = periods.map(() => {
    const rm = eRandFloat(-1.5, 2.5, 2);
    const rc = eRound(rm + eRandFloat(-0.8, 0.8, 2), 2);
    return { rc, rm };
  });
  const rcMean = eRound(data.reduce((s, d) => s + d.rc, 0) / data.length, 2);
  const rmMean = eRound(data.reduce((s, d) => s + d.rm, 0) / data.length, 2);
  // écarts à la moyenne (arrondis 2 décimales au SUP comme demandé)
  const ecarts = data.map(d => ({
    ecRc: eRound(d.rc - rcMean, 2),
    ecRm: eRound(d.rm - rmMean, 2)
  }));
  const ecartsSq = ecarts.map(e => eRoundUp(e.ecRm * e.ecRm, 2));
  const ecartsProd = ecarts.map(e => eRoundUp(e.ecRc * e.ecRm, 2));
  const sumSq = eRoundUp(ecartsSq.reduce((s, v) => s + v, 0), 2);
  const sumProd = eRoundUp(ecartsProd.reduce((s, v) => s + v, 0), 2);
  // Beta = covar/var. Cov = sumProd/(n-1), Var = sumSq/(n-1) → ratio = sumProd/sumSq
  const beta = eRoundUp(sumProd / sumSq, 2);
  // b) MEDAF : Rcp = Rf + b * prime, avec b ≠ beta calculé (pour reproduire l'énoncé)
  const betaSupp = eRandFloat(0.6, 1.4, 2);
  const rf = eRandFloat(0.5, 2.5, 2);
  const primeRisque = eRandFloat(1.5, 4, 2);
  const rcp = eRoundUp(rf + betaSupp * primeRisque, 2);
  // c) CMPC
  const rcp2 = ePick([2.5, 3, 3.5, 4, 4.5, 5]);
  const rd = ePick([1.5, 2, 2.5, 3]);
  const partCP = ePick([0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60]);
  const vcp = ePick([3000000, 4000000, 4800000, 6000000, 7200000, 8000000]);
  const vge = vcp / partCP;
  const vd = vge - vcp;
  const cmpc = eRoundUp((rcp2 / 100 * vcp / vge + rd / 100 * vd / vge) * 100, 2);
  // QCM pour chaque résultat clé
  const cellQCM = (v, dec) => eMakeDistractors(v, dec, [
    eRound(v + 0.05, dec), eRound(v - 0.05, dec), eRound(v + 0.15, dec), eRound(v - 0.15, dec)
  ]);
  const cellsRC = ecarts.map(e => cellQCM(e.ecRc, 2));
  const cellsRM = ecarts.map(e => cellQCM(e.ecRm, 2));
  const cellsRMSq = ecartsSq.map(v => cellQCM(v, 2));
  const cellsProd = ecartsProd.map(v => cellQCM(v, 2));
  const qSumSq = cellQCM(sumSq, 2);
  const qSumProd = cellQCM(sumProd, 2);
  const qBeta = cellQCM(beta, 2);
  const qRcp = eMakeDistractors(rcp, 2, [
    eRound(rf + primeRisque, 2), // oubli du beta
    eRound(betaSupp * primeRisque, 2), // oubli du rf
    eRound(rf + betaSupp + primeRisque, 2)
  ]);
  const qCMPC = eMakeDistractors(cmpc, 2, [
    eRound(rcp2 * partCP + rd * (1 - partCP), 2),
    eRound((rcp2 + rd) / 2, 2),
    eRound(rcp2 * (1 - partCP) + rd * partCP, 2) // inversion des poids
  ]);
  const qVD = eMakeDistractors(vd, 0, [
    eRound(vcp / (1 - partCP), 0),
    eRound(vge / 2, 0),
    eRound(vcp, 0)
  ]);
  return {
    titre, indice, data, rcMean, rmMean,
    ecarts, ecartsSq, ecartsProd, sumSq, sumProd, beta,
    betaSupp, rf, primeRisque, rcp,
    rcp2, rd, partCP, vcp, vge, vd, cmpc,
    cellsRC, cellsRM, cellsRMSq, cellsProd, qSumSq, qSumProd, qBeta, qRcp, qCMPC, qVD
  };
}

function d4Correct(p, ans) {
  ans = ans || {};
  let cellsOk = 0;
  const cellMax = 1; // 1 pt réparti sur les cellules du tableau
  const totalCells = 5 * 4 + 2; // 20 cellules + 2 sommes
  const cellPt = cellMax / totalCells;
  const cellDetails = [];
  for (let i = 0; i < 5; i++) {
    [['ecRc', p.cellsRC[i]], ['ecRm', p.cellsRM[i]], ['ecRmSq', p.cellsRMSq[i]], ['ecProd', p.cellsProd[i]]].forEach(([key, qcm]) => {
      const qid = `d4_${key}_${i}`;
      if (ans[qid] === qcm.correctIdx) cellsOk++;
    });
  }
  if (ans['d4_sumSq'] === p.qSumSq.correctIdx) cellsOk++;
  if (ans['d4_sumProd'] === p.qSumProd.correctIdx) cellsOk++;
  const cellPts = eRound(cellsOk * cellPt, 2);
  const okBeta = ans['d4_beta'] === p.qBeta.correctIdx;
  const okRcp = ans['d4_rcp'] === p.qRcp.correctIdx;
  const okVD = ans['d4_vd'] === p.qVD.correctIdx;
  const okCMPC = ans['d4_cmpc'] === p.qCMPC.correctIdx;
  const pts = cellPts + (okBeta ? 1 : 0) + (okRcp ? 0.5 : 0) + (okVD ? 0.5 : 0) + (okCMPC ? 1 : 0);
  // explain table
  const rowsExpl = p.data.map((d, i) => `
    <tr>
      <th>${i + 1}</th>
      <td>${eFmtPct(d.rc)}</td>
      <td>${eFmtPct(d.rm)}</td>
      <td>${eFmtNum(p.ecarts[i].ecRc, 2)}</td>
      <td>${eFmtNum(p.ecarts[i].ecRm, 2)}</td>
      <td>${eFmtNum(p.ecartsSq[i], 2)}</td>
      <td>${eFmtNum(p.ecartsProd[i], 2)}</td>
    </tr>`).join('');
  const tableExpl = `
    <table class="exam-corr-table">
      <thead><tr><th>P</th><th>R<sub>C</sub></th><th>R<sub>M</sub></th><th>R<sub>C</sub>−R̄</th><th>R<sub>M</sub>−R̄</th><th>(R<sub>M</sub>−R̄)²</th><th>Produit</th></tr></thead>
      <tbody>${rowsExpl}
        <tr class="exam-corr-final"><th>Σ</th><td>${eFmtPct(p.rcMean)}</td><td>${eFmtPct(p.rmMean)}</td><td></td><td></td><td><strong>${eFmtNum(p.sumSq, 2)}</strong></td><td><strong>${eFmtNum(p.sumProd, 2)}</strong></td></tr>
      </tbody>
    </table>
    <p style="margin-top:0.5rem;font-size:0.83rem"><strong>Bêta</strong> = (1/4 × ${eFmtNum(p.sumProd, 2)}) / (1/4 × ${eFmtNum(p.sumSq, 2)}) = ${eFmtNum(p.sumProd / p.sumSq, 4)} → arrondi sup = <strong>${eFmtNum(p.beta, 2)}</strong></p>
  `;
  return {
    pts: eRound(pts, 2), total: 4,
    details: [
      { q: 'a) Tableau de calcul du Bêta', userOk: cellsOk === totalCells, points: cellPts, max: 1, userAnswer: `${cellsOk}/${totalCells} cellules correctes`, correctAnswer: '', explain: tableExpl },
      { q: 'a) Bêta final', userOk: okBeta, points: okBeta ? 1 : 0, max: 1, userAnswer: ans['d4_beta'] != null ? eFmtNum(p.qBeta.opts[ans['d4_beta']], 2) : '—', correctAnswer: eFmtNum(p.beta, 2), explain: `β = COV / V = ${eFmtNum(p.sumProd, 2)} / ${eFmtNum(p.sumSq, 2)} = <strong>${eFmtNum(p.beta, 2)}</strong>` },
      { q: 'b) Coût des fonds propres (MEDAF)', userOk: okRcp, points: okRcp ? 0.5 : 0, max: 0.5, userAnswer: ans['d4_rcp'] != null ? eFmtPct(p.qRcp.opts[ans['d4_rcp']]) : '—', correctAnswer: eFmtPct(p.rcp), explain: `R<sub>cp</sub> = R<sub>f</sub> + β × prime = ${eFmtPct(p.rf)} + (${eFmtNum(p.betaSupp, 2)} × ${eFmtPct(p.primeRisque)}) = <strong>${eFmtPct(p.rcp)}</strong>` },
      { q: 'c) Valeur de la dette', userOk: okVD, points: okVD ? 0.5 : 0, max: 0.5, userAnswer: ans['d4_vd'] != null ? eFmtEur(p.qVD.opts[ans['d4_vd']], 0) : '—', correctAnswer: eFmtEur(p.vd, 0), explain: `V<sub>GE</sub> = V<sub>CP</sub> / part CP = ${eFmtEur(p.vcp, 0)} / ${eFmtNum(p.partCP, 2)} = ${eFmtEur(p.vge, 0)}. V<sub>D</sub> = V<sub>GE</sub> − V<sub>CP</sub> = <strong>${eFmtEur(p.vd, 0)}</strong>` },
      { q: 'c) CMPC', userOk: okCMPC, points: okCMPC ? 1 : 0, max: 1, userAnswer: ans['d4_cmpc'] != null ? eFmtPct(p.qCMPC.opts[ans['d4_cmpc']]) : '—', correctAnswer: eFmtPct(p.cmpc), explain: `CMPC = R<sub>cp</sub> × V<sub>CP</sub>/V<sub>GE</sub> + R<sub>d</sub> × V<sub>D</sub>/V<sub>GE</sub> = ${eFmtPct(p.rcp2)} × ${eFmtNum(p.partCP, 2)} + ${eFmtPct(p.rd)} × ${eFmtNum(1 - p.partCP, 2)} = <strong>${eFmtPct(p.cmpc)}</strong>` }
    ]
  };
}

      <div class="exam-context">
        <p>${eEscape(p.sujet.consigne)}</p>
        <p class="exam-rappel">📐 Barème : intro/conclusion (1 pt) · 3 avantages développés (1,5 pt) · 3 inconvénients développés (1,5 pt). Rédigez votre réponse ci-dessous ; vous l'évaluerez à la soumission en cochant les critères réellement traités.</p>
      </div>
      <div class="exam-q">
        <textarea id="d5-textarea" class="exam-textarea" placeholder="Rédigez votre développement ici..." oninput="examPick('d5_text', this.value)">${eEscape(text)}</textarea>
        <div class="exam-wc" id="d5-wc">${text.trim() ? text.trim().split(/\s+/).length : 0} mots</div>
      </div>
    </div>
  `;
}

function d5RenderEval(p, ans) {
  ans = ans || {};
  const checks = ans['d5_checks'] || {};
  return `
    <div class="exam-eval-grid">
      <div class="exam-eval-row">
        <label class="exam-eval-item">
          <input type="checkbox" ${checks.intro ? 'checked' : ''} onchange="examEvalCheck('intro', this.checked)">
          <span>Introduction présente (annonce du plan, contexte)</span>
          <span class="exam-eval-pts">+0,5 pt</span>
        </label>
        <label class="exam-eval-item">
          <input type="checkbox" ${checks.conclu ? 'checked' : ''} onchange="examEvalCheck('conclu', this.checked)">
          <span>Conclusion présente (synthèse / ouverture)</span>
          <span class="exam-eval-pts">+0,5 pt</span>
        </label>
      </div>
      <div class="exam-eval-section"><strong>Avantages traités (au moins 3 développés, +0,5 pt chacun)</strong></div>
      ${p.sujet.avantages.map((a, i) => `
        <label class="exam-eval-item">
          <input type="checkbox" ${checks['av' + i] ? 'checked' : ''} onchange="examEvalCheck('av${i}', this.checked)">
          <span>${eEscape(a)}</span>
          <span class="exam-eval-pts">+0,5 pt</span>
        </label>`).join('')}
      <div class="exam-eval-section"><strong>Inconvénients traités (au moins 3 développés, +0,5 pt chacun)</strong></div>
      ${p.sujet.inconvenients.map((c, i) => `
        <label class="exam-eval-item">
          <input type="checkbox" ${checks['inc' + i] ? 'checked' : ''} onchange="examEvalCheck('inc${i}', this.checked)">
          <span>${eEscape(c)}</span>
          <span class="exam-eval-pts">+0,5 pt</span>
        </label>`).join('')}
    </div>
  `;
}

function d5Correct(p, ans) {
  ans = ans || {};
  const checks = ans['d5_checks'] || {};
  const intro = checks.intro ? 0.5 : 0;
  const conclu = checks.conclu ? 0.5 : 0;
  const avCount = p.sujet.avantages.filter((_, i) => checks['av' + i]).length;
  const incCount = p.sujet.inconvenients.filter((_, i) => checks['inc' + i]).length;
  const avPts = Math.min(avCount, 3) * 0.5;
  const incPts = Math.min(incCount, 3) * 0.5;
  const pts = eRound(intro + conclu + avPts + incPts, 2);
  return {
    pts, total: 4,
    details: [
      { q: 'Introduction + Conclusion', userOk: intro + conclu === 1, points: intro + conclu, max: 1, userAnswer: `${(checks.intro ? 'intro ✓' : 'intro ✗')} · ${(checks.conclu ? 'conclusion ✓' : 'conclusion ✗')}`, correctAnswer: '', explain: 'Intro = présentation du sujet, plan annoncé. Conclusion = synthèse + ouverture.' },
      { q: `Avantages développés (${avCount}/3 max comptabilisés)`, userOk: avCount >= 3, points: avPts, max: 1.5, userAnswer: avCount + ' coché(s)', correctAnswer: '3 attendus parmi la liste ci-dessous', explain: '<ul>' + p.sujet.avantages.map(a => '<li>' + eEscape(a) + '</li>').join('') + '</ul>' },
      { q: `Inconvénients développés (${incCount}/3 max comptabilisés)`, userOk: incCount >= 3, points: incPts, max: 1.5, userAnswer: incCount + ' coché(s)', correctAnswer: '3 attendus parmi la liste ci-dessous', explain: '<ul>' + p.sujet.inconvenients.map(c => '<li>' + eEscape(c) + '</li>').join('') + '</ul>' }
    ]
  };
}

/* ═══════════════════════════════════════════════════════════
   ORCHESTRATION
   ═══════════════════════════════════════════════════════════ */
function examGenerate(includeMask) {
  return {
    d1: includeMask.d1 ? d1Generate() : null,
    d2: includeMask.d2 ? d2Generate() : null,
    d3: includeMask.d3 ? d3Generate() : null,
    d4: includeMask.d4 ? d4Generate() : null,
    d5: includeMask.d5 ? d5Generate() : null
  };
}

function examPick(qid, value) {
  if (!examState || examState.submitted) return;
  examState.answers[qid] = value;
  // re-render seulement la case concernée pour les opts (optimisation faible mais utile pour la fluidité visuelle)
  if (qid === 'd5_text') return; // textarea : pas de re-render
  // Pour QCM bouton : on met juste à jour la classe selected
  if (qid.indexOf('_') === -1 || qid.startsWith('d1') || qid.startsWith('d2a') || qid.startsWith('d2b') || qid.startsWith('d3a') || qid.startsWith('d3b') || qid.startsWith('d3c') || qid.startsWith('d4_beta') || qid.startsWith('d4_rcp') || qid.startsWith('d4_vd') || qid.startsWith('d4_cmpc')) {
    document.querySelectorAll(`[data-q="${qid}"], .exam-opt[onclick*="'${qid}'"]`).forEach(el => {
      const i = parseInt(el.getAttribute('data-i') ?? (el.getAttribute('onclick').match(/,\s*(\d+)\)/) || [])[1]);
      el.classList.toggle('selected', i === value);
    });
  }
}

function examEvalCheck(key, checked) {
  if (!examState) return;
  examState.answers['d5_checks'] = examState.answers['d5_checks'] || {};
  examState.answers['d5_checks'][key] = checked;
  // recalcul live du score d5
  if (examState.dossiers.d5 && examState.submitted) {
    examRecomputeScore();
  }
}

function examRecomputeScore() {
  const ds = examState.dossiers;
  const a = examState.answers;
  let total = 0, max = 0;
  if (ds.d1) { const r = d1Correct(ds.d1, a); total += r.pts; max += r.total; }
  if (ds.d2) { const r = d2Correct(ds.d2, a); total += r.pts; max += r.total; }
  if (ds.d3) { const r = d3Correct(ds.d3, a); total += r.pts; max += r.total; }
  if (ds.d4) { const r = d4Correct(ds.d4, a); total += r.pts; max += r.total; }
  if (ds.d5) { const r = d5Correct(ds.d5, a); total += r.pts; max += r.total; }
  const rounded = eRound(total, 2);
  const el = document.getElementById('exam-score-live');
  if (el) el.textContent = eFmtNum(rounded);
  // Persist updated score (live update of the most recent localStorage entry)
  if (examState && examState.submitted) {
    const arr = loadExamScores();
    if (arr.length > 0) {
      arr[0].score = rounded;
      arr[0].total = max;
      localStorage.setItem(EXAM_KEY, JSON.stringify(arr));
      flashSaveIndicator();
    }
  }
}

function flashSaveIndicator() {
  const el = document.getElementById('exam-save-flash');
  if (!el) return;
  el.classList.remove('flash');
  // trigger reflow then add class
  void el.offsetWidth;
  el.classList.add('flash');
}

/* ── ENTRY POINT ── */
function renderExamen() {
  const root = document.getElementById('appRoot');
  const header = `
    <div class="page-header">
      <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
      <div class="page-title">${DATA.title}</div>
      <div class="page-subtitle">${DATA.subtitle}</div>
    </div>`;
  if (!examState) {
    root.innerHTML = header + renderExamenConfig();
    return;
  }
  if (examState.submitted) {
    root.innerHTML = header + renderExamenResult();
    return;
  }
  root.innerHTML = header + renderExamenRunning();
  examStartTimer();
}

function loadExamScores() {
  try { return JSON.parse(localStorage.getItem(EXAM_KEY)) || []; } catch(e) { return []; }
}
function saveExamScore(score, total, durationSec, elapsedSec) {
  const arr = loadExamScores();
  arr.unshift({ score, total, date: Date.now(), duration: durationSec, elapsed: elapsedSec });
  localStorage.setItem(EXAM_KEY, JSON.stringify(arr.slice(0, 5)));
}

/* Durée (min) → nombre de dossiers tirés (proportionnel à l'épreuve réelle 120 min = 5 dossiers) */
function examDossiersFromDuration(durMin) {
  if (durMin <= 30) return 1;
  if (durMin <= 60) return 2;
  if (durMin <= 75) return 3;
  if (durMin <= 105) return 4;
  return 5;
}

function renderExamenConfig() {
  const scores = loadExamScores().slice(0, 3);
  const histHTML = scores.length === 0
    ? '<p style="color:var(--text3);font-size:0.82rem;text-align:center">Aucune tentative précédente</p>'
    : scores.map(s => {
        const pct = Math.round(s.score / s.total * 100);
        const d = new Date(s.date);
        const ds = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
        const mm = Math.floor((s.elapsed || 0) / 60);
        return `<span class="quiz-score-pill"><span style="color:${col};font-weight:700">${eFmtNum(s.score)}/${s.total}</span><span style="color:var(--text3)">${ds} · ${mm} min</span></span>`;
      }).join('');
  return `
    <div class="fade-up">
      <div class="exam-setup">
        <div style="font-size:2.4rem">📝</div>
        <h3 style="font-family:'Playfair Display',serif;margin:0.4rem 0">Examen blanc — UE 5 Finance</h3>
        <p style="color:var(--text2);max-width:560px;margin:0 auto 1.4rem;font-size:0.92rem">Format épreuve écrite (P. Robin) : 5 dossiers × 4 pts. Chiffres tirés au sort, calculs vérifiés par la formule. Calculatrice non programmable autorisée — pas d'autre document.</p>
        <div class="quiz-history" style="max-width:560px;margin:0 auto 1.4rem">
          <div class="quiz-history-title">Tentatives récentes</div>
          ${histHTML}
        </div>
        <div class="exam-setup-grid">
          <div class="exam-setup-card">
            <div class="exam-setup-label">⏱ Durée</div>
            <input id="exam-duration" type="range" min="30" max="120" step="15" value="120" class="exam-slider" oninput="examUpdateDurationLabel(this.value)">
            <div class="exam-setup-value"><span id="exam-duration-label">120 min</span></div>
            <div class="exam-setup-hint" id="exam-duration-hint">→ <strong>5 dossiers</strong> · note sur <strong>20 pts</strong> (épreuve complète)</div>
          </div>
          <div class="exam-setup-card">
            <div class="exam-setup-label">📚 Pool de dossiers</div>
            <div class="exam-setup-checks">
              <label><input type="checkbox" id="ck-d1" checked onchange="examUpdateDurationLabel()"> Dossier 1 — Forward/Forward</label>
              <label><input type="checkbox" id="ck-d2" checked onchange="examUpdateDurationLabel()"> Dossier 2 — Collar</label>
              <label><input type="checkbox" id="ck-d3" checked onchange="examUpdateDurationLabel()"> Dossier 3 — Options</label>
              <label><input type="checkbox" id="ck-d4" checked onchange="examUpdateDurationLabel()"> Dossier 4 — Bêta + CMPC</label>
              <label><input type="checkbox" id="ck-d5" checked onchange="examUpdateDurationLabel()"> Dossier 5 — Rédaction</label>
            </div>
            <div class="exam-setup-hint" style="margin-top:0.5rem">Le tirage se fait <strong>au hasard</strong> parmi les dossiers cochés.</div>
          </div>
        </div>
        <button class="start-btn" style="margin-top:1.5rem" onclick="examStart()">🚀 Lancer l'examen blanc</button>
      </div>
    </div>
  `;
}

function examUpdateDurationLabel(val) {
  const sliderEl = document.getElementById('exam-duration');
  if (val == null) val = sliderEl ? sliderEl.value : 120;
  const dur = parseInt(val, 10);
  const lbl = document.getElementById('exam-duration-label');
  if (lbl) lbl.textContent = dur + ' min';
  const targetN = examDossiersFromDuration(dur);
  const checked = ['d1','d2','d3','d4','d5'].filter(k => {
    const el = document.getElementById('ck-' + k);
    return el && el.checked;
  }).length;
  const n = Math.min(targetN, checked);
  const hint = document.getElementById('exam-duration-hint');
  if (hint) {
    const isFull = n === 5;
    const onPts = n * 4;
    hint.innerHTML = checked === 0
      ? '<span style="color:var(--red)">Coche au moins un dossier dans le pool.</span>'
      : (targetN > checked
          ? `→ <strong>${n} dossier${n>1?'s':''}</strong> (pool limité) · note sur <strong>${onPts} pts</strong>`
          : `→ <strong>${n} dossier${n>1?'s':''}</strong> tiré${n>1?'s':''} au sort · note sur <strong>${onPts} pts</strong>${isFull ? ' (épreuve complète)' : ''}`);
  }
}

function examStart() {
  const dur = parseInt(document.getElementById('exam-duration').value, 10) * 60;
  const pool = ['d1','d2','d3','d4','d5'].filter(k => {
    const el = document.getElementById('ck-' + k);
    return el && el.checked;
  });
  if (pool.length === 0) {
    alert('Sélectionne au moins un dossier dans le pool.');
    return;
  }
  const targetN = examDossiersFromDuration(Math.floor(dur / 60));
  const n = Math.min(targetN, pool.length);
  // tirage aléatoire de n dossiers parmi le pool
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const picked = shuffled.slice(0, n).sort(); // ordre canonique d1 < d2 < ...
  const mask = { d1: false, d2: false, d3: false, d4: false, d5: false };
  picked.forEach(k => { mask[k] = true; });
  examState = {
    startedAt: Date.now(),
    durationSec: dur,
    submitted: false,
    dossiers: examGenerate(mask),
    answers: {},
    mask,
    pickedCount: n
  };
  renderExamen();
}

function renderExamenRunning() {
  const ds = examState.dossiers;
  const a = examState.answers;
  let body = '';
  if (ds.d1) body += d1Render(ds.d1, a);
  if (ds.d2) body += d2Render(ds.d2, a);
  if (ds.d3) body += d3Render(ds.d3, a);
  if (ds.d4) body += d4Render(ds.d4, a);
  if (ds.d5) body += d5Render(ds.d5, a);
  return `
    <div class="exam-timer-bar" id="exam-timer-bar">
      <span class="exam-timer-icon">⏱</span>
      <span class="exam-timer-time" id="exam-timer-time">--:--</span>
      <div class="exam-timer-progress"><div class="exam-timer-progress-fill" id="exam-timer-fill"></div></div>
      <button class="exam-timer-submit" onclick="examSubmit(false)">Terminer l'examen →</button>
    </div>
    <div class="fade-up exam-running">
      ${body}
      <div style="text-align:center;margin:2rem 0">
        <button class="start-btn" onclick="examSubmit(false)">Terminer l'examen et voir le corrigé →</button>
      </div>
    </div>
  `;
}

function examStartTimer() {
  clearInterval(examTimerInterval);
  const update = () => {
    if (!examState || examState.submitted) { clearInterval(examTimerInterval); return; }
    const elapsed = Math.floor((Date.now() - examState.startedAt) / 1000);
    const remaining = Math.max(0, examState.durationSec - elapsed);
    const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
    const ss = String(remaining % 60).padStart(2, '0');
    const el = document.getElementById('exam-timer-time');
    if (el) el.textContent = mm + ':' + ss;
    const fill = document.getElementById('exam-timer-fill');
    if (fill) fill.style.width = (remaining / examState.durationSec * 100) + '%';
    const bar = document.getElementById('exam-timer-bar');
    if (bar) {
      bar.classList.toggle('warn', remaining < 300 && remaining > 60);
      bar.classList.toggle('danger', remaining <= 60);
    }
    if (remaining <= 0) { clearInterval(examTimerInterval); examSubmit(true); }
  };
  update();
  examTimerInterval = setInterval(update, 1000);
}

function examSubmit(timeout) {
  if (!examState || examState.submitted) return;
  if (!timeout && !confirm('Terminer l\'examen et afficher le corrigé ? Tu ne pourras plus modifier tes réponses.')) return;
  examState.submitted = true;
  examState.elapsedSec = Math.floor((Date.now() - examState.startedAt) / 1000);
  examState.timeout = !!timeout;
  clearInterval(examTimerInterval);
  renderExamen();
}

function renderExamenResult() {
  const ds = examState.dossiers;
  const a = examState.answers;
  const corrs = [];
  if (ds.d1) corrs.push({ key: 'd1', label: 'Dossier 1 — Forward/Forward', r: d1Correct(ds.d1, a) });
  if (ds.d2) corrs.push({ key: 'd2', label: 'Dossier 2 — Collar', r: d2Correct(ds.d2, a) });
  if (ds.d3) corrs.push({ key: 'd3', label: 'Dossier 3 — Options', r: d3Correct(ds.d3, a) });
  if (ds.d4) corrs.push({ key: 'd4', label: 'Dossier 4 — Bêta + CMPC', r: d4Correct(ds.d4, a) });
  if (ds.d5) corrs.push({ key: 'd5', label: 'Dossier 5 — Rédaction', r: d5Correct(ds.d5, a) });
  const total = eRound(corrs.reduce((s, c) => s + c.r.pts, 0), 2);
  const max = corrs.reduce((s, c) => s + c.r.total, 0);
  const pct = max > 0 ? Math.round(total / max * 100) : 0;
  const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '🎉' : pct >= 35 ? '👍' : '💪';
  const msg = pct >= 75 ? 'Mention TB' : pct >= 60 ? 'Mention B' : pct >= 50 ? 'Validé' : pct >= 30 ? 'Insuffisant' : 'Non validé';
  // Sauvegarde le score (sauf si d5 et pas encore évalué)
  saveExamScore(total, max, examState.durationSec, examState.elapsedSec);
  if (pct >= 75) launchConfetti();
  const mm = Math.floor(examState.elapsedSec / 60);
  const ss = examState.elapsedSec % 60;
  const detailsHTML = corrs.map(c => `
    <div class="exam-result-dossier">
      <div class="exam-result-dossier-head">
        <div class="exam-result-dossier-title">${c.label}</div>
        <div class="exam-result-dossier-score" style="color:${c.r.pts / c.r.total >= 0.75 ? 'var(--green)' : c.r.pts / c.r.total >= 0.5 ? 'var(--orange)' : 'var(--red)'}"><span id="exam-score-${c.key}">${eFmtNum(c.r.pts)}</span> / ${c.r.total} pts</div>
      </div>
      ${c.r.details.map(d => `
        <div class="exam-result-q ${d.userOk ? 'ok' : 'ko'}">
          <div class="exam-result-q-head">
            <span class="exam-result-q-icon">${d.userOk ? '✓' : '✗'}</span>
            <span class="exam-result-q-text">${d.q}</span>
            <span class="exam-result-q-pts">${eFmtNum(d.points)} / ${d.max} pt${d.max > 1 ? 's' : ''}</span>
          </div>
          <div class="exam-result-q-body">
            <div class="exam-result-q-line"><strong>Ta réponse :</strong> ${d.userAnswer}</div>
            ${d.correctAnswer ? `<div class="exam-result-q-line"><strong>Bonne réponse :</strong> ${d.correctAnswer}</div>` : ''}
            <div class="exam-result-q-line exam-result-q-explain">${d.explain}</div>
          </div>
        </div>`).join('')}
    </div>
  `).join('');
  const d5Block = ds.d5 ? `
    <div class="exam-result-dossier">
      <div class="exam-result-dossier-head">
        <div class="exam-result-dossier-title">📝 Auto-évaluation de la rédaction (Dossier 5)</div>
        <div class="exam-result-dossier-score">Score global mis à jour en haut ↑</div>
      </div>
      <div style="padding:0 1rem 1rem">
        <div style="background:var(--bg);padding:0.8rem 1rem;border-radius:8px;margin-bottom:1rem;border-left:3px solid var(--accent);font-size:0.88rem;white-space:pre-wrap">${eEscape(examState.answers['d5_text'] || '(aucune rédaction saisie)')}</div>
        ${d5RenderEval(ds.d5, a)}
      </div>
    </div>
  ` : '';
  return `
    <div class="fade-up">
      <div class="score-box">
        <div class="score-emoji">${emoji}</div>
        <div class="score-num"><span id="exam-score-live">${eFmtNum(total)}</span> / ${max}</div>
        <div class="exam-save-flash-wrap"><span id="exam-save-flash" class="exam-save-flash">💾 Note sauvegardée</span></div>
        <div class="score-label">${msg} · ${pct}% · ${mm}min${ss > 0 ? ' ' + ss + 's' : ''}${examState.timeout ? ' (temps écoulé)' : ''}</div>
        <div class="score-actions">
          <button class="btn-secondary" onclick="examState = null; renderExamen()">↺ Nouvel examen</button>
        </div>
      </div>
      ${d5Block}
      ${detailsHTML}
    </div>
  `;
}
