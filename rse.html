      "a": "L'implication de la gouvernance est indispensable. Elle se décline en deux volets :\n\n• La Direction : impulse la stratégie et porte les engagements, diffuse les valeurs et la culture, veille à l'intégration de la RSE dans les process, apporte crédibilité et légitimité\n• L'Organisation : définit les porteurs du projet RSE (responsable, comité...), assure le suivi et l'amélioration continue de la démarche"
    },
    {
      "id": "rfc29",
      "theme": "demarche",
      "srcChap": 7,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Étape 3 : la politique RSE",
      "a": "Une politique RSE met en œuvre la stratégie ou les décisions de gestion de l'entreprise sur un enjeu de durabilité. Elle est sous la responsabilité de personnes définies, sur un périmètre d'application précis, avec des objectifs identifiés.\n\nElle permet de répondre aux enjeux matériels, de définir la vision et l'engagement de l'entreprise, et de fixer ses objectifs. Elle est ensuite mise en œuvre par des actions."
    },
    {
      "id": "rfc30",
      "theme": "demarche",
      "srcChap": 7,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Étape 3 : les objectifs SMART",
      "a": "Un objectif RSE est la trajectoire cible visée par la stratégie et les politiques. L'entreprise met en place son plan d'actions pour l'atteindre.\n\nUn objectif est nécessairement SMART :\n• S : Spécifique\n• M : Mesurable\n• A : Atteignable\n• R : Réalisable\n• T : Temporellement défini"
    },
    {
      "id": "rfc31",
      "theme": "demarche",
      "srcChap": 8,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Étape 4 : le plan d'actions RSE",
      "a": "Un plan d'actions RSE est un ensemble de mesures, tâches ou activités visant à atteindre des objectifs prédéfinis. Il est consigné dans un document décrivant les étapes nécessaires (date d'échéance, pilote de l'action, tâches à réaliser).\n\nIl permet d'atteindre les objectifs (jalonner étape par étape) et de piloter le projet en optimisant les moyens."
    },
    {
      "id": "rfc32",
      "theme": "demarche",
      "srcChap": 8,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Étape 5 : les indicateurs de performance",
      "a": "Un indicateur de performance RSE permet de mesurer le degré d'accomplissement des objectifs RSE. Mesurer sa performance sert à suivre l'évolution de sa stratégie et à ajuster son plan d'action.\n\nTrois types d'indicateurs :\n• Indicateur de performance : information quantifiée mesurant les résultats d'une ou plusieurs actions (souvent un ratio)\n• Indicateur de moyen (de pilotage) : permet d'anticiper et de réajuster ; un levier au service de l'objectif\n• Indicateur d'impact : démontre la contribution de l'entreprise à l'amélioration d'un problème sociétal"
    },
    {
      "id": "rfc33",
      "theme": "demarche",
      "srcChap": 8,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Étape 6 : le rapport de durabilité",
      "a": "Le rapport RSE, aujourd'hui nommé officiellement rapport de durabilité, est un document périodique (généralement annuel) par lequel une entreprise rend compte de ses actions et résultats en matière de RSE.\n\n• En interne : il permet de mesurer les conséquences des activités et d'améliorer les processus\n• En externe : il permet aux parties prenantes de comprendre l'implication de l'entreprise et d'évaluer les conséquences à moyen et long terme de ses activités"
    },
    {
      "id": "rfc34",
      "theme": "demarche",
      "srcChap": 8,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "EcoVadis",
      "a": "EcoVadis est une plateforme de notation utilisée par les partenaires commerciaux pour partager des informations sur leurs performances RSE.\n\nSa méthodologie est basée sur 7 indicateurs de management répartis en 21 critères RSE, couvrant l'environnement, le social, les droits humains et les achats responsables."
    },
    {
      "id": "rfc35",
      "theme": "opportunites",
      "srcChap": 9,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Certifications et labels RSE",
      "a": "Un label ou une certification RSE est une reconnaissance attribuée à une entreprise qui atteste de sa démarche et de ses actions en matière de responsabilité sociétale.\n\nIls sont délivrés par des organismes indépendants après évaluation. Ils permettent à l'entreprise de démontrer son engagement, de renforcer sa crédibilité et son image, et d'encourager des pratiques durables et transparentes."
    },
    {
      "id": "rfc36",
      "theme": "opportunites",
      "srcChap": 9,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Le label B Corp",
      "a": "La certification B Corp est un label international qui évalue les entreprises sur divers domaines regroupés en 5 catégories principales : Collaborateurs, Environnement, Gouvernance, Clients, Collectivité.\n\nLes entreprises labellisées s'engagent à équilibrer leurs objectifs financiers avec des impacts positifs sur la société et l'environnement."
    },
    {
      "id": "rfc37",
      "theme": "opportunites",
      "srcChap": 9,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Le label LUCIE",
      "a": "Développé par l'association LUCIE, le label LUCIE RSE est attribué aux entreprises s'engageant dans une démarche de responsabilité sociétale et de durabilité. Il s'appuie sur les engagements de la norme ISO 26000.\n\nDomaines couverts : gouvernance responsable et transparence, respect des individus, qualité de vie au travail, protection de l'environnement, éthique des pratiques, respect des intérêts des citoyens, développement local."
    },
    {
      "id": "rfc38",
      "theme": "opportunites",
      "srcChap": 9,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Le label Engagé RSE (AFNOR)",
      "a": "Le label « Engagé RSE » de l'AFNOR évalue la maturité des démarches RSE des organisations. Il s'adresse à divers types d'organisations (entreprises, associations, territoires), quelle que soit leur taille ou leur secteur.\n\nIl repose sur le modèle AFAQ 26000 et couvre notamment : vision RSE et gouvernance, intégration de la RSE, performance environnementale, performance sociale et sociétale, modes de production et de consommation durables, ancrage territorial, ressources humaines, performance économique."
    },
    {
      "id": "rfc39",
      "theme": "fondamentaux",
      "srcChap": 2,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "RSE et performance financière : un faux débat",
      "a": "Le débat opposant performance financière et performance RSE est dépassé. La RSE, intégrée à la performance globale, peut être créatrice de valeur : anticipation des risques, image de marque, accès à de nouveaux marchés, attractivité des talents, réduction des coûts.\n\nUne étude de France Stratégie évoque jusqu'à +13 % de performance pour les entreprises engagées."
    },
    {
      "id": "rfc40",
      "theme": "demarche",
      "srcChap": 6,
      "src": "Cours Introduction à la RSE (D. Duheron)",
      "q": "Matérialité financière vs matérialité d'impact",
      "a": "Dans la double matérialité, deux perspectives se complètent :\n\n• Matérialité financière : raisonne en risques et opportunités, à court / moyen / long terme, réels ou potentiels. Elle évalue l'impact des sujets ESG sur la performance de l'entreprise.\n• Matérialité d'impact : raisonne en impacts négatifs et positifs, à court / moyen / long terme, réels ou potentiels. Elle évalue l'impact de l'entreprise sur l'environnement et les tiers."
    }

              "q": "1. Quelles sont les composantes de l'analyse de Double Matérialité au sens de la CSRD ?",
              "correction": "[Meilleure copie — note 17/20]\n\nLa CSRD (Corporate Sustainability Reporting Directive), en français directive de publication d'un rapport de durabilité pour les entreprises, découle du pacte vert européen (Green Deal) de 2019 et impose un cadre de reporting extra-financier standardisé avec les 12 normes ESRS (European Sustainability Reporting Standards), des standards à respecter sur les aspects environnementaux, sociaux et de gouvernance. Cela contribue à financer la transition écologique.\n\nCela permet aux entreprises de présenter une analyse de double matérialité, allant alors plus loin que la simple matérialité de la NFRD de 2014.\n\nLa simple matérialité était l'analyse de l'impact des enjeux RSE sur la performance financière de l'entreprise (analyse extra-financière).\n\nLa double matérialité va plus loin et impose 2 analyses :\n\n  • La matérialité d'impact = l'impact des enjeux de l'entreprise sur l'environnement et les tiers, les parties prenantes, qui découle de son activité. L'entreprise va alors identifier les impacts positifs et négatifs majeurs, déterminants, réels ou potentiels, à court, moyen et long terme.\n\n  • La matérialité financière = l'impact des enjeux RSE sur la performance de l'entreprise (correspond à la simple matérialité financière). Elle va analyser les risques et opportunités, réels ou potentiels, à CT, MT, LT, que les conséquences sociales, environnementales et économiques peuvent avoir sur sa capacité à mobiliser ses capitaux, sur sa création de valeur, les répercussions sur sa performance financière et globale."
            },
            {
              "q": "2. Quels sont les principaux enjeux qui devraient motiver un chef d'entreprise pour mettre en place une stratégie RSE ?",
              "correction": "[Meilleure copie — note 17/20]\n\nLes principaux enjeux RSE sont de diverses natures :\n\n  • Cela peut amener une entreprise à se questionner sur son modèle d'affaire pour le rendre plus durable, anticiper les perturbations futures et donc être plus performante\n\n  • Réduction des coûts en diminuant sa consommation d'énergie, par la réduction des déchets par exemple\n\n  • Cela peut lui permettre d'innover dans de nouvelles technologies et ainsi augmenter sa sphère de clientèle donc favoriser un meilleur chiffre d'affaires\n\n  • En étant plus durable, elle peut fidéliser les parties prenantes\n\n  • Elle devient attractive pour recruter des talents et fidéliser sa main-d'œuvre\n\n  • Elle améliore son image de marque, sa notoriété, sa réputation et renforce ainsi sa performance (fidélisation)"
            }

          "label": "Exercice 3 — Questions de cours, réponses développées (8 points, 4 pts/question)",

          "items": [
            {
              "q": "1. Quelles sont les grandes étapes de mise en œuvre d'une démarche RSE dans une organisation ? Présentez-les en expliquant les objectifs et les enjeux de chaque étape.",
              "correction": "[Meilleure copie — note 17/20]\n\nLes 6 grandes étapes dans la mise en œuvre d'une démarche RSE sont :\n\n─── 1ère étape : Déterminer les enjeux RSE ───\n\nCela a pour but de construire la démarche de manière complète, en répondant aux attentes CSRD.\n  → Faire une analyse contextuelle de l'entreprise et de son environnement :\n       • Faire un modèle d'affaire complet\n       • Faire une cartographie des parties prenantes\n       • Analyser la chaîne de valeur (amont et aval)\n  → Faire l'analyse de double matérialité pour déterminer les enjeux RSE les plus importants (impact et financière).\n\n─── 2e étape : Identifier la gouvernance RSE ───\n\nIl va falloir que la direction et le Conseil d'administration et les autres organes de direction s'impliquent dans la démarche ; c'est une condition obligatoire pour que la démarche ait du sens et elle doit engager toute l'entreprise dans sa globalité.\n\n─── 3e étape : Déterminer la politique et les objectifs RSE ───\n\nIl s'agit de réfléchir aux objectifs RSE et à la politique RSE que l'on souhaite appliquer, en lien avec la 1ère étape. Ils doivent être cohérents et SMART (spécifiques, mesurables, atteignables, réalistes, temporellement définis).\n\n─── 4e étape : Élaborer un plan d'action ───\n\nDéterminer une feuille de route avec le plan d'action des objectifs RSE et définir une temporalité associée aux actions.\n\n─── 5e étape : Mesurer la performance avec des indicateurs RSE ───\n\nIl s'agit de chiffrer la démarche pour mesurer les écarts entre le réalisé et le prévisionnel. Par exemple, pour un objectif de replanter 10 000 arbres : c'est un indicateur de performance qui permet de situer l'avancement et de savoir si on peut améliorer notre action. Cela permet d'être dans une démarche d'amélioration continue = de revoir les objectifs et d'améliorer les actions pour y parvenir.\n\n─── 6e étape : Communiquer et reporting ───\n\nIl faut alors communiquer sur la démarche, être transparent, réaliser le rapport de durabilité aux normes attendues, CSRD et celles-ci validées par un expert (CAC (H2A) ou organisme tiers indépendant).\n\nDe plus, l'entreprise peut étendre sa démarche par des certifications ou labels pour faire reconnaître son investissement RSE."
            },
            {
              "q": "2. Quels sont les objectifs d'un rapport de durabilité conforme à la CSRD ? Expliquez en quoi cette nouvelle obligation va au-delà des anciennes exigences de reporting.",
              "correction": "[Meilleure copie — note 17/20]\n\nLes objectifs d'un rapport de durabilité conforme à la CSRD sont :\n\n  • La standardisation des rapports pour faciliter les comparaisons\n  • La double matérialité (impact + financière)\n  • Le rapport de durabilité validé et certifié\n\nLe rapport de durabilité est certifié par le CAC (inscrit à la H2A) ou un organisme tiers indépendant qui atteste et certifie la solidité.\n\nIl doit respecter les 12 normes ESRS, standardisées, ce qui permet aux investisseurs de pouvoir comparer plus sereinement les rapports, qui peuvent influencer les choix d'investissements.\n\nLe vérificateur émet un rapport de certification avec une assurance limitée (formulée négativement), d'une durée de validité de 6 ans, qui atteste donc de la conformité de la démarche. Cela va donc plus loin puisque le fait que la démarche soit contrôlée, les entreprises sont contraintes à faire leur rapport de manière sérieuse et conforme.\n\nLe vérificateur garantit la conformité, la sincérité et la fiabilité du reporting après avoir vérifié qu'il n'y avait pas d'erreurs, d'omissions, d'incohérences (avec les bilans financiers par exemple) ou qu'il soit incomplet.\n\nIl vérifie aussi toutes les informations en lien avec la chaîne de valeur, le modèle d'affaire, les analyses d'impacts, les calculs effectués…\n\nAinsi, les investisseurs retrouvent confiance dans le processus et peuvent investir dans la transition écologique."
            }

          "label": "Exercice 4 — Question rédactionnelle de synthèse (3 points)",
          "context": "En une page maximum, exposez en quoi la RSE va avoir un impact sur votre futur métier. Vous pouvez vous positionner en tant que futur Responsable Financier d'une Entreprise, Expert-Comptable ou Commissaire aux Comptes… (précisez votre positionnement).",
          "items": [
            {
              "q": "Rédigez votre synthèse (1 page maximum).",
              "correction": "[Meilleure copie — note 17/20 — positionnement expert-comptable]\n\nEn tant qu'expert-comptable, la RSE aura un impact car de plus en plus d'entreprises seront concernées. En effet, les seuils des entreprises concernées seront amenés à diminuer (attente du positionnement européen sur ce sujet, Omnibus 2) et surtout, les entreprises peuvent accéder à une démarche volontaire et peuvent donc prendre part à la transition écologique dès à présent.\n\nEn effet, le VSME (Voluntary Small and Medium Enterprise) est une démarche volontaire pour les PME qui souhaitent être dans la RSE, avec des objectifs simplifiés des ESRS. Cela concerne les micro-entreprises et les PME jusqu'à 250 salariés, ce qui constitue la majorité de la clientèle d'un cabinet d'expertise-comptable.\n\nNous pourrons alors accompagner et aider les entrepreneurs dans leur démarche, en apportant nos conseils puisque nous sommes formés à la RSE. De plus, étant en collaboration avec les CAC déjà formés à la vérification, nous pourrons mieux guider nos clients.\n\nCela consistera à les accompagner dans leurs choix de niveau :\n  • 1er niveau : objectifs classiques des RSE avec les enjeux traditionnels de GES\n  • 2e niveau plus poussé : comme le CRD classique mais avec des objectifs allégés\n\nLe rôle de soutien, appui et conseil sera donc important et constitue un rôle essentiel pour accompagner les clients.\n\nDe plus, en tant qu'expert-comptable, on peut également mettre en place une VSME au sein de son propre cabinet pour être soi-même acteur de la démarche, ce qui peut attirer les talents, les nouvelles générations, favoriser l'attractivité du cabinet et le pouvoir à innover, renforcer la fidélisation des collaborateurs et la performance globale (motivation)."

let DATA = null;

function getAnnalesHTML() {
  const list = (DATA.annales || []);
  if (!list.length) return `<div class="annales-empty"><p>Aucune annale disponible pour ce cours.</p></div>`;
  const renderOne = (a, aIdx) => {
    const meta = [a.duration ? `⏱ ${a.duration}` : '', a.format || '', a.professor ? `👤 ${a.professor}` : '']
      .filter(Boolean).join(' · ');
    const head = `
      <div class="annale-head">
        <div class="annale-head-row">
          <div class="annale-year">${escAnnale(a.year || '')}</div>
          <div class="annale-title">${escAnnale(a.name || 'Annale')}</div>
        </div>
        ${meta ? `<div class="annale-meta">${escAnnale(meta)}</div>` : ''}
      </div>`;
    const tipsHTML = (a.tips||[]).length ? `
      <div class="annale-tips">
        <div class="annale-block-title">💡 Conseils méthodologiques</div>
        <ul>${a.tips.map(t => `<li>${escAnnale(t)}</li>`).join('')}</ul>
      </div>` : '';

    // ── NOUVEAU SCHÉMA : dossiers[].items[{q,correction}] avec bouton par sous-question ──
    if (Array.isArray(a.dossiers) && a.dossiers.length) {
      const cardId = `annale-card-${aIdx}`;
      const dossiersHTML = a.dossiers.map((ds, dIdx) => {
        const itemsHTML = (ds.items || []).map((it, iIdx) => {
          const corrId = `corr-${aIdx}-${dIdx}-${iIdx}`;
          return `
          <div class="annale-question">
            <div class="annale-q-text">${escAnnale(it.q || '')}</div>
            ${it.correction ? `
              <button class="annale-show-corr" type="button" onclick="toggleAnnaleCorrection('${corrId}', this)">▸ Afficher la correction</button>
              <div class="annale-correction" id="${corrId}" style="display:none">${escAnnale(it.correction)}</div>
            ` : ''}
          </div>`;
        }).join('');
        return `
        <div class="annale-dossier">
          <div class="annale-dossier-label">${escAnnale(ds.label || '')}</div>
          ${ds.context ? `<div class="annale-dossier-context">${escAnnale(ds.context)}</div>` : ''}
          <div class="annale-dossier-items">${itemsHTML}</div>
        </div>`;
      }).join('');
      const subjectHTML = a.subject ? `
        <div class="annale-subject">
          <div class="annale-block-title">📋 Énoncé général</div>
          <div class="annale-subject-content">${escAnnale(a.subject)}</div>
        </div>` : '';
      return `
      <div class="annale-card" id="${cardId}">
        ${head}
        <div class="annale-toolbar">
          <button class="annale-toolbar-btn" type="button" onclick="expandAllAnnales('#${cardId}')">▾ Tout afficher</button>
          <button class="annale-toolbar-btn" type="button" onclick="collapseAllAnnales('#${cardId}')">▸ Tout masquer</button>
        </div>
        ${subjectHTML}
        <div class="annale-dossiers">${dossiersHTML}</div>
        ${tipsHTML}
      </div>`;
    }

    // ── ANCIEN SCHÉMA (fallback pour annales non encore migrées) ──
    const exHTML = (a.exercises || []).map(e => `
      <div class="annale-exercise">
        <div class="annale-exercise-label">${escAnnale(e.label)}</div>
        <div class="annale-exercise-content">${escAnnale(e.content||'').replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
    const bc = a.bestCopy;
    let bestCopyHTML = '';
    if (bc) {
      const planHTML = (bc.plan||[]).map(line => {
        const t = (line||'').trim();
        if (!t) return '<div class="annale-plan-spacer"></div>';
        if (/^(I+\.|[0-9]+\.|Introduction|Conclusion|Exercice|Q[0-9]+|•)/.test(t)) {
          return `<div class="annale-plan-line annale-plan-main">${escAnnale(t)}</div>`;
        }
        return `<div class="annale-plan-line">${escAnnale(t)}</div>`;
      }).join('');
      const conceptsHTML = (bc.keyConcepts||[]).map(c => `<span class="annale-concept">${escAnnale(c)}</span>`).join('');
      const qcmHTML = (bc.qcmAnswers||[]).length
        ? `<div class="annale-block annale-qcm"><div class="annale-block-title">QCM — réponses correctes</div>${bc.qcmAnswers.map(q=>`<div class="annale-qcm-line">${escAnnale(q)}</div>`).join('')}</div>`
        : '';
      bestCopyHTML = `
      <div class="annale-bestcopy">
        <div class="annale-bestcopy-head">
          <span class="annale-grade">📝 Note : ${escAnnale(bc.grade)}</span>
          ${bc.subjectChosen ? `<span class="annale-chosen">Sujet traité : ${escAnnale(bc.subjectChosen)}</span>` : ''}
        </div>
        ${qcmHTML}
        <div class="annale-block">
          <div class="annale-block-title">Plan-type / structure de la copie</div>
          <div class="annale-plan">${planHTML}</div>
        </div>
        ${(bc.keyConcepts||[]).length ? `
        <div class="annale-block">
          <div class="annale-block-title">Mots-clés &amp; concepts mobilisés</div>
          <div class="annale-concepts">${conceptsHTML}</div>
        </div>` : ''}
        ${bc.correctorNotes ? `<div class="annale-corrector"><strong>Annotations du correcteur :</strong> ${escAnnale(bc.correctorNotes)}</div>` : ''}
      </div>`;
    }
    let corrigeHTML = '';
    if (a.corrige && a.corrige.available) {
      const hl = (a.corrige.highlights||[]).map(h => `<li>${escAnnale(h)}</li>`).join('');
      corrigeHTML = `
      <div class="annale-corrige">
        <div class="annale-block-title">Corrigé officiel — points clés</div>
        ${a.corrige.summary ? `<p class="annale-corrige-summary">${escAnnale(a.corrige.summary)}</p>` : ''}
        <ul>${hl}</ul>
      </div>`;
    }
    return `
    <div class="annale-card">
      ${head}
      <div class="annale-subject">
        <div class="annale-block-title">📋 Sujet</div>
        <div class="annale-subject-content">${escAnnale(a.subject||'').replace(/\n/g,'<br>')}</div>
      </div>
      ${exHTML ? `<div class="annale-exercises">${exHTML}</div>` : ''}
      ${bestCopyHTML}
      ${corrigeHTML}
      ${tipsHTML}
    </div>`;
  };
  if (list.length === 1) return renderOne(list[0], 0);
  // Multi-annales : onglets en haut + un seul corps visible à la fois
  const tabsHTML = list.map((a, i) => `
    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}

    <!-- ══ CH 5 : Enjeux et opportunités ══ -->
    <div class="course-chapter" data-theme="opportunites" data-chap-idx="5" id="chap-5">
      <h2 class="chapter-title">5 · La RSE : enjeux et opportunités pour l'entreprise</h2>

      <h3>Les 6 opportunités d'une démarche RSE</h3>
      <ol>
        <li><strong>Évolution du business model</strong> : anticipation des risques sociaux et environnementaux, meilleure préparation aux changements réglementaires et aux risques de réputation.</li>
        <li><strong>Image de marque positive</strong> : les pratiques durables renforcent l'image et distinguent l'entreprise de ses concurrents.</li>
        <li><strong>Accès à de nouveaux marchés et innovation</strong> : certains marchés exigent des normes élevées de durabilité.</li>
        <li><strong>Renforcement des relations avec les parties prenantes</strong> : relations plus solides avec employés, clients, fournisseurs, communautés.</li>
        <li><strong>Attractivité pour les talents</strong> : les entreprises engagées attirent des talents dont les valeurs sont alignées.</li>
        <li><strong>Réduction des coûts</strong> : pratiques éco-efficaces, efficacité énergétique, réduction des déchets.</li>
      </ol>

      <h3>Les opportunités métiers</h3>
      <p>Pour les futurs collaborateurs (Responsable Financier, Expert-Comptable, Commissaire aux comptes...), la RSE offre :</p>
      <ul>
        <li>Une attractivité accrue sur le marché de l'emploi ;</li>
        <li>Le développement de compétences transférables (pensée critique, résolution de problèmes, collaboration) utiles à l'audit et à la comptabilité ;</li>
        <li>Un impact sociétal positif ;</li>
        <li>L'anticipation des contraintes futures.</li>
      </ul>
    </div>

    <!-- ══ CH 6 : Démarche RSE - enjeux et matérialité ══ -->
    <div class="course-chapter" data-theme="demarche" data-chap-idx="6" id="chap-6">
      <h2 class="chapter-title">6 · Démarche RSE : déterminer ses enjeux et la matérialité</h2>

      <div class="key-box">
        <strong>La démarche RSE en 6 étapes.</strong> 1. Déterminer ses enjeux RSE · 2. Identifier sa gouvernance RSE · 3. Constituer sa politique et ses objectifs · 4. Déterminer ses actions RSE · 5. Mesurer sa performance · 6. Communiquer sur sa démarche.
      </div>

      <h3>Étape 1 : déterminer ses enjeux RSE</h3>
      <p>Un <strong>enjeu RSE</strong> est une thématique de durabilité identifiée par l'entreprise (environnementale, sociale, de gouvernance, économique ou sociétale). Les identifier permet l'orientation stratégique (concentrer les efforts sur les enjeux critiques) et la gestion des risques extra-financiers.</p>

      <h3>L'analyse de matérialité</h3>
      <table class="comp-table">
        <thead><tr><th>Type</th><th>Principe</th></tr></thead>
        <tbody>
          <tr><td>Matérialité simple</td><td>Identifie les impacts potentiels des enjeux RSE sur la performance financière de l'entreprise (analyse des risques extra-financiers).</td></tr>
          <tr><td>Double matérialité</td><td>Complète la matérialité simple : on prend aussi en compte les effets de l'activité de l'entreprise sur son environnement et les tiers. Associée à la CSRD (2022).</td></tr>
        </tbody>
      </table>
      <p>La double matérialité combine donc :</p>
      <ul>
        <li><strong>Matérialité financière</strong> : risques et opportunités que l'enjeu fait peser sur la performance de l'entreprise.</li>
        <li><strong>Matérialité d'impact</strong> : impacts positifs et négatifs de l'entreprise sur l'environnement et les tiers.</li>
      </ul>

      <h3>La démarche de double matérialité et les IRO</h3>
      <p>Le concept d'<strong>IRO</strong> (Impacts, Risques et Opportunités) structure la démarche, en 3 étapes :</p>
      <ol>
        <li>Analyse contextuelle et identification des IRO, sur l'ensemble de la chaîne de valeur.</li>
        <li>Évaluation de la matérialité d'impact et de la matérialité financière, selon une échelle de cotation (critères quantitatifs ou qualitatifs).</li>
        <li>Identification de l'information à publier : un IRO est matériel dès lors qu'il est significatif du point de vue de l'impact ou du point de vue financier.</li>
      </ol>

      <h3>Le rôle des parties prenantes</h3>
      <p>Pour déterminer ses enjeux, l'entreprise doit réaliser son analyse de matérialité, consulter ses parties prenantes clés et impliquer ses différentes fonctions. Toutes les parties prenantes n'ont pas le même poids : un barème peut leur être attribué dans l'analyse.</p>
    </div>

    <!-- ══ CH 7 : Démarche RSE - gouvernance, politique, objectifs ══ -->
    <div class="course-chapter" data-theme="demarche" data-chap-idx="7" id="chap-7">
      <h2 class="chapter-title">7 · Démarche RSE : gouvernance, politique et objectifs</h2>

      <h3>Étape 2 : identifier sa gouvernance RSE</h3>
      <p>L'implication de la gouvernance est indispensable. Elle se décline en deux volets :</p>
      <ul>
        <li><strong>La Direction</strong> : impulse la stratégie et porte les engagements, diffuse les valeurs et la culture, veille à l'intégration de la RSE dans les process, apporte crédibilité et légitimité.</li>
        <li><strong>L'Organisation</strong> : définit les porteurs du projet RSE (responsable, comité...), assure le suivi et l'amélioration continue de la démarche.</li>
      </ul>

      <h3>Étape 3 : constituer sa politique et ses objectifs</h3>
      <div class="def-box">
        <strong>Politique RSE.</strong> Elle met en œuvre la stratégie de l'entreprise sur un enjeu de durabilité. Elle est sous la responsabilité de personnes définies, sur un périmètre d'application précis, avec des objectifs identifiés. Elle permet de répondre aux enjeux matériels, de formaliser la vision et l'engagement de l'entreprise, et de fixer ses objectifs.
      </div>
      <div class="def-box">
        <strong>Objectif RSE.</strong> C'est la trajectoire cible, le but visé par la stratégie et les politiques. L'entreprise met en place son plan d'actions pour l'atteindre. Un objectif permet de suivre l'efficacité de la stratégie.
      </div>
      <div class="key-box">
        <strong>Un objectif est nécessairement SMART :</strong> Spécifique · Mesurable · Atteignable · Réalisable · Temporellement défini.
      </div>
    </div>

    <!-- ══ CH 8 : Démarche RSE - actions, performance, communication ══ -->
    <div class="course-chapter" data-theme="demarche" data-chap-idx="8" id="chap-8">
      <h2 class="chapter-title">8 · Démarche RSE : actions, performance et communication</h2>

      <h3>Étape 4 : déterminer ses actions RSE</h3>
      <div class="def-box">
        <strong>Plan d'actions RSE.</strong> Ensemble de mesures, tâches ou activités visant à atteindre des objectifs prédéfinis. Il est consigné dans un document décrivant les étapes nécessaires (date d'échéance, pilote de l'action, tâches à réaliser). Il permet d'atteindre les objectifs en les jalonnant et de piloter le projet en optimisant les moyens.
      </div>

      <h3>Étape 5 : mesurer sa performance RSE</h3>
      <p>Un <strong>indicateur de performance RSE</strong> mesure le degré d'accomplissement des objectifs. Mesurer sa performance permet de suivre l'évolution de sa stratégie et d'ajuster son plan d'action. Trois types d'indicateurs :</p>
      <table class="comp-table">
        <thead><tr><th>Indicateur</th><th>Rôle</th></tr></thead>
        <tbody>
          <tr><td>Indicateur de performance</td><td>Information quantifiée mesurant les résultats d'une ou plusieurs actions (souvent un ratio).</td></tr>
          <tr><td>Indicateur de moyen (de pilotage)</td><td>Permet d'anticiper et de réajuster ; c'est un levier au service de l'objectif.</td></tr>
          <tr><td>Indicateur d'impact</td><td>Démontre la contribution de l'entreprise à l'amélioration d'un problème sociétal.</td></tr>
        </tbody>
      </table>
      <p>Un indicateur de performance répond toujours à un objectif.</p>

      <h3>Étape 6 : communiquer sur sa démarche</h3>
      <div class="def-box">
        <strong>Rapport de durabilité.</strong> Le rapport RSE est aujourd'hui officiellement nommé rapport de durabilité. C'est un document périodique (généralement annuel) par lequel l'entreprise rend compte de ses actions et résultats en matière de RSE.
      </div>
      <ul>
        <li><strong>En interne</strong> : mesurer les conséquences des activités sur l'environnement, la société et l'écosystème économique, et améliorer les processus.</li>
        <li><strong>En externe</strong> : permettre aux parties prenantes de comprendre l'implication de l'entreprise et d'évaluer les conséquences à moyen et long terme de ses activités.</li>
      </ul>
      <p><strong>EcoVadis</strong> est une plateforme de notation utilisée par les partenaires commerciaux pour partager les performances RSE. Sa méthodologie repose sur 7 indicateurs de management répartis en 21 critères (environnement, social, droits humains, achats responsables).</p>
    </div>

    <!-- ══ CH 9 : Certifications et labels ══ -->
    <div class="course-chapter" data-theme="opportunites" data-chap-idx="9" id="chap-9">
      <h2 class="chapter-title">9 · Certifications, labels et impact sur le métier</h2>

      <div class="def-box">
        <strong>Label / certification RSE.</strong> Reconnaissance attribuée à une entreprise qui atteste de sa démarche et de ses actions en matière de responsabilité sociétale. Délivrés par des organismes indépendants après évaluation, les labels permettent de démontrer l'engagement de l'entreprise, de renforcer sa crédibilité et son image, et d'encourager des pratiques durables et transparentes.
      </div>

      <h3>Trois exemples de labels</h3>
      <table class="comp-table">
        <thead><tr><th>Label</th><th>Caractéristiques</th></tr></thead>
        <tbody>
          <tr><td>B Corp</td><td>Label international évaluant les entreprises sur 5 catégories : Collaborateurs, Environnement, Gouvernance, Clients, Collectivité. Les entreprises labellisées équilibrent objectifs financiers et impacts positifs.</td></tr>
          <tr><td>LUCIE</td><td>Développé par l'association LUCIE ; certification attribuée aux entreprises engagées dans une démarche RSE, s'appuyant sur la norme ISO 26000.</td></tr>
          <tr><td>Engagé RSE (AFNOR)</td><td>Évalue la maturité des démarches RSE des organisations (entreprises, associations, territoires), sur le modèle AFAQ 26000.</td></tr>
        </tbody>
      </table>

      <h3>L'impact de la RSE sur le futur métier</h3>
      <p>La RSE transforme les métiers de la finance, de la comptabilité et de l'audit. Le futur Responsable Financier, Expert-Comptable ou Commissaire aux comptes est concerné par le reporting de durabilité, la fiabilisation des données extra-financières et l'accompagnement des entreprises dans leur démarche RSE. Se former à la RSE, c'est anticiper les contraintes à venir et prévenir les risques.</p>
    </div>
`;

/* ───── Ex1 — QCM (5 pts) ───── */
function rseEx1Generate() { return { qcms: eShuffle(RSE_QCM_POOL).slice(0, 5) }; }

function rseEx1Render(p, ans) {
  ans = ans || {};
  const blocks = p.qcms.map((q, qi) => {
    const qid = 'ex1_q' + qi;
    const userAns = ans[qid];
    const isMulti = !!q.multi;
    const opts = q.o.map((opt, i) => {
      let sel = false;
      if (isMulti) sel = Array.isArray(userAns) && userAns.indexOf(i) >= 0;
      else sel = userAns === i;
      const onClick = isMulti ? `rseEx1ToggleMulti('${qid}', ${i})` : `examPick('${qid}', ${i})`;
      const icon = isMulti ? (sel ? '☑' : '☐') : (String.fromCharCode(65 + i) + '.');
      return `<button type="button" class="exam-opt exam-opt-wide${sel ? ' selected' : ''}" onclick="${onClick}"><span class="exam-opt-bullet">${icon}</span> ${eEscape(opt)}</button>`;
    }).join('');
    return `
      <div class="exam-q">
        <div class="exam-q-prompt"><strong>Q${qi + 1}.</strong> ${eEscape(q.q)} ${isMulti ? '<span class="exam-q-multi">(plusieurs réponses possibles)</span>' : ''} <span class="exam-q-pts">1 pt</span></div>
        <div class="exam-opts">${opts}</div>
      </div>`;
  }).join('');
  return `
    <div class="exam-dossier" id="exam-ex1">
      <div class="exam-dossier-head">
        <div class="exam-dossier-num">Exercice 1</div>
        <div class="exam-dossier-title">QCM</div>
        <div class="exam-dossier-pts">5 points</div>
      </div>
      <div class="exam-context"><p>QCM — 1 point par question. <em>Une seule bonne réponse</em> sauf mention contraire (« plusieurs réponses possibles »).</p></div>
      ${blocks}
    </div>`;
}

function rseEx1ToggleMulti(qid, i) {
  if (!examState || examState.submitted) return;
  examState.answers[qid] = examState.answers[qid] || [];
  const cur = examState.answers[qid];
  const idx = cur.indexOf(i);
  if (idx >= 0) cur.splice(idx, 1); else cur.push(i);
  // re-render visual
  const root = document.getElementById('exam-ex1');
  if (root) {
    const btns = root.querySelectorAll(`[onclick*="'${qid}'"]`);
    btns.forEach(btn => {
      const m = btn.getAttribute('onclick').match(/,\s*(\d+)\)/);
      if (!m) return;
      const optIdx = parseInt(m[1], 10);
      const sel = cur.indexOf(optIdx) >= 0;
      btn.classList.toggle('selected', sel);
      const bullet = btn.querySelector('.exam-opt-bullet');
      if (bullet) bullet.textContent = sel ? '☑' : '☐';
    });
  }
}

function rseEx1Correct(p, ans) {
  ans = ans || {};
  let pts = 0;
  const details = p.qcms.map((q, qi) => {
    const qid = 'ex1_q' + qi;
    const u = ans[qid];
    let ok = false;
    if (q.multi) {
      ok = Array.isArray(u) && eArrEq(u, q.c);
    } else {
      ok = u === q.c[0];
    }
    if (ok) pts += 1;
    const userLabel = u == null ? '—' : (q.multi
      ? (Array.isArray(u) && u.length ? u.map(i => String.fromCharCode(65 + i)).join(', ') : '—')
      : String.fromCharCode(65 + u));
    const correctLabel = q.c.map(i => String.fromCharCode(65 + i)).join(', ') + ' — ' + q.c.map(i => eEscape(q.o[i])).join(' / ');
    return { q: `Q${qi + 1}. ${q.q}${q.multi ? ' (multi)' : ''}`, userOk: ok, points: ok ? 1 : 0, max: 1, userAnswer: userLabel, correctAnswer: correctLabel, explain: q.e };
  });
  return { pts, total: 5, details };
}

function rseEx2RenderEval(p, ans) {
  ans = ans || {};
  return p.questions.map((q, qi) => {
    const qid = 'ex2_q' + qi;
    const checks = ans[qid + '_checks'] || {};
    return `
      <div class="exam-eval-sub">
        <div class="exam-eval-section"><strong>Q${qi + 1}.</strong> ${eEscape(q.q)}</div>
        ${q.points.map((pt, i) => `
          <label class="exam-eval-item">
            <input type="checkbox" ${checks['p' + i] ? 'checked' : ''} onchange="examEvalCheck('${qid}_checks', 'p${i}', this.checked)">
            <span>${eEscape(pt)}</span>
            <span class="exam-eval-pts">+${(2 / q.points.length).toFixed(2)} pt</span>
          </label>`).join('')}
      </div>`;
  }).join('');
}

function rseEx2Correct(p, ans) {
  ans = ans || {};
  let total = 0;
  const details = p.questions.map((q, qi) => {
    const qid = 'ex2_q' + qi;
    const checks = ans[qid + '_checks'] || {};
    const nChecked = q.points.filter((_, i) => checks['p' + i]).length;
    const pts = Math.min(2, nChecked * (2 / q.points.length));
    total += pts;
    return { q: `Q${qi + 1}. ${q.q}`, userOk: pts >= 1.5, points: Math.round(pts * 100) / 100, max: 2, userAnswer: `${nChecked}/${q.points.length} points-clés cochés`, correctAnswer: '', explain: '<ul>' + q.points.map(pt => `<li>${eEscape(pt)}</li>`).join('') + '</ul>' };
  });
  return { pts: Math.round(total * 100) / 100, total: 4, details };
}

    <div class="exam-dossier" id="exam-ex4">
      <div class="exam-dossier-head">
        <div class="exam-dossier-num">Exercice 4</div>
        <div class="exam-dossier-title">Question rédactionnelle de synthèse</div>
        <div class="exam-dossier-pts">3 points</div>
      </div>
      <div class="exam-context">
        <p>${eEscape(p.sujet.q)}</p>
        <p class="exam-rappel">📐 Une page maximum. Positionnement attendu : <strong>${eEscape(p.sujet.role)}</strong>. À la soumission, tu coches les points-clés réellement traités.</p>
      </div>
      <div class="exam-q">
        <textarea class="exam-textarea" style="min-height:240px" placeholder="Rédigez votre synthèse (1 page max)..." oninput="examPick('ex4_text', this.value)">${eEscape(text)}</textarea>
        <div class="exam-wc">${text.trim() ? text.trim().split(/\s+/).length : 0} mots</div>
      </div>
    </div>`;
}

function rseEx4RenderEval(p, ans) {
  ans = ans || {};
  const checks = ans['ex4_checks'] || {};
  const ptPerPoint = 3 / p.sujet.points.length;
  return `
    <div class="exam-eval-sub">
      <div class="exam-eval-section">${eEscape(p.sujet.q)}</div>
      ${p.sujet.points.map((pt, i) => `
        <label class="exam-eval-item">
          <input type="checkbox" ${checks['p' + i] ? 'checked' : ''} onchange="examEvalCheck('ex4_checks', 'p${i}', this.checked)">
          <span>${eEscape(pt)}</span>
          <span class="exam-eval-pts">+${ptPerPoint.toFixed(2)} pt</span>
        </label>`).join('')}
    </div>`;
}

function rseEx4Correct(p, ans) {
  ans = ans || {};
  const checks = ans['ex4_checks'] || {};
  const nChecked = p.sujet.points.filter((_, i) => checks['p' + i]).length;
  const pts = Math.min(3, nChecked * (3 / p.sujet.points.length));
  return {
    pts: Math.round(pts * 100) / 100, total: 3,
    details: [{ q: p.sujet.q, userOk: pts >= 2, points: Math.round(pts * 100) / 100, max: 3, userAnswer: `${nChecked}/${p.sujet.points.length} points-clés cochés`, correctAnswer: '', explain: '<ul>' + p.sujet.points.map(pt => `<li>${eEscape(pt)}</li>`).join('') + '</ul>' }]
  };
}

/* ═══════════════════════════════════════════════════════════
   ORCHESTRATION
   ═══════════════════════════════════════════════════════════ */
function examGenerate(includeMask) {
  return {
    ex1: includeMask.ex1 ? rseEx1Generate() : null,
    ex2: includeMask.ex2 ? rseEx2Generate() : null,
    ex3: includeMask.ex3 ? rseEx3Generate() : null,
    ex4: includeMask.ex4 ? rseEx4Generate() : null
  };
}

function examDossiersFromDuration(durMin) {
  if (durMin <= 15) return 1;
  if (durMin <= 30) return 2;
  if (durMin <= 45) return 3;
  return 4;
}

function examPick(qid, value) {
  if (!examState || examState.submitted) return;
  examState.answers[qid] = value;
  if (qid.indexOf('_text') >= 0) return;
  // refresh selected class on QCM single
  document.querySelectorAll(`[onclick*="examPick('${qid}'"]`).forEach(el => {
    const m = el.getAttribute('onclick').match(/,\s*(\d+)\)/);
    if (!m) return;
    const i = parseInt(m[1], 10);
    el.classList.toggle('selected', i === value);
  });
}

function examEvalCheck(group, key, checked) {
  if (!examState) return;
  examState.answers[group] = examState.answers[group] || {};
  examState.answers[group][key] = checked;
  if (examState.submitted) examRecomputeScore();
}

function examRecomputeScore() {
  const ds = examState.dossiers;
  const a = examState.answers;
  let total = 0, max = 0;
  if (ds.ex1) { const r = rseEx1Correct(ds.ex1, a); total += r.pts; max += r.total; }
  if (ds.ex2) { const r = rseEx2Correct(ds.ex2, a); total += r.pts; max += r.total; }
  if (ds.ex3) { const r = rseEx3Correct(ds.ex3, a); total += r.pts; max += r.total; }
  if (ds.ex4) { const r = rseEx4Correct(ds.ex4, a); total += r.pts; max += r.total; }
  const rounded = Math.round(total * 100) / 100;
  const el = document.getElementById('exam-score-live');
  if (el) el.textContent = rounded.toFixed(2).replace('.', ',');
  if (examState && examState.submitted) {
    const arr = loadExamScores();
    if (arr.length > 0) {
      arr[0].score = rounded;
      arr[0].total = max;
      localStorage.setItem(EXAM_KEY, JSON.stringify(arr));
      flashSaveIndicator();
    }
  }
}

function flashSaveIndicator() {
  const el = document.getElementById('exam-save-flash');
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function renderExamen() {
  const root = document.getElementById('appRoot');
  const header = `
    <div class="page-header">
      <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
      <div class="page-title">${DATA.title}</div>
      <div class="page-subtitle">${DATA.subtitle}</div>
    </div>`;
  if (!examState) { root.innerHTML = header + renderExamenConfig(); return; }
  if (examState.submitted) { root.innerHTML = header + renderExamenResult(); return; }
  root.innerHTML = header + renderExamenRunning();
  examStartTimer();
}

function loadExamScores() {
  try { return JSON.parse(localStorage.getItem(EXAM_KEY)) || []; } catch (e) { return []; }
}
function saveExamScore(score, total, durationSec, elapsedSec) {
  const arr = loadExamScores();
  arr.unshift({ score, total, date: Date.now(), duration: durationSec, elapsed: elapsedSec });
  localStorage.setItem(EXAM_KEY, JSON.stringify(arr.slice(0, 5)));
}

function renderExamenConfig() {
  const scores = loadExamScores().slice(0, 3);
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const histHTML = scores.length === 0
    ? '<p style="color:var(--text3);font-size:0.82rem;text-align:center">Aucune tentative précédente</p>'
    : scores.map(s => {
        const pct = Math.round(s.score / s.total * 100);
        const d = new Date(s.date);
        const ds = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
        const mm = Math.floor((s.elapsed || 0) / 60);
        return `<span class="quiz-score-pill"><span style="color:${col};font-weight:700">${fmtNum(s.score)}/${s.total}</span><span style="color:var(--text3)">${ds} · ${mm} min</span></span>`;
      }).join('');
  return `
    <div class="fade-up">
      <div class="exam-setup">
        <div style="font-size:2.4rem">📝</div>
        <h3 style="font-family:'Playfair Display',serif;margin:0.4rem 0">Examen blanc — RSE / CSRD</h3>
        <p style="color:var(--text2);max-width:560px;margin:0 auto 1.4rem;font-size:0.92rem">Format épreuve écrite (D. Duheron) — 1h, 20 pts : QCM (5) + courtes (4) + dev (8) + synthèse (3). Aucun document autorisé.</p>
        <div class="quiz-history" style="max-width:560px;margin:0 auto 1.4rem">
          <div class="quiz-history-title">Tentatives récentes</div>
          ${histHTML}
        </div>
        <div class="exam-setup-grid">
          <div class="exam-setup-card">
            <div class="exam-setup-label">⏱ Durée</div>
            <input id="exam-duration" type="range" min="15" max="60" step="15" value="60" class="exam-slider" oninput="examUpdateDurationLabel(this.value)">
            <div class="exam-setup-value"><span id="exam-duration-label">60 min</span></div>
            <div class="exam-setup-hint" id="exam-duration-hint">→ <strong>4 exercices</strong> · note sur <strong>20 pts</strong> (épreuve complète)</div>
          </div>
          <div class="exam-setup-card">
            <div class="exam-setup-label">📚 Pool d'exercices</div>
            <div class="exam-setup-checks">
              <label><input type="checkbox" id="ck-ex1" checked onchange="examUpdateDurationLabel()"> Exercice 1 — QCM (5 pts)</label>
              <label><input type="checkbox" id="ck-ex2" checked onchange="examUpdateDurationLabel()"> Exercice 2 — Courtes (4 pts)</label>
              <label><input type="checkbox" id="ck-ex3" checked onchange="examUpdateDurationLabel()"> Exercice 3 — Développées (8 pts)</label>
              <label><input type="checkbox" id="ck-ex4" checked onchange="examUpdateDurationLabel()"> Exercice 4 — Synthèse (3 pts)</label>
            </div>
            <div class="exam-setup-hint" style="margin-top:0.5rem">Tirage <strong>au hasard</strong> parmi les exercices cochés.</div>
          </div>
        </div>
        <button class="start-btn" style="margin-top:1.5rem" onclick="examStart()">🚀 Lancer l'examen blanc</button>
      </div>
    </div>
  `;
}

function examUpdateDurationLabel(val) {
  const sliderEl = document.getElementById('exam-duration');
  if (val == null) val = sliderEl ? sliderEl.value : 60;
  const dur = parseInt(val, 10);
  const lbl = document.getElementById('exam-duration-label');
  if (lbl) lbl.textContent = dur + ' min';
  const targetN = examDossiersFromDuration(dur);
  const keys = ['ex1','ex2','ex3','ex4'];
  const ptsMap = { ex1: 5, ex2: 4, ex3: 8, ex4: 3 };
  const checked = keys.filter(k => {
    const el = document.getElementById('ck-' + k);
    return el && el.checked;
  });
  const n = Math.min(targetN, checked.length);
  // Note approximative = somme des points des n premiers (on tire au sort, donc on indique la moyenne)
  const avgPts = checked.length ? Math.round((n / checked.length) * checked.reduce((s, k) => s + ptsMap[k], 0)) : 0;
  const hint = document.getElementById('exam-duration-hint');
  if (hint) {
    const isFull = n === 4 && checked.length === 4;
    hint.innerHTML = checked.length === 0
      ? '<span style="color:var(--red)">Coche au moins un exercice.</span>'
      : (targetN > checked.length
          ? `→ <strong>${n} exercice${n>1?'s':''}</strong> (pool limité) · note variable selon tirage`
          : `→ <strong>${n} exercice${n>1?'s':''}</strong> tiré${n>1?'s':''} au sort${isFull ? ' · note sur <strong>20 pts</strong> (épreuve complète)' : ' · note variable selon tirage'}`);
  }
}

function examStart() {
  const dur = parseInt(document.getElementById('exam-duration').value, 10) * 60;
  const pool = ['ex1','ex2','ex3','ex4'].filter(k => {
    const el = document.getElementById('ck-' + k);
    return el && el.checked;
  });
  if (pool.length === 0) { alert('Sélectionne au moins un exercice.'); return; }
  const targetN = examDossiersFromDuration(Math.floor(dur / 60));
  const n = Math.min(targetN, pool.length);
  const shuffled = eShuffle(pool);
  const picked = shuffled.slice(0, n).sort();
  const mask = { ex1: false, ex2: false, ex3: false, ex4: false };
  picked.forEach(k => { mask[k] = true; });
  examState = {
    startedAt: Date.now(),
    durationSec: dur,
    submitted: false,
    dossiers: examGenerate(mask),
    answers: {},
    mask, pickedCount: n
  };
  renderExamen();
}

function renderExamenRunning() {
  const ds = examState.dossiers;
  const a = examState.answers;
  let body = '';
  if (ds.ex1) body += rseEx1Render(ds.ex1, a);
  if (ds.ex2) body += rseEx2Render(ds.ex2, a);
  if (ds.ex3) body += rseEx3Render(ds.ex3, a);
  if (ds.ex4) body += rseEx4Render(ds.ex4, a);
  return `
    <div class="exam-timer-bar" id="exam-timer-bar">
      <span class="exam-timer-icon">⏱</span>
      <span class="exam-timer-time" id="exam-timer-time">--:--</span>
      <div class="exam-timer-progress"><div class="exam-timer-progress-fill" id="exam-timer-fill"></div></div>
      <button class="exam-timer-submit" onclick="examSubmit(false)">Terminer l'examen →</button>
    </div>
    <div class="fade-up exam-running">
      ${body}
      <div style="text-align:center;margin:2rem 0">
        <button class="start-btn" onclick="examSubmit(false)">Terminer l'examen et voir le corrigé →</button>
      </div>
    </div>`;
}

function examStartTimer() {
  clearInterval(examTimerInterval);
  const update = () => {
    if (!examState || examState.submitted) { clearInterval(examTimerInterval); return; }
    const elapsed = Math.floor((Date.now() - examState.startedAt) / 1000);
    const remaining = Math.max(0, examState.durationSec - elapsed);
    const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
    const ss = String(remaining % 60).padStart(2, '0');
    const el = document.getElementById('exam-timer-time');
    if (el) el.textContent = mm + ':' + ss;
    const fill = document.getElementById('exam-timer-fill');
    if (fill) fill.style.width = (remaining / examState.durationSec * 100) + '%';
    const bar = document.getElementById('exam-timer-bar');
    if (bar) {
      bar.classList.toggle('warn', remaining < 300 && remaining > 60);
      bar.classList.toggle('danger', remaining <= 60);
    }
    if (remaining <= 0) { clearInterval(examTimerInterval); examSubmit(true); }
  };
  update();
  examTimerInterval = setInterval(update, 1000);
}

function examSubmit(timeout) {
  if (!examState || examState.submitted) return;
  if (!timeout && !confirm('Terminer l\'examen et afficher le corrigé ? Tu ne pourras plus modifier tes réponses.')) return;
  examState.submitted = true;
  examState.elapsedSec = Math.floor((Date.now() - examState.startedAt) / 1000);
  examState.timeout = !!timeout;
  clearInterval(examTimerInterval);
  renderExamen();
}

function renderExamenResult() {
  const ds = examState.dossiers;
  const a = examState.answers;
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const corrs = [];
  if (ds.ex1) corrs.push({ key: 'ex1', label: 'Exercice 1 — QCM', r: rseEx1Correct(ds.ex1, a), hasEval: false });
  if (ds.ex2) corrs.push({ key: 'ex2', label: 'Exercice 2 — Courtes', r: rseEx2Correct(ds.ex2, a), hasEval: true, evalFn: rseEx2RenderEval });
  if (ds.ex3) corrs.push({ key: 'ex3', label: 'Exercice 3 — Développées', r: rseEx3Correct(ds.ex3, a), hasEval: true, evalFn: rseEx3RenderEval });
  if (ds.ex4) corrs.push({ key: 'ex4', label: 'Exercice 4 — Synthèse', r: rseEx4Correct(ds.ex4, a), hasEval: true, evalFn: rseEx4RenderEval });
  const total = Math.round(corrs.reduce((s, c) => s + c.r.pts, 0) * 100) / 100;
  const max = corrs.reduce((s, c) => s + c.r.total, 0);
  const pct = max > 0 ? Math.round(total / max * 100) : 0;
  const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '🎉' : pct >= 35 ? '👍' : '💪';
  const msg = pct >= 75 ? 'Mention TB' : pct >= 60 ? 'Mention B' : pct >= 50 ? 'Validé' : pct >= 30 ? 'Insuffisant' : 'Non validé';
  saveExamScore(total, max, examState.durationSec, examState.elapsedSec);
  if (pct >= 75) launchConfetti();
  const mm = Math.floor(examState.elapsedSec / 60);
  const ss = examState.elapsedSec % 60;
  const evalBlocks = corrs.filter(c => c.hasEval).map(c => `
    <div class="exam-result-dossier">
      <div class="exam-result-dossier-head">
        <div class="exam-result-dossier-title">📝 Auto-évaluation — ${c.label}</div>
      </div>
      <div style="padding:0 1rem 1rem">
        ${c.key === 'ex4' ? `<div style="background:var(--bg);padding:0.8rem 1rem;border-radius:8px;margin-bottom:1rem;border-left:3px solid var(--accent);font-size:0.88rem;white-space:pre-wrap">${eEscape(a['ex4_text'] || '(aucune rédaction saisie)')}</div>` : ''}
        ${c.evalFn(ds[c.key], a)}
      </div>
    </div>`).join('');
  const detailsHTML = corrs.map(c => `
    <div class="exam-result-dossier">
      <div class="exam-result-dossier-head">
        <div class="exam-result-dossier-title">${c.label}</div>
        <div class="exam-result-dossier-score" style="color:${c.r.pts / c.r.total >= 0.75 ? 'var(--green)' : c.r.pts / c.r.total >= 0.5 ? 'var(--orange)' : 'var(--red)'}">${fmtNum(c.r.pts)} / ${c.r.total} pts</div>
      </div>
      ${c.r.details.map(d => `
        <div class="exam-result-q ${d.userOk ? 'ok' : 'ko'}">
          <div class="exam-result-q-head">
            <span class="exam-result-q-icon">${d.userOk ? '✓' : '✗'}</span>
            <span class="exam-result-q-text">${d.q}</span>
            <span class="exam-result-q-pts">${fmtNum(d.points)} / ${d.max} pt${d.max > 1 ? 's' : ''}</span>
          </div>
          <div class="exam-result-q-body">
            <div class="exam-result-q-line"><strong>Ta réponse :</strong> ${d.userAnswer}</div>
            ${d.correctAnswer ? `<div class="exam-result-q-line"><strong>Bonne réponse :</strong> ${d.correctAnswer}</div>` : ''}
            <div class="exam-result-q-line exam-result-q-explain">${d.explain}</div>
          </div>
        </div>`).join('')}
    </div>`).join('');
  return `
    <div class="fade-up">
      <div class="score-box">
        <div class="score-emoji">${emoji}</div>
        <div class="score-num"><span id="exam-score-live">${fmtNum(total)}</span> / ${max}</div>
        <div class="exam-save-flash-wrap"><span id="exam-save-flash" class="exam-save-flash">💾 Note sauvegardée</span></div>
        <div class="score-label">${msg} · ${pct}% · ${mm}min${ss > 0 ? ' ' + ss + 's' : ''}${examState.timeout ? ' (temps écoulé)' : ''}</div>
        <div class="score-actions">
          <button class="btn-secondary" onclick="examState = null; renderExamen()">↺ Nouvel examen</button>
        </div>
      </div>
      ${evalBlocks}
      ${detailsHTML}
    </div>`;
}

/* ═══════ BOOT ═══════ */
(async function() {
  try {
    DATA = await loadJSON('data/rse.json', FALLBACK);
    if (!DATA || !DATA.checklistItems) DATA = FALLBACK;
    renderNav();
    switchTab('checklist');

    console.error('[rse] boot error', err);

    if (root) root.innerHTML = `
      <div style="padding:3rem 1.5rem;text-align:center;background:var(--card);border-radius:14px;border:1px solid var(--red)">
        <div style="font-size:2rem;margin-bottom:0.8rem">⚠️</div>
        <div style="color:var(--red);font-weight:600;margin-bottom:0.4rem">Erreur de chargement</div>
        <div style="color:var(--text2);font-size:0.85rem;margin-bottom:1rem">${err.message || err}</div>
        <button class="back-home" onclick="window.location.href='index.html'">← Retour à l'accueil</button>
      </div>`;
  }
})();
