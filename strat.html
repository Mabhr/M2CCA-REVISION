          "label": "Sujet n°1 — Question de cours (20 points)",
          "context": "Vous êtes contacté par un ami qui veut créer une plateforme. Son idée est de lancer une application pour smartphone qui permettrait de mettre en relation des personnes âgées et des personnes prêtes à rendre des services de proximité. Grâce à cette application, la personne âgée aurait accès à un réseau d'entraide. Elle pourrait échanger et envoyer une alerte aux personnes de sa communauté virtuelle pour demander de l'aide ou des services (ménage, bricolage…) à d'autres « aidants ». À l'inverse, la personne pourrait se proposer d'être « aidant » pour d'autres qui ont besoin d'une aide.\n\nVotre ami souhaite des conseils sur la stratégie qu'il pourrait déployer.\n\nN.B. Aucune connaissance sur le projet de votre ami n'est nécessaire pour répondre à la question. Vous pouvez appuyer votre réflexion sur des exemples variés.",
          "items": [
            {
              "q": "Après avoir rappelé ce qu'est une plateforme, vous détaillerez les mécanismes sur lesquels il est possible de s'appuyer pour réussir à développer ce type de structure.",
              "correction": "[Meilleure copie — note 17/20 — Sujet n°1 traité]\n\nLes plateformes sont des dispositifs de coordination de ressources et d'actions, contrôlés par un opérateur privé qui en est le chef d'orchestre. Ces nouveaux modèles d'entreprise sont apparus ces vingt dernières années, avec l'émergence des nouvelles technologies et plus particulièrement d'internet, qui permet de connecter entre elles des individus qui ne se connaissent pas. Pour être qualifié de plateforme, un dispositif doit avoir deux caractéristiques :\n  • Chaque groupe (offreur et demandeur) peut être client de la plateforme\n  • Il permet une mise en relation directe entre les offreurs et les demandeurs\n\nPour mener à bien un projet de développement de plateforme, l'opérateur de la plateforme doit réussir à rendre la plateforme la plus attractive possible, pour inciter les demandeurs à se connecter dessus, mettre en place les conditions nécessaires pour que les offreurs produisent du contenu et que les demandeurs puissent trouver une offre satisfaisante, et enfin définir un business model, c'est-à-dire un ensemble de paramètres permettant de créer, délivrer et capturer de la valeur, pour permettre de rendre le projet de plateforme rentable.\n\nPour atteindre ces objectifs, l'opérateur de la plateforme doit s'appuyer sur 6 mécanismes, décrits par Christophe Benavent en 2016.\n\n─── 1er mécanisme : les externalités de réseau et de standard ───\n\nLa valeur d'une plateforme est surtout liée à son nombre d'usagers. En effet, une plateforme ne comprenant que peu d'usagers, même si elle est très utile, ne sera que très peu utilisée et aura du mal à se développer. C'est sur le principe de la loi de Metcalfe que Benavent fait cette analyse, considérant que la valeur de la plateforme augmente au carré pour chaque nouvel utilisateur. Il s'agira donc, pour une plateforme, de réussir à avoir le plus d'utilisateurs possible pour rendre la plateforme la plus attractive possible.\n\nConcernant les externalités de standard, celles-ci sont liées à un possible changement de plateforme : en effet, il peut être « coûteux » pour un utilisateur utilisant déjà une plateforme de changer pour une nouvelle. Le fait d'être le premier sur un marché peut donc être déterminant pour garder les utilisateurs.\n\n─── 2e mécanisme : le crowdsourcing ───\n\nLe crowdsourcing va consister à faire porter le capital productif et le travail de production sur les usagers. En effet, le modèle de plateforme permet à l'opérateur d'avoir des apports en capital assez faibles, puisque ce sont les offreurs qui vont produire son offre. Pour garder cette dynamique, il faut également inciter les demandeurs à faire des retours, via notamment des systèmes de notation des offreurs, qui permettront aux autres utilisateurs de pouvoir avoir plus de confiance dans les offreurs.\n\n─── 3e mécanisme : les marchés de réputation ───\n\nLe troisième mécanisme est en lien avec le système de notation, car les plateformes sont des marchés de réputation. La plupart des utilisateurs ne se connaissent pas, et donc la confiance entre les utilisateurs, souvent nécessaire pour effectuer un acte d'achat, doit pouvoir être créée. L'opérateur de la plateforme va donc devoir permettre de créer ces conditions, notamment donc par un système de notation et de commentaires.\n\n─── 4e mécanisme : la logique de la longue traîne (économie de la variété) ───\n\nLe modèle des plateformes permet aujourd'hui de ne pas avoir de stocks et donc de proposer une variété de produits beaucoup plus importante qu'un opérateur traditionnel. Dans le cas du sujet, la plateforme va pouvoir proposer une multitude de services, certainement plus que ce que pourrait le faire par exemple une entreprise d'aide à domicile. Toutefois, la multitude des offres impose également de mettre en place des dispositifs pour pouvoir retrouver celle qui correspond au besoin du demandeur. Il peut s'agir de filtres, de moteurs de recherche, qui doivent permettre de faire correspondre une offre spécifique à une demande singulière.\n\n─── 5e mécanisme : la science de l'appariement ───\n\nElle reprend en partie les mécanismes de la logique de la longue traîne, puisqu'il s'agit d'arriver à mettre en relation deux choses qui vont naturellement de pair. La science de l'appariement va donc consister à s'assurer que les offres et les demandes qui vont ensemble puissent se « rencontrer » sur la plateforme.\n\n─── 6e mécanisme : les marchés bifaces voire multifaces ───\n\nCela va consister à trouver les moyens de s'assurer des revenus par plusieurs moyens, et de réussir à faire payer les deux faces du marché, à savoir les offreurs et les demandeurs. Mais il peut être également intéressant d'inviter d'autres types d'acteurs à proposer des offres sur la plateforme (par exemple de la publicité) pour augmenter le nombre de sources de revenus. Pour réussir à attirer à la fois offreurs et demandeurs, l'opérateur de la plateforme peut mettre en place des dispositifs pour attirer une des faces, comme par exemple prendre à sa charge les coûts relatifs à une des faces au démarrage pour les inciter à venir sur la plateforme, ou mettre en place des systèmes freemium, c'est-à-dire gratuit au début puis payant pour avoir plus de fonctionnalités.\n\n─── Les 4 risques majeurs ───\n\n1. Le pricing : la prise en charge des coûts liés à une des faces du marché peut présenter un risque pour l'opérateur. Il faut faire attention à ce que ce mécanisme ne tue pas le business model imaginé au départ.\n\n2. La méfiance entre les utilisateurs : il faudra donc pour l'opérateur mettre en place les conditions de confiance pour éviter ce risque.\n\n3. Le timing : le premier arrivé, si sa plateforme répond parfaitement aux besoins des utilisateurs, aura un avantage considérable par rapport à ses concurrents, notamment à cause des externalités de standard évoquées précédemment. Mais il faut également que le marché soit prêt lors du lancement d'une plateforme, pour que celle-ci ne soit pas délaissée. Un mécanisme important pour se lancer rapidement est le MVP (minimum viable product), qui est un produit ne présentant pas encore toutes les caractéristiques du produit final mais qui permet déjà de faire du chiffre d'affaires et d'avoir des retours utilisateurs pour améliorer son produit.\n\n4. L'orgueil, notamment pour les plateformes déjà installées : comme dans un secteur traditionnel, une entreprise leader sur son marché ne doit pas croire que la bataille est gagnée et qu'elle va le rester toute sa vie. Elle doit donc continuer à innover pour se prémunir d'entrants potentiels et garder à tout prix son avantage concurrentiel.\n\nLes plateformes répondent donc à d'autres logiques que des activités « physiques » que nous avions l'habitude de côtoyer et s'appuient donc sur des mécanismes différents pour garantir à l'opérateur de la plateforme un succès. Ces mécanismes doivent donc être pris en compte pour éviter les quatre risques majeurs que comporte le lancement d'une plateforme."

          "label": "Sujet n°2 — Étude de cas : « La nouvelle stratégie de Bic » (20 points, 5 pts/question)",
          "context": "BIC est un des leaders mondiaux des articles de papeterie, des briquets et des rasoirs. Depuis plus de 75 ans, l'entreprise fabrique des produits de grande qualité accessibles à tous, partout dans le monde. Cette vocation a permis au Groupe de faire de sa marque, enregistrée dans le monde entier, l'une des plus reconnues.\n\nÀ partir des deux articles suivants, présentés par ordre chronologique, vous répondrez aux questions suivantes.\n\n━━━ TEXTE 1 — « Bic contraint de se réinventer pour affronter l'avenir », Le Figaro Économie, 3 janvier 2020 ━━━\n\nLe groupe a finalisé la cession de sa filiale de sport. Il se concentre désormais sur les stylos, rasoirs et briquets.\n\nBic tire un trait sur ses planches à voile et paddles. Le groupe a finalisé la vente à l'estonien Tahe Outdoors de sa filiale Bic Sport, spécialisée dans les sports de glisse nautique. Il en obtiendra de 6 à 9 millions d'euros en fonction des résultats futurs de son ex-filiale. Avec cette cession, mise en œuvre par Gonzalve Bich, investi il y a un an par son père à la tête du groupe, Bic revient à ses activités historiques : stylos, briquets et rasoirs. Le groupe français, détenu à 44 % par la famille fondatrice, tire un trait final sur ses diversifications. Oubliée l'époque où l'entreprise vendait des téléphones portables dans les bureaux de tabac ; Bic a surtout renoncé à faire des produits promotionnels son quatrième pilier : il a cédé mi-2017 les activités nord-américaines de son ex-division Bic Graphic au fonds américain HIG pour 71 millions d'euros.\n\nUn choix imposé par la force des choses. Depuis deux ans, la croissance de Bic a marqué le pas, notamment dans l'activité rasoirs, bouleversée par la montée en puissance des acteurs en ligne comme Dollar Shave Club (Unilever) qui tirent les prix du marché à la baisse, surtout aux États-Unis. La rentabilité a par ailleurs été affectée par la hausse du coût des matières premières. À cela s'ajoute l'intensification de la concurrence des pays à bas coût. En tant que fabricant de biens de consommation (stylos, briquets, rasoirs), Bic est aussi confronté à un environnement de plus en plus compétitif. Les distributeurs sont aujourd'hui concurrencés par Amazon. Le digital a aussi donné naissance à de nouveaux acteurs, comme les « pure players » du rasage aux États-Unis. De plus, le comportement des consommateurs change, sans parler de la volatilité des matières premières.\n\nLe groupe septuagénaire, qui a réalisé l'an passé 2 milliards d'euros de chiffre d'affaires, est confronté à une triple contrainte : la baisse du nombre de fumeurs dans les pays occidentaux, la mode de la barbe qui incite les hommes à bouder leur rasoir et la désaffection à l'égard de l'écriture manuscrite. Si Bic peut compter sur une marque forte et reconnue mondialement, un puissant réseau de distribution et son intégration industrielle (26 usines), il est en fait à la croisée des chemins. Certes, les pays émergents représentent un tiers de son activité. Mais la volatilité de certaines économies, à l'image du Brésil, a fragilisé le groupe. Bic doit s'atteler à trouver de nouveaux relais de croissance pour l'avenir. « Afin de faire face aux défis et opportunités d'aujourd'hui et de demain, nous devons réinventer Bic », reconnaît aujourd'hui Gonzalve Bich, 40 ans, qui veut imprimer sa marque en modernisant le groupe. Une équipe a été chargée de définir un plan stratégique qui devrait être présenté fin 2020.\n\n━━━ TEXTE 2 — « Le plan stratégique de Gonzalve Bich », Les Echos, 12 novembre 2020 ━━━\n\nÀ la tête de Bic depuis deux ans et demi, Gonzalve Bich, le petit-fils du fondateur, veut relancer la croissance du champion mondial des biens de consommation. À l'occasion de la journée investisseurs mardi, il a présenté les points clés de son plan stratégique baptisé « Horizon ». Le groupe veut atteindre une croissance annuelle du chiffre d'affaires d'environ 5 %. Et de générer, grâce aux économies, « au moins 200 millions d'euros de flux nets de trésorerie par an jusqu'en 2022 ». Le montant des investissements sera en moyenne de 100 millions d'euros par an.\n\n« Monsieur Gonzalve Bich, parlez-nous du plan Horizon… »\n« Afin de faire face aux défis et opportunités d'aujourd'hui et de demain, nous devons réinventer Bic pour redevenir en 2022 un champion mondial des produits de consommation courante, plus agile et plus innovant. C'est l'ambition de ce plan stratégique. Ce projet « Horizon » s'inscrit dans la continuité du plan précédent et ouvre un nouveau chapitre, celui de la croissance, afin de voir comment nous allons élargir le périmètre de nos activités, en allant vers des segments de marché proches des nôtres et en forte croissance. Par exemple dans l'écriture, nous allons continuer à produire et fournir aux consommateurs des stylos de haute qualité à un prix abordable, avec une marque qu'ils connaissent, mais nous allons aussi leur apporter de nouveaux produits et de nouveaux usages. »\n\n« C'est le sens du rachat de Rocketbook, la marque américaine de carnets intelligents ? »\n« Rocketbook s'inscrit dans notre ADN. Ses cahiers, qui s'utilisent avec un stylo effaçable et dont le contenu peut être téléchargé via une application sur smartphone, sont proposés à un prix inférieur à 40 dollars. Et le consommateur fait un achat qui conserve l'aspect manuscrit de l'écriture. Ces cahiers présentent aussi un avantage environnemental car ils sont réutilisables. Ce sont nos premiers pas dans l'écriture digitale. Cette acquisition renforce l'activité Papeterie de BIC avec l'ajout d'un segment de marché très porteur. Les co-fondateurs de Rocketbook, Joe Lemay et Jake Epstein, l'ont reconnu, il y a une grande complémentarité entre BIC et Rocketbook. Nous sommes convaincus que Rocketbook pourra atteindre des niveaux de performances plus élevés en profitant de l'avantage parental offert par le groupe BIC. »\n\n« Sur chaque pilier du groupe, vous allez donc aller sur de nouveaux territoires ? »\n« Nous n'abandonnons pas ce qui a fait la force de notre marque. Nous allons continuer à fabriquer des stylos, des briquets et des rasoirs, mais nous allons étendre notre champ d'action tout en rationalisant nos gammes. Par exemple, dans l'écriture, nous constatons depuis une dizaine d'années que les gens ont envie de déconnecter et de se détendre à travers différentes formes d'activités créatives. Le coloriage pour adultes ou encore les marqueurs de tatouage éphémères Bodymark que nous avons lancé aux États-Unis et en Europe sont un succès. Il y a donc plein d'autres façons d'innover, d'amener de nouvelles solutions pour égayer le quotidien. »",

function getAnnalesHTML() {
  const list = (DATA.annales || []);
  if (!list.length) return `<div class="annales-empty"><p>Aucune annale disponible pour ce cours.</p></div>`;
  const renderOne = (a, aIdx) => {
    const meta = [a.duration ? `⏱ ${a.duration}` : '', a.format || '', a.professor ? `👤 ${a.professor}` : '']
      .filter(Boolean).join(' · ');
    const head = `
      <div class="annale-head">
        <div class="annale-head-row">
          <div class="annale-year">${escAnnale(a.year || '')}</div>
          <div class="annale-title">${escAnnale(a.name || 'Annale')}</div>
        </div>
        ${meta ? `<div class="annale-meta">${escAnnale(meta)}</div>` : ''}
      </div>`;
    const tipsHTML = (a.tips||[]).length ? `
      <div class="annale-tips">
        <div class="annale-block-title">💡 Conseils méthodologiques</div>
        <ul>${a.tips.map(t => `<li>${escAnnale(t)}</li>`).join('')}</ul>
      </div>` : '';

    // ── NOUVEAU SCHÉMA : dossiers[].items[{q,correction}] avec bouton par sous-question ──
    if (Array.isArray(a.dossiers) && a.dossiers.length) {
      const cardId = `annale-card-${aIdx}`;
      const dossiersHTML = a.dossiers.map((ds, dIdx) => {
        const itemsHTML = (ds.items || []).map((it, iIdx) => {
          const corrId = `corr-${aIdx}-${dIdx}-${iIdx}`;
          return `
          <div class="annale-question">
            <div class="annale-q-text">${escAnnale(it.q || '')}</div>
            ${it.correction ? `
              <button class="annale-show-corr" type="button" onclick="toggleAnnaleCorrection('${corrId}', this)">▸ Afficher la correction</button>
              <div class="annale-correction" id="${corrId}" style="display:none">${escAnnale(it.correction)}</div>
            ` : ''}
          </div>`;
        }).join('');
        return `
        <div class="annale-dossier">
          <div class="annale-dossier-label">${escAnnale(ds.label || '')}</div>
          ${ds.context ? `<div class="annale-dossier-context">${escAnnale(ds.context)}</div>` : ''}
          <div class="annale-dossier-items">${itemsHTML}</div>
        </div>`;
      }).join('');
      const subjectHTML = a.subject ? `
        <div class="annale-subject">
          <div class="annale-block-title">📋 Énoncé général</div>
          <div class="annale-subject-content">${escAnnale(a.subject)}</div>
        </div>` : '';
      return `
      <div class="annale-card" id="${cardId}">
        ${head}
        <div class="annale-toolbar">
          <button class="annale-toolbar-btn" type="button" onclick="expandAllAnnales('#${cardId}')">▾ Tout afficher</button>
          <button class="annale-toolbar-btn" type="button" onclick="collapseAllAnnales('#${cardId}')">▸ Tout masquer</button>
        </div>
        ${subjectHTML}
        <div class="annale-dossiers">${dossiersHTML}</div>
        ${tipsHTML}
      </div>`;
    }

    // ── ANCIEN SCHÉMA (fallback pour annales non encore migrées) ──
    const exHTML = (a.exercises || []).map(e => `
      <div class="annale-exercise">
        <div class="annale-exercise-label">${escAnnale(e.label)}</div>
        <div class="annale-exercise-content">${escAnnale(e.content||'').replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
    const bc = a.bestCopy;
    let bestCopyHTML = '';
    if (bc) {
      const planHTML = (bc.plan||[]).map(line => {
        const t = (line||'').trim();
        if (!t) return '<div class="annale-plan-spacer"></div>';
        if (/^(I+\.|[0-9]+\.|Introduction|Conclusion|Exercice|Q[0-9]+|•)/.test(t)) {
          return `<div class="annale-plan-line annale-plan-main">${escAnnale(t)}</div>`;
        }
        return `<div class="annale-plan-line">${escAnnale(t)}</div>`;
      }).join('');
      const conceptsHTML = (bc.keyConcepts||[]).map(c => `<span class="annale-concept">${escAnnale(c)}</span>`).join('');
      const qcmHTML = (bc.qcmAnswers||[]).length
        ? `<div class="annale-block annale-qcm"><div class="annale-block-title">QCM — réponses correctes</div>${bc.qcmAnswers.map(q=>`<div class="annale-qcm-line">${escAnnale(q)}</div>`).join('')}</div>`
        : '';
      bestCopyHTML = `
      <div class="annale-bestcopy">
        <div class="annale-bestcopy-head">
          <span class="annale-grade">📝 Note : ${escAnnale(bc.grade)}</span>
          ${bc.subjectChosen ? `<span class="annale-chosen">Sujet traité : ${escAnnale(bc.subjectChosen)}</span>` : ''}
        </div>
        ${qcmHTML}
        <div class="annale-block">
          <div class="annale-block-title">Plan-type / structure de la copie</div>
          <div class="annale-plan">${planHTML}</div>
        </div>
        ${(bc.keyConcepts||[]).length ? `
        <div class="annale-block">
          <div class="annale-block-title">Mots-clés &amp; concepts mobilisés</div>
          <div class="annale-concepts">${conceptsHTML}</div>
        </div>` : ''}
        ${bc.correctorNotes ? `<div class="annale-corrector"><strong>Annotations du correcteur :</strong> ${escAnnale(bc.correctorNotes)}</div>` : ''}
      </div>`;
    }
    let corrigeHTML = '';
    if (a.corrige && a.corrige.available) {
      const hl = (a.corrige.highlights||[]).map(h => `<li>${escAnnale(h)}</li>`).join('');
      corrigeHTML = `
      <div class="annale-corrige">
        <div class="annale-block-title">Corrigé officiel — points clés</div>
        ${a.corrige.summary ? `<p class="annale-corrige-summary">${escAnnale(a.corrige.summary)}</p>` : ''}
        <ul>${hl}</ul>
      </div>`;
    }
    return `
    <div class="annale-card">
      ${head}
      <div class="annale-subject">
        <div class="annale-block-title">📋 Sujet</div>
        <div class="annale-subject-content">${escAnnale(a.subject||'').replace(/\n/g,'<br>')}</div>
      </div>
      ${exHTML ? `<div class="annale-exercises">${exHTML}</div>` : ''}
      ${bestCopyHTML}
      ${corrigeHTML}
      ${tipsHTML}
    </div>`;
  };
  if (list.length === 1) return renderOne(list[0], 0);
  // Multi-annales : onglets en haut + un seul corps visible à la fois
  const tabsHTML = list.map((a, i) => `
    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}
