              "correction": "[Meilleure copie — note 17/20]\n\nDepuis longtemps, les théories classiques de management, comme celle de Taylor ou de Fayol, ont affirmé qu'il existait un modèle unique de gestion dit « one best way ». La théorie de la contingence a évolué dans un contexte où l'efficacité d'une organisation dépend de son habilité à s'adapter à son environnement.\n\nEn effet, la théorie de la contingence rejette l'idée qu'il existe un modèle de gestion unique mais que ce modèle de gestion doit s'adapter à son environnement, par des facteurs de contingence.\n\nPlusieurs auteurs ont pu participer à cette réflexion et l'un des premiers à poser la pierre à l'édifice est Woodward en 1958. Pour cet auteur, le type de gestion d'une entreprise doit s'adapter à son mode de production. Il en existe 3 :\n  • production unitaire : la structure de l'entreprise peut être flexible, décentralisée ;\n  • production en masse : à l'inverse, la structure doit être rigide ;\n  • production en continu : complexe et comme celle en masse, la structure doit être rigide.\n\nEnsuite, les auteurs Burns et Stalker en 1961 ont affirmé que la structure de l'entreprise dépend de son environnement. Effectivement, si l'entreprise évolue dans un environnement stable (mécanique) alors la structure sera centralisée avec une hiérarchie forte, rigide où toutes les informations nécessaires à la prise de décision sont envoyées au top management, le dirigeant. Tandis qu'un environnement instable comme l'innovation va préférer une structure organique (décentralisée) où cette fois-ci les ordres sont émis par plusieurs personnes, adaptée à la réalité du terrain.\n\nLawrence et Lorsch ont théorisé en 1967 qu'il peut exister plusieurs types de gestion en fonction du marché de l'entreprise, et donc en fonction du produit vendu, il peut exister plusieurs gestions dans une seule et même entreprise.\n\nEnsuite Fielder en 1967 classe deux types de leadership en fonction de la nature, culture et taille de l'entreprise :\n  • le leadership orienté tâche où seul l'objectif rentre en jeu ;\n  • le leadership orienté relation où les parties prenantes comme les salariés sont importantes pour une bonne gestion.\n\nEnfin, l'un des derniers auteurs que l'on peut rajouter, c'est Mintzberg en 1973 qui vient valider la théorie où il existe plusieurs types de structure :\n  • Structure simple : un seul gérant et c'est tout.\n  • Structure fonctionnelle : plusieurs pôles de fonction (GRH, logistique, production…) ;\n  • Structure divisionnelle : divisée par produit, marché ;\n  • Structure bureaucratique : forte hiérarchie ;\n  • Structure adhocratique : flexible.\n\nPour illustrer nos propos, prenons l'exemple d'une startup comme Blackmarket : cette entité repose sur une structure adhocratique car tout le temps en évolution. À l'inverse, les entités stables comme la Poste ou EDF ont plus une structure bureaucratique, où la forte hiérarchie se fait sentir. Michelin ou Airbus auront plus une structure divisionnelle catégorisée par type de production ou lieu géographique.\n\nTous ces auteurs convergent vers l'idée qu'il existe non pas un modèle unique de gestion mais que cela dépend de son environnement.\n\nPour résumer, les facteurs de contingence sont nombreux mais les principaux peuvent ressortir comme :\n  • La technologie (production)\n  • La taille de l'entreprise\n  • La culture\n  • L'environnement\n  • L'histoire du groupe\n  • La stratégie globale de l'entreprise\n\nC'est sur ce dernier facteur que repose la question : « Comment les dirigeants peuvent améliorer la performance de l'organisation en veillant à l'équilibre entre l'ambition stratégique et la capacité organisationnelle ? »\n\nTout d'abord, la stratégie c'est l'ensemble des actions mises en œuvre ou à mettre en œuvre pour atteindre un objectif MT ou LT en utilisant différentes ressources comme les compétences qui peuvent donner un avantage concurrentiel.\n\nCependant, nous avons pu voir que l'organisation est étroitement liée avec la stratégie de l'entreprise. Si les dirigeants veulent améliorer la performance de l'organisation, ce n'est pas seulement la structure à faire évoluer mais tous les autres facteurs de contingences. Pour évoluer avec les mutations économiques, technologiques, sociales alors il faudrait tendre vers une structure flexible, décentralisée, orientée relation, afin de prendre en compte tous les différents aspects. Cela affecterait inévitablement la performance de l'organisation car les parties prenantes plus impliquées dans un projet de changement ont plus de chance d'aboutir.\n\nSelon Forbes, 30 % des projets échouent si les entreprises impliquent les parties prenantes comme les salariés contre 60 % si elles ne le font pas. Ce qui pourrait augmenter la création de valeur pour l'entreprise (Résultat) comme pour les clients (utilité du produit).\n\nEn conclusion, la théorie de la contingence vient bousculer les théories classiques du management afin de prendre en compte l'environnement dans lequel une entreprise évolue afin de faire face aux différentes mutations actuelles."

function getAnnalesHTML() {
  const list = (DATA.annales || []);
  if (!list.length) return `<div class="annales-empty"><p>Aucune annale disponible pour ce cours.</p></div>`;
  const renderOne = (a, aIdx) => {
    const meta = [a.duration ? `⏱ ${a.duration}` : '', a.format || '', a.professor ? `👤 ${a.professor}` : '']
      .filter(Boolean).join(' · ');
    const head = `
      <div class="annale-head">
        <div class="annale-head-row">
          <div class="annale-year">${escAnnale(a.year || '')}</div>
          <div class="annale-title">${escAnnale(a.name || 'Annale')}</div>
        </div>
        ${meta ? `<div class="annale-meta">${escAnnale(meta)}</div>` : ''}
      </div>`;
    const tipsHTML = (a.tips||[]).length ? `
      <div class="annale-tips">
        <div class="annale-block-title">💡 Conseils méthodologiques</div>
        <ul>${a.tips.map(t => `<li>${escAnnale(t)}</li>`).join('')}</ul>
      </div>` : '';

    // ── NOUVEAU SCHÉMA : dossiers[].items[{q,correction}] avec bouton par sous-question ──
    if (Array.isArray(a.dossiers) && a.dossiers.length) {
      const cardId = `annale-card-${aIdx}`;
      const dossiersHTML = a.dossiers.map((ds, dIdx) => {
        const itemsHTML = (ds.items || []).map((it, iIdx) => {
          const corrId = `corr-${aIdx}-${dIdx}-${iIdx}`;
          return `
          <div class="annale-question">
            <div class="annale-q-text">${escAnnale(it.q || '')}</div>
            ${it.correction ? `
              <button class="annale-show-corr" type="button" onclick="toggleAnnaleCorrection('${corrId}', this)">▸ Afficher la correction</button>
              <div class="annale-correction" id="${corrId}" style="display:none">${escAnnale(it.correction)}</div>
            ` : ''}
          </div>`;
        }).join('');
        return `
        <div class="annale-dossier">
          <div class="annale-dossier-label">${escAnnale(ds.label || '')}</div>
          ${ds.context ? `<div class="annale-dossier-context">${escAnnale(ds.context)}</div>` : ''}
          <div class="annale-dossier-items">${itemsHTML}</div>
        </div>`;
      }).join('');
      const subjectHTML = a.subject ? `
        <div class="annale-subject">
          <div class="annale-block-title">📋 Énoncé général</div>
          <div class="annale-subject-content">${escAnnale(a.subject)}</div>
        </div>` : '';
      return `
      <div class="annale-card" id="${cardId}">
        ${head}
        <div class="annale-toolbar">
          <button class="annale-toolbar-btn" type="button" onclick="expandAllAnnales('#${cardId}')">▾ Tout afficher</button>
          <button class="annale-toolbar-btn" type="button" onclick="collapseAllAnnales('#${cardId}')">▸ Tout masquer</button>
        </div>
        ${subjectHTML}
        <div class="annale-dossiers">${dossiersHTML}</div>
        ${tipsHTML}
      </div>`;
    }

    // ── ANCIEN SCHÉMA (fallback pour annales non encore migrées) ──
    const exHTML = (a.exercises || []).map(e => `
      <div class="annale-exercise">
        <div class="annale-exercise-label">${escAnnale(e.label)}</div>
        <div class="annale-exercise-content">${escAnnale(e.content||'').replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
    const bc = a.bestCopy;
    let bestCopyHTML = '';
    if (bc) {
      const planHTML = (bc.plan||[]).map(line => {
        const t = (line||'').trim();
        if (!t) return '<div class="annale-plan-spacer"></div>';
        if (/^(I+\.|[0-9]+\.|Introduction|Conclusion|Exercice|Q[0-9]+|•)/.test(t)) {
          return `<div class="annale-plan-line annale-plan-main">${escAnnale(t)}</div>`;
        }
        return `<div class="annale-plan-line">${escAnnale(t)}</div>`;
      }).join('');
      const conceptsHTML = (bc.keyConcepts||[]).map(c => `<span class="annale-concept">${escAnnale(c)}</span>`).join('');
      const qcmHTML = (bc.qcmAnswers||[]).length
        ? `<div class="annale-block annale-qcm"><div class="annale-block-title">QCM — réponses correctes</div>${bc.qcmAnswers.map(q=>`<div class="annale-qcm-line">${escAnnale(q)}</div>`).join('')}</div>`
        : '';
      bestCopyHTML = `
      <div class="annale-bestcopy">
        <div class="annale-bestcopy-head">
          <span class="annale-grade">📝 Note : ${escAnnale(bc.grade)}</span>
          ${bc.subjectChosen ? `<span class="annale-chosen">Sujet traité : ${escAnnale(bc.subjectChosen)}</span>` : ''}
        </div>
        ${qcmHTML}
        <div class="annale-block">
          <div class="annale-block-title">Plan-type / structure de la copie</div>
          <div class="annale-plan">${planHTML}</div>
        </div>
        ${(bc.keyConcepts||[]).length ? `
        <div class="annale-block">
          <div class="annale-block-title">Mots-clés &amp; concepts mobilisés</div>
          <div class="annale-concepts">${conceptsHTML}</div>
        </div>` : ''}
        ${bc.correctorNotes ? `<div class="annale-corrector"><strong>Annotations du correcteur :</strong> ${escAnnale(bc.correctorNotes)}</div>` : ''}
      </div>`;
    }
    let corrigeHTML = '';
    if (a.corrige && a.corrige.available) {
      const hl = (a.corrige.highlights||[]).map(h => `<li>${escAnnale(h)}</li>`).join('');
      corrigeHTML = `
      <div class="annale-corrige">
        <div class="annale-block-title">Corrigé officiel — points clés</div>
        ${a.corrige.summary ? `<p class="annale-corrige-summary">${escAnnale(a.corrige.summary)}</p>` : ''}
        <ul>${hl}</ul>
      </div>`;
    }
    return `
    <div class="annale-card">
      ${head}
      <div class="annale-subject">
        <div class="annale-block-title">📋 Sujet</div>
        <div class="annale-subject-content">${escAnnale(a.subject||'').replace(/\n/g,'<br>')}</div>
      </div>
      ${exHTML ? `<div class="annale-exercises">${exHTML}</div>` : ''}
      ${bestCopyHTML}
      ${corrigeHTML}
      ${tipsHTML}
    </div>`;
  };
  if (list.length === 1) return renderOne(list[0], 0);
  // Multi-annales : onglets en haut + un seul corps visible à la fois
  const tabsHTML = list.map((a, i) => `
    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}

      <li><strong>Transversalité</strong></li>
      <li><strong>Autonomie vs Responsabilité</strong></li>
      <li><strong>Initiative et innovation</strong></li>
      <li><strong>Orientation Satisfaction Client</strong></li>

  </div>
  <h3>La culture d'entreprise</h3>
  <div class="def-box">
    <ul>
      <li>Il existe toujours <strong>une culture d'établissement qu'elle soit connue ou non</strong>.</li>
      <li>Elle est fondée sur les <strong>habitudes, les attitudes sociales, l'histoire de chacun de ses membres</strong>.</li>
      <li>Il existe une <strong>confrontation entre les valeurs personnelles des acteurs, et la culture déclarée</strong> de l'établissement et des autres.</li>
      <li>Elle est fondée sur une <strong>histoire, une identité, des règles du jeu, d'acceptation et de pouvoir, des croyances et des routines</strong> auxquelles les acteurs adhèrent ou non.</li>
    </ul>
  </div>
  <h3>Perspectives managériales</h3>
  <div class="example-box">
    <em>« Un bon chef est celui qui a besoin des autres »</em> — <strong>Paul Valéry</strong>
    <p style="margin-top:0.6rem">Pour construire la performance, il faut alors : <strong>faire réussir les autres</strong>.</p>
  </div>
</div>

<div class="course-chapter" data-theme="processus" data-chap-idx="8" id="chap-8">
  <h2>8. Approche processus &amp; ISO 9001:2000</h2>
  <div class="def-box">
    <div class="def-label">L'évolution du management</div>
    <p>Passer d'une <strong>logique de « tâches »</strong> (en perspective de l'école classique) à une <strong>approche « processus » orientée vers la performance et l'excellence</strong>.</p>
  </div>

  <h3>Définition d'un processus</h3>
  <div class="def-box">
    <div class="def-label">Norme ISO 8402 — définition formelle</div>
    <p>« <strong>Ensemble des moyens et d'activités qui transforment les éléments entrants en éléments sortants dans un but défini et mesurable</strong> » <em>(ISO 8402, cité par P. Baracchini, 2007)</em></p>
    <p>Plus simplement : un processus est un <strong>ensemble homogène de sous-processus et de tâches</strong>, qui s'enchaînent de façon logique pour transformer des intrants en extrants.</p>
  </div>

  <h3>Les 3 types de processus</h3>
  <table class="comp-table">
    <thead><tr><th>Type</th><th>Objet</th><th>Exemples</th></tr></thead>
    <tbody>
      <tr><td><strong>Processus de Réalisation</strong></td><td>Réalisation du produit ou du service</td><td>Conception, fabrication, vente, prestation</td></tr>
      <tr><td><strong>Processus Support</strong></td><td>Outils et méthodes permettant d'appuyer le processus de réalisation</td><td>RH, formation, informatique, comptabilité, maintenance</td></tr>
      <tr><td><strong>Processus de Pilotage</strong></td><td>Mise en œuvre des objectifs dans l'organisme</td><td>Politique, stratégie, technologie, décision, budget, mesure</td></tr>
    </tbody>
  </table>

  <h3>Vocabulaire hiérarchique</h3>
  <div class="key-box">
    <ul>
      <li><strong>MACROPROCESSUS</strong> : Client, RH…</li>
      <li><strong>PROCESSUS</strong> : ensemble de sous-processus</li>
      <li><strong>SOUS-PROCESSUS</strong> : ensemble de tâches</li>
      <li><strong>TÂCHES</strong> : opération spécifique</li>
    </ul>
  </div>

  <h3>Système de Management de la Qualité — Norme ISO 9001 version 2000</h3>
  <div class="key-box">
    <strong>Schéma général de l'amélioration continue</strong> :
    <ul>
      <li><strong>Client (entrée)</strong> : exigences → Données d'entrée</li>
      <li><strong>Responsabilité de la direction</strong></li>
      <li><strong>Management des ressources</strong></li>
      <li><strong>Réalisation du produit et/ou service</strong></li>
      <li><strong>Mesure, analyse et amélioration</strong></li>
      <li><strong>Client (sortie)</strong> : satisfaction → Données de sortie</li>
    </ul>
    Le tout est inscrit dans une boucle d'<strong>amélioration continue</strong>.
  </div>

  <h3>La tortue de Crosby — identification des processus</h3>
  <div class="def-box">
    <div class="def-label">Tortue de Crosby — 4 questions clés</div>
    <p>Pour caractériser un processus, on mobilise <strong>4 questions</strong> :</p>
    <ul>
      <li><strong>AVEC QUOI ?</strong> — Avec quels moyens et équipements je maîtrise le processus ?</li>
      <li><strong>AVEC QUI ?</strong> — Avec quelles compétences je maîtrise le processus ?</li>
      <li><strong>COMMENT ?</strong> — Avec quelles méthodes je maîtrise le processus ?</li>
      <li><strong>COMBIEN ?</strong> — Avec quels indicateurs je pilote le processus ?</li>
    </ul>
  </div>

  <h3>Interactions entre processus</h3>
  <div class="key-box">
    <ul>
      <li>Identifier les processus entre lesquels il existe une interaction</li>
      <li>Définir la <strong>nature de l'interaction</strong> (sortie de l'un = entrée d'un autre, etc.)</li>
      <li>Établir un <strong>diagramme de toutes les interactions</strong> entre tous les processus identifiés (<strong>cartographie des processus</strong>)</li>
    </ul>
  </div>

  <h3>La nature des processus &amp; chaîne de valeur</h3>
  <div class="key-box">
    <ul>
      <li>Processus dont les éléments de sortie sont associés aux <strong>exigences des clients</strong></li>
      <li>Processus dont les éléments de sortie ont une incidence sur l'<strong>efficacité des autres processus</strong></li>
    </ul>
    <strong>Processus et chaîne de valeur</strong> : le processus produit de la <strong>valeur ajoutée</strong>, des <strong>fournisseurs</strong> vers les <strong>clients</strong>, à travers des <strong>moyens</strong> et des <strong>règles</strong>.
  </div>
</div>

<div class="course-chapter" data-theme="performance" data-chap-idx="9" id="chap-9">
  <h2>9. La performance — définition, dualité, mesure</h2>
  <h3>Stratégie-Organisation : une dualité permanente</h3>
  <div class="def-box">
    <div class="def-label">Dualité ago-antagoniste</div>
    <ul>
      <li>L'entreprise doit avoir à la fois une <strong>démarche pro-active de conquête</strong> et en même temps <strong>limiter le risque associé</strong>.</li>
      <li>Recherche de la <strong>convergence d'éléments ago-antagonistes</strong> comme aimait à les qualifier <strong>Edgar Morin</strong>.</li>
      <li>Lien indissociable qui existe entre la <strong>structure de l'entreprise et sa stratégie</strong> — <strong>A. Chandler</strong>.</li>
      <li>Le succès ou l'échec d'une politique d'entreprise réside aussi dans la <strong>maîtrise organisationnelle</strong>. Facteurs d'inertie liés : communication, comportements, jeux des acteurs.</li>
    </ul>
  </div>

  <h3>Qu'est-ce que la performance ?</h3>
  <div class="key-box">
    <strong>Questions ouvertes :</strong> Dimension objective ou subjective ? C'est un processus ? Action ou état ? Finalité mesurable ? Corollaire du management ? Atteinte de résultats prévus ?
  </div>
  <div class="def-box">
    <div class="def-label">Définition de la performance (Besombes)</div>
    <ul>
      <li>La performance d'une organisation est issue d'un <strong>processus de construction contingent</strong>.</li>
      <li>La performance est la conséquence d'une <strong>représentation</strong>, qui n'a pas de réalité propre.</li>
      <li>Elle est le résultat de <strong>l'accord entre les parties prenantes</strong> de l'organisation, fondée sur le <strong>consensus et la coopération</strong>.</li>
      <li>La performance est devenue stratégique, elle contribue à l'<strong>émergence du « sens »</strong>.</li>
    </ul>
    <p><em>Tentative de définition : la performance organisationnelle pourrait être définie comme le résultat d'un processus maîtrisé afin d'atteindre un but préalablement défini, en mobilisant des ressources variées et optimisées.</em></p>
  </div>

  <h3>L'approche de l'US Navy</h3>
  <div class="example-box">
    <em>« Processus de définition de la <strong>mission</strong> et des <strong>outputs escomptés</strong>, de détermination des <strong>standards de la performance</strong>, de <strong>mise en relation du budget</strong> avec la performance, de <strong>reporting des résultats</strong> ainsi que de <strong>l'assurance que les managers sont comptables des résultats</strong>. »</em>
  </div>

  <h3>Entre efficacité et efficience</h3>
  <table class="comp-table">
    <thead><tr><th>Concept</th><th>Définition</th><th>Citation Drucker</th></tr></thead>
    <tbody>
      <tr><td><strong>Efficacité</strong></td><td>Atteinte des résultats <strong>quelle que soit l'allocation de ressources</strong></td><td>« Faire <strong>les bonnes choses</strong> »</td></tr>
      <tr><td><strong>Efficience</strong></td><td>Atteinte des résultats, en <strong>optimisant l'allocation de ressources</strong></td><td>« Faire les choses <strong>de la bonne façon</strong> »</td></tr>
    </tbody>
  </table>
  <div class="key-box">
    <strong>Le contexte fait la différence</strong> — La performance représenterait dans un contexte donné, la <strong>capacité d'être à la fois Efficace et Efficient</strong>. La performance est alors dépendante de la définition d'objectifs <strong>partagés, compris et mis en œuvre</strong>.
  </div>

  <h3>Le Modèle de Gilbert (1980)</h3>
  <div class="def-box">
    <div class="def-label">Modèle de Gilbert (1980) — Le triangle de la performance</div>
    <p>La performance se construit à l'intersection de 3 dimensions :</p>
    <ul>
      <li><strong>OBJECTIFS</strong></li>
      <li><strong>MOYENS</strong></li>
      <li><strong>RÉSULTATS</strong></li>
    </ul>
    Les écarts entre ces 3 sommets définissent :
    <ul>
      <li><strong>Objectifs ↔ Résultats</strong> : Efficacité</li>
      <li><strong>Moyens ↔ Résultats</strong> : Efficience</li>
      <li><strong>Objectifs ↔ Moyens</strong> : Pertinence</li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="performance" data-chap-idx="10" id="chap-10">
  <h2>10. L'organisation est un corps vivant — Michel Crozier</h2>
  <div class="def-box">
    <div class="def-label">Michel Crozier (1922-2013)</div>
    <p>Concepteur de <strong>l'analyse stratégique et de l'action collective</strong>.</p>
    <ul>
      <li>Les organisations sont comparables à des <strong>organismes vivants</strong>.</li>
      <li>Les êtres vivants <strong>planifient, analysent, expérimentent et décident</strong>.</li>

    </ul>
  </div>
  <h3>Vers un arbre de décision dynamique</h3>
  <div class="key-box">
    Trois leviers structurent l'arbre de décision organisationnel :
    <ul>
      <li><strong>Pouvoir</strong></li>
      <li><strong>Droit</strong></li>
      <li><strong>Intérêt</strong></li>
    </ul>
    Ces 3 dimensions interagissent en permanence et déterminent les jeux d'acteurs au sein de l'organisation.
  </div>
</div>

<div class="course-chapter" data-theme="pilotage" data-chap-idx="11" id="chap-11">

  <h3>Le dialogue social, enjeu pour construire la réussite</h3>
  <div class="example-box">

  <h3>Migrer d'une structure fonctionnelle à une structure projet</h3>
  <table class="comp-table">

        <td>Communication <strong>continue circulaire</strong>. Organisation centrée sur les <strong>processus</strong>.</td>
      </tr>
    </tbody>
  </table>
  <div class="key-box">

    <ul>

      <li><strong>Contrôler</strong> (autonomie)</li>
      <li><strong>Agir ou Réagir</strong></li>
    </ul>
  </div>

  <h3>Pour passer de la vision à l'action — 7 leviers</h3>
  <div class="key-box">
    <ol>

      <li><strong>Choisir ses clients en segmentant</strong></li>

  <div class="def-box">

      <li>Il n'y a <strong>pas de performance sans management</strong></li>
      <li>Il n'y a <strong>pas de management sans stratégie partagée</strong></li>
      <li>Il n'y a <strong>pas de réussite sans management</strong></li>
    </ul>

  </div>

  <h3>Piloter la performance organisationnelle</h3>
  <div class="example-box">
    <em>« L'art de diriger consiste à abandonner la baguette pour ne pas gêner l'orchestre. »</em> — <strong>Herbert von Karajan</strong>

  <table class="comp-table">

  </table>
  <div class="key-box">

function renderSujetCard(s, idx) {
  const planHTML = s.plan.map(section => `
    <div class="sujet-section">
      <div class="sujet-section-title">${escAnnale(section.section)}</div>
      <ul>${section.bullets.map(b => `<li>${escAnnale(b)}</li>`).join('')}</ul>
    </div>`).join('');
  const auteursHTML = s.auteurs_cles ? `
    <div class="sujet-meta-block">
      <div class="sujet-meta-label">📚 Auteurs / théories à citer</div>
      <div class="sujet-tags">${s.auteurs_cles.map(a => `<span class="sujet-tag">${escAnnale(a)}</span>`).join('')}</div>
    </div>` : '';
  const piegesHTML = s.pieges && s.pieges.length ? `
    <div class="sujet-meta-block">
      <div class="sujet-meta-label">⚠️ Pièges à éviter</div>
      <ul class="sujet-pieges">${s.pieges.map(p => `<li>${escAnnale(p)}</li>`).join('')}</ul>
    </div>` : '';
  return `
    <div class="sujet-card" id="sujet-${s.id}">
      <button class="sujet-card-head" onclick="toggleSujet('${s.id}')">
        <div class="sujet-card-head-left">
          <span class="sujet-card-num">${String(idx + 1).padStart(2, '0')}</span>
          <div>
            <div class="sujet-card-title">${escAnnale(s.titre)}</div>
            <div class="sujet-card-annee">${escAnnale(s.annee)}</div>
          </div>
        </div>
        <span class="sujet-card-chev">▸</span>
      </button>
      <div class="sujet-card-body" id="sujet-body-${s.id}" style="display:none">
        <div class="sujet-enonce">
          <div class="sujet-enonce-label">📝 Énoncé</div>
          <div class="sujet-enonce-text">${escAnnale(s.enonce)}</div>
        </div>
        ${auteursHTML}
        <div class="sujet-meta-block">
          <div class="sujet-meta-label">📐 Plan détaillé attendu</div>
          <div class="sujet-plan">${planHTML}</div>
        </div>
        ${piegesHTML}
      </div>
    </div>
  `;
}

function toggleSujet(id) {
  const body = document.getElementById('sujet-body-' + id);
  const card = document.getElementById('sujet-' + id);
  if (!body || !card) return;
  const isHidden = body.style.display === 'none' || !body.style.display;
  body.style.display = isHidden ? 'block' : 'none';
  card.classList.toggle('open', isHidden);
}

/* ═══════════════════════════════════════════════════════════
   ═══════ EXAMEN BLANC — 1 dissertation, format Besombes ═══════
   Pool : EVO_SUJETS (les mêmes sujets que l'onglet Sujets-types)
   Format : durée 30→60 min · textarea + auto-évaluation par cochage
   Note sur 20 pts répartis à parts égales sur les points-clés du plan.
   ═══════════════════════════════════════════════════════════ */

const EXAM_KEY = 'm2cca_examen_evo_orga';
let examState = null;
let examTimerInterval = null;

function eExamPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function eExamEscape(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Collecte de tous les points-clés (bullets) du plan + intro/pieges agrégés */
function examFlattenBullets(sujet) {
  const items = [];
  (sujet.plan || []).forEach(section => {
    (section.bullets || []).forEach(b => {
      items.push({ section: section.section, text: b });
    });
  });
  return items;
}

function loadExamScores() {
  try { return JSON.parse(localStorage.getItem(EXAM_KEY)) || []; } catch (e) { return []; }
}
function saveExamScore(score, total, durationSec, elapsedSec, sujetId) {
  const arr = loadExamScores();
  arr.unshift({ score, total, date: Date.now(), duration: durationSec, elapsed: elapsedSec, sujetId });
  localStorage.setItem(EXAM_KEY, JSON.stringify(arr.slice(0, 5)));
}

function renderExamen() {
  const root = document.getElementById('appRoot');
  const header = `
    <div class="page-header">
      <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
      <div class="page-title">${DATA.title}</div>
      <div class="page-subtitle">${DATA.subtitle}</div>
    </div>`;
  if (!examState) { root.innerHTML = header + renderExamenConfig(); return; }
  if (examState.submitted) { root.innerHTML = header + renderExamenResult(); return; }
  root.innerHTML = header + renderExamenRunning();
  examStartTimer();
}

function renderExamenConfig() {
  const scores = loadExamScores().slice(0, 3);
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const histHTML = scores.length === 0
    ? '<p style="color:var(--text3);font-size:0.82rem;text-align:center">Aucune tentative précédente</p>'
    : scores.map(s => {
        const pct = Math.round(s.score / s.total * 100);
        const d = new Date(s.date);
        const ds = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
        const mm = Math.floor((s.elapsed || 0) / 60);
        return `<span class="quiz-score-pill"><span style="color:${col};font-weight:700">${fmtNum(s.score)}/${s.total}</span><span style="color:var(--text3)">${ds} · ${mm} min</span></span>`;
      }).join('');
  const pool = EVO_SUJETS;
  return `
    <div class="fade-up">
      <div class="exam-setup">
        <div style="font-size:2.4rem">📝</div>
        <h3 style="font-family:'Playfair Display',serif;margin:0.4rem 0">Examen blanc — ${DATA.title}</h3>
        <p style="color:var(--text2);max-width:560px;margin:0 auto 1.4rem;font-size:0.92rem">Format épreuve écrite Besombes : 1 dissertation à rédiger, sans document, durée habituelle 1h, note sur 20 pts. ${pool.length} sujets dans le pool, tirage aléatoire. <strong>Focus sur le thème annoncé par le prof.</strong></p>
        <div class="quiz-history" style="max-width:560px;margin:0 auto 1.4rem">
          <div class="quiz-history-title">Tentatives récentes</div>
          ${histHTML}
        </div>
        <div class="exam-setup-grid">
          <div class="exam-setup-card">
            <div class="exam-setup-label">⏱ Durée</div>
            <input id="exam-duration" type="range" min="15" max="60" step="15" value="60" class="exam-slider" oninput="examUpdateDurationLabel(this.value)">
            <div class="exam-setup-value"><span id="exam-duration-label">60 min</span></div>
            <div class="exam-setup-hint" id="exam-duration-hint">→ <strong>1 dissertation</strong> sur <strong>20 pts</strong> (épreuve complète)</div>
          </div>
          <div class="exam-setup-card">
            <div class="exam-setup-label">📚 Pool de sujets</div>
            <p style="font-size:0.82rem;color:var(--text2);margin:0.4rem 0 0.6rem">${pool.length} sujets disponibles, tirage aléatoire à chaque lancement.</p>
            <div class="exam-setup-hint">Tous les sujets sont basés strictement sur le contenu du cours Besombes.</div>
          </div>
        </div>
        <button class="start-btn" style="margin-top:1.5rem" onclick="examStart()">🚀 Lancer l'examen blanc</button>
      </div>
    </div>
  `;
}

function examUpdateDurationLabel(val) {
  const sliderEl = document.getElementById('exam-duration');
  if (val == null) val = sliderEl ? sliderEl.value : 60;
  const lbl = document.getElementById('exam-duration-label');
  if (lbl) lbl.textContent = parseInt(val, 10) + ' min';
}

function examStart() {
  const dur = parseInt(document.getElementById('exam-duration').value, 10) * 60;
  const pool = EVO_SUJETS;
  if (!pool.length) { alert('Aucun sujet disponible.'); return; }
  const sujet = eExamPick(pool);
  examState = {
    startedAt: Date.now(),
    durationSec: dur,
    submitted: false,
    sujet,
    bullets: examFlattenBullets(sujet),
    answers: { text: '', checks: {} }
  };
  renderExamen();
}

function renderExamenRunning() {
  const s = examState.sujet;
  const text = examState.answers.text || '';
  return `
    <div class="exam-timer-bar" id="exam-timer-bar">
      <span class="exam-timer-icon">⏱</span>
      <span class="exam-timer-time" id="exam-timer-time">--:--</span>
      <div class="exam-timer-progress"><div class="exam-timer-progress-fill" id="exam-timer-fill"></div></div>
      <button class="exam-timer-submit" onclick="examSubmit(false)">Terminer →</button>
    </div>
    <div class="fade-up exam-running">
      <div class="exam-dossier">
        <div class="exam-dossier-head">
          <div class="exam-dossier-num">Dissertation</div>
          <div class="exam-dossier-title">${eExamEscape(s.titre)}</div>
          <div class="exam-dossier-pts">20 pts</div>
        </div>
        <div class="exam-context">
          <p><em>${eExamEscape(s.enonce)}</em></p>
          <p class="exam-rappel">📐 Durée 1h. À la soumission, tu cocheras les points-clés que tu as effectivement traités pour obtenir ta note.</p>
        </div>
        <div class="exam-q">
          <textarea class="exam-textarea" style="min-height:380px" placeholder="Rédigez votre dissertation structurée (introduction, 2-3 parties, conclusion)..." oninput="examUpdateText(this.value)">${eExamEscape(text)}</textarea>
          <div class="exam-wc" id="exam-wc">${text.trim() ? text.trim().split(/\s+/).length : 0} mots</div>
        </div>
      </div>
      <div style="text-align:center;margin:2rem 0">
        <button class="start-btn" onclick="examSubmit(false)">Terminer l'examen et voir le corrigé →</button>
      </div>
    </div>`;
}

function examUpdateText(val) {
  if (!examState || examState.submitted) return;
  examState.answers.text = val;
  const el = document.getElementById('exam-wc');
  if (el) el.textContent = (val.trim() ? val.trim().split(/\s+/).length : 0) + ' mots';
}

function examStartTimer() {
  clearInterval(examTimerInterval);
  const update = () => {
    if (!examState || examState.submitted) { clearInterval(examTimerInterval); return; }
    const elapsed = Math.floor((Date.now() - examState.startedAt) / 1000);
    const remaining = Math.max(0, examState.durationSec - elapsed);
    const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
    const ss = String(remaining % 60).padStart(2, '0');
    const el = document.getElementById('exam-timer-time');
    if (el) el.textContent = mm + ':' + ss;
    const fill = document.getElementById('exam-timer-fill');
    if (fill) fill.style.width = (remaining / examState.durationSec * 100) + '%';
    const bar = document.getElementById('exam-timer-bar');
    if (bar) {
      bar.classList.toggle('warn', remaining < 300 && remaining > 60);
      bar.classList.toggle('danger', remaining <= 60);
    }
    if (remaining <= 0) { clearInterval(examTimerInterval); examSubmit(true); }
  };
  update();
  examTimerInterval = setInterval(update, 1000);
}

function examSubmit(timeout) {
  if (!examState || examState.submitted) return;
  if (!timeout && !confirm('Terminer l\'examen et afficher le corrigé ? Tu ne pourras plus modifier ta rédaction (mais tu pourras encore cocher les points-clés).')) return;
  examState.submitted = true;
  examState.elapsedSec = Math.floor((Date.now() - examState.startedAt) / 1000);
  examState.timeout = !!timeout;
  clearInterval(examTimerInterval);
  // sauvegarde initiale du score (0 jusqu'à auto-évaluation)
  saveExamScore(0, 20, examState.durationSec, examState.elapsedSec, examState.sujet.id);
  renderExamen();
}

function examEvalCheck(key, checked) {
  if (!examState) return;
  examState.answers.checks = examState.answers.checks || {};
  examState.answers.checks[key] = checked;
  if (examState.submitted) examRecomputeScore();
}

function examRecomputeScore() {
  const checks = examState.answers.checks || {};
  const total = examState.bullets.length;
  const checked = Object.keys(checks).filter(k => checks[k]).length;
  const pts = Math.round(checked / total * 20 * 100) / 100;
  const el = document.getElementById('exam-score-live');
  if (el) el.textContent = pts.toFixed(2).replace('.', ',');
  // live persistence
  if (examState.submitted) {
    const arr = loadExamScores();
    if (arr.length > 0) {
      arr[0].score = pts;
      localStorage.setItem(EXAM_KEY, JSON.stringify(arr));
      flashSaveIndicator();
    }
  }
}

function flashSaveIndicator() {
  const el = document.getElementById('exam-save-flash');
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function renderExamenResult() {
  const s = examState.sujet;
  const a = examState.answers;
  const bullets = examState.bullets;
  const checked = bullets.filter((_, i) => (a.checks || {})['b' + i]).length;
  const pts = Math.round(checked / bullets.length * 20 * 100) / 100;
  const pct = Math.round(pts / 20 * 100);
  const emoji = pct >= 75 ? '🏆' : pct >= 50 ? '🎉' : pct >= 35 ? '👍' : '💪';
  const msg = pct >= 75 ? 'Mention TB' : pct >= 60 ? 'Mention B' : pct >= 50 ? 'Validé' : pct >= 30 ? 'Insuffisant' : 'Non validé';
  if (pct >= 75) launchConfetti();
  // Save the initial score with no checks
  const fmtNum = v => (Math.round(v * 100) / 100).toFixed(2).replace('.', ',');
  const mm = Math.floor(examState.elapsedSec / 60);
  const ss = examState.elapsedSec % 60;
  // group bullets by section for display
  const sectionMap = {};
  bullets.forEach((b, i) => { if (!sectionMap[b.section]) sectionMap[b.section] = []; sectionMap[b.section].push({ ...b, idx: i }); });
  const evalHTML = Object.keys(sectionMap).map(secTitle => `
    <div class="exam-eval-sub">
      <div class="exam-eval-section"><strong>${eExamEscape(secTitle)}</strong></div>
      ${sectionMap[secTitle].map(b => `
        <label class="exam-eval-item">
          <input type="checkbox" ${(a.checks || {})['b' + b.idx] ? 'checked' : ''} onchange="examEvalCheck('b${b.idx}', this.checked)">
          <span>${eExamEscape(b.text)}</span>
          <span class="exam-eval-pts">+${(20 / bullets.length).toFixed(2)} pt</span>
        </label>`).join('')}
    </div>
  `).join('');
  const auteursHTML = (s.auteurs_cles && s.auteurs_cles.length)
    ? `<div class="sujet-meta-block"><div class="sujet-meta-label">📚 Auteurs / concepts à mobiliser</div><div class="sujet-tags">${s.auteurs_cles.map(a => `<span class="sujet-tag">${eExamEscape(a)}</span>`).join('')}</div></div>`
    : '';
  const piegesHTML = (s.pieges && s.pieges.length)
    ? `<div class="sujet-meta-block"><div class="sujet-meta-label">⚠️ Pièges à éviter</div><ul class="sujet-pieges">${s.pieges.map(p => `<li>${eExamEscape(p)}</li>`).join('')}</ul></div>`
    : '';
  return `
    <div class="fade-up">
      <div class="score-box">
        <div class="score-emoji">${emoji}</div>
        <div class="score-num"><span id="exam-score-live">${fmtNum(pts)}</span> / 20</div>
        <div class="exam-save-flash-wrap"><span id="exam-save-flash" class="exam-save-flash">💾 Note sauvegardée</span></div>
        <div class="score-label">${msg} · ${pct}% · ${mm}min${ss > 0 ? ' ' + ss + 's' : ''}${examState.timeout ? ' (temps écoulé)' : ''}</div>
        <div class="score-actions">
          <button class="btn-secondary" onclick="examState = null; renderExamen()">↺ Nouvel examen</button>
        </div>
      </div>
      <div class="exam-result-dossier">
        <div class="exam-result-dossier-head">
          <div class="exam-result-dossier-title">📝 Sujet et ta rédaction</div>
        </div>
        <div style="padding:0 1rem 1rem">
          <p style="font-size:0.92rem;color:var(--text)"><strong>${eExamEscape(s.titre)}</strong></p>
          <p style="font-size:0.88rem;color:var(--text2);font-style:italic;margin:0.4rem 0 0.8rem">${eExamEscape(s.enonce)}</p>
          <div style="background:var(--bg);padding:0.8rem 1rem;border-radius:8px;border-left:3px solid var(--accent);font-size:0.88rem;white-space:pre-wrap">${eExamEscape(a.text || '(aucune rédaction saisie)')}</div>
        </div>
      </div>
      <div class="exam-result-dossier">
        <div class="exam-result-dossier-head">
          <div class="exam-result-dossier-title">✅ Auto-évaluation — coche les points-clés que tu as réellement traités</div>
        </div>
        <div style="padding:0.6rem 1rem 1rem">
          ${evalHTML}
        </div>
      </div>
      ${auteursHTML ? `<div class="exam-result-dossier"><div style="padding:1rem 1.3rem">${auteursHTML}</div></div>` : ''}
      ${piegesHTML ? `<div class="exam-result-dossier"><div style="padding:1rem 1.3rem">${piegesHTML}</div></div>` : ''}
    </div>`;
}
