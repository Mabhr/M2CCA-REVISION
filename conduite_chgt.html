          "items": [

              "q": "Après avoir rappelé ce qu'est la compétence, la GPEC et la GEPP, vous expliquerez en quoi la compétence est devenue un enjeu clé pour l'avenir des organisations.\n\nPuis, vous expliquerez en quoi une bonne gestion des compétences favorise l'autonomie des personnes dans un contexte de changement.",
              "correction": "[Meilleure copie — note 17/20 — « Très bon travail »]\n\n─── Définitions et introduction ───\n\nLa compétence est une disposition à combiner, à moduler et à mettre en œuvre des ressources. Elle représente le savoir-faire, les connaissances, l'expérience de chacun. Elle est nécessaire pour tel ou tel métier et doit être en adéquation avec le poste pour que la personne puisse être efficiente.\n\nLa GEPP est la gestion de l'emploi et du parcours professionnel. Elle a été mise en place en 2017 par Macron par le biais d'une ordonnance. Elle concerne toutes les entreprises qui ont plus de 300 salariés. Il s'agit d'une négociation auprès des salariés pour évaluer leurs compétences, voir les évolutions des métiers et l'amélioration des compétences. Cette négociation a lieu tous les trois ans.\n\nDe cette manière, on peut constater que la compétence est un enjeu crucial, obsolète dans la pérennité de l'entreprise. Dans un premier temps, il sera question de voir que la compétence est devenue un enjeu clé pour l'avenir des organisations. Ensuite, il sera pertinent de voir que la bonne gestion des compétences favorise l'autonomie des personnes dans un contexte de changement.\n\n─── I. La compétence : un enjeu clé pour l'avenir des organisations ───\n\nPour commencer, lors du recrutement, l'accent est mis sur l'adéquation des compétences réelles du candidat et les compétences requises pour le métier. Le système d'information est notamment utilisé pour répondre à cette problématique. En effet, de plus en plus d'entreprises utilisent l'IA prédictive pour constater les compétences. C'est le cas avec les ATS (Attending Tracking System) où l'IA sélectionne des CV en priorité par rapport à des compétences prédéfinies. L'IA peut également constater quelles sont les compétences en tension dans tel corps de métier. Un autre outil essentiel qui permet d'identifier les compétences des collaborateurs est le SIRH. Ce système d'information permet d'avoir une visualisation globale sur les salariés, constater leurs compétences, s'il y a un écart entre les compétences requises et réelles. Cela permet également de voir si les collaborateurs ont suivi des formations ou non. Tous ces outils informatiques permettent de constater les compétences et une adéquation de celles-ci avec le métier permet de faire fructifier grandement la performance de l'entreprise. Sans les compétences requises, les collaborateurs ne peuvent pas être efficients.\n\nOn peut également constater que la compétence est devenue un enjeu clé dans l'avenir des organisations dans certaines situations. Plusieurs anticipations doivent être prises en compte dans l'organisation d'une entreprise. La GEPP permet justement de mettre en avant l'anticipation des compétences. Cet élément doit être pris en compte lorsqu'un collaborateur part à la retraite par exemple. Il représente un savoir-faire, des compétences de plusieurs années. Il s'agit encore plus le cas dans les générations qui arrivent actuellement à la retraite car ces personnes sont souvent restées pendant plusieurs décennies dans la même entreprise. Ainsi, lors du recrutement du remplaçant, il faut quelqu'un qui doit avoir un minimum de compétences pour remplacer un collaborateur qui a une expérience très largement reconnue. Une inadéquation des compétences lors du recrutement du remplacement peut conduire à un véritable déséquilibre dans l'organisation de l'entreprise.\n\nUne autre situation à prendre en compte dans l'enjeu qu'est la compétence est l'anticipation de l'évolution des métiers. En effet, il s'agit d'un point abordé dans la GEPP qui est important. On peut donner l'exemple d'une assistante comptable qui doit faire face à l'arrivée de la facturation électronique. Son métier va complètement évoluer et les compétences acquises et réelles seront peut-être obsolètes pour l'évolution de son métier. Il ne sera plus demandé de faire de la saisie comptable mais plutôt vérifier les données transmises par le SI et valider celles-ci. Ainsi de nouvelles compétences seront requises et l'entreprise doit anticiper ces évolutions pour pouvoir mettre en place une nouvelle organisation.\n\n─── II. La gestion des compétences favorise l'autonomie dans un contexte de changement ───\n\nUne bonne gestion des compétences favorise l'autonomie des personnes dans un contexte de changement. En effet, un changement peut être mal perçu par les collaborateurs. Il peut y avoir de la résistance face à ce changement, ce qui complique l'organisation des compétences et le management à employer. En outre, une structure hiérarchique peut aussi être handicapante dans le changement d'organisation et la bonne gestion des compétences. C'est le cas car ce type de structure ne favorise pas la transmission du savoir. S'il n'y a pas de transmission du savoir, il ne peut pas y avoir une bonne gestion des compétences car elles ne circulent pas entre collaborateurs et la performance en est influencée.\n\nDe cette manière, il est possible de s'appuyer sur la théorie de Kotter pour favoriser une bonne gestion des compétences. Selon lui, il est important de définir des objectifs fixes et de permettre des victoires à court terme pour les collaborateurs. Il est également important de tous les faire participer aux différents projets de l'entreprise. En y prenant part, ils peuvent devenir autonomes et mettre en application leurs compétences. Une autre idée de Kotter est celle de la politique de l'urgence. Il faut être réactif dans ses missions. Cette réactivité pousse à l'autonomie.\n\nUn second auteur peut être cité pour montrer comment avoir une bonne gestion des compétences en vue d'une autonomie des collaborateurs. L'auteur en question est Peter Drucker. Ce dernier évoque l'homme comme l'atout stratégique d'une structure. Il faut définir des objectifs clairs et atteignables pour donner une impulsion positive. D'autre part, il faut que les collaborateurs soient dans un apprentissage en continu. Il faut régulièrement former les équipes afin que le savoir-faire augmente et que les compétences requises soient en adéquation avec la réalité. Tous ces éléments permettent une bonne gestion des compétences chez les collaborateurs et cela permet qu'ils deviennent autonomes.\n\n─── Conclusion ───\n\nEn conclusion, la GEPP et la GEPC (gestion des évolutions de compétences professionnelles) mettent en avant l'importance de la compétence. Comme on peut le voir au travers de l'utilisation des systèmes informatiques, il s'agit d'un élément que l'on ne peut pas négliger. Il faut que les compétences requises soient en adéquation avec les compétences réelles. Il en va de même lorsque les métiers évoluent ou qu'un collaborateur part à la retraite. Dans le cas contraire, il y a une désorganisation stratégique qui apparaît dans la structure. Afin d'assurer une bonne gestion des compétences au sein des collaborateurs, il est possible de s'appuyer sur les théories de Kotter et Drucker. Le contexte de changement peut effectivement révéler quelques difficultés qui peuvent être palliées par un bon management."

function escAnnale(s) {
  return String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
function toggleAnnaleCorrection(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const isHidden = el.style.display === 'none' || !el.style.display;
  el.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '▾ Masquer la correction' : '▸ Afficher la correction';
  btn.classList.toggle('open', isHidden);
}
function expandAllAnnales(scope) {
  document.querySelectorAll(scope + ' .annale-correction').forEach(el => { el.style.display = 'block'; });
  document.querySelectorAll(scope + ' .annale-show-corr').forEach(btn => { btn.textContent = '▾ Masquer la correction'; btn.classList.add('open'); });
}
function collapseAllAnnales(scope) {
  document.querySelectorAll(scope + ' .annale-correction').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll(scope + ' .annale-show-corr').forEach(btn => { btn.textContent = '▸ Afficher la correction'; btn.classList.remove('open'); });
}

function switchAnnale(idx, btn) {
  document.querySelectorAll('.annale-body-wrap').forEach(el => {
    el.style.display = parseInt(el.dataset.annaleIdx, 10) === idx ? '' : 'none';
  });
  document.querySelectorAll('.annale-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Collapse toutes les corrections de l'annale qu'on quitte pour repartir propre
  document.querySelectorAll('.annale-correction').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll('.annale-show-corr').forEach(b => { b.textContent = '▸ Afficher la correction'; b.classList.remove('open'); });
}

function getAnnalesHTML() {
  const list = (DATA.annales || []);
  if (!list.length) return `<div class="annales-empty"><p>Aucune annale disponible pour ce cours.</p></div>`;
  const renderOne = (a, aIdx) => {
    const meta = [a.duration ? `⏱ ${a.duration}` : '', a.format || '', a.professor ? `👤 ${a.professor}` : '']
      .filter(Boolean).join(' · ');
    const head = `
      <div class="annale-head">
        <div class="annale-head-row">
          <div class="annale-year">${escAnnale(a.year || '')}</div>
          <div class="annale-title">${escAnnale(a.name || 'Annale')}</div>
        </div>
        ${meta ? `<div class="annale-meta">${escAnnale(meta)}</div>` : ''}
      </div>`;
    const tipsHTML = (a.tips||[]).length ? `
      <div class="annale-tips">
        <div class="annale-block-title">💡 Conseils méthodologiques</div>
        <ul>${a.tips.map(t => `<li>${escAnnale(t)}</li>`).join('')}</ul>
      </div>` : '';

    // ── NOUVEAU SCHÉMA : dossiers[].items[{q,correction}] avec bouton par sous-question ──
    if (Array.isArray(a.dossiers) && a.dossiers.length) {
      const cardId = `annale-card-${aIdx}`;
      const dossiersHTML = a.dossiers.map((ds, dIdx) => {
        const itemsHTML = (ds.items || []).map((it, iIdx) => {
          const corrId = `corr-${aIdx}-${dIdx}-${iIdx}`;
          return `
          <div class="annale-question">
            <div class="annale-q-text">${escAnnale(it.q || '')}</div>
            ${it.correction ? `
              <button class="annale-show-corr" type="button" onclick="toggleAnnaleCorrection('${corrId}', this)">▸ Afficher la correction</button>
              <div class="annale-correction" id="${corrId}" style="display:none">${escAnnale(it.correction)}</div>
            ` : ''}
          </div>`;
        }).join('');
        return `
        <div class="annale-dossier">
          <div class="annale-dossier-label">${escAnnale(ds.label || '')}</div>
          ${ds.context ? `<div class="annale-dossier-context">${escAnnale(ds.context)}</div>` : ''}
          <div class="annale-dossier-items">${itemsHTML}</div>
        </div>`;
      }).join('');
      const subjectHTML = a.subject ? `
        <div class="annale-subject">
          <div class="annale-block-title">📋 Énoncé général</div>
          <div class="annale-subject-content">${escAnnale(a.subject)}</div>
        </div>` : '';
      return `
      <div class="annale-card" id="${cardId}">
        ${head}
        <div class="annale-toolbar">
          <button class="annale-toolbar-btn" type="button" onclick="expandAllAnnales('#${cardId}')">▾ Tout afficher</button>
          <button class="annale-toolbar-btn" type="button" onclick="collapseAllAnnales('#${cardId}')">▸ Tout masquer</button>
        </div>
        ${subjectHTML}
        <div class="annale-dossiers">${dossiersHTML}</div>
        ${tipsHTML}
      </div>`;
    }

    // ── ANCIEN SCHÉMA (fallback pour annales non encore migrées) ──
    const exHTML = (a.exercises || []).map(e => `
      <div class="annale-exercise">
        <div class="annale-exercise-label">${escAnnale(e.label)}</div>
        <div class="annale-exercise-content">${escAnnale(e.content||'').replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
    const bc = a.bestCopy;
    let bestCopyHTML = '';
    if (bc) {
      const planHTML = (bc.plan||[]).map(line => {
        const t = (line||'').trim();
        if (!t) return '<div class="annale-plan-spacer"></div>';
        if (/^(I+\.|[0-9]+\.|Introduction|Conclusion|Exercice|Q[0-9]+|•)/.test(t)) {
          return `<div class="annale-plan-line annale-plan-main">${escAnnale(t)}</div>`;
        }
        return `<div class="annale-plan-line">${escAnnale(t)}</div>`;
      }).join('');
      const conceptsHTML = (bc.keyConcepts||[]).map(c => `<span class="annale-concept">${escAnnale(c)}</span>`).join('');
      const qcmHTML = (bc.qcmAnswers||[]).length
        ? `<div class="annale-block annale-qcm"><div class="annale-block-title">QCM — réponses correctes</div>${bc.qcmAnswers.map(q=>`<div class="annale-qcm-line">${escAnnale(q)}</div>`).join('')}</div>`
        : '';
      bestCopyHTML = `
      <div class="annale-bestcopy">
        <div class="annale-bestcopy-head">
          <span class="annale-grade">📝 Note : ${escAnnale(bc.grade)}</span>
          ${bc.subjectChosen ? `<span class="annale-chosen">Sujet traité : ${escAnnale(bc.subjectChosen)}</span>` : ''}
        </div>
        ${qcmHTML}
        <div class="annale-block">
          <div class="annale-block-title">Plan-type / structure de la copie</div>
          <div class="annale-plan">${planHTML}</div>
        </div>
        ${(bc.keyConcepts||[]).length ? `
        <div class="annale-block">
          <div class="annale-block-title">Mots-clés &amp; concepts mobilisés</div>
          <div class="annale-concepts">${conceptsHTML}</div>
        </div>` : ''}
        ${bc.correctorNotes ? `<div class="annale-corrector"><strong>Annotations du correcteur :</strong> ${escAnnale(bc.correctorNotes)}</div>` : ''}
      </div>`;
    }
    let corrigeHTML = '';
    if (a.corrige && a.corrige.available) {
      const hl = (a.corrige.highlights||[]).map(h => `<li>${escAnnale(h)}</li>`).join('');
      corrigeHTML = `
      <div class="annale-corrige">
        <div class="annale-block-title">Corrigé officiel — points clés</div>
        ${a.corrige.summary ? `<p class="annale-corrige-summary">${escAnnale(a.corrige.summary)}</p>` : ''}
        <ul>${hl}</ul>
      </div>`;
    }
    return `
    <div class="annale-card">
      ${head}
      <div class="annale-subject">
        <div class="annale-block-title">📋 Sujet</div>
        <div class="annale-subject-content">${escAnnale(a.subject||'').replace(/\n/g,'<br>')}</div>
      </div>
      ${exHTML ? `<div class="annale-exercises">${exHTML}</div>` : ''}
      ${bestCopyHTML}
      ${corrigeHTML}
      ${tipsHTML}
    </div>`;
  };
  if (list.length === 1) return renderOne(list[0], 0);
  // Multi-annales : onglets en haut + un seul corps visible à la fois
  const tabsHTML = list.map((a, i) => `
    <button class="annale-tab${i === 0 ? ' active' : ''}" type="button" onclick="switchAnnale(${i}, this)">
      <span class="annale-tab-year">${escAnnale(a.year || '')}</span>
      ${a.name ? `<span class="annale-tab-name">${escAnnale(a.name)}</span>` : ''}
    </button>`).join('');
  return `
    <div class="annales-tabs">${tabsHTML}</div>
    <div class="annales-bodies">
      ${list.map((a, i) => `<div class="annale-body-wrap" data-annale-idx="${i}" style="${i === 0 ? '' : 'display:none'}">${renderOne(a, i)}</div>`).join('')}
    </div>`;
}

  <div class="key-box">
    <ul>
      <li>Construire la <strong>structure qui permettra de piloter</strong> et coordonner les actions</li>
      <li>Constitution d'une équipe de <strong>correspondants métiers</strong></li>
      <li>Répartition des rôles + cellule de coordination</li>
      <li>Initialisation d'un <strong>plan de communication</strong></li>
      <li>Indicateurs de pilotage</li>
      <li>Validation par les décideurs (structure et ressources)</li>
      <li>Communiquer rapidement pour : expliquer et vendre la cible, donner du sens, rassurer, informer sur la suite</li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="acteurs" data-chap-idx="7" id="chap-7">
  <h2>7. Les acteurs face au changement</h2>

  <h3>3 types de comportements face au changement</h3>
  <table class="comp-table">
    <thead><tr><th>Catégorie</th><th>%</th><th>Profil</th><th>Action recommandée</th></tr></thead>
    <tbody>
      <tr>
        <td><strong>Les PROACTIFS (constructifs)</strong></td>
        <td>10 à 20 %</td>
        <td>Favorables au changement, se positionnent comme <strong>prescripteurs</strong></td>
        <td><strong>Les utiliser</strong></td>
      </tr>
      <tr>
        <td><strong>Les PASSIFS (hésitants)</strong></td>
        <td>60 à 80 %</td>
        <td>En attente de résultats probants, veulent <strong>être sécurisés</strong></td>
        <td><strong>Les rassurer</strong></td>
      </tr>
      <tr>
        <td><strong>Les OPPOSANTS (destructeurs)</strong></td>
        <td>10 à 20 %</td>
        <td>Opposés aux projets, avancent systématiquement des <strong>arguments « contre »</strong></td>
        <td><strong>Les laisser s'isoler</strong> pour mieux les raccrocher</td>
      </tr>
    </tbody>
  </table>

  <h3>3 niveaux d'acteurs pour accompagner le changement</h3>
  <div class="key-box">
    <strong>① S'appuyer sur le Top Management</strong> pour donner l'<strong>impulsion et la légitimité</strong> :
    <ul>
      <li>Montrer à tous que le projet est moteur pour l'organisation</li>
      <li>Prendre les décisions importantes et les communiquer</li>
      <li>… ce qui suppose que le Top Management est <strong>impliqué et motivé</strong></li>
    </ul>
  </div>
  <div class="key-box">
    <strong>② Puis sur le Middle Management opérationnel</strong> pour <strong>relayer</strong> :
    <ul>
      <li>S'impliquer dans les actions de communication</li>
      <li>Intégrer les changements dans le management au quotidien</li>
      <li>Contribuer à l'accompagnement post-déploiement</li>
      <li>… ce qui suppose que le Management de proximité bénéficie d'un <strong>temps d'avance</strong></li>
    </ul>
  </div>
  <div class="key-box">
    <strong>③ Miser sur des Ressources Métiers</strong> pour accompagner le changement :
    <ul>
      <li>Ils <strong>connaissent l'organisation</strong></li>
      <li>Ils sont <strong>légitimes</strong></li>
      <li>Ils <strong>resteront</strong></li>
      <li>… ce qui suppose de les mobiliser et de les animer le plus en amont possible, puis de les accompagner dans ce rôle</li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="pilotage" data-chap-idx="8" id="chap-8">
  <h2>8. Outils opérationnels : RACI, matrices et grille communication</h2>

  <h3>La méthode RACI</h3>
  <div class="def-box">
    <div class="def-label">RACI — 4 rôles par activité</div>
    <ul>
      <li><strong>R : Responsable (1 et un seul par activité)</strong> — Donne son approbation, et assume la responsabilité globale de l'activité et ses conséquences</li>
      <li><strong>A : Acteur (1 à n par étape)</strong> — Réalise les activités</li>
      <li><strong>C : Contribution (0 à n par étape)</strong> — Dispose d'une information / d'une expertise pour la réalisation de l'activité, mais n'a pas d'autorité sur celle-ci (c'est R qui décide)</li>
      <li><strong>I : Information (0 à n par étape)</strong> — Informé de l'activité, sans avoir d'intervention dans sa réalisation (est généralement indirectement impacté)</li>
    </ul>
  </div>

  <h3>Identifier les impacts organisationnels</h3>
  <div class="key-box">
    <ol>
      <li>Identifier les impacts <strong>par processus / sous-processus</strong></li>
      <li>Identifier les <strong>scénarios</strong> et formuler une recommandation, puis faire arbitrer</li>
      <li><strong>Formaliser le RACI</strong> par processus</li>
    </ol>
  </div>

  <h3>Grille communication × dispositif (suivre les questions des acteurs)</h3>
  <table class="comp-table">
    <thead><tr><th>Question posée par l'acteur</th><th>Dispositif à mettre en œuvre</th></tr></thead>
    <tbody>
      <tr><td><strong>« Pourquoi changer ? »</strong></td><td>Communication projet · Kits de communication</td></tr>
      <tr><td><strong>« Comment ça va se passer ? »</strong></td><td>Information ciblée par métier, domaine, fonction, rôle</td></tr>
      <tr><td><strong>« Qu'est-ce qui change pour moi ? »</strong></td><td>Modules de sensibilisation</td></tr>
      <tr><td><strong>« Vais-je être à la hauteur ? »</strong></td><td>Formation aux nouveautés (outils, processus, comportements)</td></tr>
      <tr><td><strong>« Comment vais-je faire ? »</strong></td><td>Modules de formation</td></tr>
      <tr><td><strong>« Suis-je prêt ? »</strong></td><td>Entraînement libre ou encadré</td></tr>
      <tr><td><strong>« Je ne suis pas prêt ! »</strong></td><td>Assistance de proximité</td></tr>
      <tr><td><strong>« Comment faire encore mieux ? »</strong></td><td>Assistance à distance + Management au quotidien</td></tr>
    </tbody>
  </table>

  <h3>Piloter le changement — préalable</h3>
  <div class="key-box">
    Constituer une <strong>instance décisionnaire dédiée à l'accompagnement du changement</strong> qui couvre :
    <ul>
      <li>Cohérence avec les orientations stratégiques</li>
      <li>Indicateurs à suivre</li>
      <li>Ressources nécessaires, relais terrain</li>
      <li>Tactique de déploiement</li>
      <li>Coordination équipe projet</li>
      <li>Planification, suivi du plan d'action</li>
      <li>Déploiement des actions de communication clés</li>
      <li>Alertes et risques</li>
    </ul>
  </div>

  <h3>Matrice de décision &amp; Matrice d'impact</h3>
  <div class="example-box">
    Le support s'appuie sur 2 outils visuels : la <strong>matrice de décision (vote pour décider)</strong> et la <strong>matrice d'impact</strong>, utilisées pour arbitrer entre options et qualifier les conséquences organisationnelles.
  </div>
</div>

<div class="course-chapter" data-theme="pilotage" data-chap-idx="9" id="chap-9">
  <h2>9. Les 10 points clés de la conduite du changement (Besombes)</h2>
  <div class="key-box">
    <ol>
      <li><strong>Faire participer les acteurs clés</strong> — savoir les identifier, puis les mobiliser</li>
      <li><strong>Rester factuel</strong> — écouter, comprendre, restituer, donner les moyens de qualifier et prioriser</li>
      <li><strong>Être réaliste</strong> — tenir compte de la capacité de changement du terrain, voire de son envie de changement</li>
      <li><strong>Communiquer « honnête » et « utile »</strong> — sans noyer sous un flot d'information</li>
      <li><strong>Faciliter la coordination des projets</strong> — afin de contribuer à la stratégie</li>
      <li><strong>Accompagner le changement</strong> — en tenant compte du processus de « deuil » des collaborateurs</li>
      <li><strong>Mesurer les impacts</strong> d'un projet et l'ampleur du changement — avant de décider « quoi communiquer » ou « qui sensibiliser et former à quoi »</li>
      <li><strong>S'appuyer sur une méthodologie structurée et rassurante</strong> pour garantir l'appropriation des changements</li>
      <li><strong>S'appuyer sur la Direction Générale</strong> pour donner l'impulsion et la légitimité, puis sur le middle management opérationnel pour relayer</li>
      <li><strong>S'appuyer sur des ressources métiers internes</strong> pour accompagner le changement — et les « chouchouter »</li>
    </ol>
  </div>
  <div class="def-box" style="text-align:center; margin-top:1.5rem;">
    <p style="font-style:italic;">« La conduite du changement repose moins sur une méthode magique que sur une <strong>discipline d'écoute, de coordination et d'accompagnement</strong>, articulée autour d'une démarche structurée et de quelques outils robustes. »</p>
  </div>
</div>

<div class="course-chapter" data-theme="competences" data-chap-idx="10" id="chap-10">
  <h2>10. La gestion des compétences — fondamentaux Besombes</h2>

  <h3>De la description de poste à la performance — chaîne des rôles</h3>
  <div class="def-box">
    <div class="def-label">Traitement et exploitation des descriptions de poste</div>
    <p>4 rôles successifs définissent la performance organisationnelle :</p>
    <ul>
      <li><strong>Rôle confié</strong> (par l'organisation)</li>
      <li><strong>Rôle perçu</strong> (par le salarié)</li>
      <li><strong>Rôle accepté</strong> (par le salarié)</li>
      <li><strong>Rôle tenu</strong> (effectivement)</li>
    </ul>
    <p style="margin-top:0.6rem">La <strong>description de poste</strong> permet de minimiser l'<strong>écart d'efficacité</strong> entre rôle confié et rôle tenu.</p>
  </div>

  <h3>Pourquoi la gestion des compétences est devenue critique</h3>
  <div class="key-box">
    Les entreprises doivent en permanence se remettre en cause, tant leur environnement est soumis à des <strong>mutations importantes</strong>. L'organisation doit être <strong>aussi réactive que possible</strong> et permettre le développement des initiatives conduisant à l'obtention de la performance.
  </div>
  <h4>Problèmes RH actuels</h4>
  <div class="key-box">
    <ul>
      <li><strong>Transformation des niveaux de qualifications</strong></li>
      <li><strong>Modification de la structure de population</strong> (âge, niveau…)</li>
      <li><strong>Modification du comportement</strong></li>
      <li><strong>Départs / promotions</strong></li>
      <li><strong>Modification du rapport au travail</strong></li>
    </ul>
  </div>

  <h3>Définition de la compétence</h3>
  <div class="def-box">
    <div class="def-label">La compétence selon Besombes</div>
    <p>« La compétence est une <strong>disposition à mobiliser, à combiner et mettre en œuvre des ressources</strong> (savoir, savoir-faire, savoir-être). C'est la <strong>combinaison dynamique</strong> de différents éléments. »</p>
    <ul>
      <li><strong>Savoir théorique</strong></li>
      <li><strong>Procédures et / ou bonnes pratiques</strong></li>
      <li><strong>Savoir-faire</strong></li>
      <li><strong>Expérience non formalisée</strong></li>
    </ul>
  </div>

  <h3>Identification des compétences</h3>
  <div class="key-box">
    <strong>Méthode 1 — Selon le potentiel estimé</strong> (5 critères) :
    <ol>
      <li>Motivation</li>
      <li>Caractère</li>
      <li>Image que l'on a de soi</li>
      <li>Les connaissances et le savoir</li>
      <li>Le savoir-faire</li>
    </ol>
    <p style="margin-top:0.6rem"><em>Il est préférable d'embaucher quelqu'un qui a 1, 2, 3 et de le former à 4 et 5.</em></p>
  </div>
  <div class="key-box">
    <strong>Méthode 2 — L'approche par les compétences professionnelles</strong> :
    <ul>
      <li>Les compétences sont définies par leur <strong>contenu en termes de savoir</strong></li>
      <li>Permet de rapprocher les <strong>diplômes souhaités dans les référentiels d'emplois</strong></li>
    </ul>
  </div>

  <h3>Compétences selon l'objectif poursuivi</h3>
  <div class="key-box">
    <strong>Identification des compétences nécessaires</strong> :
    <ul>
      <li>Établir un <strong>référentiel des métiers ou des emplois</strong>, élaboré soit dans le cadre d'une réflexion menée dans l'entreprise, soit provenant de l'extérieur et adapté</li>
      <li>Indication du <strong>niveau de maîtrise sur 4 à 5 niveaux</strong></li>
    </ul>
  </div>
  <div class="key-box">
    <strong>Identification des compétences détenues</strong> — 4 outils :
    <ul>
      <li><strong>Mesure de l'employabilité individuelle</strong></li>
      <li><strong>Bilan de compétences</strong></li>
      <li><strong>Portefeuille de compétences</strong></li>
      <li><strong>Cartes de compétences</strong></li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="competences" data-chap-idx="11" id="chap-11">
  <h2>11. GPEC, organisation qualifiante et systèmes d'évaluation</h2>

  <h3>GPEC — Gestion Prévisionnelle des Emplois et des Compétences</h3>
  <div class="def-box">
    <div class="def-label">Objectif de la GPEC</div>
    <p>Vise à <strong>réduire, de façon anticipée, les écarts entre les besoins et les ressources</strong> de l'entreprise en termes d'effectifs et de compétences en fonction des objectifs identifiés, avec l'<strong>implication du salarié</strong> dans le cadre d'un projet d'évolution professionnelle.</p>
  </div>

  <h3>Éthique de performance</h3>
  <div class="key-box">
    L'<strong>éthique de performance</strong> repose sur un triangle :
    <ul>
      <li><strong>Actionnaires</strong> (stratégie, vision)</li>
      <li><strong>Salariés</strong> (création de valeur)</li>
      <li><strong>Clients</strong> (profits)</li>
    </ul>
    Au centre : la <strong>Direction</strong> assure l'équilibre permanent et la constance de l'objectif stratégique.
  </div>

  <h3>L'organisation qualifiante</h3>
  <div class="def-box">
    <p>L'<strong>organisation qualifiante</strong> repose sur 3 piliers :</p>
    <ul>
      <li><strong>Enrichissement des tâches</strong></li>
      <li><strong>Volonté éducative</strong> (développement de l'apprentissage permanent)</li>
      <li><strong>Recherche de la compétitivité</strong></li>
    </ul>
  </div>
  <div class="key-box">
    <strong>Éléments préalables</strong> :
    <ul>
      <li>Identification et connaissance des emplois actuels (résultats attendus, compétences requises via <strong>dictionnaire de compétences</strong>)</li>
      <li>Prévision raisonnable et réaliste de l'évolution de l'emploi</li>
    </ul>
    <strong>Mise en œuvre</strong> : travailler sur l'organisation en tenant compte
    <ul>
      <li>Des compétences existantes ou pouvant être recrutées</li>
      <li>En augmentant le niveau de compétences (plan de formation)</li>
      <li>En faisant évoluer les compétences</li>
    </ul>
  </div>

  <h3>Description de poste — schéma de principe</h3>
  <div class="def-box">
    <p>La <strong>description de poste</strong> est un outil à la fois RH et organisationnel. Distinguons :</p>
    <ul>
      <li><strong>Le poste</strong> (emploi tenu) : unité physiquement identifiable</li>
      <li><strong>La fonction</strong> : activités mises en œuvre tendant vers le même but</li>
    </ul>
  </div>
  <table class="comp-table">
    <thead><tr><th>Rubrique</th><th>Contenu</th></tr></thead>
    <tbody>
      <tr><td><strong>Intitulé du poste</strong></td><td>Nom officiel du poste</td></tr>
      <tr><td><strong>Missions</strong></td><td>Finalités du poste</td></tr>
      <tr><td><strong>Dimensions</strong></td><td>Chiffres significatifs</td></tr>
      <tr><td><strong>Contexte général</strong></td><td>Cadre général de travail, contraintes</td></tr>
      <tr><td><strong>Nature et étendue des activités</strong></td><td>Analyse du cadre d'activité et de ses moyens</td></tr>
      <tr><td><strong>Résultats attendus</strong></td><td>Identification des objectifs</td></tr>
    </tbody>
  </table>

  <h3>Les 3 dimensions des compétences</h3>
  <div class="key-box">
    <strong>① En termes de métier</strong> : connaissances techniques et théoriques · connaissances pratiques et savoir-faire<br>
    <strong>② En termes de management</strong> : compétences relationnelles liées au métier · planification, organisation, coordination, contrôle · direction, animation, motivation<br>
    <strong>③ Orientation vers les résultats</strong> : initiation, autonomie · engagement, sens des responsabilités · sens des priorités et flexibilité · contribution aux axes de progrès
  </div>

  <h3>Les systèmes d'évaluation</h3>
  <div class="def-box">
    <p>L'évaluation des compétences doit s'envisager au regard d'<strong>objectifs à atteindre</strong>. Elle doit mettre en évidence des <strong>écarts à combler</strong> et permettre de fonder des démarches de progrès.</p>
    <p>Inducteur de changement, l'instauration d'un système d'évaluation fait évoluer : <strong>comportements, pratiques managériales, relations d'autorité, mentalités, représentations culturelles</strong>.</p>
  </div>
  <table class="comp-table">
    <thead><tr><th>Vers une évaluation « sanction »</th><th>Vers une évaluation « formative »</th></tr></thead>
    <tbody>
      <tr>
        <td>
          La performance, les résultats. <strong>Outil de mesures</strong> :
          <ul>
            <li>Les objectifs quantitatifs</li>
            <li>Les plans d'actions</li>
            <li>Le management de la performance</li>
          </ul>
        </td>
        <td>
          Les compétences, la tenue du poste. <strong>Outils de mesure</strong> :
          <ul>
            <li>Les orientations développement</li>
          </ul>
        </td>
      </tr>
    </tbody>
  </table>

  <h4>Conditions de mise en œuvre</h4>
  <div class="key-box">
    Pour mettre en œuvre un système d'appréciation, il faut confier aux salariés :
    <ul>
      <li>Des <strong>missions claires</strong></li>
      <li>Des <strong>moyens adaptés</strong></li>
    </ul>
    <strong>3 types de missionnement</strong> :
    <ul>
      <li>Les <strong>directives</strong> (règle, procédure, plan d'action)</li>
      <li>Les <strong>objectifs quantitatifs</strong></li>
      <li>Les <strong>orientations ou objectifs qualitatifs</strong></li>
    </ul>
    <strong>3 types d'appréciation</strong> :
    <ul>
      <li>Le <strong>contrôle</strong></li>
      <li>La <strong>mesure</strong></li>
      <li>L'<strong>appréciation</strong></li>
    </ul>
  </div>

  <h4>Implications du système d'appréciation</h4>
  <div class="key-box">
    La mise en œuvre s'appuyant sur des <strong>entretiens individuels</strong> fait appel à des notions qui relèvent de la <strong>culture d'entreprise</strong>. La démarche doit intégrer :
    <ul>
      <li>La clarification des postes</li>
      <li>La clarification des objectifs</li>
      <li>Des objectifs quantitatifs</li>
      <li>Des plans d'actions formalisés</li>
      <li>L'appréciation des résultats</li>
      <li>La notion de performance</li>
    </ul>
  </div>

  <h3>La culture d'entreprise — 5 forces</h3>
  <div class="def-box">
    La culture d'entreprise repose sur 5 forces :
    <ul>
      <li><strong>Mythes</strong></li>
      <li><strong>Rites</strong></li>
      <li><strong>Identité</strong></li>
      <li><strong>Valeurs</strong></li>
      <li><strong>Histoire</strong></li>
    </ul>
  </div>
</div>

<div class="course-chapter" data-theme="equipe" data-chap-idx="12" id="chap-12">
  <h2>12. L'équipe et le management agile (Besombes)</h2>

  <h3>Les 5 étapes de constitution d'une équipe</h3>
  <table class="comp-table">
    <thead><tr><th>Étape</th><th>Description</th><th>Rôle du manager</th></tr></thead>
    <tbody>
      <tr><td><strong>① CONSTITUTION</strong></td><td>Création de l'équipe, découverte des autres et de la légitimité de chacun, positionnement au sein de l'équipe</td><td>Team Building</td></tr>
      <tr><td><strong>② TENSION</strong></td><td>Confrontation des opinions (parfois violemment), divergences objectives ou irrationnelles, tensions</td><td>Prévention · Gestion des conflits</td></tr>
      <tr><td><strong>③ NORMALISATION</strong></td><td>Acceptation d'un but commun, d'un cadre commun de travail, apparition de règles et structuration de l'équipe</td><td>Négociation</td></tr>
      <tr><td><strong>④ PRODUCTION</strong></td><td>Travail collectif vers le but commun. En marche vers l'efficacité de l'équipe</td><td>Motivation</td></tr>
      <tr><td><strong>⑤ DISSOLUTION</strong></td><td>Dissolution de l'équipe (membres partis, nouveaux arrivants)</td><td>Valorisation</td></tr>
    </tbody>
  </table>

  <h3>Travailler en équipe — définition</h3>
  <div class="def-box">
    <div class="def-label">Définition de l'équipe (selon Lewin)</div>
    <p>« <strong>L'essence d'un groupe est l'interdépendance de chacun de ses membres.</strong> » — Kurt Lewin</p>
    <p>Caractéristiques d'une équipe :</p>
    <ul>
      <li><strong>Objectif commun</strong></li>
      <li><strong>Interaction psychologique</strong></li>
      <li><strong>Existence collective</strong></li>
    </ul>
  </div>

  <h3>Le continuum de management — comportement managérial selon l'autorité</h3>
  <div class="key-box">
    Le management s'inscrit sur un continuum entre <strong>autorité du responsable</strong> et <strong>liberté d'action du groupe</strong>, organisé en 7 niveaux :
    <table class="comp-table">
      <thead><tr><th>Centré sur l'animateur</th><th>Centré sur le groupe</th></tr></thead>
      <tbody>
        <tr><td>AUTORITÉ — directif</td><td>IMPLICATIF — délégation, responsabilisant</td></tr>
        <tr><td>INFORMATION</td><td>NÉGOCIATION</td></tr>
        <tr><td>EXPLICATIF</td><td>EXPLICATIF — concertation</td></tr>
        <tr><td>CONSULTATION</td><td></td></tr>
      </tbody>
    </table>
  </div>

  <h3>Management et responsabilisation — modèle Pertinence / Cap / Actions / Ressources</h3>
  <div class="key-box">
    Pour responsabiliser, articuler 4 dimensions :
    <ul>
      <li><strong>Cap</strong> — Quelle est la destination à atteindre ?</li>
      <li><strong>Actions</strong> — Comment s'y prendre pour atteindre le cap ?</li>
      <li><strong>Ressources</strong> — Avec qui et quoi pour atteindre le cap ?</li>
      <li><strong>Pertinence</strong> — Sens ? Utilité ? Cohérence ?</li>
    </ul>
  </div>

  <h3>Les 4 attentes vis-à-vis du manager</h3>
  <div class="key-box">
    Ce que les managés attendent de leur manager (notamment dans une équipe « nouvelle ») :
    <ol>
      <li><strong>Honnête</strong> — l'intégrité (confiance)</li>
      <li><strong>Compétent</strong> — la compétence (technique &amp; managériale)</li>
      <li><strong>Tourné vers l'avenir</strong> — la vision</li>
      <li><strong>Motivant</strong> — le dynamisme (implication et responsabilisation)</li>
    </ol>
  </div>

  <h3>Agilité managériale</h3>
  <div class="def-box">
    <div class="def-label">Agilité managériale</div>
    <p>La <strong>capacité d'adaptation et d'innovation</strong> mobilisée ensemble face à :</p>
    <ul>
      <li>Quelles problématiques ?</li>
      <li>Quelle résolution de problème ensemble ?</li>
      <li>Quel plan d'actions concerté ?</li>
    </ul>
  </div>

  <h3>Manager n'est pas une fin en soi, c'est un moyen</h3>
  <div class="key-box">

      <li>Rester concentré sur l'essentiel (satisfaction du client et des collaborateurs)</li>
      <li>Se connaître soi-même pour entrer en relation et dans une dynamique positive de travail avec l'autre. Être cohérent ensemble.</li>
      <li>La discipline de groupe crée les conditions de la réussite : ses membres formulent ensemble le projet, se mettent d'accord sur les objectifs, définissent une méthode de travail commune, développent des compétences complémentaires à un niveau élevé, s'engagent collectivement à atteindre les résultats souhaités.</li>
    </ul>
  </div>

  <h3>Le Modèle de Gilbert (1980) — triangle de la performance</h3>
  <div class="def-box">
    <div class="def-label">Modèle de Gilbert (1980)</div>
    <p>La <strong>performance</strong> se construit à l'intersection de 3 dimensions :</p>

      <li><strong>OBJECTIFS</strong></li>
      <li><strong>MOYENS</strong></li>
      <li><strong>RÉSULTATS</strong></li>
    </ul>

    <ul>
      <li><strong>Objectifs ↔ Résultats</strong> : Efficacité</li>
      <li><strong>Moyens ↔ Résultats</strong> : Efficience</li>
      <li><strong>Objectifs ↔ Moyens</strong> : Pertinence</li>
    </ul>
  </div>

  <h3>Conclusion — la quête d'équilibre</h3>
  <div class="def-box" style="text-align:center;">
    <p style="font-style:italic;">« La recherche de l'<strong>équilibre entre les besoins en ressources de l'organisation et les ressources prévisibles</strong> conduit à rechercher divers modes d'ajustements internes et externes. »</p>
  </div>
</div>
`;
}

/* ═══════ TABS ═══════ */
const TABS = [
  { id:'checklist', label:'✅ Checklist', prog:10 },
  { id:'cours',     label:'📖 Cours',     prog:20 },
  { id:'synth',     label:'📝 Synthèse',  prog:35 },
  { id:'schemas',   label:'📊 Schémas',   prog:48 },
  { id:'flash',     label:'⚡ Flashcards', prog:50 },
  { id:'quiz',      label:'🎯 Quiz',      prog:65 },
  { id:'sujets',    label:'🗂 Sujets-types', prog:78 },
  { id:'examen',    label:'📝 Examen blanc', prog:90 },
  { id:'annales',   label:'📜 Annales',   prog:100 }
];
let currentTab = 'checklist';
let fcTheme = 'all', quizTheme = 'all', coursTheme = 'all';

function getFilteredFlashcards() {
  if (fcTheme === 'all') return DATA.flashcards.map((_, i) => i);
  return DATA.flashcards.map((fc, i) => fc.theme === fcTheme ? i : -1).filter(i => i >= 0);
}
function getFilteredQuizQuestions() {
  if (quizTheme === 'all') return DATA.quizQuestions;
  return DATA.quizQuestions.filter(q => q.theme === quizTheme);
}
function setFcTheme(id) { fcTheme = id; switchTab('flash'); }
function setQuizTheme(id) { quizTheme = id; switchTab('quiz'); }
function setQuizCount(n) {
  quizCount = n;
  document.querySelectorAll('.quiz-count-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.n) === n));
  const p = document.querySelector('.quiz-setup p');
  if (p) {
    const fq = getFilteredQuizQuestions();
    p.textContent = Math.min(quizCount, fq.length) + ' questions tirées au sort sur ' + fq.length + (quizTheme !== 'all' ? ' (thème filtré)' : '');
  }
}
function setCoursTheme(id) { coursTheme = id; applyCoursFilter(); renderCoursPills(); }
function applyCoursFilter() {
  document.querySelectorAll('.course-chapter').forEach(el => {
    const matches = coursTheme === 'all' || el.dataset.theme === coursTheme;
    el.style.display = matches ? '' : 'none';
  });
  const empty = document.getElementById('coursEmpty');
  if (empty) {
    const visible = Array.from(document.querySelectorAll('.course-chapter')).some(el => el.style.display !== 'none');
    empty.style.display = visible ? 'none' : 'block';
  }
}
function renderCoursPills() {
  const host = document.getElementById('coursThemeSelectorWrap');
  if (host) host.innerHTML = themeSelectorHTML('cours');
}

function themeSelectorHTML(scope) {
  const current = scope === 'flash' ? fcTheme : (scope === 'quiz' ? quizTheme : coursTheme);
  const fn = scope === 'flash' ? 'setFcTheme' : (scope === 'quiz' ? 'setQuizTheme' : 'setCoursTheme');
  const themes = DATA.themes || [];
  if (!themes.length) return '';
  const counts = {};
  if (scope === 'flash') {
    counts.all = DATA.flashcards.length;
    themes.forEach(t => counts[t.id] = DATA.flashcards.filter(fc => fc.theme === t.id).length);
  } else if (scope === 'quiz') {
    counts.all = DATA.quizQuestions.length;
    themes.forEach(t => counts[t.id] = DATA.quizQuestions.filter(q => q.theme === t.id).length);
  } else {
    // cours : on compte les .course-chapter DOM si déjà présents, sinon fallback à 0
    const chaps = document.querySelectorAll('.course-chapter');
    counts.all = chaps.length;
    themes.forEach(t => counts[t.id] = Array.from(chaps).filter(c => c.dataset.theme === t.id).length);
  }
  const pill = (id, label, count) => `<button class="theme-pill${current === id ? ' active' : ''}" onclick="${fn}('${id}')" title="${label}">${label} <span class="theme-count">${count}</span></button>`;
  return `<div class="theme-selector" id="coursThemeSelector-${scope}">
    <div class="theme-label">Filtre par axe</div>
    <div class="theme-pills">
      ${pill('all', '🔍 Tous', counts.all)}
      ${themes.map(t => pill(t.id, t.icon + ' ' + t.label, counts[t.id] || 0)).join('')}
    </div>
  </div>`;
}


function switchTab(id) {
  currentTab = id;
  renderNav();
  removeScrollSpy();
  const t = TABS.find(t => t.id === id);
  document.getElementById('progressFill').style.width = (t ? t.prog : 0) + '%';
  renderTab(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderNav() {
  document.getElementById('navTabs').innerHTML = TABS.map(t =>
    `<button class="nav-tab${t.id === currentTab ? ' active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function renderTab(id) {
  const root = document.getElementById('appRoot');
  const header = `
    <div class="page-header">
      <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
      <div class="page-title">${DATA.title}</div>
      <div class="page-subtitle">${DATA.subtitle}</div>
    </div>`;
  if (id === 'checklist') root.innerHTML = header + renderChecklist();
  else if (id === 'cours') {
    root.innerHTML = header + `<div class="fade-up"><div id="coursThemeSelectorWrap"></div>${getCoursHTML()}<div id="coursEmpty" class="cours-empty" style="display:none">Aucun chapitre dans cet axe pour ce cours.</div></div>`;
    document.getElementById('coursThemeSelectorWrap').innerHTML = themeSelectorHTML('cours');
    applyCoursFilter();
    setTimeout(() => buildScrollSpy('.main', '.course-chapter:not([style*="display: none"]) h2'), 100);
    if (window._pendingCoursJump) { window._pendingCoursJump(); window._pendingCoursJump = null; }
  }
  else if (id === 'synth') root.innerHTML = header + `<div class="fade-up fade-up-stagger">${getSynthHTML()}</div>`;
  else if (id === 'schemas') root.innerHTML = header + `<div class="fade-up fade-up-stagger">${getSchemasHTML()}</div>`;
  else if (id === 'flash') { root.innerHTML = header + renderFlash(); bindFlash(); }
  else if (id === 'quiz')  { root.innerHTML = header + renderQuizSetup(); }
  else if (id === 'annales'){ root.innerHTML = header + `<div class="fade-up fade-up-stagger">${getAnnalesHTML()}</div>`; }
  else if (id === 'sujets') { root.innerHTML = header + renderSujetsTypes(); }
  else if (id === 'examen') { renderExamen(); }
}


/* ═══════ DEEP LINK (hash : #cours=N&q=word ou #chap-N) ═══════ */
function parseDeepLink() {
  const h = window.location.hash || '';
  if (!h) return null;
  const out = {};
  // Format 1 : #chap-3
  let m = h.match(/^#chap-(\d+)$/);
  if (m) { out.chap = parseInt(m[1], 10); return out; }
  // Format 2 : #cours=3&q=mot&theme=xxx
  m = h.match(/^#([^?]+)/);
  if (m) {
    const params = new URLSearchParams(h.slice(1));
    if (params.has('cours')) out.chap = parseInt(params.get('cours'), 10);
    if (params.has('q')) out.q = params.get('q');
    if (params.has('theme')) out.theme = params.get('theme');
    if (params.has('tab')) out.tab = params.get('tab');
  }
  return Object.keys(out).length ? out : null;
}
function highlightInChapter(chapEl, word) {
  if (!chapEl || !word) return;
  const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  const walker = document.createTreeWalker(chapEl, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n => {
    if (!re.test(n.nodeValue)) return;
    re.lastIndex = 0;
    const span = document.createElement('span');
    span.innerHTML = n.nodeValue.replace(re, '<mark class="search-hit">$1</mark>');
    n.parentNode.replaceChild(span, n);
  });
}
function applyDeepLink() {
  const dl = parseDeepLink();
  if (!dl) return;
  if (dl.theme) coursTheme = dl.theme;
  // S'assurer qu'on est sur l'onglet cours
  const targetTab = dl.tab || 'cours';
  const jumper = () => {
    const el = dl.chap ? document.getElementById('chap-' + dl.chap) : null;
    if (el) {
      // Si le chapitre est masqué par le filtre, réinitialise à 'all'
      if (el.style.display === 'none') { coursTheme = 'all'; applyCoursFilter(); renderCoursPills(); }
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      el.classList.add('chap-target-flash');
      setTimeout(() => el.classList.remove('chap-target-flash'), 2400);
      if (dl.q) highlightInChapter(el, dl.q);
    }
  };
  if (currentTab !== targetTab) {
    window._pendingCoursJump = jumper;
    switchTab(targetTab);
  } else {
    setTimeout(jumper, 80);
  }
}
window.addEventListener('hashchange', applyDeepLink);

/* ═══════ CHECKLIST ═══════ */
function renderChecklist() {
  const items = DATA.checklistItems;
  const total = items.length;
  const done = items.filter(i => isChecked(COURSE_KEY + ':' + i.id)).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  saveCourseProgress(COURSE_KEY, done, total);
  const r = 54, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;

  return `
  <div class="cl-progress-wrap fade-up">
    <div style="position:relative;width:140px;height:140px;margin:0 auto">
      <svg width="140" height="140" viewBox="0 0 140 140" class="cl-ring-svg" aria-label="Progression ${pct}%">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="100%" stop-color="var(--copper)"/>
          </linearGradient>
        </defs>
        <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="10"/>
        <circle cx="70" cy="70" r="${r}" fill="none" stroke="url(#ringGrad)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
          style="transition:stroke-dashoffset 0.8s cubic-bezier(0.34,1.56,0.64,1)"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
        <div style="font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--text)">${pct}%</div>
        <div style="font-size:0.7rem;color:var(--text3);margin-top:2px">${done}/${total} points</div>
      </div>
    </div>
    <div style="margin-top:1.5rem;font-family:'Playfair Display',serif;font-size:1rem;color:var(--text2)">Progression du cours</div>
  </div>
  <div class="checklist-list fade-up-stagger">
    ${items.map(i => { const cid = COURSE_KEY + ':' + i.id, ck = isChecked(cid); return `
      <div class="cl-item${ck ? ' done' : ''}" data-id="${cid}" role="checkbox" aria-checked="${ck}" tabindex="0" onclick="handleCheck('${cid}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleCheck('${cid}');}">
        <div class="cl-box">${ck ? '✓' : ''}</div>
        <span class="cl-label">${i.label}</span>
      </div>`; }).join('')}
  </div>`;
}

function handleCheck(id) {
  toggleCheck(id);
  switchTab('checklist');
}

/* ═══════ FLASHCARDS ═══════ */
let fcQueue = [], fcKnown = [], fcFlipped = false, fcStreak = 0;
let fcSRS = {}, fcSRSMode = 'srs', fcSessionSize = 0;

function initFlashcards() {
  fcSRS = loadSRS(DATA.quizKey);
  const allowedIdx = new Set(getFilteredFlashcards());
  const total = allowedIdx.size;
  if (fcSRSMode === 'srs') {
    fcQueue = srsBuildQueue(fcSRS, DATA.flashcards.length).filter(i => allowedIdx.has(i)).slice(0, SRS_SESSION_MAX);
    if (fcQueue.length === 0) {
      fcQueue = shuffle([...allowedIdx]).slice(0, SRS_SESSION_MAX);
    }
  } else {
    fcQueue = shuffle([...allowedIdx]);
  }
  fcSessionSize = fcQueue.length;
  fcKnown = []; fcFlipped = false; fcStreak = 0;
}

function renderFlash() {
  initFlashcards();
  return buildFlashHTML();
}

function buildFlashHTML() {
  const total = DATA.flashcards.length;
  const knownCount = fcKnown.length;
  const pct = fcSessionSize > 0 ? Math.round(knownCount / fcSessionSize * 100) : 0;
  const stats = srsGetStats(fcSRS, total);

  if (fcQueue.length === 0) {
    launchConfetti();
    return `
    <div class="fade-up">
      <div class="fc-done">
        <div style="font-size:3rem;margin-bottom:0.5rem">🎉</div>
        <div class="fc-done-title">Toutes les cartes maîtrisées !</div>
        <p style="color:var(--text2);margin:0.5rem 0 1rem">${total}/${total} cartes — Score parfait</p>
        <button class="fc-reset-btn" onclick="resetFlash()">↺ Recommencer</button>
      </div>
    </div>`;
  }

  const card = DATA.flashcards[fcQueue[0]];
  const streakHTML = fcStreak >= 2 ? `<span class="fc-streak">🔥 ${fcStreak} d'affilée</span>` : '';
  return `
  <div class="fade-up">
    ${themeSelectorHTML('flash')}
    <div class="fc-header">
      <div class="fc-progress-bar">
        <div class="fc-pb-label">${knownCount} / ${fcSessionSize} en session · ${stats.learned}/${stats.total} maîtrisées${stats.due > 0 && fcSRSMode==='srs' ? ` · <span style=\"color:var(--orange)\">${stats.due} dues</span>` : ''} ${streakHTML}</div>
        <div class="fc-pb-track"><div class="fc-pb-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="fc-shortcuts">${fcSRSMode === 'srs' ? '🧠 SRS' : '🔀 Mélangé'} · <span onclick="toggleSRSMode()" style="cursor:pointer;text-decoration:underline">basculer</span></div>
    </div>
    <div class="fc-counter">Carte ${fcKnown.length + 1} sur ${total} — ${fcQueue.length} restante(s)</div>
    <div class="flashcard-container">
      <div class="flashcard${fcFlipped ? ' flipped' : ''}" id="fcCard" role="button" tabindex="0" aria-label="Carte de révision — cliquer ou Espace pour retourner" onclick="flipCard()" onkeydown="if(event.key==='Enter'){event.preventDefault();flipCard();}">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-q">${card.q}</div>
          <div class="flashcard-hint">Cliquez pour révéler la réponse</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-a">${card.a}</div>
        </div>
      </div>
    </div>
    <div class="fc-actions">
      <button class="fc-btn-review" onclick="markReview()" title="Raccourci : ←">
        <span class="fc-btn-lbl">✗ À revoir</span>
        <span class="fc-btn-iv">${srsFormatInterval(srsPreviewInterval(fcSRS[fcQueue[0]], 'again'))}</span>
      </button>
      <button class="fc-btn-known" onclick="markKnown()" title="Raccourci : ↓">
        <span class="fc-btn-lbl">✓ Bien</span>
        <span class="fc-btn-iv">${srsFormatInterval(srsPreviewInterval(fcSRS[fcQueue[0]], 'good'))}</span>
      </button>
      <button class="fc-btn-easy" onclick="markEasy()" title="Raccourci : →">
        <span class="fc-btn-lbl">★ Facile</span>
        <span class="fc-btn-iv">${srsFormatInterval(srsPreviewInterval(fcSRS[fcQueue[0]], 'easy'))}</span>
      </button>
    </div>
    <div style="text-align:center;margin-top:0.6rem">
      <button class="fc-btn-skip" onclick="skipCard()" title="Passer cette carte sans la noter">↪ Passer (sans noter)</button>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button class="fc-reset-btn" onclick="resetFlash()">↺ Réinitialiser</button>
    </div>
  </div>`;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  const card = document.getElementById('fcCard');
  if (card) card.classList.toggle('flipped', fcFlipped);
}

function markKnown() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'good');
  saveSRS(DATA.quizKey, fcSRS);
  fcKnown.push(idx); fcStreak++; fcFlipped = false; rerenderFlash();
}
function markReview() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'again');
  saveSRS(DATA.quizKey, fcSRS);
  fcQueue.push(idx); fcStreak = 0; fcFlipped = false; rerenderFlash();
}
function markEasy() {
  if (!fcQueue.length) return;
  const idx = fcQueue.shift();
  fcSRS[idx] = srsScheduleCard(fcSRS[idx], 'easy');
  saveSRS(DATA.quizKey, fcSRS);
  fcKnown.push(idx); fcStreak++; fcFlipped = false; rerenderFlash();
}
function skipCard() {
  if (!fcQueue.length) return;
  fcQueue.push(fcQueue.shift()); fcFlipped = false; rerenderFlash();
}
function toggleSRSMode() {
  fcSRSMode = (fcSRSMode === 'srs') ? 'shuffle' : 'srs';
  switchTab('flash');
}
function resetFlash() { initFlashcards(); rerenderFlash(); }

function rerenderFlash() {
  const ctx = { fcQueue, fcKnown, fcStreak, fcSRS, fcSRSMode, fcSessionSize };
  if (updateFlashCardPartial(DATA, ctx)) return;
  const root = document.getElementById('appRoot');
  const header = root.querySelector('.page-header') ? root.querySelector('.page-header').outerHTML : '';
  root.innerHTML = header + buildFlashHTML();
}

function bindFlash() { document.addEventListener('keydown', fcKeyHandler); }
function fcKeyHandler(e) {
  if (currentTab !== 'flash') { document.removeEventListener('keydown', fcKeyHandler); return; }
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  else if (e.code === 'ArrowLeft') { if (fcQueue.length > 0) markReview(); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); if (fcQueue.length > 0) markKnown(); }
  else if (e.code === 'ArrowRight') { if (fcQueue.length > 0) markEasy(); }
  else if (e.code === 'Tab' || e.code === 'KeyS') { e.preventDefault(); if (fcQueue.length > 0) skipCard(); }
}

/* ═══════ QUIZ ═══════ */
let quizState = null;
let timerInterval = null;
let timeLeft = 30;
let quizCount = 20;

function renderQuizSetup() {
  const scores = loadQuizScores(DATA.quizKey).slice(0, 3);
  const histHTML = scores.length === 0
    ? '<p style="color:var(--text3);font-size:0.82rem">Aucune partie précédente</p>'
    : scores.map(s => {
        const pct = Math.round(s.score / s.total * 100);
        const d = new Date(s.date);
        const ds = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
        return `<span class="quiz-score-pill"><span style="color:${col};font-weight:700">${s.score}/${s.total}</span><span style="color:var(--text3)">${ds}</span></span>`;
      }).join('');

  const filteredQuiz = getFilteredQuizQuestions();
  const quizSize = Math.min(quizCount, filteredQuiz.length);
  return `
  <div class="fade-up">
    ${themeSelectorHTML('quiz')}
    <div class="quiz-setup">
      <div style="font-size:2rem;margin-bottom:0.5rem">🎯</div>
      <h3>Quiz — ${DATA.title}</h3>
      <p>${quizSize} questions tirées au sort sur ${filteredQuiz.length}${quizTheme !== 'all' ? ' (thème filtré)' : ''}</p>
      <div class="quiz-count">
        <span class="quiz-count-label">Nombre de questions</span>
        <div class="quiz-count-opts">
          ${[5, 10, 20].map(n => `<button class="quiz-count-btn${quizCount === n ? ' active' : ''}" data-n="${n}" onclick="setQuizCount(${n})">${n}</button>`).join('')}
        </div>
      </div>
      <div class="quiz-history">
        <div class="quiz-history-title">Scores récents</div>
        ${histHTML}
      </div>
      <div id="timerToggle" class="quiz-timer-toggle" onclick="toggleTimer()">
        <span>⏱</span> Timer 30s par question
      </div>
      <br>
      <button class="start-btn" onclick="startQuiz()">Lancer le quiz</button>
    </div>
  </div>`;
}

function toggleTimer() {
  const el = document.getElementById('timerToggle');
  if (!el) return;
  const on = el.classList.toggle('on');
  el._timerOn = on;
  if (quizState) quizState.timerEnabled = on;
}

function startQuiz() {
  const timerEl = document.getElementById('timerToggle');
  const timerOn = timerEl ? !!timerEl._timerOn : false;
  const pool = getFilteredQuizQuestions();
  quizState = {
    questions: shuffle([...pool]).slice(0, Math.min(quizCount, pool.length)).map(quizShuffleQuestion),
    current: 0,
    answers: [],
    timerEnabled: timerOn,
    errors: []
  };
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (!quizState || quizState.current >= quizState.questions.length) { showQuizResult(); return; }
  clearInterval(timerInterval);
  timeLeft = 30;
  if (updateQuizQuestionPartial(quizState)) {
    if (quizState.timerEnabled) {
      const fill = document.getElementById('timerFill');
      if (fill) { fill.style.width = '100%'; fill.classList.remove('warn'); }
      const label = document.getElementById('timerLabel');
      if (label) label.textContent = timeLeft + 's';
      startQuestionTimer(quizState.current);
    }
    return;
  }
  const qi = quizState.current;
  const q = quizState.questions[qi];
  const total = quizState.questions.length;
  const letters = ['A','B','C','D'];
  const timerBar = quizState.timerEnabled ? `<div class="quiz-timer-bar"><div class="quiz-timer-fill" id="timerFill" style="width:100%"></div></div>` : '';
  const timerLabel = quizState.timerEnabled ? `<span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:0.78rem" id="timerLabel">${timeLeft}s</span>` : '';

  const root = document.getElementById('appRoot');
  root.innerHTML = `
  <div class="page-header">
    <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
    <div class="page-title">${DATA.title}</div>
    <div class="page-subtitle">${DATA.subtitle}</div>
  </div>
  <div class="fade-up">
    <div class="quiz-progress">
      <span>Question ${qi + 1} / ${total}</span>
      ${timerLabel}
    </div>
    ${timerBar}
    <div class="quiz-global-bar"><div class="quiz-global-fill" style="width:${Math.round((qi/total)*100)}%"></div></div>
    <div class="quiz-card" id="quizCard">${q.type === 'tf' ? '' : `
      <div class="quiz-q-num">Q${qi + 1}</div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options" id="quizOpts">
        ${q.o.map((opt, i) => `
          <button class="quiz-option" data-i="${i}" onclick="selectAnswer(event, ${qi}, ${i})">
            <div class="opt-letter">${letters[i]}</div>
            <span>${opt}</span>
          </button>`).join('')}
      </div>`}
    </div>
  </div>`;

  if (q.type === 'tf') renderTFQuestionInline(document.getElementById('quizCard'), q, qi, quizState);
  document.querySelectorAll('.quiz-option').forEach(attachRipple);

  if (quizState.timerEnabled) startQuestionTimer(qi);
}

function startQuestionTimer(qi) {
  timeLeft = 30;
  const fill = document.getElementById('timerFill');
  const label = document.getElementById('timerLabel');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    if (fill) {
      fill.style.width = (timeLeft / 30 * 100) + '%';
      if (timeLeft <= 10) fill.classList.add('warn');
    }
    if (label) label.textContent = timeLeft + 's';
    if (timeLeft <= 0) { clearInterval(timerInterval); autoWrong(qi); }
  }, 1000);
}

function autoWrong(qi) {
  if (!quizState || quizState.answers[qi] !== undefined) return;
  quizState.answers[qi] = -1;
  quizState.errors.push({ qi, chosen: -1 });
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.classList.add('disabled'));
  const q = quizState.questions[qi];
  if (opts[q.c]) opts[q.c].classList.add('correct');
  document.getElementById('quizCard').classList.add('shake');
  showExplanation(q, true, qi);
}

function selectAnswer(ev, qi, chosen) {
  if (!quizState || quizState.answers[qi] !== undefined) return;
  clearInterval(timerInterval);
  quizState.answers[qi] = chosen;
  const q = quizState.questions[qi];
  const correct = chosen === q.c;
  if (!correct) quizState.errors.push({ qi, chosen });
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[q.c].classList.add('correct');
  opts[q.c].classList.add('correct-highlight');
  if (!correct) {
    if (opts[chosen]) opts[chosen].classList.add('wrong');
    document.getElementById('quizCard').classList.add('shake');
    setTimeout(() => document.getElementById('quizCard')?.classList.remove('shake'), 500);
  }
  showExplanation(q, !correct, qi);
}

function showExplanation(q, wrong, qi) {
  const card = document.getElementById('quizCard');
  if (!card) return;
  const expl = document.createElement('div');
  expl.className = 'quiz-expl';
  expl.textContent = q.e;
  card.appendChild(expl);
  const nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-next-btn';
  const isLast = quizState.current >= quizState.questions.length - 1;
  nextBtn.textContent = isLast ? 'Voir les résultats →' : 'Question suivante →';
  nextBtn.onclick = () => { quizState.current++; renderQuizQuestion(); };
  card.appendChild(nextBtn);
}

function showQuizResult() {
  clearInterval(timerInterval);
  const total = quizState.questions.length;
  const score = quizState.answers.filter((a, i) => isQuestionCorrect(quizState.questions[i], a)).length;
  saveQuizScore(DATA.quizKey, score, total);
  const pct = Math.round(score / total * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 75 ? '🎉' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 90 ? 'Excellent !' : pct >= 75 ? 'Très bien !' : pct >= 50 ? 'Bien !' : 'Continue tes efforts !';
  if (pct >= 90) launchConfetti();

  const errorsHTML = quizState.errors.length === 0
    ? '<p style="color:var(--green);text-align:center;margin-top:1rem">Aucune erreur — parfait !</p>'
    : `<div class="errors-list">
        <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:0.7rem">Erreurs à revoir</div>
        ${quizState.errors.map(err => {
          const q = quizState.questions[err.qi];
          const yourAns = q.type === 'tf' ? '' : (err.chosen >= 0 && q.o ? q.o[err.chosen] : 'Pas de réponse');
          return `<div class="error-item"><div class="eq">${q.q}</div>${yourAns ? `<div class="ea-wrong">✗ Ta réponse : ${yourAns}</div>` : ''}<div class="ea">${formatCorrectAnswerHTML(q)}</div>${q.e ? `<div class="ea-expl">${q.e}</div>` : ''}</div>`;
        }).join('')}
      </div>`;

  const root = document.getElementById('appRoot');
  root.innerHTML = `
  <div class="page-header">
    <button class="back-home" onclick="window.location.href='index.html'">← Accueil</button>
    <div class="page-title">${DATA.title}</div>
    <div class="page-subtitle">${DATA.subtitle}</div>
  </div>
  <div class="fade-up">
    <div class="score-box">
      <div class="score-emoji">${emoji}</div>
      <div class="score-num" id="scoreNum">0/${total}</div>
      <div class="score-label">${msg} · ${pct}%</div>
      <div class="score-actions">
        <button class="btn-secondary" onclick="switchTab('quiz')">↺ Relancer</button>
        <button class="btn-primary" id="errBtn" onclick="toggleErrors()">${quizState.errors.length > 0 ? 'Voir les erreurs' : "Pas d'erreurs"}</button>
        ${quizState.errors.length > 0 ? `<button class="btn-secondary" onclick="replayErrors()">↻ Rejouer mes ${quizState.errors.length} erreur${quizState.errors.length > 1 ? 's' : ''}</button>` : ''}
      </div>
      <div id="errSection" style="display:none">${errorsHTML}</div>
    </div>
  </div>`;

  const el = document.getElementById('scoreNum');
  const start = Date.now();
  const dur = 1500;
  (function tick() {
    const t = Math.min((Date.now() - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(ease * score) + '/' + total;
    if (t < 1) requestAnimationFrame(tick);
  })();
}

function toggleErrors() {
  const sec = document.getElementById('errSection');
  const btn = document.getElementById('errBtn');
  if (!sec) return;
  const visible = sec.style.display !== 'none';
  sec.style.display = visible ? 'none' : 'block';
  if (btn) btn.textContent = visible ? 'Voir les erreurs' : 'Masquer les erreurs';
}
